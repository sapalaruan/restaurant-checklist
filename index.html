const MAINT_BUCKET = 'maint-photos';

function getGpsCoords(){
  return new Promise(resolve=>{
    if(!navigator.geolocation){ resolve({gps:'', acc:null, err:'Walang geolocation sa browser na ito'}); return; }
    let best=null, watchId=null, done=false;
    const finish=()=>{
      if(done) return; done=true;
      try{ if(watchId!=null) navigator.geolocation.clearWatch(watchId); }catch(e){}
      if(best){
        resolve({gps:best.coords.latitude.toFixed(6)+','+best.coords.longitude.toFixed(6), acc:Math.round(best.coords.accuracy), err:''});
      }else{
        resolve({gps:'', acc:null, err:'Hindi makuha ang lokasyon (timeout o naka-off ang Location)'});
      }
    };
    try{
      watchId=navigator.geolocation.watchPosition(
        p=>{
          if(!best || p.coords.accuracy < best.coords.accuracy) best=p;
          if(best && best.coords.accuracy <= 12) finish(); // sapat na ang tumpak, tigil na
        },
        e=>{ if(!best && e && e.code===1){ done=true; try{if(watchId!=null)navigator.geolocation.clearWatch(watchId);}catch(_){}
               resolve({gps:'', acc:null, err:'Hindi pinayagan ang Location (Permission Denied)'}); } },
        {enableHighAccuracy:true, maximumAge:0, timeout:20000}
      );
    }catch(e){ finish(); return; }
    setTimeout(finish, 14000); // kunin ang pinaka-tumpak sa loob ng ~14s
  });
}

function compressImage(file, maxDim, quality){
  return new Promise((resolve,reject)=>{
    const reader=new FileReader();
    reader.onload=e=>{
      const img=new Image();
      img.onload=()=>{
        let w=img.width, h=img.height;
        if(w>h && w>maxDim){ h=Math.round(h*maxDim/w); w=maxDim; }
        else if(h>maxDim){ w=Math.round(w*maxDim/h); h=maxDim; }
        const canvas=document.createElement('canvas'); canvas.width=w; canvas.height=h;
        canvas.getContext('2d').drawImage(img,0,0,w,h);
        canvas.toBlob(b=>b?resolve(b):reject(new Error('compress failed')),'image/jpeg',quality);
      };
      img.onerror=()=>reject(new Error('image load failed'));
      img.src=e.target.result;
    };
    reader.onerror=()=>reject(new Error('read failed'));
    reader.readAsDataURL(file);
  });
}

function startMaintCapture(taskId, stepId){
  const input=document.createElement('input');
  input.type='file'; input.accept='image/*'; input.setAttribute('capture','environment');
  input.onchange=async()=>{
    const file=input.files&&input.files[0]; if(!file) return;
    const t=cache.maintTasks.find(x=>x.id===taskId); const due=maintComputeDue(t);
    const st=cache.maintState[taskId]||{}; if(st.due_date!==due.dueDate){ st.due_date=due.dueDate; st.captures={}; }
    st.captures=st.captures||{};
    // show inline "uploading" state (no blocking alert)
    st.captures[stepId]={ts:maintNowTime(), gps:'', url:'', uploading:true};
    cache.maintState[taskId]=st; render();
    try{
      const g=await getGpsCoords();
      const gps=g.gps;
      const blob=await compressImage(file, 1280, 0.6);
      const path=taskId+'/'+stepId+'_'+Date.now()+'.jpg';
      const up=await sb.storage.from(MAINT_BUCKET).upload(path, blob, {contentType:'image/jpeg', upsert:true});
      if(up.error) throw up.error;
      const signed=await sb.storage.from(MAINT_BUCKET).createSignedUrl(path, 60*60*24*7); // 7 araw (tugma sa auto-delete)
      const url=(signed.data && signed.data.signedUrl) ? signed.data.signedUrl : '';
      st.captures[stepId]={ts:maintNowTime(), gps, acc:g.acc||null, url, path};
      cache.maintState[taskId]=st; await saveMaintState(taskId,st); render();
      if(!gps){ setTimeout(()=>alert('Na-upload ang litrato, pero walang GPS.\n\nDahilan: '+(g.err||'hindi alam')+'\n\nTip: i-allow ang Location, kumuha malapit sa bintana/labas, tapos kunan ulit.'),150); }
      else if(g.acc && g.acc>50){ setTimeout(()=>alert('Na-kuha ang GPS pero hindi gaanong tumpak (±'+g.acc+'m).\n\nPara mas tumpak: kumuha malapit sa labas o bintana, tapos kunan ulit.'),150); }
    }catch(e){
      console.error('maint capture',e);
      delete st.captures[stepId]; cache.maintState[taskId]=st; render();
      const m=(e&&e.message)?e.message:'hindi alam';
      setTimeout(()=>alert('Hindi na-upload ang litrato.\n\nDahilan: '+m+'\n\nKung tungkol sa storage/bucket, hindi pa kumpleto ang Phase B1 SQL. Kung internet, subukan ulit.'),150);
    }
  };
  input.click();
}

function cashierCompute(d){
  const expenses=csum(d.expenses), cashAdded=csum(d.cash_added), gcash=csum(d.gcash), card=csum(d.card), vault=csum(d.vault);
  const closing=d.shifts.length?d.shifts[d.shifts.length-1]:null;
  const actualDrawer=closing?Number(closing.acoh):null;
  let cashSales=null, expectedDrawer=null, discrepancy=null, balanced=null;
  if(d.total_sales!=null && d.opening_acoh!=null && actualDrawer!=null){
    cashSales=Number(d.total_sales)-gcash-card;
    expectedDrawer=Number(d.opening_acoh)+cashSales+cashAdded-expenses-vault;
    discrepancy=actualDrawer-expectedDrawer;
    balanced=Math.abs(discrepancy) < (Number(d.tolerance)||1);
  }
  return {expenses,cashAdded,gcash,card,vault,actualDrawer,cashSales,expectedDrawer,discrepancy,balanced};
}

function cashierReportCard(d,c,role){
  const submitted = !!d.submitted_by;
  const revealed = (role==='owner' || role==='manager' || submitted);

  if(c.discrepancy==null){ disc=`<div class="disc-pend-box">Hinihintay ang Total Sales — hindi pa ma-compute ang discrepancy</div>`; }

function cTime(){ return new Date().toLocaleTimeString('en-PH',{hour:'2-digit',minute:'2-digit',timeZone:'Asia/Manila'}); }
function startCardReportUpload(d){
  const input=document.createElement('input');
  input.type='file'; input.accept='image/*,application/pdf';
  input.onchange=async()=>{
    const file=input.files&&input.files[0]; if(!file) return;
    try{
      const ext=(file.name.split('.').pop()||'dat').toLowerCase();
      const path=d.date+'/card_'+Date.now()+'.'+ext;
      const up=await sb.storage.from('cashier-docs').upload(path,file,{upsert:true,contentType:file.type||undefined});
      if(up.error) throw up.error;
      d.card_report_url=path; // store PATH; signed URL generated on view (private bucket)
      await saveCashierDay(d); alert('✓ Na-upload ang card report.'); render();
    }catch(e){ console.error('card report upload',e); alert('Hindi na-upload ang card report.\n\nDahilan: '+((e&&e.message)||'hindi alam')+'\n\nKung tungkol sa bucket, patakbuhin ang cashier-docs SQL.'); }
  };
  input.click();
}
function cStamp(){ return new Date().toLocaleString('en-PH',{timeZone:'Asia/Manila',month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'}); }
let cashierPoll=null;
function startCashierPoll(){
  if(cashierPoll) clearInterval(cashierPoll);
  cashierPoll=setInterval(async()=>{
    if(route!=='cashier'){ clearInterval(cashierPoll); cashierPoll=null; return; }
    const sig=a=>JSON.stringify((a||[]).map(x=>[x.id,x.status]));
    const before=sig(getCashierDay().audits);
    await loadCashier();
    const after=sig(getCashierDay().audits);
    const ae=document.activeElement;
    const typing=ae&&(ae.tagName==='INPUT'||ae.tagName==='TEXTAREA');
    if(before!==after && !typing) render();
  }, 20000);
}
function pendingAuditTodayObj(){ const d=cache.cashier && cache.cashier[cashierToday()]; if(!d||!d.audits) return null; return d.audits.find(a=>a.status==='pending_count')||null; }
let auditWatch=null;
function startAuditWatch(){
  if(auditWatch) clearInterval(auditWatch);
  auditWatch=setInterval(async()=>{
    if(!session || session.role!=='staff'){ clearInterval(auditWatch); auditWatch=null; return; }
    await loadCashier();
    const ae=document.activeElement; const typing=ae&&(ae.tagName==='INPUT'||ae.tagName==='TEXTAREA');
    if(pendingAuditTodayObj() && !typing) render();

}

function csvCell(v){ v=(v==null?'':String(v)).replace(/"/g,'""'); return /[",\n]/.test(v)?`"${v}"`:v; }
function cashierExportCSV(){
  if(!session||session.role!=='owner'){ alert('Owner lang ang pwedeng mag-download ng CSV.'); return; }
  const days=Object.values(cache.cashier||{}).sort((a,b)=>a.date<b.date?1:-1);
  const hdr=['Date','Status','Opening ACOH','Total Sales (UTAK)','GCash','Card','Expenses','Vault','Cash Infusion','Actual Drawer','Expected','Discrepancy','Submitted by','Corrected by','Verified by','Incident'];
  const rows=days.map(d=>{ const c=cashierCompute(d); return [d.date,d.status,d.opening_acoh,d.total_sales,csum(d.gcash),csum(d.card),csum(d.expenses),csum(d.vault),csum(d.cash_added),c.actualDrawer,c.expectedDrawer,c.discrepancy,d.submitted_by,d.corrected_by,d.verified_by,d.incident].map(csvCell).join(','); });
  const csv=[hdr.join(','),...rows].join('\n');
  const a=document.createElement('a'); a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'})); a.download='cashier_'+cashierToday()+'.csv'; a.click();
}
async function cashierCheckDiscrepancy(d){
  const c=cashierCompute(d);
  if(c.discrepancy==null || c.balanced){ return; }
  if(d._alerted) return; d._alerted=true;
  const closing=d.shifts[d.shifts.length-1];
  const w=c.discrepancy<0?'KULANG':'SOBRA';
  const msg='*CASHIER DISCREPANCY*\n'+d.date+'\n'+w+': '+peso(Math.abs(c.discrepancy))+'\nCashier: '+(closing?closing.cashier:'')+'\nExpected: '+peso(c.expectedDrawer)+' | Actual: '+peso(c.actualDrawer);
  try{ await sb.rpc('send_whatsapp_alert',{msg}); }catch(e){ console.error('cashier alert',e); }
}
function bindCashier(){

  const csvb=document.getElementById('c-csv');
  if(csvb) csvb.addEventListener('click',cashierExportCSV);
  const val=id=>{const e=document.getElementById(id);return e?e.value.trim():'';};
  const num=id=>{const v=val(id);return v===''?null:Number(v);};
  document.querySelectorAll('[data-denom]').forEach(el=>el.addEventListener('input',()=>{

  const es=document.getElementById('ce-save');

    } else if(key==='cash_added'){
      const amount=num('ce-amount'); if(!val('ce-desc')||amount==null){alert('Kailangan ng dahilan at amount.');return;}
      d.cash_added=d.cash_added||[]; d.cash_added.push({desc:val('ce-desc'),amount});
    } else {
      const amount=num('ce-amount'), ref=val('ce-ref');

      d[key].push({ref,amount});
    }

  });
  document.querySelectorAll('[data-cdel]').forEach(el=>el.addEventListener('click',async()=>{
    const [key,i]=el.dataset.cdel.split('|'); d[key].splice(Number(i),1);
    await saveCashierDay(d); await cashierCheckDiscrepancy(d); render();
  }));

  const tol=document.getElementById('c-tol-save');

  const as2=document.getElementById('c-audit-save');

    d.audits.push({id:'a'+Date.now(), at:cStamp(), total_sales:t, by:session.name, status:'pending_count', acoh:null, cash_sales:null, expected:null, discrepancy:null, counted_by:null, counted_at:null});

    pa.denoms=denomBreakdown('aud');

      else if(fixType==='gcash') d.gcash.push({ref:fixDetail,amount:fixAmt,corrected:true});
      else if(fixType==='card') d.card.push({ref:fixDetail,amount:fixAmt,corrected:true});
      else if(fixType==='cash_sales'){ d.cash_added=d.cash_added||[]; d.cash_added.push({desc:'(cash sales hindi naitala) '+fixDetail,amount:fixAmt,kind:'sales',corrected:true}); }
      else { d.cash_added=d.cash_added||[]; d.cash_added.push({desc:fixDetail,amount:fixAmt,kind:'infusion',corrected:true}); }
    }
    const closing=d.shifts[d.shifts.length-1]; d.corrections=d.corrections||{};
    if(fixAcoh!=null && closing && fixAcoh!==Number(closing.acoh)){ if(!('closing_acoh' in d.corrections)) d.corrections.closing_acoh=Number(closing.acoh); closing.acoh=fixAcoh; }
    d.incident=incident; d.corrected_by=session.name; d.corrected_at=cStamp(); d.status='corrected';
    await saveCashierDay(d); alert('✓ Na-submit ang correction + incident. Ipapadala sa Owner/Manager.'); render();
  });
  const cup=document.getElementById('c-card-up');
  if(cup) cup.addEventListener('click',()=>startCardReportUpload(d));
  const cvw=document.getElementById('c-card-view');
  if(cvw) cvw.addEventListener('click',async()=>{
    try{ const s=await sb.storage.from('cashier-docs').createSignedUrl(d.card_report_url, 3600);
      if(s.data&&s.data.signedUrl) window.open(s.data.signedUrl,'_blank'); else alert('Hindi mabuksan ang report.');
    }catch(e){ alert('Hindi mabuksan: '+((e&&e.message)||'')); }
  });
  const reopen=document.getElementById('c-reopen');
  if(reopen) reopen.addEventListener('click',async()=>{
    if(!confirm('Magbukas ulit ng kaha para ituloy ang orders? Mananatili ang record at incident; pwede mong i-submit ulit mamaya.')) return;
    d.submitted_by=null; d.submitted_at=null; if(d.status==='submitted') d.status='open';
    await saveCashierDay(d); render();
  });
  const sub=document.getElementById('c-submit');
  if(sub) sub.addEventListener('click',async()=>{
    if(!confirm('I-submit na ang cash reconciliation? Pagkatapos nito, hindi mo na mababago ang mga entry (maliban sa correction kung may discrepancy), at makikita mo na ang Total Sales at resulta.')) return;
    d.submitted_by=session.name; d.submitted_at=cStamp(); if(d.status==='open') d.status='submitted';
    await saveCashierDay(d); await cashierCheckDiscrepancy(d); render();
  });
  const ve=document.getElementById('c-verify');
  if(ve) ve.addEventListener('click',async()=>{ d.verified_by=session.name; d.verified_at=cStamp(); d.status='verified'; await saveCashierDay(d); alert('✓ Na-verify.'); render(); });
}

function escapeHtml(str){
  return String(str ?? '')
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;')
    .replace(/'/g,'&#39;');
}

(async function start(){
  await initData();
  await utilLoadData();
  await loadPhaseA();
  await loadCashier();
  render();
  if(session && session.role==='staff') startAuditWatch();
  setupAutoLogout();
})();

/* ----- Auto-logout after 5 minutes of inactivity ----- */
let inactivityTimer = null;
const INACTIVITY_MS = 5 * 60 * 1000; // 5 minutes
function resetInactivityTimer(){
  if(!session) return; // only when logged in
  if(inactivityTimer) clearTimeout(inactivityTimer);
  inactivityTimer = setTimeout(()=>{
    if(session){
      session = null;
      DB.save('session', null);
      route = 'login';
      render();
      setTimeout(()=>alert('Naka-logout ka dahil 5 minuto nang walang aktibidad. Mag-login ulit.'), 150);
    }
  }, INACTIVITY_MS);
}
function setupAutoLogout(){
  ['click','touchstart','keydown','scroll','input'].forEach(evt=>{
    document.addEventListener(evt, resetInactivityTimer, {passive:true});
  });
  resetInactivityTimer();
}
