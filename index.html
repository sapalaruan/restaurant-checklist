"D","f":"15. Sabotage Committing act/s of sabotage in any form or manner."},{"r":"Acts Against Peace and Order","t":"Unauthorized Distribution of Printed or Computer Network Materials","s":"C","f":"16. Unauthorized Distribution of Printed or Computer Network Materials Distributing written or sending computer network/e-mail and related materials of any description to employees, visitors, vendors, and guests without proper authorization form KAWAYANAN RESTAURANT OPC Management."},{"r":"Acts Against Peace and Order","t":"Unauthorized Posters/Announcements/Notices","s":"C","f":"17. Unauthorized Posters/Announcements/Notices Putting up of notices, announcements, posters, or other similar materials in KAWAYANAN RESTAURANT OPC premises or in KAWAYANAN RESTAURANT OPC\u2019s computer network or work premises without proper authorization from KAWAYANAN RESTAURANT OPC Management."},{"r":"Acts Against Peace and Order","t":"Other Acts of Disturbing Peace and Order","s":"D","f":"18. Other Acts of Disturbing Peace and Order Committing any other acts which disturb the peace and order within KAWAYANAN RESTAURANT OPC premises, whether on or off-duty."},{"r":"Acts Against Good Conduct and Behavior","t":"Libel/Slander","s":"D","f":"Libel/Slander Making libelous, malicious and false utterances or statements, publications or engaging in gossip which tend to cause dishonor or embarrassment to employees, visitors, vendors and guests."},{"r":"Acts Against Good Conduct and Behavior","t":"Discourtesy and Use of Disrespectful Language","s":"D","f":"2. Discourtesy and Use of Disrespectful Language Discourtesy either by acts or words, using disrespectful or offensive language against employees, visitors, vendors and guests."},{"r":"Acts Against Good Conduct and Behavior","t":"Abuse of Authority","s":"D","f":"3. Abuse of Authority Coercion, maltreatment, favoritism or any retaliatory act against a subordinate."},{"r":"Acts Against Good Conduct and Behavior","t":"Uncontrolled Temper/Discourtesy","s":"C","f":"4. Uncontrolled Temper/Discourtesy Displaying uncontrolled temper/discourtesy unbecoming of a decent KAWAYANAN RESTAURANT OPC employee."},{"r":"Acts Against Good Conduct and Behavior","t":"Tampering of KAWAYANAN RESTAURANT OPC Announcements/Posters","s":"D","f":"5. Tampering of KAWAYANAN RESTAURANT OPC Announcements/Posters Removing, defacing, tearing, mutilating, or otherwise altering the contents and/or form of any official announcement, poster, memorandum, circular or other KAWAYANAN RESTAURANT OPC documents placed on Bulletin Boards by KAWAYANAN RESTAURANT OPC Management."},{"r":"Acts Against Good Conduct and Behavior","t":"Vandalism","s":"D","f":"6. Vandalism Writing on walls, work stations, sleeping quarters, comfort rooms, locker rooms, lockers, elevators, machines, equipment or any KAWAYANAN RESTAURANT OPC property or premises."},{"r":"Acts Against Good Conduct and Behavior","t":"Being Under the Influence of Liquor or other Controlled Substances","s":"D","f":"7. Being Under the Influence of Liquor or other Controlled Substances Being under the influence of liquor or other controlled substances such as prohibited drugs, within KAWAYANAN RESTAURANT OPC premises or work area."},{"r":"Acts Against Good Conduct and Behavior","t":"Drinking Alcoholic Beverage","s":"D","f":"8. Drinking Alcoholic Beverage Drinking alcoholic beverages within KAWAYANAN RESTAURANT OPC premises or outside KAWAYANAN RESTAURANT OPC premises but performing official work/business, except in KAWAYANAN RESTAURANT OPC authorized functions."},{"r":"Acts Against Good Conduct and Behavior","t":"Refusing to Follow Medical Advice","s":"C","f":"9. Refusing to Follow Medical Advice Refusing to follow the medical advice of the KAWAYANAN RESTAURANT OPC Physician after being certified as \u201cunfit to work.\u201d"},{"r":"Acts Against Good Conduct and Behavior","t":"Refusing to Work","s":"C","f":"10. Refusing to Work Refusing to report for work after being certified as \u201cfit to work\u201d by the KAWAYANAN RESTAURANT OPC Physician."},{"r":"Acts Against Good Conduct and Behavior","t":"Refusing to Accept Work, Change of Shift or Work Locations","s":"D","f":"11. Refusing to Accept Work, Change of Shift or Work Locations Refusing to accept work assignment, change of shift or work locations as required by the exigencies of the service or business operations."},{"r":"Acts Against Good Conduct and Behavior","t":"Refusing to Render Overtime or Holiday/Rest Day Work","s":"C","f":"12. Refusing to Render Overtime or Holiday/Rest Day Work Refusing to render overtime, holiday or rest day work despite legitimate circumstances and reasonable notice, and/or after signifying willingness to perform authorized OT works."},{"r":"Acts Against Good Conduct and Behavior","t":"Refusing to Work on Official Business","s":"C","f":"13. Refusing to Work on Official Business Refusing to do official business outside KAWAYANAN RESTAURANT OPC premises or outside working hours when required to do so by the superior."},{"r":"Acts Against Good Conduct and Behavior","t":"Refusing to Cooperate","s":"D","f":"14. Refusing to Cooperate Refusing to cooperate with other employees or personnel in consonance with duties and responsibilities, causing disruption of operations of the department or the business."},{"r":"Acts Against Good Conduct and Behavior","t":"Refusing to Notify about Contagious or Deadly Disease","s":"D","f":"15. Refusing to Notify about Contagious or Deadly Disease Refusing to notify superior or HR about one\u2019s own contagious, communicable or deadly disease or refusing to notify superior or HR while knowing another employee is suffering from contagious, communicable or deadly disease."},{"r":"Acts Against Good Conduct and Behavior","t":"Refusing to Comply with Sanitation Rules","s":"D","f":"16. Refusing to Comply with Sanitation Rules Refusing to comply with sanitation rules or improper use of sanitation facilities, i.e. non-flushing of toilets, spitting, urinating at improper receptacles or areas, littering and performing other unsanitary acts."},{"r":"Acts Against Good Conduct and Behavior","t":"Refusing to Submit Required Medical Examination and any other tests","s":"D","f":"17. Refusing to Submit Required Medical Examination and any other tests Refusing to submit to the required Medical, Dental, Physical and other health examinations, i.e., prohibited drugs, HIV, Hepatitis, Sexually Transmitted Diseases that are required by KAWAYANAN RESTAURANT OPC especially ones that the employee/agreed to"},{"r":"Acts Against Good Conduct and Behavior","t":"Refusing to Carry Out Instructions","s":"D","f":"18. Refusing to Carry Out Instructions Refusing to carry out verbal or written instructions, policies and procedures or standard operating procedures or any legitimate order issued by the KAWAYANAN RESTAURANT OPC management."},{"r":"Acts Against Good Conduct and Behavior","t":"Refusing to Comply with Government Requirements","s":"D","f":"19. Refusing to Comply with Government Requirements Refusing to comply with the national and local government requirements as required by KAWAYANAN RESTAURANT OPC, i.e. health certificates, police clearance, etc."},{"r":"Acts Against Good Conduct and Behavior","t":"Engaging in Any Form of Gambling or Game of Chance","s":"D","f":"20. Engaging in Any Form of Gambling or Game of Chance Engaging in any form of gambling or games of chance inside KAWAYANAN RESTAURANT OPC premises or while on duty outside KAWAYANAN RESTAURANT OPC premises."},{"r":"Acts Against Good Conduct and Behavior","t":"Horseplay","s":"C","f":"21. Horseplay Engaging in horseplay, mischief, running, making pranks, scuffling, throwing things or other misdemeanors, improper or unnecessary acts while in KAWAYANAN RESTAURANT OPC premises."},{"r":"Acts Against Good Conduct and Behavior","t":"Engaging in Usury","s":"D","f":"22. Engaging in Usury Engaging in usurious money lending business with employees, visitors, vendors and guests."},{"r":"Acts Against Good Conduct and Behavior","t":"Refusing to Follow Policy on the Use and Care of KAWAYANAN RESTAURANT OPC Property and Res","s":"C","f":"23. Refusing to Follow Policy on the Use and Care of KAWAYANAN RESTAURANT OPC Property and Resources Refusing to follow policy on the use and care of KAWAYANAN RESTAURANT OPC property and resources."},{"r":"Acts Against Good Conduct and Behavior","t":"Refusing to Attend a Scheduled Training Session or Seminar","s":"C","f":"24. Refusing to Attend a Scheduled Training Session or Seminar Refusing to attend a scheduled training session or seminar despite advance notice."},{"r":"Acts Against Good Conduct and Behavior","t":"Unauthorized Activities","s":"C","f":"25. Unauthorized Activities Conducting unauthorized activities, personal business, i.e. buy and sell business, or any unnecessary undertaking such as watching TV, playing, sending irrelevant e-mail or text messages, reading unnecessary materials, surfing the internet on KAWAYANAN RESTAURANT OPC time and/or premises without due permission, from the Management."},{"r":"Acts Against Good Conduct and Behavior","t":"Holding Unauthorized Meetings","s":"D","f":"26. Holding Unauthorized Meetings Holding unauthorized meetings, i.e. meetings not related to KAWAYANAN RESTAURANT OPC business, or holding illegal assembly within KAWAYANAN RESTAURANT OPC premises or while on duty."},{"r":"Acts Against Good Conduct and Behavior","t":"Smoking/Chewing Gum","s":"C","f":"27. Smoking/Chewing Gum Smoking or chewing gum while on duty and/or in the presence of other employees, visitors, vendors and guests."},{"r":"Acts Against Good Conduct and Behavior","t":"Loafing and Loitering While on Duty","s":"B","f":"28. Loafing and Loitering While on Duty Loafing, loitering, malingering, wasting time inside the production floor, administrative offices while on break, and/or duty."},{"r":"Acts Against Good Conduct and Behavior","t":"Working or Indulging in Strenuous Activity","s":"C","f":"29. Working or Indulging in Strenuous Activity Working, moonlighting or indulging in strenuous or irregular physical activity at the time of a home visit, or after being sent home or after sending a \u201csick notice.\u201d"},{"r":"Acts Against Good Conduct and Behavior","t":"Loafing or Loitering After End of Working Hours","s":"B","f":"30. Loafing or Loitering After End of Working Hours Loafing and loitering in KAWAYANAN RESTAURANT OPC premises after the end of working hours to malinger, socialize with other employees, visitors and pass away the time, or for any other reason."},{"r":"Acts Against Good Conduct and Behavior","t":"Prolonging Break or Rest Periods","s":"B","f":"31. Prolonging Break or Rest Periods Prolonging break or rest periods or taking more break times than authorized."},{"r":"Acts Against Good Conduct and Behavior","t":"Taking meal Breaks at Unauthorized times","s":"A","f":"32. Taking meal Breaks at Unauthorized times Not following scheduled break time or taking meals prior to break time without approval by supervisor or any KAWAYANAN RESTAURANT OPC authorized personnel/manager."},{"r":"Acts Against Good Conduct and Behavior","t":"Leaving Duty Area/s or Going Outside KAWAYANAN RESTAURANT OPC premises","s":"C","f":"33. Leaving Duty Area/s or Going Outside KAWAYANAN RESTAURANT OPC premises Leaving duty area/s or going outside KAWAYANAN RESTAURANT OPC premises during working hours without proper authorization and relief."},{"r":"Acts Against Good Conduct and Behavior","t":"Extending Leave Periods","s":"B","f":"34. Extending Leave Periods Continuing to go on leave despite disapproval by the supervisor or any KAWAYANAN RESTAURANT OPC authorized personnel/manager or extending original period previously- authorized vacation or sick-leave without prior authorization or justifiable reason."},{"r":"Acts Against Good Conduct and Behavior","t":"Bringing In/Storing of Personal Belongings","s":"B","f":"35. Bringing In/Storing of Personal Belongings Bringing in/Storing of personal belongings in other lockers or areas not assigned to the employee or personnel."},{"r":"Acts Against Good Conduct and Behavior","t":"Insubordination","s":"D","f":"36. Insubordination Willfully defying or disregarding KAWAYANAN RESTAURANT OPC authority. Disobeying, delaying or non-execution of any official system/procedure or any direct order or instruction written or verbal (with witnesses), that results to re-work disruption, prejudice, work stoppage, slowdown, delay, accident, injuries, damages or loss."},{"r":"Acts Against Good Conduct and Behavior","t":"Engaging in Activities Promoting Non-work Relationships between supervisor or any KAWAYANA","s":"B","f":"37. Engaging in Activities Promoting Non-work Relationships between supervisor or any KAWAYANAN RESTAURANT OPC authorized personnels/Managers and Subordinates Engaging in activities promoting or encouraging Non-Work Relationships between employees and supervisor or any KAWAYANAN RESTAURANT OPC authorized personnels/managers or administration personnel or failure to report Non-work relationships of"},{"r":"Acts Against Good Conduct and Behavior","t":"Behaving in Unbecoming Conduct","s":"B","f":"38. Behaving in Unbecoming Conduct Behaving or fraternizing of a physical or sexual nature which could potentially lead to compromising situations or possible Non-work relationships."},{"r":"Acts Against Good Conduct and Behavior","t":"Other Acts of Discourtesy, Misconduct or Misbehavior","s":"D","f":"39. Other Acts of Discourtesy, Misconduct or Misbehavior Committing other acts of discourtesy, misconduct or misbehavior where there is an overt or deliberate act which slows disrespect, disobedience or contempt towards KAWAYANAN RESTAURANT OPC guests, suppliers, outside agencies, officers, employees or other personnel."},{"r":"Acts of Negligence","t":"Failure to Account for KAWAYANAN RESTAURANT OPC Revenue or Report Lost/Damaged KAWAYANAN R","s":"C","f":"1. Failure to Account for KAWAYANAN RESTAURANT OPC Revenue or Report Lost/Damaged KAWAYANAN RESTAURANT OPC Property Failure to report loss of KAWAYANAN RESTAURANT OPC revenue, property, or damage of property and/or its parts, assets, supplies, equipment, etc., within 24 hours to KAWAYANAN RESTAURANT OPC management."},{"r":"Acts of Negligence","t":"Causing Loss of Revenue or Causing Loss or Damage to KAWAYANAN RESTAURANT OPC Property","s":"C","f":"2. Causing Loss of Revenue or Causing Loss or Damage to KAWAYANAN RESTAURANT OPC Property Causing loss of revenue or causing loss, spoilage or damage to KAWAYANAN RESTAURANT OPC property and/or its parts, assets, supplies, equipment, machinery, furniture or endangering the efficiency of the machines and equipment through negligence, carelessness or inefficiency. (In case of loss or damage, the emp"},{"r":"Acts of Negligence","t":"Failure to Report Accident or Injury","s":"C","f":"3. Failure to Report Accident or Injury Failure to report to the proper authority any accident or injury within 24 hours without unnecessary delay, involving employees, visitors, vendors, guests and other personnel."},{"r":"Acts of Negligence","t":"Receiving Below Expectations Ratings","s":"D","f":"4. Receiving Below Expectations Ratings Receiving two (2) successive Needs Improvement ratings in the Performance Appraisal while holding the same or an equivalent position."},{"r":"Acts of Negligence","t":"AWOL in Excess of One (1) Working Day","s":"D","f":"5. AWOL in Excess of One (1) Working Day Incurring absence without official/authorized leave in excess of one (1) working day."},{"r":"Acts of Negligence","t":"Failure to Report for Work","s":"C","f":"6. Failure to Report for Work Failure to report for work promptly upon the expiration of the leave of absence without justifiable reason and approved / authorized written notice."},{"r":"Acts of Negligence","t":"Receiving Visitors","s":"A","f":"7. Receiving Visitors Unauthorized receiving of visitors during working hours for personal reasons, or making/receiving personal telephone calls, except during an emergency."},{"r":"Acts of Negligence","t":"Failure to Sign IN or OUT","s":"A","f":"8. Failure to Sign IN or OUT Failure to record attendance as instructed by the Franchisor/Manager or Franchisee."},{"r":"Acts of Negligence","t":"Failure to Sign In or Out","s":"A","f":"9. Failure to Sign In or Out Failure to record attendance by not properly logging in or out or as prescribed."},{"r":"Acts of Negligence","t":"Failure to Comply with KAWAYANAN RESTAURANT OPC Dress Code","s":"A","f":"10. Failure to Comply with KAWAYANAN RESTAURANT OPC Dress Code Failure to comply with the KAWAYANAN RESTAURANT OPC prescribed Dress Code while on duty."},{"r":"Acts of Negligence","t":"Failure to Notify Change in Employee Data","s":"A","f":"11. Failure to Notify Change in Employee Data Failure to notify superior and HR, in writing, of change of employee personal data such as, but not limited to, civil status, name of dependents or additional dependents, home address, outstanding loans and other employment information within five (5) working days from date of occurrence."},{"r":"Acts of Negligence","t":"Failure to Report Contagious or Deadly Disease","s":"C","f":"12. Failure to Report Contagious or Deadly Disease Failure to report to supervisor or any KAWAYANAN RESTAURANT OPC authorized personnel and HR about employee\u2019s own contagious, communicable or deadly disease or failure to report to supervisor or any KAWAYANAN RESTAURANT OPC authorized personnel or HR while knowing another employee is suffering from any contagious, communicable or deadly disease."},{"r":"Acts of Negligence","t":"Failure to Comply with Sanitation Rules","s":"C","f":"13. Failure to Comply with Sanitation Rules Failure to comply with sanitation rules or contributing poor housekeeping or unsanitary conditions, i.e., non-flushing of toilets, spitting, urinating at improper receptacles/areas, littering, throwing candy wrappers, leaving food trays unattended and performing other unsanitary acts."},{"r":"Acts of Negligence","t":"Failure to Submit to Annual Medical Examination","s":"C","f":"14. Failure to Submit to Annual Medical Examination Failure to submit to the required Annual Medical, Dental, Physical and other health examinations, i.e. substance abuse, prohibited drugs, HIV, Hepatitis, Sexually Transmitted Diseases, that are required by the KAWAYANAN RESTAURANT OPC."},{"r":"Acts of Negligence","t":"Failure to Use the Required Safety Device/Equipment","s":"C","f":"15. Failure to Use the Required Safety Device/Equipment Failure to use the required safety device or protective equipment established by the KAWAYANAN RESTAURANT OPC health and safety rules."},{"r":"Acts of Negligence","t":"Failure to Comply with Government Requirements","s":"C","f":"16. Failure to Comply with Government Requirements Failure to comply with national and local government requirements as required by the KAWAYANAN RESTAURANT OPC, i.e., health certificates, police clearance, etc."},{"r":"Acts of Negligence","t":"Failure to Provide Necessary Service","s":"C","f":"17. Failure to Provide Necessary Service Unjustified failure to provide or procure materials, supplies, facilities or services in a timely manner, which are essential in the proper servicing of employees, visitors, vendors or guests at the required level of quality and quantity."},{"r":"Acts of Negligence","t":"Failure to Comply with Prescribed/Control Procedures","s":"C","f":"18. Failure to Comply with Prescribed/Control Procedures Failure to comply or conform with prescribed or control procedures such as but not limited to, standard operating procedures on accidents, safety or security regulations that may prejudice employees, visitors, vendors and guests."},{"r":"Acts of Negligence","t":"Failure to Comply with Security Standards","s":"C","f":"19. Failure to Comply with Security Standards Failure to submit security personnel in the conduct of their duties, i.e. baggage inspection, body search, finger printing, inquiry on a certain investigation, frisking, etc."},{"r":"Acts of Negligence","t":"Unauthorized Entrance/Exit","s":"C","f":"20. Unauthorized Entrance/Exit Gaining entrance to or exiting form KAWAYANAN RESTAURANT OPC by any means other than by the official entrance and exit designated for employees."},{"r":"Acts of Negligence","t":"Failure to Take Corrective Action","s":"C","f":"21. Failure to Take Corrective Action Failure of the immediate superior/manager to report and/or take action on any violation of his/her subordinate."},{"r":"Acts of Negligence","t":"Failure to Attend a Scheduled Training Session or Seminar","s":"B","f":"22. Failure to Attend a Scheduled Training Session or Seminar Failure to attend a scheduled Training Session or Seminar without justifiable reason."},{"r":"Acts of Negligence","t":"Delegating Duties to Others","s":"C","f":"23. Delegating Duties to Others Delegating other responsibilities, functions, duties not officially designated or authorized for others to perform, i.e. supervisor or any KAWAYANAN RESTAURANT OPC authorized personnel delegating his/her work to an agent."},{"r":"Acts of Negligence","t":"Failure to Comply with KAWAYANAN RESTAURANT OPC policies and Procedures","s":"C","f":"24. Failure to Comply with KAWAYANAN RESTAURANT OPC policies and Procedures Failure to comply or conform with KAWAYANAN RESTAURANT OPC policies and procedures promulgated from time to time."},{"r":"Acts of Negligence","t":"Deleting or Editing any form of communication for or with the corporation","s":"D","f":"25. Deleting or Editing any form of communication for or with the corporation Deleting or editing any form of communication for or with the corporation like in email, messaging, social media or any other social or website platforms."},{"r":"Acts of Negligence","t":"Other Acts of Negligence","s":"C","f":"26. Other Acts of Negligence Any other acts which may endanger safety or superiors or employees or unnecessary disruption of operations through gross negligence, carelessness, or inefficiency."},{"r":"Acts Against Operational Policies","t":"Eating and Drinking inside the Production/Operations area","s":"A","f":"1. Eating and Drinking inside the Production/Operations area Eating food or drinking from an open container."},{"r":"Acts Against Operational Policies","t":"Gross Discourtesy to Customer","s":"D","f":"2. Gross Discourtesy to Customer Arguing with a customer or uttering rude remarks to customers/customers. Also includes releasing line while customer is still speaking/on the line."},{"r":"Acts Against Operational Policies","t":"Delaying Answering of Incoming Call","s":"A","f":"3. Delaying Answering of Incoming Call Not immediately answering calls without valid reason."},{"r":"Acts Against Operational Policies","t":"Deliberate Clearing of Line","s":"B","f":"4. Deliberate Clearing of Line Clearing of lines to avoid receiving calls or complaint/identification by customer without justifiable reason."},{"r":"Acts Against Operational Policies","t":"Unnecessary Personal Phone Conversation","s":"B","f":"5. Unnecessary Personal Phone Conversation Engaging customers in unnecessary personal conversation without justifiable or valid reason."},{"r":"Acts Against Operational Policies","t":"Refusal to Transfer Call","s":"C","f":"6. Refusal to Transfer Call Willful intent to withhold transfer of call to supervisor or any KAWAYANAN RESTAURANT OPC authorized personnel/manager for fear of complaint by customers/customers."},{"r":"Acts Against Operational Policies","t":"Unauthorized Use of Log-in ID","s":"C","f":"7. Unauthorized Use of Log-in ID Unauthorized use of somebody\u2019s log-in ID to commit violation."},{"r":"Acts Against Operational Policies","t":"Unauthorized Log-out","s":"B","f":"8. Unauthorized Log-out Logging-out without valid reason and outside break schedule."},{"r":"Acts Against Operational Policies","t":"Unnecessary Side-remarks","s":"A","f":"9. Unnecessary Side-remarks Uttering/Writing unnecessary remarks to customers."},{"r":"Acts Against Operational Policies","t":"Unnecessary Conversations with Co-Worker","s":"A","f":"10. Unnecessary Conversations with Co-Worker Uttering unnecessary conversation."},{"r":"Acts Against Operational Policies","t":"Below Quota","s":"B","f":"11. Below Quota Computer Assistants/Employees/Trainees/Contractuals showing average sales that is below tenure-based performance target for a specific period. (As specified by management)"},{"r":"Acts Against Operational Policies","t":"Unavailing of Make Busy","s":"B","f":"12. Unavailing of Make Busy Pretending to be busy to avoid receiving customers."},{"r":"Acts Against Operational Policies","t":"Excessive Rejects","s":"A","f":"13. Excessive Rejects Computer Assistants/Employees/Trainees making excessive rejects."},{"r":"Acts Against Operational Policies","t":"Unauthorized Access of Password/Logon files","s":"C","f":"14. Unauthorized Access of Password/Logon files Unauthorized access of Computer Assistants/Employees/Trainees\u2019 password/logon files to commit violation."},{"r":"Acts Against Operational Policies","t":"Below Par Quality Score","s":"B","f":"15. Below Par Quality Score Computer Assistants/Employees/Trainees showing care and fulfillment scores below tenure-based performance target for a specific period."},{"r":"Acts Against Operational Policies","t":"Unauthorized Moving of Equipments","s":"B","f":"16. Unauthorized Moving of Equipments Changing/removing keyboard function keys, keyboard, headsets, etc. from one station to another without proper authority/permission."},{"r":"Acts Against Operational Policies","t":"Performing Work of Personal Nature while on Duty","s":"A","f":"17. Performing Work of Personal Nature while on Duty Reading, cross-stitching, text messaging, answering to cellular phone calls, or calling using cellular phones or doing unnecessary activity during working hours."},{"r":"Acts Against Operational Policies","t":"Not Wearing Company ID","s":"A","f":"18. Not Wearing Company ID Violation of any regulation on the use or wearing of KAWAYANAN RESTAURANT OPC company ID."},{"r":"Acts Against Operational Policies","t":"Sleeping While on Duty","s":"C","f":"19. Sleeping While on Duty Sleeping in any position, during working hours."},{"r":"Acts Against Operational Policies","t":"Unauthorized Use of Telephone/Cellular Phone","s":"A","f":"20. Unauthorized Use of Telephone/Cellular Phone Using office/admin telephones/cellular phones to make personal calls without proper authorization/permission."},{"r":"Acts Against Operational Policies","t":"Inaccurate order given to customer","s":"A","f":"21. Inaccurate order given to customer Wrong order given to customer"},{"r":"Acts Against Operational Policies","t":"Didn\u2019t check order before delivering to customer","s":"A","f":"22. Didn\u2019t check order before delivering to customer Rider or Crew didnt check order before delivering to customer"},{"r":"Acts Against Operational Policies","t":"Didn\u2019t do CHECKLIST","s":"C","f":"23. Didn\u2019t do CHECKLIST"},{"r":"Acts Against Operational Policies","t":"No hairnet or incomplete uniform","s":"A","f":"24. No hairnet or incomplete uniform"},{"r":"Acts Against Operational Policies","t":"Pants have pockets","s":"B","f":"25. Pants have pockets"},{"r":"Acts Against Operational Policies","t":"Incoming or outgoing stocks and equipment were not logged in logbook","s":"C","f":"26. Incoming or outgoing stocks and equipment were not logged in logbook"},{"r":"Acts Against Operational Policies","t":"Removed or, altered in any way logbook page, WhatsApp or any other message in any platform","s":"D","f":"27. Removed or, altered in any way logbook page, WhatsApp or any other message in any platform (email, social apps, websites)"},{"r":"Acts Against Operational Policies","t":"Ice served to customer has PLASTIC (remaining plastic as if plastic is ingested, it will b","s":"C","f":"28. Ice served to customer has PLASTIC (remaining plastic as if plastic is ingested, it will be a safety issue to the customer)"},{"r":"Acts Against Operational Policies","t":"Did not order sufficient stocks","s":"C","f":"29. Did not order sufficient stocks"},{"r":"Acts Against Operational Policies","t":"Did not clean greasetrap at the scheduled time","s":"C","f":"30. Did not clean greasetrap at the scheduled time"},{"r":"Acts Against Operational Policies","t":"Did not issue physical receipt to customer (if brownout or damaged POS, didn\u2019t issue email","s":"D","f":"31. Did not issue physical receipt to customer (if brownout or damaged POS, didn\u2019t issue email or physical sales invoice)"},{"r":"Acts Against Operational Policies","t":"Did not put 1,000 or 500 bills (or whatever bill exceeds your CHANGE and REVOLVING FUND)","s":"C","f":"32. Did not put 1,000 or 500 bills (or whatever bill exceeds your CHANGE and REVOLVING FUND)"},{"r":"Acts Against Operational Policies","t":"No display in chiller/display cabinet","s":"C","f":"33. No display in chiller/display cabinet"}]';

function invAllInfractions(){
  if(!CARE_INFRACTIONS) CARE_INFRACTIONS=JSON.parse(_CARE_INFRACTIONS_JSON);
  const custom=cache.invCustomInfractions||[];
  return CARE_INFRACTIONS.concat(custom.map(c=>({r:c.rule_category,t:c.title,s:c.sanction_degree,f:c.full_text})));
}

// STANDARDS OF BEHAVIOR — buong text, hiwalay sa CARE_INFRACTIONS table

let _SOB_JSON='["Standards of Behavior", "Foreword", "The Code of Conduct exemplifies KAWAYANAN RESTAURANT OPC’s commitment to the highest standard and quality of service to its clients.  It aims to bring people from different backgrounds, perspectives, norms and values to work together in fulfillment of this commitment.", "KAWAYANAN RESTAURANT OPC endeavors to provide a work environment where each individual is treated with respect and dignity.  The Code of Conduct serves as a communication tool upon which everyone in the organization carries themselves.", "KAWAYANAN RESTAURANT OPC believes that each member of the organization must be given the opportunity to be coached and counseled.  The Code of Conduct provides this mechanism to ensure that when deviations are committed, corrective actions shall always be constructive, consistent, objective and fair.", "As member of the KAWAYANAN RESTAURANT OPC Family, everyone is expected to dedicate their work in fulfillment of KAWAYANAN RESTAURANT OPC’s Core Values and Strategies.", "KAWAYANAN RESTAURANT OPC CORE VALUES", "MALASAKIT", "Scope", "The Code of Conduct applies to all personnel regardless of employment status and rank, and covers all actions pertaining to infringements or deviations committed on KAWAYANAN RESTAURANT OPC time or within its premises.", "“KAWAYANAN RESTAURANT OPC premises” include areas where the personnel performs official duties even if such areas are physically outside of KAWAYANAN RESTAURANT OPC.", "For purposes of defining the scope, the term “personnel” applies to any and all of the following:", "officials and regular employees of KAWAYANAN RESTAURANT OPC", "probationary employees", "contractual employees", "part timers", "interns", "project employees", "If franchisee/or any staff/OJT/trainee hired by franchisee should adhere and strictly follow to any of KAWAYANAN RESTAURANT OPC’s rules and regulations including but not limited to Standards of Behavior.  If franchisee/or any staff/OJT/trainee hired by franchisee will violate any of KAWAYANAN RESTAURANT OPC’s rules and regulations including but not limited to Standards of Behavior, it will also be a violation of franchise agreement.", "Definition of Terms", "1.    KAWAYANAN RESTAURANT OPC Standard Behavior", "or Expected Conduct is the respect, observance, understanding and recognition of authority as long as it is lawful and in accordance with KAWAYANAN RESTAURANT OPC’s rules and regulations, policies and procedures and established authority.", "2.   Corrective Action", "Corrective action is the disciplinary measure meted out to employees to instill a fuller understanding of and conformity with KAWAYANAN RESTAURANT OPC’s rules and regulations, policies and procedures and established authority.", "3.    Verbal Advice", "If a problem has not been corrected through counseling and coaching discussions, the supervisor or any KAWAYANAN RESTAURANT OPC authorized personnel discusses the Work Performance, Conduct, or Human Asset Development problem with the employee in a private meeting.  The supervisor or any KAWAYANAN RESTAURANT OPC authorized personnel reminds the employee of the importance of commitment to KAWAYANAN RESTAURANT OPC standards and performance excellence as well as the impact to the team.  Together the problem is discussed and the employee’s commitment to change is sought.  Performance plans should be jointly developed so that the employee knows specifically what must be done in order to demonstrate ownership for his/her results and relationships, meet expectations and return to an accepted level of performance.  Note: A Citation Action Record (CARE – Part 2) and Corrective Action Record (CARE – Part 1) are used to document a corrective action with an erring employee.", "4.   Written Advice", "The Written Advice is the next progressive step in the corrective action system and should be used when an employee’s commitment to improve is not met at anytime within the three-month active period for a Verbal Advice, or when an employee commits an offense serious enough to warrant this level of action (whether or not any previous action has been taken).", "5.   Final Warning", "The Final Warning is the final step in the corrective action process.  This step is appropriate when an employee’s commitment to improve is not met during the six- month active time period for a Written Advice or there is an offense so serious it warrants this level of corrective action (whether or not previous action has been taken).  The Final Warning requires approval by the next level of management.  All Final Warnings require consultation with Human Resources prior to delivery.  If there is a disagreement between the supervisor or any KAWAYANAN RESTAURANT OPC authorized personnel/manager and Human Resources on the decision, it will require the Operations Manager or the Franchisor/Manager to review the recommendation. The final decision will remain with the Operations Manager or the Franchisor/Manager.", "The supervisor or any KAWAYANAN RESTAURANT OPC authorized personnel will meet with the employee to issue the Final Warning.  During the discussion, the employee’s overall work record, including past reviews, formal action previously taken and notes from other conversations, is reviewed.", "At the conclusion of the discussion, the employee is given a choice to commit to improve his job performance or accept consequences for his actions.  The employee reports his/her decision to the supervisor or any KAWAYANAN RESTAURANT OPC authorized personnel the following working day.", "6.    Termination", "Termination is the dismissal of an employee for just cause.", "Active Periods for Corrective Action", "The focus of corrective action levels, should remain developmental and future-focused.  The goal is development of good performance in the future, the individual employee’s responsibility for his/her performance, results and relationships.", "KAWAYANAN RESTAURANT OPC has the right to expect a total performance commitment from its employees.  This includes the expectation that performance infractions that warrant formal corrective action will never require similar action.  Likewise, employees have the right not to have past performance problems remain in their files forever, running the risk of an adverse effect on their careers.  Accordingly, formal corrective action levels remain active for the following time periods:", "When corrective actions deactivate, the supervisor or any KAWAYANAN RESTAURANT OPC authorized personnel will notify the employee of the deactivation and the need to schedule a meeting as soon as possible.", "Leaves of absence sufficient to remove employees from “regular” employment status will temporarily discontinue the active period for any of the formal corrective action levels.  The time for calculating the active period for the formal level will be extended by the time the employee was off of “regular” status when the employee returns to work.", "Performance Categories and Repeat Violations", "Performance problems requiring corrective action are divided into three general categories:", "Work Performance.", "Conduct.", "Human Asset Development (applies to supervisor or any KAWAYANAN RESTAURANT OPC authorized personnely and management employees only)", "If an employee commits an offense in the same category as that in which a specific level of corrective action is currently active, the second offense would normally escalate to the next level.  In such an instance, the first action would not deactivate until the subsequent action(s) deactivate(s).", "If an employee has a level active in one performance category and commits an offense that warrants corrective action in another category, the level of the first corrective action may be repeated for the second offense.  The following guidelines should be used:", "No more than two active Verbal Advice may be in effect at any time;", "No more than two active Written Advice may be in effect at any time;", "No more than one active Final Warning may be in effect at any time;", "No formal corrective action may be administered after a Final Warning is in effect.", "Corrective Action Guidelines", "Corrective actions are sanctions imposed as soon as possible after the offense has been clearly established.", "The rules and the corresponding corrective actions shall be imposed with fairness.  Due process of law and the right to a prompt hearing will be accorded the errant employee.", "Corrective actions are commensurate to the offense committed.", "Corrective action or sanction is limited to verbal advice, written advice, final warning and termination and in no instance is it in violation of labor laws and fair labor practices.", "Definition of Roles", "The responsibility of ensuring that KAWAYANAN RESTAURANT OPC’s standard of behavior and expected conduct are upheld is jointly vested upon the supervisor or any KAWAYANAN RESTAURANT OPC authorized personnels, managers and the Human Resources.  They have the authority to initiate any corrective action whenever a deviation form KAWAYANAN RESTAURANT OPC’s rules and regulations is committed.", "A.   Manager/supervisor or any KAWAYANAN RESTAURANT OPC authorized personnel", "Maintains discipline and the expected conduct among subordinates to achieve desired goals and performance level of his/her section or unit.", "Ensures that policies and guidelines prescribed in this Code are followed.", "In case of infringement of or deviation form KAWAYANAN RESTAURANT OPC’s rules and regulations by any of the subordinates, he investigates the matter and observes due process of law in accordance with the provisions and guidelines set in this Code.", "Prepares the required reports on cases investigated and/or corrective actions meted out for submission to the Operations Manager/Production Manager.", "Recommends the necessary corrective action or sanction.", "B.   Operations Manager/Production Manager/Department Head", "Ensures that all his managers and supervisor or any KAWAYANAN RESTAURANT OPC authorized personnels are fully aware of their responsibilities in maintaining the standard behavior and expected conduct and understand all relevant rules and regulations.", "Reviews and approves (upon consultation with HR on termination cases), the corrective actions recommended by his manager or supervisor or any KAWAYANAN RESTAURANT OPC authorized personnel, to ensure consistency, objectivity and fairness prior to implementation.", "Assists in the settlement or clarification of issues which may arise in connection with this Code.", "Ensures that the approved corrective action is implemented by his manager or supervisor or any KAWAYANAN RESTAURANT OPC authorized personnel.", "C.   Human Resources Group", "Monitors proper implementation of the policies and guidelines contained in this Code.", "Advises managers and supervisor or any KAWAYANAN RESTAURANT OPC authorized personnels as to how policies and guidelines should be implemented.", "Ensures that such policies, rules and regulations are regularly updated based on the needs of the KAWAYANAN RESTAURANT OPC.  This is done in close consultation with the Franchisor/Manager.", "Advises/counsels other groups on how to handle sensitive cases involving termination or final warning leading to a termination.", "Clarifies matters with regard to the interpretation of the Code of Conduct.", "Encourages the development of an atmosphere where positive behavior is second nature to everyone.", "D.   Franchisor/Manager", "Acts as the final arbiter in case of impasse or deadlock in the corrective action to be implemented.", "Makes the final approval in cases involving termination or preventive suspension leading to a termination.", "System of Sanction", "CARE 1            Citation Action Record for Conduct Violation – Part I", "DATE\t:  _______________________\t\tReference No: ________________", "TO \t:  _______________________\t\tFrom: _______________________", "Employee Name\t\tsupervisor or any KAWAYANAN RESTAURANT OPC authorized personnel/Manager Name", "SUBJECT:  ______________________________________________", "Please explain in writing within twenty-four (24) hours upon receipt of this citation why you should not be issued any corrective action for the alleged violation/deviation mentioned below in detail.", "_____________________________________________________________________________", "_____________________________________________________________________________", "_____________________________________________________________________________", "_____________________________________________________________________________", "_____________________________________________________________________________", "Please note that failure or refusal to reply to this memo within the said date shall mean admission to the offense and we shall then effect the corresponding correction action.", "For your compliance.", "Signature of", "supervisor or any KAWAYANAN RESTAURANT OPC authorized personnel/Manager", "Notes:", "A copy of the CARE Form Part I is attached to the employee’s written explanation.", "Cite incident/date/time/persons involved.  If a meeting is required, include specific instruction such as date, time and venue.", "For termination cases, the concurrence of the HR Director is required at all times.", "CARE 2           Corrective Action Record for Conduct Violation - PART II", "DATE\t:  _______________________\t\tReference No: ________________", "TO \t:  _______________________\t\tFrom: _______________________", "Employee Name\tsupervisor or any KAWAYANAN RESTAURANT OPC authorized personnel/Manager Name", "SUBJECT:  ______________________________________________", "IMPORTANT DETAILS OF INFRACTION", "Indicate all important details (act, date, place, etc.)", "Attach employee’s written explanation and CARE 1 form, if appropriate.", "Based on our evaluation, you have committed an offense against the Company’s Policies and Procedures, specifically:", "As per the Code of Conduct, this offense warrants a Degree of Sanction [___] .", "A discussion or warning has been previously issued last (Indicate date): ____________________", "Policy Statement", "KAWAYANAN RESTAURANT OPC’ successful operation depends upon the attendance of its employees.  In order to give the best possible service to our clients, it is necessary for all employees to be punctual and come to work as scheduled.  In addition, regular attendance contributes significantly towards better team effort and productivity as each employee is important to the smooth operation of KAWAYANAN RESTAURANT OPC.  Good attendance is an essential component of solid employee performance.  In addition to affecting the workflow and productivity in the work area, tardiness and absences create hardship on fellow employees and decrease the quality of service to our clients.", "Implementing Procedures", "A. During Training – Foundation, Product, Transition / OJT and Transfer Training", "While on training, a trainee is allowed up to two (2) tardiness/undertime and one (1) excused absence/half-day only.  A third tardiness/undertime or second absence/half-day will result to immediate termination from the Training Program.", "Trainees are advised to notify their Trainers/Supervisors thru call within two (2) hours before start of their scheduled shift in case of inability to report to work or tardiness.", "Definition of Terms", "Tardiness is defined as arriving within the first fifteen (15) minutes after start of the training shift.", "Undertime is defined as leaving within fifteen (15) minutes before end of the training shift.", "Half-day is defined as leaving after half the number of required hours for a training shift but more than fifteen (15) minutes before end of training shift", "Absence is not reporting to training for a whole shift, arriving beyond half of the training shift, or leaving before the second half of the training shift.", "No Call No Show (NCNS) is not advising trainer/supervisor thru call within 2 hours before start of training shift of any absence or tardiness.", "OJT / Transfer Training – one week after the training set wherein trainees will be tasked to install guards already under training in order to qualify for contractual position (length of time is dependent on the performance/branch)", "No Call No Show (NCNS) is defined as failure to advise the supervisor thru call (for STAFF/INSTALLERs) or Immediate Supervisor (for non-STAFF/INSTALLERs) of tardiness or absence within the prescribed period", "Over-breaks are late log-ins from a scheduled break", "Holidays are regular and special holidays declared by Human Resources Department", "Critical Days are holidays, weekends, and paydays", "Unplanned Leaves are leaves that do not have prior approval by the Direct Supervisor which can be excused by the Supervisor.  Types of which are:", "**Unplanned Absences – absences without advice given prior to release of the next week’s schedule regardless of reason and without prior approval from WFM (for STAFF/INSTALLERs) or Immediate Supervisor (Non-STAFF/INSTALLERs). Types of which are:", "Afflicted by a communicable disease that requires prolonged absence.", "Death of an immediate family member (inclusive to immediate Grandparents, Father/Mother, Father-in-law/Mother-in-law, Siblings, Child/Children, and Legal Guardian)", "Man-made disaster like fire, vehicular accident resulting to serious physical injury, hostage, and the like", "Natural calamity resulting to permanent displacement from place of residence.", "Corrective Action during Training (Training / Foundation / Product / Transition or OJT/ Transfer Training)", "1st \tTardiness or Undertime\t\t=\tVerbal", "2nd \tTardiness or Undertime\t\t=\tFinal", "3rd  \tTardiness or Undertime\t\t=\tTermination", "1st \tAbsence or Half-day\t\t=\tFinal", "2nd \tAbsence or Half-day\t\t=\tTermination", "1st \tNo Call No Show\t\t=\tTermination", "B. Starting Contractual or Probationary Employment Onwards for Staff/Installer Positions", "WITH ADVICE:", "1st \tTardiness or Undertime\tor Half-Day or Absence\t=\tVerbal", "2nd \tTardiness or Undertime\tor Half-Day or Absence\t=\tWritten", "3rd  \tTardiness or Undertime\tor Half-Day or Absence\t=\tSuspension (1 day)", "4th  \tTardiness or Undertime\tor Half-Day or Absence\t=\tSuspension (3 days)", "5th   Tardiness or Undertime\tor Half-Day or Absence\t=\tTermination", "WITHOUT ADVICE (NCNS (No Call No Show))", "1st \tTardiness or Undertime\t\t=\tFinal", "2nd \tTardiness or Undertime\t\t=\tSuspension (3 days)", "3rd  \tTardiness or Undertime\t\t=\tTermination", "1st \tAbsence or Half-day\t\t=\tTermination", "CARES/Sanctions will be refreshed (or will be disregarded) every 6 months.", "Employees are advised to notify / call-in Supervisors / Managers two (2) hours before their scheduled shift for absences, and before their scheduled shift for tardiness. Inability to do so will be tagged as No Call No Show (NCNS).", "Leaving early from the scheduled shift will be counted against equivalent allowed number of tardiness or absence, whichever is applicable.", "Call-In / Notification Procedure for Staff/Installer", "For Absences", "The Staff/Installer should call to Supervisors within two (2) hours before start of scheduled shift", "The Staff/Installer should get an approval from the Supervisor.", "The Staff/Installer must state their contact number, scheduled shift start time and reason for calling in.", "Wait for a call from the Supervisor or co-employee regarding the change in schedule or absence.  Wait for a call for further instructions.", "For Tardiness", "The Staff/Installer has to call to a Supervisor at least two hours before their respective shift.", "A. \tCONFLICTS OF INTEREST", "Business decisions must be made in the best interests of KAWAYANAN RESTAURANT OPC and not be motivated by personal interest or gain.  A conflict of interest occurs when your own interests interfere, or appear likely to interfere, with the interest of KAWAYANAN RESTAURANT OPC as a whole.  The conflict may make it difficult for you to perform your work for KAWAYANAN RESTAURANT OPC objectively and effectively.  KAWAYANAN RESTAURANT OPC expects all directors, officers and employees to avoid not only situations that give rise to a conflict of interest, but also those situations that create the appearance of a conflict of interest, unless expressly approved by KAWAYANAN RESTAURANT OPC.  Furthermore, you must promptly disclose potential conflicts of interest to KAWAYANAN RESTAURANT OPC.", "You may encounter potential conflicts of interest in a variety of situations.  Some of the more likely situations are:", "Relationships with clients, vendors, suppliers and business associates.", "Financial or other dealings with outside organizations that do business with KAWAYANAN RESTAURANT OPC.", "Outside employment with any competitor, client, vendor or supplier of KAWAYANAN RESTAURANT OPC, or any other outside employment that could jeopardize KAWAYANAN RESTAURANT OPC’s interests or interfere with productivity.", "You have a duty of loyalty to advance the business interests of KAWAYANAN RESTAURANT OPC.  You may not accept gifts or benefits or entertainment of more than P5,000 value from clients, vendors, suppliers, and other business associates.  Also, you may not give gifts or benefits or entertainment to clients, vendors, suppliers, and other business associates which are of more than P5,000 value or are intended to bribe or influence the recipient or are otherwise against the law.  You must not own, or provide services to, another business if that situation would cause you to put the other business interests ahead of KAWAYANAN RESTAURANT OPC.  You must not misappropriate assets of KAWAYANAN RESTAURANT OPC or abuse your position with KAWAYANAN RESTAURANT OPC to get improper benefits.", "Although KAWAYANAN RESTAURANT OPC may under some circumstances elect to waive conflicts that have already occurred, KAWAYANAN RESTAURANT OPC requires you to disclose all possible conflicts before putting yourself in a situation that could jeopardize your employment.  Questions about possible conflicts should be directed to KAWAYANAN RESTAURANT OPC’s General Counsel.", "B.\tCORPORATE OPPORTUNITIES", "KAWAYANAN RESTAURANT OPC entrusts its directors, officers and employees with a wealth of information, tools and resources that we expect to be used solely to advance the legitimate interests of KAWAYANAN RESTAURANT OPC.", "You may not use the information, computer and other equipment and resources entrusted with you by KAWAYANAN RESTAURANT OPC to identify or exploit personal opportunities for your personal gain.  Furthermore, you must not take for yourself opportunities that belong to KAWAYANAN RESTAURANT OPC.", "For example, as a result of your position with KAWAYANAN RESTAURANT OPC you may be presented with an opportunity to buy a business that is a client, vendor or supplier of KAWAYANAN RESTAURANT OPC or that competes with KAWAYANAN RESTAURANT OPC.  This business opportunity must first be offered to KAWAYANAN RESTAURANT OPC.", "C.\tCONFIDENTIALITY", "Directors, officers and employees must preserve and protect the confidentiality of information entrusted to them by KAWAYANAN RESTAURANT OPC, except when disclosing information is approved or legally mandated.  Furthermore, you must maintain the confidentiality of information that has been entrusted to us by our clients, vendors, suppliers, other business associates, and other employees, except when disclosure of the confidential information is approved or legally mandated.  Often we, our clients, vendors, suppliers, or other business associates establish specific security procedures intended to preserve and protect the confidentiality of certain information, and at a minimum you should observe these specific security procedures with respect to such information.", "Confidential information includes proprietary information that is not in the public domain that could be of use to KAWAYANAN RESTAURANT OPC’s competitors or that could harm KAWAYANAN RESTAURANT OPC or our clients (or their customers), vendors, suppliers, other business associates, employees or shareholders if disclosed.", "Employees also must not use or disclose to KAWAYANAN RESTAURANT OPC any proprietary information or trade secrets of any former employer or other person or entity with whom obligations of confidentiality exist.", "D.\tFAIR DEALING", "KAWAYANAN RESTAURANT OPC expects its directors, officers and employees to always endeavor to deal fairly and honestly with KAWAYANAN RESTAURANT OPC and its clients, vendors, suppliers, other business associates, other employees, shareholders and competitors.", "It is not acceptable to take advantage of an opportunity to profit, through unfairness or dishonesty, at another’s expense.  For example, you must not take advantage of anyone through abuse of personal or confidential information, misrepresentation of material facts, or any other unfair dealing practice.  Such unacceptable behavior could take the form, for example, of filing a false expense statement, accepting a bribe or kickback, unlawfully copying computer software, lying to a supervisor or client concerning business facts, taking business supplies or money.", "Clients.  We will achieve our mission—to enhance the value of our clients’ customer contacts, relationships and information—and prosper only by clearly understanding and meeting our clients’ expectations.  We must do everything we reasonably can to ensure client satisfaction by exercising good faith in all agreements and dealings with our clients and providing quality services for fair prices.", "Business Associates.  KAWAYANAN RESTAURANT OPC achieves a competitive advantage through quality relationships with vendors, suppliers and other companies which extend our reach and influence around the world.  Relationships built on trust are one of the most significant aspects of purchasing agreements, joint ventures and other types of business relationships.  KAWAYANAN RESTAURANT OPC must strive to preserve the reputation of other organizations and expects others to similarly protect KAWAYANAN RESTAURANT OPC’s reputation.  We will not do business with those who intentionally or continually act illegally or in conflict with the spirit and intent of our Code.   We maintain open and frank business dealings in an effort to develop mutually advantageous relationships that are effective and efficient.  Our purchasing decisions are made solely in the best interests of KAWAYANAN RESTAURANT OPC and consider quality, price, service and sourcing.", "Employees.  We recognize that our employees’ knowledge, skills and experience are the tools by which we have built a great company and that each and every employee is a critical factor in our success. We must encourage respect, recognition, fairness and dignity.  We are an equal opportunity employer.  We hire people based on their ability to do the job and pay and reward them for performance.  We are committed to providing a safe and healthy work environment and strive to provide opportunities for self-improvement and growth.  We do not tolerate harassment or abuse in any form.  We practice an ‘open door’ policy to encourage employees to voice their opinions freely about KAWAYANAN RESTAURANT OPC’s policies and programs.", "Shareholders.  Shareholders own our business and expect a fair return on their investment in KAWAYANAN RESTAURANT OPC.  All directors, officers and employees have the responsibility to work toward the achievement of profit and a fair return for our shareholders.  Management functions as a steward of the business for shareholders.  To this end, we foster open communication with shareholders and have established clear roles and responsibilities of management.", "Competitors.  While we compete aggressively, we do so with integrity.  We support fair competition and comply with applicable competition and antitrust laws of the countries in which we do business.  We will not enter into agreements or understandings that attempt to unlawfully limit competition.  We do not use illegal or unethical methods to collect competitive or proprietary information, including inducing such disclosures by former or current employees of competitors.", "Financial Community.  KAWAYANAN RESTAURANT OPC recognizes that shareholders depend on the financial community (analysts, investment managers, media, and so on) for an ongoing and independent assessment of KAWAYANAN RESTAURANT OPC’s financial prospects and activities.  We are committed to accurate and timely communication of our achievements and prospects to allow shareholders to reasonably evaluate their investment or prospective investment.  We willingly comply with applicable statutory and regulatory requirements for the provision of information.  We provide a clear, fair and accurate picture of our business to the financial community on a non-preferential basis.", "E.\tPROTECTION AND PROPER USE OF COMPANY ASSETS", "KAWAYANAN RESTAURANT OPC’s directors, officers and employees must protect KAWAYANAN RESTAURANT OPC’s assets from improper use, theft, loss and waste.", "KAWAYANAN RESTAURANT OPC’s assets include, for example, accounts receivable, furniture and equipment, leasehold improvements, company names, trademarks, copyrights, other intellectual property, databases, policy and procedure manuals, training materials, financial information, records, data, emails, computer files, other files, documents, contracts, proposals, reports, presentations, correspondence, client lists, vendor lists, other books and records, keys, security cards, passwords, access codes, credit cards, and other personal property.", "These assets are proprietary to KAWAYANAN RESTAURANT OPC, are intended to be used only for legitimate business purposes, and may not be used for personal benefit or any other improper purpose. KAWAY // ---------- TRACEABLE WATERMARKING (canary trap technique) ----------
// Batay sa totoong industry practice ng "canary trap" — bawat empleyado ay
// nakakakita ng SARILING bersyon ng dokumento na may HINDI-NAKIKITANG
// pagkakaiba sa spacing sa pagitan ng mga salita, deterministic batay sa
// pangalan nila. Kung may mag-screenshot o mag-kopya nito, ang spacing
// pattern ay maaaring sukatin at itugma pabalik kung sino ang nakakita
// nito noon — kahit hindi maiwasan ang pagkuha ng litrato, MATUTUNTON kung
// kanino ito nanggaling.
//
// Mekanismo: para sa bawat staff name, gumawa ng deterministic hash-based
// seed. Gamitin ang seed para pumili ng ILANG partikular na posisyon
// (salita #) sa buong dokumento kung saan magdadagdag ng KARAGDAGANG
// thin space (U+2009) sa pagitan ng dalawang salita — halos hindi
// mapapansin sa screen, pero ang EXACT na mga posisyon ay natatangi sa
// bawat tao. Ang pattern mismo (listahan ng posisyon) ay naka-log laban
// sa pangalan, kaya kung may leaked na litrato/text, masusukat ang span
// sa pagitan ng mga salita sa partikular na posisyon at maitutugma sa
// log.
function invWatermarkSeed(staffName){
  let h=0;
  const s = 'PALARUAN-SOB-'+staffName; // simpleng salt para hindi predictable kung ano lang ang pangalan
  for(let i=0;i<s.length;i++){ h=(h*31+s.charCodeAt(i))|0; }
  return Math.abs(h);
}
function invWatermarkPattern(staffName, totalWordSlots){
  // Gumawa ng listahan ng posisyon (word index) kung saan magdadagdag ng
  // extra thin space — humigit-kumulang 1 sa bawat 40 salita, sapat para
  // sa natatanging "fingerprint" nang hindi halatang kakaiba ang spacing.
  const seed = invWatermarkSeed(staffName);
  let state = seed;
  const rng = () => { state = (state*1103515245+12345)|0; return ((state>>>0)/4294967295); };
  const positions=[];
  for(let i=0;i<totalWordSlots;i++){
    if(rng() < 0.025) positions.push(i); // ~2.5% ng word boundaries
  }
  return positions;
}
// I-tukoy ang mga PAGE BOUNDARY (saang index ng paragraph nagsisimula ang
// bawat pahina) batay sa parehong logic ng pag-detect ng section header na
// ginagamit sa invRenderStructuredSOB -- kailangan ito BAGO mag-apply ng
// watermark, para masiguro na bawat pahina ay may sariling marka, hindi
// lang "sa kabuuan ng dokumento may marka kahit saan".
function invSobPageBoundaries(paragraphs){
  const blankRanges = invSobBlankFormRanges(paragraphs);
  const boundaries=[0];
  paragraphs.forEach((p,i)=>{
    if(invInRange(i, blankRanges)) return;
    if(SOB_SECTION_HEADERS.has(p.trim()) && i>0) boundaries.push(i);
  });
  return boundaries;
}
function invApplyWatermark(paragraphs, staffName){
  // GUARANTEED PER-PAGE WATERMARK: hatiin muna sa page boundaries, tapos
  // para sa BAWAT pahina nang HIWALAY, siguraduhing may kahit 2 watermark
  // point -- kung kulang ang natural na 2.5%-per-word na tsansa (lalo na sa
  // maiikling pahina, hal. ang title page o maiksing seksyon), sapilitang
  // markahan ang una at huling posibleng salita ng pahina. Deterministic
  // pa rin ito batay sa parehong seed ng staff, kaya pareho pa rin ang
  // makikita nila sa bawat pagbukas.
  //
  // MAHALAGANG AYOS: kailangang COMPUTE ang page boundaries gamit ang
  // ORIHINAL (hindi pa na-watermark) na paragraphs, AT hindi dapat
  // i-watermark ang mga SECTION HEADER paragraph mismo -- dahil kung
  // mababago ang EXACT text ng isang header (hal. "Performance Categories
  // and Repeat Violations" -> may dagdag na thin space sa salita), hindi na
  // ito eksaktong tutugma sa SOB_SECTION_HEADERS set, kaya hindi na ito
  // makikilala bilang page boundary sa muling pag-render -- nagreresulta sa
  // ilang buong pahina na NAWAWALA (na-merge sa ibang pahina) at nagiging
  // hindi magkatugma ang dalawang magkahiwalay na pagtukoy ng "ano ang
  // pahina" (isa para sa watermark, isa para sa aktwal na render).
  const boundaries = invSobPageBoundaries(paragraphs);
  const headerParaIdxs = new Set(boundaries.filter(b=>b>0).concat(
    paragraphs.map((p,i)=>SOB_SECTION_HEADERS.has(p.trim())?i:-1).filter(i=>i>=0)
  ));
  const seed = invWatermarkSeed(staffName);
  let state = seed;
  const rng = () => { state = (state*1103515245+12345)|0; return ((state>>>0)/4294967295); };
  const result = [...paragraphs];
  for(let pg=0; pg<boundaries.length; pg++){
    const startIdx = boundaries[pg];
    const endIdx = pg+1<boundaries.length ? boundaries[pg+1] : paragraphs.length;
    const pageParaIdxs = [];
    for(let i=startIdx;i<endIdx;i++){ if(!headerParaIdxs.has(i)) pageParaIdxs.push(i); }

    const markablePositions=[];
    pageParaIdxs.forEach(paraIdx=>{
      const words = result[paraIdx].split(' ');
      for(let w=0; w<words.length-1; w++) markablePositions.push({paraIdx, wordIdx:w});
    });

    if(!markablePositions.length) continue;

    const naturalMarks = new Set();
    markablePositions.forEach((pos,idx)=>{ if(rng()<0.025) naturalMarks.add(idx); });

    const minMarksPerPage = Math.min(2, markablePositions.length);
    while(naturalMarks.size < minMarksPerPage){
      const forcedIdx = Math.abs(seed + naturalMarks.size*7919) % markablePositions.length;
      naturalMarks.add(forcedIdx);
    }

    const wordsByPara = {};
    pageParaIdxs.forEach(paraIdx=>{ wordsByPara[paraIdx] = result[paraIdx].split(' '); });
    naturalMarks.forEach(idx=>{
      const pos = markablePositions[idx];
      wordsByPara[pos.paraIdx][pos.wordIdx] = wordsByPara[pos.paraIdx][pos.wordIdx] + '\u2009';
    });
    pageParaIdxs.forEach(paraIdx=>{ result[paraIdx] = wordsByPara[paraIdx].join(' '); });
  }
  return result;
}

// KNOWN SECTION HEADERS — eksaktong nakuha mula sa totoong dokumento, para
// hindi mahirapan sa pagbasa ang sinumang empleyado dahil flat text lang.
// Batay sa totoong industry practice (EMP Trust, Treegarden): hindi
// kailangang PDF — kailangan lang ng tamang structure (headers, tables),
// na siya namang sinusunod dito.
const SOB_SECTION_HEADERS = new Set([
  'Foreword','Scope','Definition of Terms','Active Periods for Corrective Action',
  'Performance Categories and Repeat Violations','Corrective Action Guidelines',
  'Definition of Roles','System of Sanction','Policy Statement','Implementing Procedures',
  'Call-In / Notification Procedure for Staff/Installer'
]);
// NOTE: ang blangko na CARE 1/CARE 2 form template ay TUNAY na bahagi ng
// orihinal na PDF na inattach — dapat ITO ay manatili sa structured view,
// hindi dapat alisin. (Dating tinanggal ito ng maling desisyon — naibalik
// na ngayon.) Ang function na ito ay HINDI na nag-aalis ng kahit anong
// range; nananatili ang buong content ng dokumento.
function invSobBlankFormRanges(paragraphs){
  return [];
}
function invInRange(i, ranges){ return ranges.some(([a,b])=>i>=a && i<=b); }
// I-render ang nilalaman bilang STRUCTURED HTML — totoong section headers,
// totoong tables (Active Periods, System of Sanction, mga tab-separated na
// linya sa attendance schedule), hindi lang sunod-sunod na <p> tags.
// DIAGONAL TILED WATERMARK — repeating, rotated text na nakapatong sa
// BUONG content area, hindi lang isang linya sa itaas. Batay sa totoong
// pattern ng IronPDF (CSS transform:rotate), PixelPanda (tile placement —
// "covers the entire image and cannot be cropped out"), at kung paano
// ipinapakita ng Intralinks/Peony ang per-viewer text sa bawat pahina.
// Ito ay HIWALAY at KARAGDAGAN sa invisible thin-space watermark (na nasa
// loob mismo ng text) — dalawang magkaibang layer ng proteksyon, parehong
// kailangan ayon sa parehong mga totoong sistema.
function invSobDiagonalWatermarkSvg(staffName){
  const label1 = `FOR ${escapeHtml((staffName||'').toUpperCase())}'S EYES ONLY`;
  const label2 = 'CONFIDENTIAL - DO NOT COPY';
  return `<svg style="position:absolute; inset:0; width:100%; height:100%; pointer-events:none; z-index:1;" aria-hidden="true">
    <defs>
      <pattern id="sobWmTile" width="260" height="170" patternUnits="userSpaceOnUse" patternTransform="rotate(-30)">
        <text x="0" y="40" font-size="13" font-family="sans-serif" fill="currentColor" opacity="0.16">${label1}</text>
        <text x="0" y="120" font-size="13" font-family="sans-serif" fill="currentColor" opacity="0.16">${label2}</text>
      </pattern>
    </defs>
    <rect width="100%" height="100%" fill="url(#sobWmTile)"></rect>
  </svg>`;
}
function invRenderStructuredSOB(paragraphs, staffName){
  // PINAGHIWA-HIWALAY NA PAHINA — bawat REAL section header (Foreword,
  // Scope, Definition of Terms, atbp.) ang nagsisilbing hangganan ng bagong
  // pahina, hindi arbitrary na bilang ng salita. Ibinabalik ang ARRAY ng
  // mga pahina (bawat isa'y sariling HTML string), hindi isang malaking
  // tuluy-tuloy na block — ito ang nagbibigay-daan sa per-page na pagbasa
  // AT nagsisiguro na ang watermark (na nailapat na sa BUONG text bago pa
  // man dito dumaan) ay talagang naroroon sa BAWAT pahina, hindi lang sa
  // isang lugar ng dokumento.
  const blankRanges = invSobBlankFormRanges(paragraphs);
  const pages = [];
  let html = '';
  let i = 0;
  let startedFirstPage = false;
  while(i < paragraphs.length){
    const p = paragraphs[i].trim();
    if(invInRange(i, blankRanges)){ i++; continue; }

    // Tab-separated na linya (hal. "1st \tTardiness...\t\t=\tVerbal") —
    // pangkat-pangkatin ang magkakasunod na ganitong linya bilang isang
    // table, sa halip na hiwalay-hiwalay na talata.
    if(p.includes('\t')){
      const tableRows=[];
      while(i<paragraphs.length && paragraphs[i].includes('\t') && !invInRange(i,blankRanges)){
        tableRows.push(paragraphs[i].split('\t').map(c=>c.trim()).filter(Boolean));
        i++;
      }
      html += `<table class="sob-table"><tbody>${tableRows.map(cols=>`<tr>${cols.map(c=>`<td>${escapeHtml(c)}</td>`).join('')}</tr>`).join('')}</tbody></table>`;
      continue;
    }

    if(SOB_SECTION_HEADERS.has(p)){
      // Bagong pahina simula dito — i-save muna ang naipong content ng
      // nakaraang pahina (kung mayroon).
      if(startedFirstPage && html.trim()){ pages.push(html); html=''; }
      startedFirstPage = true;
      html += `<h3 class="sob-h">${escapeHtml(p)}</h3>`;
      // Pagkatapos ng "Active Periods for Corrective Action" header, ilagay
      // ang totoong table — ang nilalaman nito ay nasa CARE_ACTIVE_PERIODS
      // data structure, hindi sa paragraph stream.
      if(p==='Active Periods for Corrective Action'){
        html += `<table class="sob-table"><tbody>
          <tr><td>Verbal Advice</td><td>${escapeHtml(CARE_ACTIVE_PERIODS.verbal)}</td></tr>
          <tr><td>Written Advice</td><td>${escapeHtml(CARE_ACTIVE_PERIODS.written)}</td></tr>
          <tr><td>Final Warning</td><td>${escapeHtml(CARE_ACTIVE_PERIODS.final)}</td></tr>
        </tbody></table>`;
      }
      // Pagkatapos ng "System of Sanction" header, ilagay ang totoong
      // Degree of Sanction matrix bilang table.
      if(p==='System of Sanction'){
        // WATERMARK SA TABLE CELL: ito ang TANGING pahina sa buong
        // dokumento na ang LAHAT ng nakikitang content ay isang table
        // (walang ibang body text dahil dito naka-skip ang blank CARE
        // form template) -- kaya kailangang ilapat dito ang watermark sa
        // mismong text ng table cell, hindi sa paragraph, para masiguro
        // pa ring may marka kahit dito. DETERMINISTIC PER-STAFF: ang
        // PARTICULAR na cell na minamarkahan ay depende sa seed ng staff
        // member, hindi laging parehong cell para sa lahat -- kung hindi,
        // walang silbi ang pag-trace dahil iisa lang ang variant.
        const allCells = [];
        ['A','B','C','D'].forEach(deg=>{ (CARE_SANCTION_MATRIX[deg]||[]).forEach((val,idx)=>{ if(val) allCells.push(deg+'-'+idx); }); });
        const seed = staffName ? invWatermarkSeed(staffName) : 0;
        const markedCellKey = allCells.length ? allCells[seed % allCells.length] : null;
        html += `<table class="sob-table"><thead><tr><th>Degree</th><th>1st</th><th>2nd</th><th>3rd</th><th>4th</th></tr></thead><tbody>
          ${['A','B','C','D'].map(deg=>{
            const row=CARE_SANCTION_MATRIX[deg];
            const cells=[0,1,2,3].map(idx=>{
              if(!row[idx]) return '—';
              const isMarked = markedCellKey===(deg+'-'+idx);
              return escapeHtml(row[idx] + (isMarked?'\u2009':''));
            });
            return `<tr><td><b>${deg}</b></td>${cells.map(c=>`<td>${c}</td>`).join('')}</tr>`;
          }).join('')}
        </tbody></table>`;
      }
      i++; continue;
    }

    // Numbered/lettered sub-headings (hal. "1.   Verbal Advice", "A. CONFLICTS OF INTEREST")
    if(/^[A-Z]\.\s*\t?[A-Z]{3,}/.test(p) || /^\d+\.\s+[A-Z]/.test(p)){
      html += `<h4 class="sob-h4">${escapeHtml(p)}</h4>`;
      i++; continue;
    }

    if(!startedFirstPage) startedFirstPage = true; // mga talata bago ang unang header (hal. pamagat ng dokumento)
    html += `<p class="sob-p">${escapeHtml(p)}</p>`;
    i++;
  }
  if(html.trim()) pages.push(html);
  return pages;
}
async function invLogWatermarkView(staffName, recordId, codeUsed, accessGrantedFlag){
  // I-log kung kailan/sino ang nakatingin sa dokumento (o sumubok mag-input

// Ibalik ang lahat ng available na (groupKind, groupName, options[]) para sa
// isang menu item base sa pangalan nito, gamit ang totoong UTAK modifier
// data. null kung walang modifier mapping ang item (hal. plain drinks).
function invUtakModifierGroupsFor(itemName){
  const idx = UTAK_ITEM_MODIFIER_INDEX[itemName];
  if(idx==null || !UTAK_MODIFIERS[idx]) return null;
  const entry = UTAK_MODIFIERS[idx];
  const groups=[];
  for(const kind of ['single','multiple']){
    if(entry[kind]){
      for(const [gname, opts] of Object.entries(entry[kind])){
        groups.push({kind, name:gname, options:opts});
      }
    }
  }
  return groups.length ? groups : null;
}

// Auto-seed ang inv_pos_item_map para sa lahat ng kilalang UTAK item+option
// combinations. Ito ang KRITIKAL na hakbang na nagkonekta sa sales CSV import
// sa inventory deductions — kung wala ang pos_key mapping, kahit may recipe
// ang menu item ay HINDI mababawas ang stock kapag nag-import ng sales.
// Ginagawa lang ang insert kung wala pang entry para sa posKey na iyon —
// hindi nito binabago ang manual na na-configure na mappings ng Owner.
async function invCatchUpPosItemMap(){
  try{
    const norm = s => (s||'').trim().toLowerCase().replace(/\s+/g,' ');
    const existingKeys = new Set(cache.invPosItemMap.map(m=>m.pos_key));
    const toInsert=[];
    for(const [itemName, opts] of Object.entries(UTAK_ITEM_OPTIONS)){
      const menuItem = cache.invMenuItems.find(m=>m.name===itemName);
      if(!menuItem) continue;
      const utakEntry = UTAK_MENU_ITEMS.find(u=>u.n===itemName);
      const category = utakEntry ? utakEntry.c : '';
      for(const opt of opts){
        if(!opt.o) continue;
        const posKey = norm(category)+'|'+norm(itemName)+'|'+norm(opt.o)+'|';
        if(existingKeys.has(posKey)) continue;
        // MAHALAGA: ang TUNAY na schema ng inv_pos_item_map ay
        // {pos_key (PRIMARY KEY), category, item, option_name, modifier,
        // menu_item_id, ignored, updated_at} — WALANG id/created_by/created_at
        // column. Ang dating code ay nagpapadala ng mga field na WALANG
        // katumbas na column, kaya tahimik na nabigo ang bawat insert dito
        // (hindi namin chinecheck ang {error}) — ito mismo ang dahilan kung
        // bakit walang laman ang pos_item_map kahit tumakbo na ang function
        // na ito, kaya hindi nagmamatch ang Wings, Sizzling Sisig, at iba pa.
        const row={pos_key:posKey, category, item:itemName, option_name:opt.o, modifier:'', menu_item_id:menuItem.id, ignored:false, updated_at:new Date().toISOString()};
        toInsert.push(row);
      }
      const baseKey = norm(category)+'|'+norm(itemName)+'||';
      if(!existingKeys.has(baseKey)){
        const row={pos_key:baseKey, category, item:itemName, option_name:'', modifier:'', menu_item_id:menuItem.id, ignored:false, updated_at:new Date().toISOString()};
        toInsert.push(row);
      }
    }
    let okCount=0, failCount=0;
    for(const row of toInsert){
      cache.invPosItemMap.push(row);
      const {error} = await sb.from('inv_pos_item_map').upsert(row, {onConflict:'pos_key'});
      if(error){ failCount++; console.error('pos_item_map insert failed for', row.pos_key, error); }
      else okCount++;
    }
    // DAGDAG: i-seed din ang mga item na WALA sa UTAK_ITEM_OPTIONS (single-size,
    // walang option) pero nasa UTAK_MENU_ITEMS — hal. Rice, Coke, Sprite, Extra
    // Microwaveable, Extra Buffalo Sauce. Dati, ang seeding loop ay tumatakbo
    // LANG para sa items na may entry sa UTAK_ITEM_OPTIONS (may sub-options).
    // Ang mga walang option ay hindi nakukuha — ito ang totoong dahilan kung bakit
    // hindi nagmamatch ang Extra Microwaveable at iba pa kahit nasa menu sila.
    for(const utakItem of UTAK_MENU_ITEMS){
      if(UTAK_ITEM_OPTIONS[utakItem.n]) continue; // may options na, handled na sa itaas
      const menuItem = cache.invMenuItems.find(m=>m.name===utakItem.n);
      if(!menuItem) continue;
      const baseKey = norm(utakItem.c)+'|'+norm(utakItem.n)+'||';
      if(existingKeys.has(baseKey)) continue;
      const row={pos_key:baseKey, category:utakItem.c, item:utakItem.n, option_name:'', modifier:'', menu_item_id:menuItem.id, ignored:false, updated_at:new Date().toISOString()};
      cache.invPosItemMap.push(row);
      existingKeys.add(baseKey);
      const {error} = await sb.from('inv_pos_item_map').upsert(row, {onConflict:'pos_key'});
      if(error){ failCount++; console.error('pos_item_map no-option insert failed for', row.pos_key, error); }
      else okCount++;
    }
    if(okCount || failCount) console.log('invCatchUpPosItemMap: inserted', okCount, 'OK,', failCount, 'failed');
  }catch(e){ console.error('invCatchUpPosItemMap failed', e); }
}
async function invCatchUpIngredients(){
  try{
    const {seedIng, seedSub} = invCanonicalSeed();
    const byNameLower = new Map(cache.invIngredients.map(i=>[i.name.toLowerCase(), i]));
    const toInsert=[];
    const toMerge=[]; // {oldId, newRow}
    for(const canon of seedIng){
      const existing = byNameLower.get(canon.name.toLowerCase());
      if(!existing){
        toInsert.push(canon);
      } else if(existing.id !== canon.id){
        // Parehong pangalan, ibang id — ito ang lumang row mula sa unang bersyon.
        // Panatilihin ang balanse nito sa ILALIM ng BAGONG canonical id.
        toMerge.push({oldId:existing.id, newRow:{...canon, begin_day:existing.begin_day, added:existing.added, deducted:existing.deducted, unit_cost:existing.unit_cost||canon.unit_cost}});
      }
    }
    for(const row of toInsert){
      await sb.from('inv_ingredients').upsert(row);
      cache.invIngredients.push(row);
    }
    for(const {oldId,newRow} of toMerge){
      await sb.from('inv_ingredients').upsert(newRow);
      // I-remap ang lahat ng existing reference papunta sa bagong id
      await sb.from('inv_staff_counts').update({ingredient_id:newRow.id}).eq('ingredient_id',oldId);
      await sb.from('inv_stock_entries').update({ingredient_id:newRow.id}).eq('ingredient_id',oldId);
      await sb.from('inv_reorders').update({ingredient_id:newRow.id}).eq('ingredient_id',oldId);
      cache.invStaffCounts.forEach(c=>{ if(c.ingredient_id===oldId) c.ingredient_id=newRow.id; });
      cache.invStockEntries.forEach(e=>{ if(e.ingredient_id===oldId) e.ingredient_id=newRow.id; });
      cache.invReorders.forEach(r=>{ if(r.ingredient_id===oldId) r.ingredient_id=newRow.id; });
      await sb.from('inv_ingredients').delete().eq('id',oldId);
      cache.invIngredients = cache.invIngredients.filter(i=>i.id!==oldId);
      cache.invIngredients = cache.invIngredients.filter(i=>i.id!==newRow.id);
      cache.invIngredients.push(newRow);
      await invAuditLog('ingredient_migrated',{name:newRow.name,oldId,newId:newRow.id,reason:'Catch-up migration sa canonical ingredient list'});
    }
    if(toInsert.length || toMerge.length){
      await invAuditLog('ingredient_catchup',{inserted:toInsert.length,merged:toMerge.length});
    }
    // Sub-recipes — same logic, simpler dahil walang balance na dadalhin
    const srByNameLower = new Map(cache.invSubRecipes.map(s=>[s.name.toLowerCase(), s]));
    for(const canon of seedSub){
      if(!srByNameLower.has(canon.name.toLowerCase())){
        await sb.from('inv_sub_recipes').upsert(canon);
        cache.invSubRecipes.push(canon);
      }
    }
  }catch(e){ console.error('invCatchUpIngredients failed', e); }
}
