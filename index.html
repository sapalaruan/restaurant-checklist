/* ============================================================
   EVENT HANDLERS
============================================================ */
function bindEvents(){
  // Nav — ang logout ay hawak na ng delegated listener sa document (tingnan
  // sa ibaba ng file), kaya hindi na kailangang i-bind dito ulit.
  document.querySelectorAll('[data-go]').forEach(el=>{
    el.addEventListener('click', ()=>{
      const target = el.dataset.go;
      if(target!=='logout') go(target);
    });
  });

  // Open a checklist from the selector
  document.querySelectorAll('[data-action="open-checklist"]').forEach(el=>{
    el.addEventListener('click', ()=>{
      const key = el.dataset.checklist;
      currentChecklist = key;
      showDoneList = false;
      showNotDoneList = true;
      adminEditingTaskId = null;
      const sub = cache.todaySubmissions[key];
      if(sub && session.role !== 'owner'){
        go('locked');
      }else{
        go('checklist');
      }
    });
  });

  // Admin: switch which checklist is being managed
  const adminChecklistSelect = document.getElementById('admin-checklist-select');
  if(adminChecklistSelect) adminChecklistSelect.addEventListener('change', ()=>{
    currentChecklist = adminChecklistSelect.value;
    adminEditingTaskId = null;
    render();
  });

  // Open utilities monitor
  document.querySelectorAll('[data-action="open-utilities"]').forEach(el=>{
    el.addEventListener('click', ()=>{
      utilTab='entry'; utilSettingsOpen=false; utilDraft={}; utilNote='';
      utilShift = (new Date().getHours() < 15) ? 'opening' : 'closing';
      go('utilities');
    });
  });
  document.querySelectorAll('[data-action="open-maint"]').forEach(el=>{
    el.addEventListener('click', ()=>{ maintTab='maint'; activeMaintId=null; editingMaintId=null; addingMaint=false; go('maint'); });
  });
  document.querySelectorAll('[data-action="open-employee"]').forEach(el=>{
    el.addEventListener('click', ()=>{ maintTab='leave'; activeMaintId=null; go('employee'); });
  });
  document.querySelectorAll('[data-action="open-support"]').forEach(el=>{
    el.addEventListener('click', ()=>{ supportPriorRoute=route; supportDraft={report_type:'app_issue', category:'', description:''}; go('support'); });
  });
  document.querySelectorAll('[data-action="open-cashier"]').forEach(el=>{
    el.addEventListener('click', ()=>{ cashierAdd=null; go('cashier'); });
  });
  document.querySelectorAll('[data-action="open-inventory"]').forEach(el=>{
    el.addEventListener('click', ()=>{ invTab='stock'; invAdd=null; go('inventory'); });
  });
  const mdis=document.getElementById('maint-dismiss');
  if(mdis) mdis.addEventListener('click', ()=>{ maintPopupDismissed=true; render(); });

  // Login
  const ownerRecover = document.getElementById('btn-owner-recover');
  if(ownerRecover) ownerRecover.addEventListener('click', async ()=>{
    const pin = prompt('Ilagay ang Owner PIN para i-unlock ang owner account:');
    if(!pin) return;
    try{
      const {data:ok, error} = await sb.rpc('admin_unlock_staff', {p_owner_pin: pin, p_target_id: 'owner'});
      if(error) throw error;
      alert(ok ? '✓ Na-unlock ang owner. Mag-login na.' : 'Maling Owner PIN.');
    }catch(e){ alert('Walang connection o mali ang PIN.'); console.error(e); }
  });
  const loginBtn = document.getElementById('btn-login');
  // ENTER KEY sa PIN field — para hindi na kailangang pindotin ang button
  // pagkatapos mag-type ng PIN, lalo na sa mobile kung saan maliit ang
  // screen at mahirap pindotin ang tama.
  const pinField = document.getElementById('login-pin');
  if(pinField) pinField.addEventListener('keydown', e=>{ if(e.key==='Enter' && loginBtn) loginBtn.click(); });
  if(loginBtn) loginBtn.addEventListener('click', async ()=>{
    const staffId = document.getElementById('login-staff').value;
    const pin = document.getElementById('login-pin').value;
    const err = document.getElementById('login-error');
    err.textContent = '';
    loginBtn.disabled = true;
    loginBtn.textContent = 'Checking...';
    try{
      const {data, error} = await sb.rpc('login_staff', {p_id: staffId, p_pin: pin});
      if(error) throw error;
      const r = data && data.length ? data[0] : null;
      if(r && r.status === 'ok'){
        // CARE BLOCK — kung may CARE citation na HINIHINTAY pa ang sagot ng
        // empleyadong ito, hindi muna sila papayagang makapasok. Hindi ito
        // nag-a-apekto sa ibang staff na gumagamit ng parehong shared phone
        // — ang pangalan/account lang nila ang naka-block, hindi ang device.
        try{
          // I-PREFETCH ang anumang corrective-action-issued na record —
          // ginagawa ito nang PARALLEL (Promise.all) hindi sequential,
          // para hindi mabagalan ang login. Ang awaiting_explanation check
          // ay kailangan muna (nagpapakita ng pre-login CARE button),
          // ang corrective_action_issued naman ay para ma-populate agad
          // ang cache bago mag-render, para sa CARE block sa render().
          const [{data: careCheck}, {data: issuedCheck}] = await Promise.all([
            sb.from('inv_care_records').select('*').eq('employee_name', r.name).eq('status','awaiting_explanation').limit(1),
            sb.from('inv_care_records').select('*').eq('employee_name', r.name).eq('status','corrective_action_issued')
          ]);
          if(careCheck && careCheck.length){
            const c = careCheck[0];
            err.innerHTML = `🔒 May CARE citation kang hinihintay pang sagutin (${escapeHtml(c.reference_no)}, ${escapeHtml(c.issued_date)}). Hindi ka muna makakapasok sa buong app hangga't hindi ito nasasagutan.`;
            const answerBtnWrap=document.createElement('div');
            answerBtnWrap.innerHTML = `<button class="btn-primary btn-block" id="btn-answer-care-now" style="margin-top:8px;">📝 Sagutin ang CARE Ngayon</button>`;
            err.appendChild(answerBtnWrap);
            document.getElementById('btn-answer-care-now').addEventListener('click', ()=>{
              careOnlySession = {id:r.id, name:r.name, role:r.role, careRecordId:c.id};
              go('care-only-answer');
            });
            loginBtn.disabled = false; loginBtn.textContent = 'Mag-login';
            return;
          }
          if(issuedCheck && issuedCheck.length){
            cache.careRecords = cache.careRecords || [];
            issuedCheck.forEach(rec=>{ if(!cache.careRecords.find(x=>x.id===rec.id)) cache.careRecords.push(rec); });
          }
        }catch(careErr){ console.error('care check at login failed', careErr); }
        session = {id:r.id, name:r.name, role:r.role};
        DB.save('session', session);
        if(session.role==='staff') startAuditWatch();
        // PIN MANAGEMENT — i-redirect sa PIN change screen kung:
        // 1. must_change_pin: bagong staff na kailangang palitan ang temporary PIN
        // 2. pin_reset_required: pinilit ng Owner na palitan
        // 3. 90-day expiry: matagal nang hindi nagpapalit
        const pinAge = r.pin_changed_at ? Math.floor((Date.now()-new Date(r.pin_changed_at).getTime())/(1000*60*60*24)) : 999;
        // 90-day expiry check: ONLY applies if the PIN has been changed via
        // the new flow before (pin_changed_at is set). Staff with old-format
        // PINs (4 chars, no letter/number mix) have pin_changed_at=null and
        // should NOT be forced to change via the 90-day rule — they would be
        // locked out since they can't pass the new format validation without
        // the Owner first setting them a temporary PIN via Settings → Staff.
        // Explicit flags (must_change_pin, pin_reset_required) still work
        // regardless — those are intentional Owner actions.
        const expiryApplies = !!r.pin_changed_at && pinAge >= 90;
        const needsForcedChange = r.role !== 'owner' && (r.must_change_pin || r.pin_reset_required || expiryApplies);
        // MAHALAGA: huwag mag-redirect sa PIN change kung may pending na CARE
        // corrective action — ang CARE block sa render() ang mag-ha-handle ng
        // redirect. Kung sabay-sabay ang dalawa, maglo-loop nang walang katapusan:
        // PIN change screen → CARE block override → CARE submit → login →
        // PIN change redirect → CARE block override → ulit mula sa simula.
        const hasPendingCare = (cache.careRecords||[]).some(c=>c.employee_name===r.name && c.status==='corrective_action_issued' && !c.employee_accepted);
        if(needsForcedChange && !hasPendingCare){
          pinChangeRequired = {
            reason: r.must_change_pin ? 'new_staff' : r.pin_reset_required ? 'owner_reset' : 'expired',
            days: pinAge
          };
          go('pin-change');
        } else {
          go('select');
        }
        return;
      }else if(r && r.status === 'locked_forever'){
        err.textContent = 'Naka-lock na ang account na ito. Kailangan i-unlock ng owner.';
      }else if(r && r.status === 'locked_temp'){
        const until = r.locked_until ? new Date(r.locked_until).toLocaleTimeString('en-PH',{hour:'2-digit',minute:'2-digit'}) : '';
        err.textContent = `Naka-lock pansamantala dahil sa maling PIN. Subukan ulit mamaya${until?(' (~'+until+')'):''}, o i-unlock ng owner.`;
      }else{
        err.textContent = 'Maling PIN. Subukan ulit.';
      }
    }catch(e){
      err.textContent = 'Walang connection. Subukan ulit.';
      console.error(e);
    }
    loginBtn.disabled = false;
    loginBtn.textContent = 'Mag-login';
  });

  // Checklist status buttons
  document.querySelectorAll('[data-action="status"]').forEach(el=>{
    el.addEventListener('click', ()=>{
      const taskId = el.dataset.task;
      const val = el.dataset.val;
      const state = getTaskState();
      const cur = state[taskId] || {};
      // toggle off if clicking same
      if(cur.status === val){
        cur.status = null;
        if(val==='done') cur.doneAt = null;
        if(val==='not_done'){ cur.reason=''; cur.reasonAt=null; cur.confirmed=false; }
      }else{
        cur.status = val;
        if(val==='done'){
          cur.doneAt = nowStamp();
          cur.reason=''; cur.reasonAt=null; cur.confirmed=false;
          // LATE TASK — huwag nang i-block si Gina ng popup. I-mark agad
          // bilang tapos, at mag-flag lang na kailangan ng late reason.
          // Ang explanation ay lalabas inline sa task card mismo, at
          // mahahanap niya ito bago isumite — hindi muna siya pipigilan
          // habang nag-ta-tick ng ibang tasks na kailangan pang gawin.
          const task = getTasks().find(x=>x.id===taskId);
          if(task && task.time && isPastDeadline(task.time)){
            cur.lateFlag = true;
            cur.lateReason = ''; // hihintayin ang inline na explanation
          }
        }else{
          cur.doneAt = null;
          cur.confirmed = false;
        }
      }
      state[taskId] = {...cur};
      setTaskState(state);
      render();
    });
  });

  // Reason inputs
  document.querySelectorAll('[data-action="reason"]').forEach(el=>{
    el.addEventListener('input', ()=>{
      const taskId = el.dataset.task;
      const state = getTaskState();
      state[taskId] = state[taskId] || {};
      state[taskId].reason = el.value;
      setTaskState(state);
      const warn = document.querySelector(`[data-warn="${taskId}"]`);
      if(warn) warn.classList.toggle('show', !el.value);
      const btn = document.querySelector(`[data-action="confirm-reason"][data-task="${taskId}"]`);
      if(btn) btn.disabled = !el.value;
    });
  });

  // Confirm a "Hindi Pa" reason -> moves task to the "Hindi Tapos" section with a timestamp
  document.querySelectorAll('[data-action="confirm-reason"]').forEach(el=>{
    el.addEventListener('click', ()=>{
      const taskId = el.dataset.task;
      const state = getTaskState();
      const cur = state[taskId] || {};
      if(!cur.reason) return;
      cur.confirmed = true;
      cur.reasonAt = nowStamp();
      state[taskId] = cur;
      setTaskState(state);
      showNotDoneList = true;
      render();
    });
  });

  // "Baguhin" on a confirmed not-done item -> brings it back to the active list for editing
  document.querySelectorAll('[data-action="edit-notdone"]').forEach(el=>{
    el.addEventListener('click', ()=>{
      const taskId = el.dataset.task;
      const state = getTaskState();
      if(state[taskId]) state[taskId].confirmed = false;
      setTaskState(state);
      render();
    });
  });

  // Toggle "Hindi Tapos" collapsible section
  const toggleNotDone = document.querySelector('[data-action="toggle-notdone"]');
  if(toggleNotDone) toggleNotDone.addEventListener('click', ()=>{
    showNotDoneList = !showNotDoneList;
    render();
  });

  // Undo a "done" task (bring it back to the active list)
  document.querySelectorAll('[data-action="undo-done"]').forEach(el=>{
    el.addEventListener('click', ()=>{
      const taskId = el.dataset.task;
      const state = getTaskState();
      if(state[taskId]){ state[taskId].status = null; state[taskId].doneAt = null; state[taskId].lateFlag = false; state[taskId].lateReason = ''; }
      setTaskState(state);
      render();
    });
  });
  // INLINE LATE REASON — i-save ang dahilan nang hindi binibigyan ng block
  // ang ibang tasks. Ang input ay nasa done list mismo, hindi blocking popup.
  document.querySelectorAll('[data-action="save-late-reason"]').forEach(el=>{
    el.addEventListener('click', ()=>{
      const taskId = el.dataset.task;
      const inputEl = document.querySelector(`[data-action="late-reason"][data-task="${taskId}"]`);
      const reason = inputEl ? inputEl.value.trim() : '';
      if(!reason){ inputEl && (inputEl.style.borderColor='var(--very-high)'); return; }
      const state = getTaskState();
      if(state[taskId]){ state[taskId].lateReason = reason; }
      setTaskState(state);
      render();
    });
  });
  // Live update ng late-reason input sa state (para hindi mawala kapag nag-render)
  document.querySelectorAll('[data-action="late-reason"]').forEach(el=>{
    el.addEventListener('input', ()=>{
      const taskId = el.dataset.task;
      const state = getTaskState();
      if(state[taskId]) state[taskId].lateReason = el.value;
      // Huwag mag-render — baka mawala ang cursor. State lang ang update.
      cache.stateByChecklist[currentChecklist] = state;
    });
  });

  // Toggle "Tapos na" collapsible section
  const toggleDone = document.querySelector('[data-action="toggle-done"]');
  if(toggleDone) toggleDone.addEventListener('click', ()=>{
    showDoneList = !showDoneList;
    render();
  });

  // Submit
  const submitBtn = document.getElementById('btn-submit');
  if(submitBtn) submitBtn.addEventListener('click', ()=>{
    const tasks = getTasks().filter(t=>t.active);
    const state = getTaskState();

    // Validation
    let firstInvalid = null;
    for(const t of tasks){
      const st = state[t.id];
      if(!st || !st.status){ firstInvalid = t.id; break; }
      if(st.status==='not_done' && !st.confirmed){ firstInvalid = t.id; break; }
    }
    if(firstInvalid){
      alert('Sagutan muna ang lahat ng task. Kung "Hindi Pa", maglagay ng dahilan at i-tap ang "Isumite ang Dahilan".');
      const card = document.querySelector(`[data-task="${firstInvalid}"]`);
      if(card) card.scrollIntoView({behavior:'smooth', block:'center'});
      return;
    }
    // Block din kung may late task na walang dahilan pa
    const missingLateReason = tasks.find(t=>{ const st=state[t.id]; return st && st.status==='done' && st.lateFlag && !st.lateReason; });
    if(missingLateReason){
      alert('May task na na-late — kailangan munang maglagay ng dahilan sa "Tapos na" list bago isumite.');
      showDoneList = true; render();
      return;
    }

    const undone = [];
    const newState = {};
    tasks.forEach(t=>{
      const st = state[t.id];
      if(st.status==='not_done'){
        undone.push({text:t.text, reason:st.reason, reasonAt:st.reasonAt});
        newState[t.id] = {status:'not_done', reason:st.reason, reasonAt:st.reasonAt, confirmed:true, wasPendingFromBefore:true, doneAt:null};
      }else{
        // done -> cleared for next shift
        newState[t.id] = {status:null, reason:'', reasonAt:null, confirmed:false, wasPendingFromBefore:false, doneAt:null};
      }
    });
    setTaskState(newState);
    showDoneList = false;
    showNotDoneList = true;

    const now = new Date();
    const timeStr = now.toLocaleTimeString('en-PH', {hour:'2-digit', minute:'2-digit', timeZone:'Asia/Manila'});
    pushHistory({
      staff: session.name,
      date: now.toLocaleDateString('en-PH', {month:'short', day:'numeric'}),
      time: timeStr,
      undoneCount: undone.length,
      undoneItems: undone
    });
    cache.todaySubmissions[currentChecklist] = {
      staff_name: session.name,
      undone_count: undone.length,
      timeStr: timeStr
    };

    lastSubmission = {undone};
    go('summary');
    // Undone-item alerts are sent automatically & silently to the owners
    // via Supabase + CallMeBot — staff don't see them.
  });

  // Back from summary
  const backBtn = document.getElementById('btn-back-checklist');
  if(backBtn) backBtn.addEventListener('click', ()=>go('select'));

  // WhatsApp
  const waBtn = document.getElementById('btn-whatsapp');
  if(waBtn) waBtn.addEventListener('click', ()=>{
    const ownerNum = formatPhoneForWa(cache.settings.owner_whatsapp);
    const msg = buildWhatsappMessage();
    const url = ownerNum
      ? `https://wa.me/${ownerNum}?text=${encodeURIComponent(msg)}`
      : `https://wa.me/?text=${encodeURIComponent(msg)}`;
    window.open(url, '_blank');
  });

  // Admin: save deadline window hours
  const saveDw=document.getElementById('btn-save-deadline');
  if(saveDw) saveDw.addEventListener('click', async ()=>{
    const v=document.getElementById('deadline-window').value.trim();
    const msg=document.getElementById('dw-msg');
    if(!v || isNaN(parseFloat(v))){ msg.style.color='var(--very-high)'; msg.textContent='Maglagay ng bilang ng oras.'; return; }
    saveDw.disabled=true;
    try{ await saveSetting('deadline_window_hours', v); msg.style.color='var(--done)'; msg.textContent='Na-save!'; }
    catch(e){ msg.style.color='var(--very-high)'; msg.textContent='Hindi na-save.'; console.error(e); }
    saveDw.disabled=false;
  });

  // Admin: save owner's WhatsApp number
  const saveWaBtn = document.getElementById('btn-save-whatsapp');
  if(saveWaBtn) saveWaBtn.addEventListener('click', async ()=>{
    const num = document.getElementById('owner-whatsapp').value.trim();
    const msg = document.getElementById('wa-msg');
    saveWaBtn.disabled = true;
    try{
      await saveSetting('owner_whatsapp', num);
      msg.style.color = 'var(--done)';
      msg.textContent = 'Na-save!';
    }catch(e){
      msg.style.color = 'var(--very-high)';
      msg.textContent = 'Hindi na-save. Subukan ulit.';
      console.error(e);
    }
    saveWaBtn.disabled = false;
  });

  // Admin: change own PIN
  const changePinBtn = document.getElementById('btn-change-pin');
  if(changePinBtn) changePinBtn.addEventListener('click', async ()=>{
    const oldPin = document.getElementById('pin-old').value.trim();
    const newPin = document.getElementById('pin-new').value.trim();
    const confirmPin = document.getElementById('pin-confirm').value.trim();
    const msg = document.getElementById('pin-msg');
    msg.style.color = 'var(--very-high)';
    if(!oldPin || !newPin || !confirmPin){ msg.textContent = 'Kumpletuhin ang lahat ng field.'; return; }
    if(!/^(?=.*[A-Za-z])(?=.*[0-9])[A-Za-z0-9]{6}$/.test(newPin)){ msg.textContent = 'Dapat 6 characters na may letra at numero (hal. ab12cd).'; return; }
    if(newPin !== confirmPin){ msg.textContent = 'Hindi tugma ang bagong PIN.'; return; }
    changePinBtn.disabled = true;
    try{
      const {data, error} = await sb.rpc('change_staff_pin', {p_id: session.id, p_old_pin: oldPin, p_new_pin: newPin});
      if(error) throw error;
      if(data){
        msg.style.color = 'var(--done)';
        msg.textContent = 'Na-update ang PIN mo!';
        document.getElementById('pin-old').value = '';
        document.getElementById('pin-new').value = '';
        document.getElementById('pin-confirm').value = '';
      }else{
        msg.textContent = 'Mali ang kasalukuyang PIN.';
      }
    }catch(e){
      msg.textContent = 'Connection error. Subukan ulit.';
      console.error(e);
    }
    changePinBtn.disabled = false;
  });

  // Admin: add task
  const addTaskBtn = document.getElementById('btn-add-task');
  if(addTaskBtn) addTaskBtn.addEventListener('click', ()=>{
    const text = document.getElementById('new-task-text').value.trim();
    const priority = document.getElementById('new-task-priority').value;
    const time = document.getElementById('new-task-time').value;
    if(!text){ alert('Maglagay ng pangalan ng task.'); return; }
    const tasks = getTasks();
    tasks.push({id:'t'+Date.now(), text, priority, time, active:true, order:tasks.length});
    setTasks(tasks);
    render();
  });

  // Admin: edit/delete task
  document.querySelectorAll('[data-action="edit-task"]').forEach(el=>{
    el.addEventListener('click', ()=>{
      adminEditingTaskId = el.dataset.task;
      render();
    });
  });
  document.querySelectorAll('[data-action="cancel-edit"]').forEach(el=>{
    el.addEventListener('click', ()=>{
      adminEditingTaskId = null;
      render();
    });
  });
  document.querySelectorAll('[data-action="save-task"]').forEach(el=>{
    el.addEventListener('click', ()=>{
      const tasks = getTasks();
      const t = tasks.find(x=>x.id===el.dataset.task);
      const newText = document.getElementById('edit-task-text').value.trim();
      if(!newText){ alert('Hindi pwedeng walang pangalan ang task.'); return; }
      t.text = newText;
      t.priority = document.getElementById('edit-task-priority').value;
      t.time = document.getElementById('edit-task-time').value;
      t.active = document.getElementById('edit-task-active').checked;
      setTasks(tasks);
      adminEditingTaskId = null;
      render();
    });
  });
  document.querySelectorAll('[data-action="delete-task"]').forEach(el=>{
    el.addEventListener('click', ()=>{
      if(!confirm('Tanggalin ang task na ito?')) return;
      let tasks = getTasks().filter(x=>x.id!==el.dataset.task);
      setTasks(tasks);
      const state = getTaskState();
      delete state[el.dataset.task];
      setTaskState(state);
      render();
    });
  });

  // Admin: add staff
  const addStaffBtn = document.getElementById('btn-add-staff');
  if(addStaffBtn) addStaffBtn.addEventListener('click', async ()=>{
    const name = document.getElementById('new-staff-name').value.trim();
    const pin = document.getElementById('new-staff-pin').value.trim();
    if(!name || !pin){ alert('Kumpletuhin ang pangalan at passcode.'); return; }
    if(!/^(?=.*[A-Za-z])(?=.*[0-9])[A-Za-z0-9]{6}$/.test(pin)){
      alert('Ang passcode ay dapat eksaktong 6 characters, may kahit 1 letra at 1 numero (hal. ab12cd).'); return;
    }
    try{
      const {error} = await sb.rpc('admin_add_staff', {p_name: name, p_pin: pin});
      if(error) throw error;
      // Awtomatikong i-set ang must_change_pin=true para pilitin ang bagong
      // staff na palitan ang temporary PIN sa first login nila — sila lang
      // dapat nakakaalam ng kanilang sariling PIN, hindi ang Owner.
      const {data:newStaffData} = await sb.rpc('get_staff_list');
      const newStaff = (newStaffData||[]).find(s=>s.name===name);
      if(newStaff){
        await sb.from('staff').update({must_change_pin:true}).eq('id',newStaff.id);
      }
      if(newStaffData) cache.staff = newStaffData;
      alert(`✓ Naidagdag si ${name}. Sa unang login nila, kailangan nilang palitan ang temporary PIN na "${pin}" para sila lang nakakaalam.`);
      render();
    }catch(e){
      alert('Hindi na-save ang staff. Tiyaking tama ang passcode format.');
      console.error(e);
    }
  });
  // OWNER: I-edit ang PIN ng staff nang direkta
  document.querySelectorAll('[data-action="owner-edit-pin"]').forEach(el=>{
    el.addEventListener('click', async ()=>{
      const name = el.dataset.name;
      const newPin = prompt(`Bagong PIN para kay ${name} (6 characters, may letra at numero):`);
      if(!newPin) return;
      if(!/^(?=.*[A-Za-z])(?=.*[0-9])[A-Za-z0-9]{6}$/.test(newPin)){
        alert('Hindi tama ang format. Kailangan: eksaktong 6 characters, may kahit 1 letra at 1 numero.');
        return;
      }
      const forceChange = confirm(`Pilitin si ${name} na palitan ito sa susunod na login nila?\n(I-click OK kung gusto mong temporary PIN lang ito at sila ang mag-set ng sarili nilang PIN. I-click Cancel kung ikaw ang mag-se-set ng final PIN nila.)`);
      await sb.rpc('owner_change_staff_pin',{p_staff_id: el.dataset.staff, p_new_pin: newPin, p_must_change: forceChange});
      const {data} = await sb.rpc('get_staff_list');
      if(data) cache.staff = data;
      alert(`✓ Na-update ang PIN ni ${name}${forceChange?' — kailangan nilang palitan ito sa susunod na login':''}.`);
      render();
    });
  });
  // OWNER: I-flag ang staff na kailangan palitan ang PIN (force reset)
  document.querySelectorAll('[data-action="owner-force-reset"]').forEach(el=>{
    el.addEventListener('click', async ()=>{
      const name = el.dataset.name;
      if(!confirm(`Pilitin si ${name} na palitan ang PIN sa susunod na login nila?`)) return;
      await sb.rpc('owner_flag_pin_reset',{p_staff_id: el.dataset.staff});
      const {data} = await sb.rpc('get_staff_list');
      if(data) cache.staff = data;
      alert(`✓ Na-flag si ${name} — kailangang palitan ang PIN sa susunod na login nila.`);
      render();
    });
  });
  document.querySelectorAll('[data-action="delete-staff"]').forEach(el=>{
    el.addEventListener('click', async ()=>{
      if(!confirm('Tanggalin ang staff na ito?')) return;
      try{
        const {error} = await sb.rpc('admin_delete_staff', {p_id: el.dataset.staff});
        if(error) throw error;
        const {data} = await sb.rpc('get_staff_list');
        if(data) cache.staff = data;
        render();
      }catch(e){
        alert('Hindi na-tanggal ang staff. Subukan ulit.');
        console.error(e);
      }
    });
  });

  // Admin: load locked staff list, then wire unlock buttons
  const lockedBox = document.getElementById('locked-staff-list');
  if(lockedBox){
    (async()=>{
      try{
        const {data, error} = await sb.rpc('get_locked_staff');
        if(error) throw error;
        if(!data || !data.length){ lockedBox.innerHTML = `<p class="hint">Walang naka-lock na staff.</p>`; return; }
        lockedBox.innerHTML = data.map(s=>{
          const why = s.locked_forever ? 'Permanente (5 maling subok)' : ('Hanggang '+(s.locked_until?new Date(s.locked_until).toLocaleTimeString('en-PH',{hour:'2-digit',minute:'2-digit'}):''));
          return `<div class="admin-task-row"><div class="top">
            <span>${escapeHtml(s.name)} — <span style="color:var(--very-high)">${why}</span></span>
            <button class="btn-small btn-primary" data-unlock="${s.staff_id}">Unlock</button>
          </div></div>`;
        }).join('');
        lockedBox.querySelectorAll('[data-unlock]').forEach(btn=>{
          btn.addEventListener('click', async ()=>{
            const ownerPin = prompt('Ilagay ang Owner PIN para i-unlock:');
            if(!ownerPin) return;
            try{
              const {data:ok, error:e2} = await sb.rpc('admin_unlock_staff', {p_owner_pin: ownerPin, p_target_id: btn.dataset.unlock});
              if(e2) throw e2;
              if(ok){ alert('Na-unlock na!'); render(); }
              else alert('Maling Owner PIN.');
            }catch(err){ alert('Hindi na-unlock. Subukan ulit.'); console.error(err); }
          });
        });
      }catch(e){ lockedBox.innerHTML = `<p class="hint">Hindi ma-load ang listahan.</p>`; console.error(e); }
    })();
  }
}

/* ============================================================
   UTILITIES MONITOR MODULE
   (data in Supabase table 'util_entries' + 'util_settings';
    falls back to localStorage if offline)
============================================================ */
const DEFAULT_METERS = [
  {id:'main_water', name:'Main Water', enabled:true},
  {id:'common_water', name:'Common Water (CW)', enabled:true},
  {id:'water7', name:'7 Water', enabled:true},
  {id:'water5', name:'5 Water', enabled:true},
  {id:'elec7', name:'7 Electricity', enabled:true},
  {id:'elec5', name:'5 Electricity', enabled:true},
  {id:'gas', name:'Gas', enabled:true}
];
// Live meter config (loaded from app_settings 'util_meters'); starts as default.
let METER_CONFIG = JSON.parse(JSON.stringify(DEFAULT_METERS));
// METERS = only the ENABLED meters (used by staff entry, limits, alerts).
// Use getAllMeters() when you need every meter incl. disabled (e.g. history/CSV).
function getMeters(){ return METER_CONFIG.filter(m=>m.enabled!==false); }
function getAllMeters(){ return METER_CONFIG; }
Object.defineProperty(window, 'METERS', { get(){ return getMeters(); } });
const DEFAULT_UTIL_LIMITS = {
  opening: {main_water:0.8, common_water:0.7, water7:0.5, water5:0.7, elec7:null, elec5:null, gas:1.0},
  closing: {main_water:0.5, common_water:0.4, water7:0.3, water5:0.5, elec7:null, elec5:null, gas:1.0}
};
const DEFAULT_UTIL_SETTINGS_PW = '9999';

let utilCache = { entries: [], limits: JSON.parse(JSON.stringify(DEFAULT_UTIL_LIMITS)), settingsPw: DEFAULT_UTIL_SETTINGS_PW };
let utilTab = 'entry';
let utilShift = (new Date().getHours() < 15) ? 'opening' : 'closing';
let utilDraft = {};
let utilNote = '';
let utilSettingsOpen = false;
let utilChartRefs = {};

function utilRound3(n){ return Math.round(n*1000)/1000; }
function utilTodayKey(){ return new Date().toLocaleDateString('en-CA',{timeZone:'Asia/Manila'}); }
function utilNowTime(){ return new Date().toLocaleTimeString('en-PH',{hour:'2-digit',minute:'2-digit',timeZone:'Asia/Manila'}); }
function utilLastReading(meterId){
  const es = utilCache.entries.filter(e=>e.readings && e.readings[meterId]!=null).slice().sort((a,b)=>b.ts-a.ts);
  return es.length ? {value:es[0].readings[meterId], date:es[0].date, shift:es[0].shift} : null;
}
function utilEntryExists(date, shift){ return utilCache.entries.some(e=>e.date===date && e.shift===shift); }

async function utilLoadData(){
  try{
    const [entriesRes, settingsRes] = await Promise.all([
      sb.from('util_entries').select('*').order('ts',{ascending:true}),
      sb.from('app_settings').select('*').in('key',['util_limits','util_settings_pw','util_meters'])
    ]);
    if(entriesRes.data){
      utilCache.entries = entriesRes.data.map(r=>({
        date:r.date, shift:r.shift, staff:r.staff, readings:r.readings, usage:r.usage,
        exceeded:r.exceeded||[], negatives:r.negatives||[], note:r.note||'', time:r.time, ts:Number(r.ts)
      }));
    }
    (settingsRes.data||[]).forEach(r=>{
      if(r.key==='util_limits' && r.value){ try{ utilCache.limits = JSON.parse(r.value); }catch(e){} }
      if(r.key==='util_settings_pw' && r.value){ utilCache.settingsPw = r.value; }
      if(r.key==='util_meters' && r.value){ try{ const m=JSON.parse(r.value); if(Array.isArray(m)&&m.length) METER_CONFIG=m; }catch(e){} }
    });
  }catch(err){ console.error('utilLoadData', err); }
}
async function utilSaveEntry(entry){
  utilCache.entries.push(entry);
  // fold the why/action explanation into the note field so it persists & shows in logs/alerts
  let noteFull = entry.note || '';
  if(entry.exceedWhy){ noteFull += (noteFull?' | ':'') + 'BAKIT LUMAGPAS: ' + entry.exceedWhy; }
  if(entry.exceedAction){ noteFull += (noteFull?' | ':'') + 'GINAWA: ' + entry.exceedAction; }
  const {error} = await sb.from('util_entries').insert({
    date:entry.date, shift:entry.shift, staff:entry.staff, readings:entry.readings, usage:entry.usage,
    exceeded:entry.exceeded, negatives:entry.negatives, note:noteFull, time:entry.time, ts:entry.ts
  });
  if(error) console.error('utilSaveEntry', error);
}
async function utilSaveLimits(){
  const {error} = await sb.from('app_settings').upsert({key:'util_limits', value:JSON.stringify(utilCache.limits)});
  if(error) console.error('utilSaveLimits', error);
}
async function utilSaveSettingsPw(pw){
  utilCache.settingsPw = pw;
  await sb.from('app_settings').upsert({key:'util_settings_pw', value:pw});
}
async function utilDeleteEntries(filterFn){
  const toDelete = utilCache.entries.filter(filterFn);
  utilCache.entries = utilCache.entries.filter(e=>!filterFn(e));
  for(const e of toDelete){ await sb.from('util_entries').delete().eq('ts', e.ts); }
}

/* ----- Utilities WhatsApp ----- */
function utilBuildAlertMessage(entry){
  const sh = entry.shift==='opening'?'Opening (AM)':'Closing (PM)';
  let msg=`*⚠ UTILITIES ALERT*\n${entry.date} ${sh}\nStaff: ${entry.staff}\n\n`;
  if(entry.exceeded && entry.exceeded.length){
    msg+=`*LAGPAS SA LIMIT:*\n`;
    entry.exceeded.forEach(id=>{const m=METERS.find(x=>x.id===id);msg+=`  ${m.name.replace(' (CW)','')}: ${entry.usage[id]} (limit ${utilCache.limits[entry.shift][id]})\n`;});
    msg+='\n';
  }
  if(entry.negatives && entry.negatives.length){
    msg+=`*NEGATIVE READING (baka mali/na-reset):*\n`;
    entry.negatives.forEach(id=>{const m=METERS.find(x=>x.id===id);msg+=`  ${m.name.replace(' (CW)','')}: ${entry.usage[id]} (ngayon ${entry.readings[id]})\n`;});
    msg+='\n';
  }
  if(entry.note) msg+=`Note: ${entry.note}`;
  return msg;
}
function utilBuildMonthMessage(){
  const ym=utilTodayKey().slice(0,7);
  const es=utilCache.entries.filter(e=>e.date.startsWith(ym)).slice().sort((a,b)=>a.ts-b.ts);
  let msg=`*UTILITIES — ${ym}*\n\n`;
  if(!es.length) return msg+'Walang record ngayong buwan.';
  es.forEach(e=>{
    msg+=`${e.date} ${e.shift==='opening'?'AM':'PM'} (${e.staff}):\n`;
    METERS.forEach(m=>{ if(e.usage && e.usage[m.id]!=null){ const ov=e.exceeded&&e.exceeded.includes(m.id); const ng=e.negatives&&e.negatives.includes(m.id); msg+=`  ${m.name.replace(' (CW)','')}: ${e.usage[m.id]}${ov?' ⚠LAGPAS':''}${ng?' ⚠NEGATIVE':''}\n`; } });
    if(e.note) msg+=`  Note: ${e.note}\n`;
    msg+='\n';
  });
  return msg;
}
function utilOpenWa(msg){
  const num=formatPhoneForWa(cache.settings.owner_whatsapp);
  window.open((num?`https://wa.me/${num}`:'https://wa.me/')+`?text=${encodeURIComponent(msg)}`,'_blank');
}
function utilDownloadCSV(){
  const es=utilCache.entries.slice().sort((a,b)=>a.ts-b.ts);
  const header=['Date','Shift','Staff',...METERS.map(m=>m.name.replace(' (CW)','')+' reading'),...METERS.map(m=>m.name.replace(' (CW)','')+' usage'),'Exceeded','Negative','Note'];
  const rows=es.map(e=>[e.date,e.shift,e.staff,
    ...METERS.map(m=>e.readings[m.id]??''),...METERS.map(m=>e.usage[m.id]??''),
    (e.exceeded||[]).join('|'),(e.negatives||[]).join('|'),(e.note||'').replace(/,/g,';')]);
  const csv=[header,...rows].map(r=>r.join(',')).join('\n');
  const blob=new Blob([csv],{type:'text/csv'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`utilities_${utilTodayKey()}.csv`;a.click();
}

/* ----- Utilities render ----- */
function renderUtilities(){
  const tabs=(id,label)=>`<button class="${utilTab===id?'active':''}" data-util-tab="${id}">${label}</button>`;
  let body='';
  if(utilTab==='entry') body=renderUtilEntry();
  else if(utilTab==='log') body=renderUtilLog();
  else if(utilTab==='trends') body=renderUtilTrends();
  else if(utilTab==='settings') body=renderUtilSettings();
  return `<div class="screen">
    <div class="util-tabs">${tabs('entry','Entry')}${tabs('log','Log')}${tabs('trends','Trends')}${tabs('settings','Settings')}</div>
    ${body}
  </div>`;
}
function renderUtilEntry(){
  const limits=utilCache.limits[utilShift];
  const date=utilTodayKey();
  const shiftLabel=utilShift==='opening'?'☀️ OPENING (Umaga)':'🌙 CLOSING (Gabi)';
  const otherShift=utilShift==='opening'?'closing':'opening';
  const otherLabel=utilShift==='opening'?'🌙 Closing (Gabi)':'☀️ Opening (Umaga)';
  const bar=`<div class="shift-label">${shiftLabel}</div><div class="shift-switch" data-util-switch="${otherShift}">Lumipat sa ${otherLabel} →</div>`;
  if(utilEntryExists(date,utilShift)){
    const e=utilCache.entries.find(x=>x.date===date&&x.shift===utilShift);
    return `${bar}<div class="util-locked"><div class="big">✓ Tapos na ang ${utilShift==='opening'?'Opening':'Closing'} ngayong araw</div>
      <p style="font-size:13px;color:var(--ink-soft)">Ni ${escapeHtml(e.staff)} sa ${e.time||''}. Pwede ulit bukas.</p></div>`;
  }
  const cards=METERS.map(m=>{
    const prev=utilLastReading(m.id); const prevVal=prev?prev.value:null;
    const cur=utilDraft[m.id]!==undefined?utilDraft[m.id]:''; const lim=limits[m.id];
    return `<div class="meter-card" id="ucard-${m.id}">
      <div class="mc-top"><span class="mc-name">${m.name}</span><span class="limit-pill">${lim!=null?('limit '+lim):'no limit'}</span></div>
      <div class="mc-prev">Huling reading: ${prevVal!=null?prevVal+' ('+prev.date+' '+prev.shift+')':'— wala pa, baseline'}</div>
      <div style="margin-top:7px;"><div class="field-label">Meter Reading Ngayon</div>
      <input type="text" inputmode="decimal" data-umeter="${m.id}" value="${cur}" placeholder="hal. 123.4"></div>
      <div class="mc-usage" id="uusage-${m.id}"></div>
    </div>`;
  }).join('');
  return `${bar}
    <div class="util-alert" id="ualert" style="display:none;"><div class="a-title"></div><div class="a-list"></div></div>
    ${cards}
    <div class="field-label" style="margin-top:6px;">Notes (optional)</div>

function updateUtilPreview(){
  const limits=utilCache.limits[utilShift]; let over=false,neg=false;
  METERS.forEach(m=>{
    const card=document.getElementById('ucard-'+m.id); const ue=document.getElementById('uusage-'+m.id);
    if(!card||!ue) return;
    const prev=utilLastReading(m.id); const raw=utilDraft[m.id]; const cur=parseFloat(raw); const lim=limits[m.id];
    if(prev && raw!==undefined && raw!=='' && !isNaN(cur)){
      const u=utilRound3(cur-prev.value); const isNeg=u<0; const isOver=!isNeg&&lim!=null&&u>lim;
      if(isOver)over=true; if(isNeg)neg=true;
      card.classList.toggle('exceeded', isOver||isNeg);
      ue.className='mc-usage'+((isOver||isNeg)?' over':'');
      ue.innerHTML= isNeg?`Usage: <b>${u}</b> ⚠ NEGATIVE! (mas mababa sa huling reading)`:(`Usage: <b>${u}</b>`+(lim!=null?(isOver?' ⚠ LAGPAS SA LIMIT!':' ✓ ok'):''));

  if(al){ if(over||neg){ al.style.display='block';

}

    // setTimeout(50) lang, walang retry kung hindi pa ready ang canvas.
    let tries=0;
    const tryDraw=()=>{
      tries++;
      const ready=document.getElementById('uchart-water');
      if(ready){ drawUtilCharts(); }
      else if(tries<10){ setTimeout(tryDraw,100); }
    };
    setTimeout(tryDraw,50);
  }

      const val=parseFloat(raw); if(isNaN(val)){ missing.push(m.name.replace(' (CW)','')); continue; }
      readings[m.id]=val; const prev=utilLastReading(m.id);
      if(prev){ const u=utilRound3(val-prev.value); usage[m.id]=u; if(u<0)negatives.push(m.id); else if(limits[m.id]!=null&&u>limits[m.id])exceeded.push(m.id); }
      else usage[m.id]=null;
    }
    if(missing.length){ alert('Kulang/mali ang readings para sa:\n\n• '+missing.join('\n• ')); return; }

    // If anything exceeded the limit or went negative, require an explanation

    const entry={date,shift:utilShift,staff:session.name,readings,usage,exceeded,negatives,note:utilNote.trim(),exceedWhy:explain.why||null,exceedAction:explain.action||null,time:utilNowTime(),ts:Date.now()};
    usave.disabled=true;

  });

  if(usaveLimits) usaveLimits.addEventListener('click',async()=>{
    document.querySelectorAll('[data-ulim]').forEach(el=>{const [sh,id]=el.dataset.ulim.split(':');const v=el.value.trim();utilCache.limits[sh][id]=v===''?null:parseFloat(v);});
    await utilSaveLimits(); const m=document.getElementById('uset-msg'); if(m)m.textContent='Na-save ang limits!';
  });
  const udelOpen=document.getElementById('btn-udel-open');
  if(udelOpen) udelOpen.addEventListener('click',async()=>{const d=utilTodayKey();await utilDeleteEntries(e=>e.date===d&&e.shift==='opening');render();});
  const udelClose=document.getElementById('btn-udel-close');

  const addMeter=document.getElementById('btn-add-meter');
  if(addMeter) addMeter.addEventListener('click',()=>{

function maintTodayKey(){ return new Date().toLocaleDateString('en-CA',{timeZone:'Asia/Manila'}); }
function maintNowTime(){ return new Date().toLocaleTimeString('en-PH',{hour:'2-digit',minute:'2-digit',timeZone:'Asia/Manila'}); }

function maintLastMonday(y,m){ const d=new Date(y,m+1,0); while(d.getDay()!==1)d.setDate(d.getDate()-1); return d; }
function maintComputeDue(t){
  const today=new Date(maintTodayKey()+'T00:00:00');
  if(t.sched_type==='weekly'){ const diff=(today.getDay()-t.weekday+7)%7; const due=new Date(today); due.setDate(today.getDate()-diff); return {dueDate:due.toLocaleDateString('en-CA'),label:`${WEEKDAYS_TL[t.weekday]} ${t.time}`}; }
  if(t.sched_type==='quarterly_last_monday'){ const lm=maintLastMonday(today.getFullYear(),today.getMonth()); return {dueDate:lm.toLocaleDateString('en-CA'),label:`Last Monday ${t.time} (every 3 months)`}; }
  return {dueDate:maintTodayKey(),label:''};
}

/* ---- Blocking check (staff only) ---- */
function getMaintBlocker(){
  if(!session || session.role!=='staff') return null;
  const today=maintTodayKey(); const ns=Date.now();
  for(const t of (cache.maintTasks||[]).filter(x=>x.active)){
    const due=maintComputeDue(t); const st=(cache.maintState||{})[t.id]||{};
    if(st.status==='done'&&st.due_date===due.dueDate)continue;
    if(today<due.dueDate)continue;
    if(st.due_date===due.dueDate&&st.later_until&&ns<st.later_until)continue;
    if(st.postpone_until_date&&today<st.postpone_until_date)continue;
    return t;
  }
  return null;
}

function daysInclusive(a,b){ if(!a||!b)return 0; const d1=new Date(a+'T00:00:00'),d2=new Date(b+'T00:00:00'); const n=Math.round((d2-d1)/86400000)+1; return n>0?n:0; }
// I-check kung may APPROVED na leave na ang staff member na ito sa loob ng
// hiniling na petsa — kung mayroon, hindi pwedeng magsumite ng panibagong
// request na sumasalubong dito (blocked ang date). Tinitingnan lang ang
// 'approved' na status, hindi 'pending' o 'declined', dahil maaaring
// mauna pa rin matapos ang isang pending request.
function leaveDateOverlapsApproved(staffName, from, until){
  return (cache.leaves||[]).find(lv=>
    lv.staff===staffName && lv.status==='approved' &&
    !(until < lv.from || from > lv.until) // may pagsalubong sa pagitan ng dalawang date range
  );
}
function leaveUsedDays(name){ let d=0; (cache.leaves||[]).forEach(lv=>{ if(lv.staff===name && lv.status==='approved' && lv.type==='Annual Leave'){ d+=daysInclusive(lv.from,lv.until); } }); return d; }
function leaveApprovedCount(name){ return (cache.leaves||[]).filter(lv=>lv.staff===name && lv.status==='approved').length; }
function leaveRequestCount(name){ return (cache.leaves||[]).filter(lv=>lv.staff===name).length; }
async function saveLeaveCredits(name, val){ cache.leaveCredits=cache.leaveCredits||{}; cache.leaveCredits[name]={annual_credits:val}; const {error}=await sb.from('leave_credits').upsert({staff:name, annual_credits:val, updated_at:new Date().toISOString()}); if(error)console.error('saveLeaveCredits',error); }

  document.querySelectorAll('[data-mback]').forEach(el=>el.addEventListener('click',()=>{activeMaintId=null;render();}));

/* ----- Phase B1: camera + GPS + compress + upload ----- */
const MAINT_BUCKET = 'maint-photos';

function getGpsCoords(){
  return new Promise(resolve=>{
    if(!navigator.geolocation){ resolve({gps:'', acc:null, err:'Walang geolocation sa browser na ito'}); return; }
    let best=null, watchId=null, done=false;
    const finish=()=>{
      if(done) return; done=true;
      try{ if(watchId!=null) navigator.geolocation.clearWatch(watchId); }catch(e){}
      if(best){
        resolve({gps:best.coords.latitude.toFixed(6)+','+best.coords.longitude.toFixed(6), acc:Math.round(best.coords.accuracy), err:''});
      }else{
        resolve({gps:'', acc:null, err:'Hindi makuha ang lokasyon (timeout o naka-off ang Location)'});
      }
    };
    try{
      watchId=navigator.geolocation.watchPosition(
        p=>{
          if(!best || p.coords.accuracy < best.coords.accuracy) best=p;
          if(best && best.coords.accuracy <= 12) finish(); // sapat na ang tumpak, tigil na
        },
        e=>{ if(!best && e && e.code===1){ done=true; try{if(watchId!=null)navigator.geolocation.clearWatch(watchId);}catch(_){}
               resolve({gps:'', acc:null, err:'Hindi pinayagan ang Location (Permission Denied)'}); } },
        {enableHighAccuracy:true, maximumAge:0, timeout:20000}
      );
    }catch(e){ finish(); return; }
    setTimeout(finish, 14000); // kunin ang pinaka-tumpak sa loob ng ~14s
  });
}

function compressImage(file, maxDim, quality){
  return new Promise((resolve,reject)=>{
    const reader=new FileReader();
    reader.onload=e=>{
      const img=new Image();
      img.onload=()=>{
        let w=img.width, h=img.height;
        if(w>h && w>maxDim){ h=Math.round(h*maxDim/w); w=maxDim; }
        else if(h>maxDim){ w=Math.round(w*maxDim/h); h=maxDim; }
        const canvas=document.createElement('canvas'); canvas.width=w; canvas.height=h;
        canvas.getContext('2d').drawImage(img,0,0,w,h);
        canvas.toBlob(b=>b?resolve(b):reject(new Error('compress failed')),'image/jpeg',quality);
      };
      img.onerror=()=>reject(new Error('image load failed'));
      img.src=e.target.result;
    };
    reader.onerror=()=>reject(new Error('read failed'));
    reader.readAsDataURL(file);
  });
}

function startMaintCapture(taskId, stepId){
  const input=document.createElement('input');
  input.type='file'; input.accept='image/*'; input.setAttribute('capture','environment');
  input.onchange=async()=>{
    const file=input.files&&input.files[0]; if(!file) return;
    const t=cache.maintTasks.find(x=>x.id===taskId); const due=maintComputeDue(t);
    const st=cache.maintState[taskId]||{}; if(st.due_date!==due.dueDate){ st.due_date=due.dueDate; st.captures={}; }
    st.captures=st.captures||{};
    // show inline "uploading" state (no blocking alert)
    st.captures[stepId]={ts:maintNowTime(), gps:'', url:'', uploading:true};
    cache.maintState[taskId]=st; render();
    try{
      const g=await getGpsCoords();
      const gps=g.gps;
      const blob=await compressImage(file, 1280, 0.6);
      const path=taskId+'/'+stepId+'_'+Date.now()+'.jpg';
      const up=await sb.storage.from(MAINT_BUCKET).upload(path, blob, {contentType:'image/jpeg', upsert:true});
      if(up.error) throw up.error;
      const signed=await sb.storage.from(MAINT_BUCKET).createSignedUrl(path, 60*60*24*7); // 7 araw (tugma sa auto-delete)
      const url=(signed.data && signed.data.signedUrl) ? signed.data.signedUrl : '';
      st.captures[stepId]={ts:maintNowTime(), gps, acc:g.acc||null, url, path};
      cache.maintState[taskId]=st; await saveMaintState(taskId,st); render();
      if(!gps){ setTimeout(()=>alert('Na-upload ang litrato, pero walang GPS.\n\nDahilan: '+(g.err||'hindi alam')+'\n\nTip: i-allow ang Location, kumuha malapit sa bintana/labas, tapos kunan ulit.'),150); }
      else if(g.acc && g.acc>50){ setTimeout(()=>alert('Na-kuha ang GPS pero hindi gaanong tumpak (±'+g.acc+'m).\n\nPara mas tumpak: kumuha malapit sa labas o bintana, tapos kunan ulit.'),150); }
    }catch(e){
      console.error('maint capture',e);
      delete st.captures[stepId]; cache.maintState[taskId]=st; render();
      const m=(e&&e.message)?e.message:'hindi alam';
      setTimeout(()=>alert('Hindi na-upload ang litrato.\n\nDahilan: '+m+'\n\nKung tungkol sa storage/bucket, hindi pa kumpleto ang Phase B1 SQL. Kung internet, subukan ulit.'),150);
    }
  };
  input.click();
}

function cashierToday(){ return new Date().toLocaleDateString('en-CA',{timeZone:'Asia/Manila'}); }
// PAALALA NG MGA KAILANGANG I-UPLOAD — para sa huling 7 araw, tingnan kung
// anong KULANG: walang Sales Sync (UTAK CSV), walang card report, o walang
// na-submit na cash count mula sa staff. Ibinabalik ang listahan kada uri,
// para malinaw kung ano talaga ang kailangang gawin, hindi lang isang
// generic na "may kulang" na mensahe.
function invCashierUploadGaps(){
  const today = new Date(cashierToday()+'T00:00:00');
  const dates=[];
  for(let i=1;i<=7;i++){ const d=new Date(today); d.setDate(d.getDate()-i); dates.push(d.toLocaleDateString('en-CA')); }
  // Load dismissed gaps from localStorage
  let dismissed={};
  try{ dismissed=JSON.parse(localStorage.getItem('dismissedGaps')||'{}'); }catch(e){}
  const missingSales=[], missingCard=[], missingCount=[];
  dates.forEach(dateKey=>{
    const hasSales = cache.invSalesLines.some(s=>(invParseSaleDate(s.sale_date)||s.sale_date)===dateKey);
    if(!hasSales && !dismissed['sales_'+dateKey]) missingSales.push(dateKey);
    const cDay = cache.cashier && cache.cashier[dateKey];
    if(cDay){
      if(!cDay.card_report_url && !dismissed['card_'+dateKey]) missingCard.push(dateKey);
      if(!cDay.submitted_by && !cDay.shifts?.length && !dismissed['count_'+dateKey]) missingCount.push(dateKey);
    }
  });
  return {missingSales, missingCard, missingCount};
}
function invDismissGap(type, dateKey){
  let dismissed={};
  try{ dismissed=JSON.parse(localStorage.getItem('dismissedGaps')||'{}'); }catch(e){}
  dismissed[type+'_'+dateKey]=true;
  try{ localStorage.setItem('dismissedGaps',JSON.stringify(dismissed)); }catch(e){}
  render();
}

function cashierYesterdayClosing(){
  const today=cashierToday();

// 7-DAY STALE CARD VALIDATION CHECK — kung may card entry na HINDI pa
// na-validate (manually-added, hindi galing sa auto-OCR) na 7+ araw na
// mula nang itala, ipaalam sa Owner via WhatsApp. Throttled sa isang beses
// kada araw (gamit ang settings key) para hindi paulit-ulit na alert.
async function checkStaleCardValidations(){
  try{
    const lastCheck = cache.settings.inv_last_stale_card_check;
    const today = cashierToday();
    if(lastCheck===today) return; // isang beses lang kada araw
    const cutoff = new Date(); cutoff.setDate(cutoff.getDate()-7);
    const staleItems=[];
    Object.values(cache.cashier||{}).forEach(d=>{
      const dayDate = new Date(d.date+'T00:00:00');
      if(dayDate > cutoff) return; // hindi pa 7 araw
      (d.card||[]).forEach(c=>{
        if(!c.validated && !c.from_ocr){
          staleItems.push(`${d.date}: ${c.ref||'(walang ref)'} — ${peso(c.amount)}`);
        }
      });
    });
    if(staleItems.length){
      const msg = `*CARD VALIDATION — 7+ ARAW NANG HINDI NA-VALIDATE*\n${staleItems.length} entry ang hindi pa na-validate sa loob ng 7 araw o higit pa:\n${staleItems.slice(0,15).join('\n')}${staleItems.length>15?'\n...at iba pa':''}`;
      await sb.rpc('send_whatsapp_alert',{p_text:msg});
    }
    cache.settings.inv_last_stale_card_check = today;
    await saveSetting('inv_last_stale_card_check', today);
  }catch(e){ console.error('checkStaleCardValidations',e); }
}

function invPendingSobAckFor(staffName){
  const raw = cache.settings.inv_sob_pending_update;

  try{ update = JSON.parse(raw); }catch(e){ return null; }

function getCashierDay(date){
  date=date||cashierToday(); cache.cashier=cache.cashier||{};
  if(!cache.cashier[date]) cache.cashier[date]=blankDay(date);
  return cache.cashier[date];

async function saveCashierDay(d){
  cache.cashier[d.date]=d;
  const row={ date:d.date, opening_acoh:d.opening_acoh, opening_petty:d.opening_petty,
    shifts:d.shifts, expenses:d.expenses, cash_added:d.cash_added||[], gcash:d.gcash, card:d.card, vault:d.vault,
    total_sales:d.total_sales, total_sales_source:d.total_sales_source, total_sales_by:d.total_sales_by,
    validations:d.validations, validated_by:d.validated_by, card_report_url:d.card_report_url||null, incident:d.incident,
    corrections:d.corrections, corrected_by:d.corrected_by, corrected_at:d.corrected_at,
    verified_by:d.verified_by, verified_at:d.verified_at, submitted_by:d.submitted_by||null, submitted_at:d.submitted_at||null, status:d.status, tolerance:d.tolerance, audits:d.audits||[],
    updated_at:new Date().toISOString() };
  const {error}=await sb.from('cashier_days').upsert(row);
  if(error) console.error('saveCashierDay',error);

function cashierCompute(d){
  const expenses=csum(d.expenses), cashAdded=csum(d.cash_added), gcash=csum(d.gcash), card=csum(d.card), vault=csum(d.vault);
  const closing=d.shifts.length?d.shifts[d.shifts.length-1]:null;
  const actualDrawer=closing?Number(closing.acoh):null;
  let cashSales=null, expectedDrawer=null, discrepancy=null, balanced=null;
  if(d.total_sales!=null && d.opening_acoh!=null && actualDrawer!=null){
    cashSales=Number(d.total_sales)-gcash-card;
    expectedDrawer=Number(d.opening_acoh)+cashSales+cashAdded-expenses-vault;
    discrepancy=actualDrawer-expectedDrawer;
    balanced=Math.abs(discrepancy) < (Number(d.tolerance)||1);
  }
  return {expenses,cashAdded,gcash,card,vault,actualDrawer,cashSales,expectedDrawer,discrepancy,balanced};
}

function cashierDenomBreakdownSection(d){
  if(!d.shifts || !d.shifts.length) return '';

  const lastIdx = d.shifts.length-1;
  const rows = d.shifts.map((s,idx)=>{
    // PER-SHIFT LOCK: editable LANG ang PINAKAHULING shift habang hindi pa
    // submitted ang buong araw — sa sandaling may SUSUNOD na shift na
    // naitala (hal. nag-shift change na), itinuturing nang FINAL ang nakaraang
    // count, dahil doon na nai-handover ang kaha sa susunod na cashier.
    // Industry-standard practice ito: locked ang count pagkatapos ng
    // handoff, hindi pa rin ito dapat babaguhin pagkatapos.
    const canEdit = dayUnlocked && idx===lastIdx;
    const denomLines = PH_DENOMS.map(dn=>{
      const q=(s.denoms||{})[dn];
      if(!q) return '';
      const lbl = dn>=1 ? ('₱'+dn) : '25¢';
      return canEdit
        ? `<div class="denom-row"><span class="dlbl">${lbl}</span><span class="dx">×</span><input type="number" inputmode="numeric" min="0" data-shiftdenomedit="${idx}|${dn}" value="${q}" style="flex:1;"></div>`

    return `<div class="task-card" style="padding:8px 10px; margin-top:6px;">
      <div class="line2"><b>${escapeHtml(s.name)}</b><span class="hint">${escapeHtml(s.cashier||'')} · ${escapeHtml(s.time||'')}</span>${!canEdit?'<span class="cc-badge done" style="margin-left:6px;">🔒 Final</span>':''}</div>

      ${canEdit?`<button class="btn-ghost btn-small" data-saveshiftdenom="${idx}" style="margin-top:6px;">💾 I-save ang Pagbabago</button>`:''}

function cTime(){ return new Date().toLocaleTimeString('en-PH',{hour:'2-digit',minute:'2-digit',timeZone:'Asia/Manila'}); }
async function ocrCardReportFile(file){
  const isXls = /\.(xlsx?|csv)$/i.test(file.name) ||
    file.type==='application/vnd.ms-excel' ||
    file.type==='application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' ||
    file.type==='text/csv';

  if(isXls){
    // APPROACH 1: Read as text (works for HTML-disguised XLS and CSV)
    let fileText = '';
    try{
      fileText = await new Promise((res,rej)=>{
        const r=new FileReader();
        r.onload=()=>res(r.result);
        r.onerror=()=>rej(new Error('Read failed'));
        r.readAsText(file, 'utf-8');
      });
    }catch(e){ fileText=''; }

    // Check if it's readable text (not binary garbage)
    // Binary OLE2 XLS starts with D0 CF 11 E0 — when read as UTF-8 it
    // produces garbled characters. CSV/HTML-XLS starts with printable text.
    const firstChars = fileText.slice(0,20);
    const isReadable = firstChars.length > 5 && (
      firstChars.trim().startsWith('<') ||   // HTML table
      firstChars.includes(',') ||             // CSV
      firstChars.includes('\t') ||            // TSV
      /^[A-Za-z0-9\s"']/.test(firstChars)    // plain text
    );

    if(isReadable){
      const stripped = fileText
        .replace(/<style[^>]*>[\s\S]*?<\/style>/gi,'')
        .replace(/<script[^>]*>[\s\S]*?<\/script>/gi,'')
        .replace(/<[^>]+>/g,' ')
        .replace(/&nbsp;/g,' ').replace(/&amp;/g,'&')
        .replace(/ {2,}/g,' ')
        .trim().slice(0,8000);

      const prompt=`This is data from a Philippine bank card/POS terminal settlement report. Find ALL card transactions. For each transaction extract: (1) settlement/transaction date in YYYY-MM-DD format, (2) reference/auth/approval code, (3) GROSS amount as a number (the original transaction amount before fees). Return ONLY JSON: {"transactions": [{"date":"YYYY-MM-DD","ref":"string","amount":number}]}. If none found, return {"transactions":[]}.

Data:
${stripped}`;
      const response=await fetch('https://api.anthropic.com/v1/messages',{
        method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:2000,
          messages:[{role:'user',content:[{type:'text',text:prompt}]}]})
      });
      if(!response.ok) throw new Error('API '+response.status);
      const data=await response.json();
      const tb=(data.content||[]).find(b=>b.type==='text');
      if(!tb) throw new Error('No text from AI');
      const parsed=JSON.parse(tb.text.replace(/```json|```/g,'').trim());
      return parsed.transactions||[];
    }

    // APPROACH 2: True binary OLE2 XLS (like Metrobank statements).
    // These CANNOT be read as text in the browser without a binary parser.
    // SheetJS works but requires CDN. Try it with a 12-second timeout.
    try{
      const XLSX=await Promise.race([
        new Promise((resolve,reject)=>{
          if(window.XLSX){resolve(window.XLSX);return;}
          const s=document.createElement('script');
          s.src='https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';
          s.onload=()=>resolve(window.XLSX);
          s.onerror=()=>reject(new Error('CDN failed'));
          document.head.appendChild(s);
        }),
        new Promise((_,reject)=>setTimeout(()=>reject(new Error('CDN timeout')),12000))
      ]);
      const ab=await file.arrayBuffer();
      const wb=XLSX.read(ab,{type:'array',cellDates:true});
      let csv='';
      wb.SheetNames.forEach(sn=>{ csv+=XLSX.utils.sheet_to_csv(wb.Sheets[sn])+'\n'; });
      // Always send to Claude — column-guessing is unreliable across banks
      // (Metrobank CSV has MDR% before Gross, which a column index scan
      // picks up as the amount instead of the actual gross transaction value).
      const prompt2=`This is a Philippine bank card/POS settlement report converted to CSV from XLS. Extract ONLY the actual customer transaction amounts (gross sales amounts) — NOT fees, NOT MDR%, NOT charges. For each transaction row find: (1) date YYYY-MM-DD, (2) auth/approval code (alphanumeric, usually 6 chars), (3) GROSS transaction amount (the original amount charged to the customer's card, before any bank deductions/fees). Return ONLY JSON: {"transactions":[{"date":"YYYY-MM-DD","ref":"string","amount":number}]}. If none, {"transactions":[]}.\n\n${csv.slice(0,8000)}`;
      const r2=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:2000,messages:[{role:'user',content:[{type:'text',text:prompt2}]}]})});
      if(!r2.ok) throw new Error('API '+r2.status);
      const d2=await r2.json();
      const tb2=(d2.content||[]).find(b=>b.type==='text');
      const p2=JSON.parse((tb2&&tb2.text||'{"transactions":[]}').replace(/```json|```/g,'').trim());
      return p2.transactions||[];
    }catch(xlsErr){
      console.warn('SheetJS failed:',xlsErr.message);
      // Signal to caller that this is a binary XLS that needs manual entry
      throw Object.assign(new Error('BINARY_XLS'), {isBinaryXls:true});
    }
  }

  // IMAGE / PDF path
  const toBase64=(f)=>new Promise((res,rej)=>{
    const r=new FileReader(); r.onload=()=>res(r.result.split(',')[1]);
    r.onerror=()=>rej(new Error('Read failed')); r.readAsDataURL(f);
  });
  const b64=await toBase64(file);
  const isPdf=file.type==='application/pdf'||/\.pdf$/i.test(file.name);
  const mediaType=isPdf?'application/pdf':(file.type||'image/jpeg');
  const cb=isPdf?{type:'document',source:{type:'base64',media_type:mediaType,data:b64}}:{type:'image',source:{type:'base64',media_type:mediaType,data:b64}};
  const prompt=`Philippine bank card/POS terminal settlement report. Find ALL card transactions. For each: (1) date YYYY-MM-DD, (2) auth/approval code, (3) gross amount as number. Return ONLY JSON: {"transactions":[{"date":"YYYY-MM-DD","ref":"string","amount":number}]}. If none, {"transactions":[]}.`;
  const response=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:2000,messages:[{role:'user',content:[cb,{type:'text',text:prompt}]}]})});
  if(!response.ok) throw new Error('API '+response.status);
  const data=await response.json();
  const tb=(data.content||[]).find(b=>b.type==='text');
  if(!tb) throw new Error('No text from AI');
  const parsed=JSON.parse((tb.text||'{}').replace(/```json|```/g,'').trim());
  return parsed.transactions||[];
}

      await saveCashierDay(d);

      // AUTO-READ AT AUTO-APPROVE — babasahin ang nilalaman ng file at
      // direktang ilalapat ang mga nahanap na transaksyon sa TAMANG petsa
      // (hindi lang sa kasalukuyang bukas na araw), at awtomatikong i-mamarkahan
      // na "validated" — WALANG kumpirmasyon bago i-apply, ayon sa
      // partikular na hiling. May duplicate detection na nagpapaalam sa
      // Owner kung mukhang paulit-ulit na ang ilang transaksyon.
      let ocrResult;
      try{ ocrResult = await ocrCardReportFile(file); }
      catch(ocrErr){
        console.error('card OCR failed', ocrErr);
        alert('✓ Na-upload ang file, pero hindi awtomatikong nabasa ang nilalaman nito (maaaring hindi malinaw ang litrato). I-validate na lang nang manual sa ibaba.');
        render();
        return;
      }

      let totalAdded=0, totalDuplicate=0;
      const duplicateDetails=[];
      const byDate={};
      ocrResult.forEach(tx=>{
        const dt = tx.date && /^\d{4}-\d{2}-\d{2}$/.test(tx.date) ? tx.date : d.date;
        byDate[dt]=byDate[dt]||[];
        byDate[dt].push(tx);
      });
      for(const [dateKey, txs] of Object.entries(byDate)){
        const targetDay = getCashierDay(dateKey);
        targetDay.card = targetDay.card || [];
        for(const tx of txs){
          const amount = Number(tx.amount)||0;
          if(amount<=0) continue;
          const ref = (tx.ref||'').toString().trim();
          // DUPLICATE CHECK — parehong ref AT halaga sa parehong araw ay
          // itinuturing na posibleng duplicate, hindi idadagdag, ipinapaalam
          // na lang sa Owner.
          const isDup = targetDay.card.some(c=>c.amount===amount && (ref?c.ref===ref:true) && c.from_ocr);
          if(isDup){
            totalDuplicate++;
            duplicateDetails.push(`${dateKey}: ${ref||'(walang ref)'} — ${peso(amount)}`);
            continue;
          }
          targetDay.card.push({ref: ref||('Card '+invToday()), amount, validated:true, from_ocr:true, ocr_at:invNow()});
          totalAdded++;
        }
        await saveCashierDay(targetDay);
      }

      let msg = `✓ Na-upload ang card report.\n\n${totalAdded} transaksyon ang awtomatikong nabasa at na-validate.`;
      if(totalDuplicate>0){
        msg += `\n\n⚠️ ${totalDuplicate} posibleng DUPLICATE na hindi idinagdag:\n${duplicateDetails.join('\n')}`;
        const dupMsg = `*CARD REPORT — POSIBLENG DUPLICATE*\n${totalDuplicate} transaksyon ang mukhang paulit-ulit, hindi idinagdag:\n${duplicateDetails.join('\n')}\n\nI-check sa Cashier tab.`;
        sb.rpc('send_whatsapp_alert',{p_text:dupMsg}).catch(e=>console.error(e));
      }
      alert(msg);
      render();
    }catch(e){ console.error('card report upload',e); alert('Hindi na-upload ang card report.\n\nDahilan: '+((e&&e.message)||'hindi alam')+'\n\nKung tungkol sa bucket, patakbuhin ang cashier-docs SQL.'); }
  };
  input.click();
}

function csvCell(v){ v=(v==null?'':String(v)).replace(/"/g,'""'); return /[",\n]/.test(v)?`"${v}"`:v; }
function cashierExportCSV(){
  if(!session||session.role!=='owner'){ alert('Owner lang ang pwedeng mag-download ng CSV.'); return; }
  const days=Object.values(cache.cashier||{}).sort((a,b)=>a.date<b.date?1:-1);
  const hdr=['Date','Status','Opening ACOH','Total Sales (UTAK)','GCash','Card','Expenses','Vault','Cash Infusion','Actual Drawer','Expected','Discrepancy','Submitted by','Corrected by','Verified by','Incident'];
  const rows=days.map(d=>{ const c=cashierCompute(d); return [d.date,d.status,d.opening_acoh,d.total_sales,csum(d.gcash),csum(d.card),csum(d.expenses),csum(d.vault),csum(d.cash_added),c.actualDrawer,c.expectedDrawer,c.discrepancy,d.submitted_by,d.corrected_by,d.verified_by,d.incident].map(csvCell).join(','); });
  const csv=[hdr.join(','),...rows].join('\n');
  const a=document.createElement('a'); a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'})); a.download='cashier_'+cashierToday()+'.csv'; a.click();
}
async function cashierCheckDiscrepancy(d){
  const c=cashierCompute(d);
  if(c.discrepancy==null || c.balanced){ return; }
  if(d._alerted) return; d._alerted=true;
  const closing=d.shifts[d.shifts.length-1];
  const w=c.discrepancy<0?'KULANG':'SOBRA';
  const msg='*CASHIER DISCREPANCY*\n'+d.date+'\n'+w+': '+peso(Math.abs(c.discrepancy))+'\nCashier: '+(closing?closing.cashier:'')+'\nExpected: '+peso(c.expectedDrawer)+' | Actual: '+peso(c.actualDrawer);
  try{ await sb.rpc('send_whatsapp_alert',{p_text:msg}); }catch(e){ console.error('cashier alert',e); }
  // I-LOG sa structured discrepancy table — hindi lang one-time alert.
  // Ito ang nagpapakita ng PATTERN sa Owner kung sino ang madalas
  // magkamali, hindi lang isang beses na abiso na nawawala pagkatapos.
  try{
    const row={
      id:invUid(), log_type:'cash_discrepancy', date:d.date,
      cashier_name: closing?closing.cashier:'', amount: c.discrepancy,
      category: c.discrepancy<0?'kulang':'sobra',
      description: `Expected ₱${c.expectedDrawer} pero ang aktwal ay ₱${c.actualDrawer}. Pagkakaiba: ${w} ${peso(Math.abs(c.discrepancy))}.`,
      reported_by: session?session.name:'system', resolved:false
    };
    cache.discrepancyLog = cache.discrepancyLog || [];
    cache.discrepancyLog.unshift(row);
    await sb.from('inv_discrepancy_log').insert(row);
  }catch(e){ console.error('discrepancy log insert failed',e); }
}

// maipaghambing sa recipe_effective_from. Sinusuportahan ang dalawang format:
// "18 Jun 2026" (mula sa CSV) at "2026-06-18" (ISO, kung naka-store na namin).
function invParseSaleDate(raw){
  if(!raw) return '';
  const s = String(raw).trim();
  // ISO format na — direkta na gamitin
  if(/^\d{4}-\d{2}-\d{2}$/.test(s)) return s;
  // "18 Jun 2026" format mula sa UTAK CSV
  const months={jan:'01',feb:'02',mar:'03',apr:'04',may:'05',jun:'06',jul:'07',aug:'08',sep:'09',oct:'10',nov:'11',dec:'12'};
  const m = s.match(/^(\d{1,2})\s+([A-Za-z]{3})\s+(\d{4})$/);
  if(m){
    const mon = months[(m[2]||'').toLowerCase()];
    return mon ? m[3]+'-'+mon+'-'+m[1].padStart(2,'0') : '';
  }
  return '';
}

function invGIN(name){
  // Exact match muna (pinaka-mabilis at tumpak), tapos case-insensitive
  // fallback — para hindi mag-fail nang tahimik kapag may pagkakaiba ng
  // uppercase/lowercase sa pagitan ng stock entry name at ingredient cache
  // (hal. "Bareta" vs "bareta"), na dati ay nagpapareresulta sa unit_cost=0
  // kahit na-approve na ang delivery na may presyo.
  const exact = cache.invIngredients.find(i=>i.name===name);

  const lower = (name||'').toLowerCase();

}

// BUILT-IN TAGALOG ↔ ENGLISH na karaniwang ingredient pairs — gumagana
// kahit walang manual na inilagay na alias, para sa pinakakaraniwang
// pagkalito (hal. "bawang" → "garlic"). Bidirectional ang paghahanap.
const INV_COMMON_TAGALOG_ALIASES = {
  garlic:['bawang'], onion:['sibuyas'], ginger:['luya'], tomato:['kamatis'],
  pepper:['paminta'],'bell pepper':['siling berde','siling pula'],chili:['sili'],
  salt:['asin'], sugar:['asukal'], vinegar:['suka'], 'soy sauce':['toyo'],
  egg:['itlog'], rice:['bigas','kanin'], pork:['baboy'], chicken:['manok'],
  beef:['baka'], fish:['isda'], shrimp:['hipon'], crab:['alimango'],
  squid:['pusit'], milk:['gatas'], butter:['mantikilya'], oil:['mantika'],
  flour:['harina'], cornstarch:['gawgaw'], 'cooking oil':['mantika'],
  cabbage:['repolyo'], carrot:['karot'], potato:['patatas'], eggplant:['talong'],
  'string beans':['sitaw'], okra:['okra'], squash:['kalabasa'], cucumber:['pipino'],
  lemon:['dayap','kalamansi'], calamansi:['kalamansi'], coconut:['niyog'],
  'coconut milk':['gata'], banana:['saging'], mango:['mangga'], pineapple:['pinya'],
  'fabric conditioner':['downy','fabcon'], detergent:['sabon panlaba','detergent bar'],
  'dishwashing liquid':['joy','sabon panghugas'], bleach:['zonrox','chlorine'],
  'cooking gas':['gasul','lpg'], 'paper towel':['tissue','napkin']
};
// I-tukoy kung tumutugma ba ang QUERY (search text) sa isang INGREDIENT
// — sinusuri ang totoong pangalan, ang mga manual na alias na nakalagay sa
// ingredient, AT ang built-in Tagalog/English dictionary sa magkabilang
// direksyon (English query → Tagalog name, o kabaliktaran).
function invIngredientMatchesQuery(ing, query){
  const q = (query||'').toLowerCase().trim();
  if(!q) return true;
  const name = (ing.name||'').toLowerCase();
  if(name.includes(q)) return true;
  const aliases = (ing.aliases||[]).map(a=>a.toLowerCase());
  if(aliases.some(a=>a.includes(q))) return true;
  // Built-in dictionary: tingnan kung ang QUERY mismo ay isang kilalang
  // Tagalog alias ng pangalan ng ingredient, o kabaliktaran.
  for(const [eng, tagVariants] of Object.entries(INV_COMMON_TAGALOG_ALIASES)){
    const allVariants = [eng, ...tagVariants];
    const nameMatches = allVariants.some(v=>name.includes(v));
    const queryMatches = allVariants.some(v=>v.includes(q) || q.includes(v));
    if(nameMatches && queryMatches) return true;
  }
  return false;
}

// FUZZY DUPLICATE CHECK — para hindi madaling magkaroon ng halos-pareho na
// pangalan ng ingredient (hal. "Mantika" vs "mantika " vs "Mantika ng Niyog"
// vs "Mantka" na typo lang). I-normalize muna (lowercase, tanggalin ang
// extra spaces/punctuation), tapos gamitin ang Levenshtein distance para
// makita ang pinakamalapit na existing na ingredient.
function invNormalizeName(s){
  return String(s||'').toLowerCase().trim().replace(/\s+/g,' ').replace(/[^\w\s]/g,'');
}
function invLevenshtein(a, b){
  const m=a.length, n=b.length;
  if(m===0) return n; if(n===0) return m;
  const dp=Array.from({length:m+1},()=>new Array(n+1).fill(0));
  for(let i=0;i<=m;i++) dp[i][0]=i;
  for(let j=0;j<=n;j++) dp[0][j]=j;
  for(let i=1;i<=m;i++){
    for(let j=1;j<=n;j++){
      dp[i][j] = a[i-1]===b[j-1] ? dp[i-1][j-1] : 1+Math.min(dp[i-1][j], dp[i][j-1], dp[i-1][j-1]);
    }
  }
  return dp[m][n];
}
// Ibalik ang pinakamalapit na existing ingredient kung magkahawig ang
// pangalan (exact normalized match, o maliit lang ang distance/length ratio).
// threshold: 0.25 default — hanggang 25% ng haba ng mas mahabang pangalan
// ang pwedeng iba bago ituring na "ibang ingredient na".
function invFindCloseIngredientMatch(name, threshold){
  threshold = threshold!=null ? threshold : 0.25;
  const norm=invNormalizeName(name);
  if(!norm) return null;
  let best=null, bestDist=Infinity;
  for(const ing of cache.invIngredients){
    const n2=invNormalizeName(ing.name);
    if(n2===norm) return {ingredient:ing, distance:0, exact:true};
    const dist=invLevenshtein(norm, n2);
    const maxLen=Math.max(norm.length, n2.length);
    const ratio = maxLen>0 ? dist/maxLen : 1;
    if(ratio<=threshold && dist<bestDist){ best={ingredient:ing, distance:dist, exact:false}; bestDist=dist; }
  }
  return best;
}
function invGSR(id){ return cache.invSubRecipes.find(s=>s.id===id); }
function invGSRN(name){ return cache.invSubRecipes.find(s=>s.name===name); }
function invCost(name){
  const sr = invGSRN(name);
  if(sr){ const bc=(sr.ingredients||[]).reduce((s,i)=>s+invCost(i.n)*i.q,0); return sr.batch_qty>0?bc/sr.batch_qty:0; }
  const ing = invGIN(name);
  return ing ? Number(ing.unit_cost||0) : 0;
}
function invComponentsCost(ingredients, subRecipes){
  const raw=(ingredients||[]).reduce((s,i)=>s+invCost(i.n)*i.q,0);
  const subs=(subRecipes||[]).reduce((s,sb)=>{ const sr=invGSR(sb.sr_id); if(!sr) return s; const bc=(sr.ingredients||[]).reduce((x,i)=>x+invCost(i.n)*i.q,0); const uc=sr.batch_qty>0?bc/sr.batch_qty:0; return s+uc*sb.q; },0);
  return raw+subs;
}
// Itugma ang modifier text ng isang benta (hal. "Buffalo W BBQ F") sa lahat ng
// variant rule ng menu item na ang 'match' keyword ay nasa loob ng modifier
// text — kaya posibleng MARAMI ang ma-match sa isang linya (hal. Buffalo +
// BBQ sa parehong combo, magkaibang flavor ng wings at fries).
function invMatchVariants(m, modifierText){
  const text=(modifierText||'').toLowerCase();
  return (m.variants||[]).filter(v=> text.includes((v.match||'').toLowerCase()) && v.match);
}
function invMenuCost(m, modifierText){
  let total = invComponentsCost(m.ingredients, m.sub_recipes);
  if(modifierText!=null){
    invMatchVariants(m, modifierText).forEach(v=>{ total += invComponentsCost(v.ingredients, v.sub_recipes); });
  }
  return total;
}
function invMenuCostPct(m){ const c=invMenuCost(m); return m.price>0 ? c/m.price*100 : 0; }

d Order","t":"Endangering Safety","s":"D","f":"2. Endangering Safety Endangering safety of employees, visitors, vendors and guests or unnecessary disruption of operations through gross negligence, carelessness or inefficiency."},{"r":"Acts Against Peace and Order","t":"Tampering with Fire Equipment","s":"D","f":"3. Tampering with Fire Equipment Using, removing or tampering with fire protection equipment for purposes other than fire fighting."},{"r":"Acts Against Peace and Order","t":"Driving Recklessly","s":"C","f":"4. Driving Recklessly Driving any vehicle recklessly or at excessive speed within or outside KAWAYANAN RESTAURANT OPC premises."},{"r":"Acts Against Peace and Order","t":"Working under the Influence of Liquor or Other Controlled Substance","s":"C","f":"5. Working under the Influence of Liquor or Other Controlled Substance Working under the influence of liquor or other controlled substances such as prohibited drugs, within KAWAYANAN RESTAURANT OPC premises or work area."},{"r":"Acts Against Peace and Order","t":"Smoking in KAWAYANAN RESTAURANT OPC Premises","s":"C","f":"6. Smoking in KAWAYANAN RESTAURANT OPC Premises Smoking in KAWAYANAN RESTAURANT OPC premises and other designated non-smoking areas."},{"r":"Acts Against Peace and Order","t":"Entering/Using Restricted Areas","s":"C","f":"7. Entering/Using Restricted Areas Unauthorized entry or use of restricted areas or premises, i.e., server room, production floor, sleeping quarters and the like."},{"r":"Acts Against Peace and Order","t":"Refusing to Comply with Prescribed/Control Procedures","s":"D","f":"8. Refusing to Comply with Prescribed/Control Procedures Failure to comply or conform with prescribed or control procedures such as but not limited to, prescribed procedures on accidents, safety or security regulations that may prejudice employees, visitors, vendors, and guestsl and/or KAWAYANAN RESTAURANT OPC property."},{"r":"Acts Against Peace and Order","t":"Disregard of Security Standards","s":"D",
