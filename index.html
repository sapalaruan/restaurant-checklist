            else if(a.discrepancy==null) res='—';
            else if(Math.abs(a.discrepancy)<(d.tolerance||1)) res='✓ Balanse';
            else res=(a.discrepancy<0?'KULANG ':'SOBRA ')+peso(Math.abs(a.discrepancy));
            return `<tr><td>${escapeHtml(a.at||'')}</td><td style="text-align:right;">${peso(a.total_sales)}</td><td style="text-align:right;">${a.acoh!=null?peso(a.acoh):'—'}</td><td style="text-align:right;">${a.expected!=null?peso(a.expected):'—'}</td><td>${res}</td><td>${escapeHtml(a.counted_by||'—')}</td></tr>`;
          }).join('')}
        </table>`;
      }
    }
    if(hasDisc && corrected && !d.verified_by){
      body += `<button class="btn-primary btn-block" id="c-verify" style="margin-top:14px;">✓ I-verify ang Correction (${isOwner?'Owner':'Manager'})</button>`;
    }

    }

  return `<div class="screen">${back}${ownerBar}<div class="title" style="font-size:18px;">💵 Cash Reconciliation — ${d.date}</div>${body}</div>`;
}

function cTime(){ return new Date().toLocaleTimeString('en-PH',{hour:'2-digit',minute:'2-digit',timeZone:'Asia/Manila'}); }
function startCardReportUpload(d){

    try{
      const ext=(file.name.split('.').pop()||'dat').toLowerCase();

      const up=await sb.storage.from('cashier-docs').upload(path,file,{upsert:true,contentType:file.type||undefined});

      d.card_report_url=path; // store PATH; signed URL generated on view (private bucket)
      await saveCashierDay(d); alert('✓ Na-upload ang card report.'); render();
    }catch(e){ console.error('card report upload',e); alert('Hindi na-upload ang card report.\n\nDahilan: '+((e&&e.message)||'hindi alam')+'\n\nKung tungkol sa bucket, patakbuhin ang cashier-docs SQL.'); }

function cStamp(){ return new Date().toLocaleString('en-PH',{timeZone:'Asia/Manila',month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'}); }
let cashierPoll=null;
function startCashierPoll(){
  if(cashierPoll) clearInterval(cashierPoll);
  cashierPoll=setInterval(async()=>{
    if(route!=='cashier'){ clearInterval(cashierPoll); cashierPoll=null; return; }
    const sig=a=>JSON.stringify((a||[]).map(x=>[x.id,x.status]));
    const before=sig(getCashierDay().audits);
    await loadCashier();
    const after=sig(getCashierDay().audits);
    const ae=document.activeElement;
    const typing=ae&&(ae.tagName==='INPUT'||ae.tagName==='TEXTAREA');
    if(before!==after && !typing) render();
  }, 20000);
}

function csvCell(v){ v=(v==null?'':String(v)).replace(/"/g,'""'); return /[",\n]/.test(v)?`"${v}"`:v; }
function cashierExportCSV(){
  if(!session||session.role!=='owner'){ alert('Owner lang ang pwedeng mag-download ng CSV.'); return; }
  const days=Object.values(cache.cashier||{}).sort((a,b)=>a.date<b.date?1:-1);
  const hdr=['Date','Status','Opening ACOH','Total Sales (UTAK)','GCash','Card','Expenses','Vault','Cash Infusion','Actual Drawer','Expected','Discrepancy','Submitted by','Corrected by','Verified by','Incident'];
  const rows=days.map(d=>{ const c=cashierCompute(d); return [d.date,d.status,d.opening_acoh,d.total_sales,csum(d.gcash),csum(d.card),csum(d.expenses),csum(d.vault),csum(d.cash_added),c.actualDrawer,c.expectedDrawer,c.discrepancy,d.submitted_by,d.corrected_by,d.verified_by,d.incident].map(csvCell).join(','); });
  const csv=[hdr.join(','),...rows].join('\n');
  const a=document.createElement('a'); a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'})); a.download='cashier_'+cashierToday()+'.csv'; a.click();
}
async function cashierCheckDiscrepancy(d){
  const c=cashierCompute(d);
  if(c.discrepancy==null || c.balanced){ return; }
  if(d._alerted) return; d._alerted=true;
  const closing=d.shifts[d.shifts.length-1];
  const w=c.discrepancy<0?'KULANG':'SOBRA';
  const msg='*CASHIER DISCREPANCY*\n'+d.date+'\n'+w+': '+peso(Math.abs(c.discrepancy))+'\nCashier: '+(closing?closing.cashier:'')+'\nExpected: '+peso(c.expectedDrawer)+' | Actual: '+peso(c.actualDrawer);
  try{ await sb.rpc('send_whatsapp_alert',{msg}); }catch(e){ console.error('cashier alert',e); }
}

// I-normalize ang sale_date mula sa UTAK CSV patungong YYYY-MM-DD para
// maipaghambing sa recipe_effective_from. Sinusuportahan ang dalawang format:
// "18 Jun 2026" (mula sa CSV) at "2026-06-18" (ISO, kung naka-store na namin).
function invParseSaleDate(raw){
  if(!raw) return '';
  const s = String(raw).trim();
  // ISO format na — direkta na gamitin
  if(/^\d{4}-\d{2}-\d{2}$/.test(s)) return s;
  // "18 Jun 2026" format mula sa UTAK CSV
  const months={jan:'01',feb:'02',mar:'03',apr:'04',may:'05',jun:'06',jul:'07',aug:'08',sep:'09',oct:'10',nov:'11',dec:'12'};
  const m = s.match(/^(\d{1,2})\s+([A-Za-z]{3})\s+(\d{4})$/);
  if(m){
    const mon = months[(m[2]||'').toLowerCase()];
    return mon ? m[3]+'-'+mon+'-'+m[1].padStart(2,'0') : '';
  }
  return '';
}
function invNow(){ return new Date().toLocaleString('en-PH',{timeZone:'Asia/Manila',month:'short',day:'numeric',year:'numeric',hour:'2-digit',minute:'2-digit'}); }
function invBal(i){ return Number(i.begin_day||0) + Number(i.added||0) - Number(i.deducted||0); }
function invGI(id){ return cache.invIngredients.find(i=>i.id===id); }
function invGIN(name){
  // Exact match muna (pinaka-mabilis at tumpak), tapos case-insensitive
  // fallback — para hindi mag-fail nang tahimik kapag may pagkakaiba ng
  // uppercase/lowercase sa pagitan ng stock entry name at ingredient cache
  // (hal. "Bareta" vs "bareta"), na dati ay nagpapareresulta sa unit_cost=0
  // kahit na-approve na ang delivery na may presyo.
  const exact = cache.invIngredients.find(i=>i.name===name);
  if(exact) return exact;
  const lower = (name||'').toLowerCase();
  return cache.invIngredients.find(i=>i.name.toLowerCase()===lower);
}

// FUZZY DUPLICATE CHECK — para hindi madaling magkaroon ng halos-pareho na
// pangalan ng ingredient (hal. "Mantika" vs "mantika " vs "Mantika ng Niyog"
// vs "Mantka" na typo lang). I-normalize muna (lowercase, tanggalin ang
// extra spaces/punctuation), tapos gamitin ang Levenshtein distance para
// makita ang pinakamalapit na existing na ingredient.
function invNormalizeName(s){
  return String(s||'').toLowerCase().trim().replace(/\s+/g,' ').replace(/[^\w\s]/g,'');
}
function invLevenshtein(a, b){
  const m=a.length, n=b.length;
  if(m===0) return n; if(n===0) return m;
  const dp=Array.from({length:m+1},()=>new Array(n+1).fill(0));
  for(let i=0;i<=m;i++) dp[i][0]=i;
  for(let j=0;j<=n;j++) dp[0][j]=j;
  for(let i=1;i<=m;i++){
    for(let j=1;j<=n;j++){
      dp[i][j] = a[i-1]===b[j-1] ? dp[i-1][j-1] : 1+Math.min(dp[i-1][j], dp[i][j-1], dp[i-1][j-1]);
    }
  }
  return dp[m][n];
}
// Ibalik ang pinakamalapit na existing ingredient kung magkahawig ang
// pangalan (exact normalized match, o maliit lang ang distance/length ratio).
// threshold: 0.25 default — hanggang 25% ng haba ng mas mahabang pangalan
// ang pwedeng iba bago ituring na "ibang ingredient na".
function invFindCloseIngredientMatch(name, threshold){
  threshold = threshold!=null ? threshold : 0.25;
  const norm=invNormalizeName(name);
  if(!norm) return null;
  let best=null, bestDist=Infinity;
  for(const ing of cache.invIngredients){
    const n2=invNormalizeName(ing.name);
    if(n2===norm) return {ingredient:ing, distance:0, exact:true};
    const dist=invLevenshtein(norm, n2);
    const maxLen=Math.max(norm.length, n2.length);
    const ratio = maxLen>0 ? dist/maxLen : 1;
    if(ratio<=threshold && dist<bestDist){ best={ingredient:ing, distance:dist, exact:false}; bestDist=dist; }
  }
  return best;
}
function invGSR(id){ return cache.invSubRecipes.find(s=>s.id===id); }
function invGSRN(name){ return cache.invSubRecipes.find(s=>s.name===name); }
function invCost(name){
  const sr = invGSRN(name);
  if(sr){ const bc=(sr.ingredients||[]).reduce((s,i)=>s+invCost(i.n)*i.q,0); return sr.batch_qty>0?bc/sr.batch_qty:0; }
  const ing = invGIN(name);
  return ing ? Number(ing.unit_cost||0) : 0;
}
function invComponentsCost(ingredients, subRecipes){
  const raw=(ingredients||[]).reduce((s,i)=>s+invCost(i.n)*i.q,0);
  const subs=(subRecipes||[]).reduce((s,sb)=>{ const sr=invGSR(sb.sr_id); if(!sr) return s; const bc=(sr.ingredients||[]).reduce((x,i)=>x+invCost(i.n)*i.q,0); const uc=sr.batch_qty>0?bc/sr.batch_qty:0; return s+uc*sb.q; },0);
  return raw+subs;
}
// Itugma ang modifier text ng isang benta (hal. "Buffalo W BBQ F") sa lahat ng
// variant rule ng menu item na ang 'match' keyword ay nasa loob ng modifier
// text — kaya posibleng MARAMI ang ma-match sa isang linya (hal. Buffalo +
// BBQ sa parehong combo, magkaibang flavor ng wings at fries).
function invMatchVariants(m, modifierText){
  const text=(modifierText||'').toLowerCase();
  return (m.variants||[]).filter(v=> text.includes((v.match||'').toLowerCase()) && v.match);
}
function invMenuCost(m, modifierText){
  let total = invComponentsCost(m.ingredients, m.sub_recipes);
  if(modifierText!=null){
    invMatchVariants(m, modifierText).forEach(v=>{ total += invComponentsCost(v.ingredients, v.sub_recipes); });
  }
  return total;
}
function invMenuCostPct(m){ const c=invMenuCost(m); return m.price>0 ? c/m.price*100 : 0; }

// Ibalik ang lahat ng available na (groupKind, groupName, options[]) para sa
// isang menu item base sa pangalan nito, gamit ang totoong UTAK modifier
// data. null kung walang modifier mapping ang item (hal. plain drinks).
function invUtakModifierGroupsFor(itemName){
  const idx = UTAK_ITEM_MODIFIER_INDEX[itemName];
  if(idx==null || !UTAK_MODIFIERS[idx]) return null;
  const entry = UTAK_MODIFIERS[idx];
  const groups=[];
  for(const kind of ['single','multiple']){
    if(entry[kind]){
      for(const [gname, opts] of Object.entries(entry[kind])){
        groups.push({kind, name:gname, options:opts});
      }
    }
  }
  return groups.length ? groups : null;
}

// Auto-seed ang inv_pos_item_map para sa lahat ng kilalang UTAK item+option
// combinations. Ito ang KRITIKAL na hakbang na nagkonekta sa sales CSV import
// sa inventory deductions — kung wala ang pos_key mapping, kahit may recipe
// ang menu item ay HINDI mababawas ang stock kapag nag-import ng sales.
// Ginagawa lang ang insert kung wala pang entry para sa posKey na iyon —
// hindi nito binabago ang manual na na-configure na mappings ng Owner.
async function invCatchUpPosItemMap(){
  try{
    const norm = s => (s||'').trim().toLowerCase().replace(/\s+/g,' ');
    const existingKeys = new Set(cache.invPosItemMap.map(m=>m.pos_key));
    const toInsert=[];
    // Para sa bawat UTAK item na may Options, gumawa ng posKey per option
    // (hal. "mains|wings|6|" at "mains|wings|12|" etc.) na ini-link sa
    // iisang menu item na "Wings". Ang modifier field ay LAGING BLANGKO dito
    // dahil ang actual modifier text sa benta ay nag-iiba bawat transaksyon —
    // ang invMenuItemForPosKey ay may fallback logic na bababa sa key na ito
    // mula sa exact posKey ng transaksyon (na may modifier).
    for(const [itemName, opts] of Object.entries(UTAK_ITEM_OPTIONS)){
      const menuItem = cache.invMenuItems.find(m=>m.name===itemName);
      if(!menuItem) continue;
      const utakEntry = UTAK_MENU_ITEMS.find(u=>u.n===itemName);
      const category = utakEntry ? utakEntry.c : '';
      for(const opt of opts){
        if(!opt.o) continue; // skip blank option rows (plain items)
        const posKey = norm(category)+'|'+norm(itemName)+'|'+norm(opt.o)+'|';
        if(existingKeys.has(posKey)) continue; // already mapped, skip
        const row={id:invUid(),pos_key:posKey,menu_item_id:menuItem.id,ignored:false,created_by:'system',created_at:new Date().toISOString()};
        toInsert.push(row);
      }
      // Also add base item-level key (no option) as a catch-all fallback
      const baseKey = norm(category)+'|'+norm(itemName)+'||';
      if(!existingKeys.has(baseKey)){
        const row={id:invUid(),pos_key:baseKey,menu_item_id:menuItem.id,ignored:false,created_by:'system',created_at:new Date().toISOString()};
        toInsert.push(row);
      }
    }
    for(const row of toInsert){
      cache.invPosItemMap.push(row);
      await sb.from('inv_pos_item_map').upsert(row);
    }
    if(toInsert.length) console.log('invCatchUpPosItemMap: inserted', toInsert.length, 'posKey mappings');
  }catch(e){ console.error('invCatchUpPosItemMap failed', e); }
}
async function invCatchUpIngredients(){
  try{
    const {seedIng, seedSub} = invCanonicalSeed();
    const byNameLower = new Map(cache.invIngredients.map(i=>[i.name.toLowerCase(), i]));
    const toInsert=[];
    const toMerge=[]; // {oldId, newRow}
    for(const canon of seedIng){
      const existing = byNameLower.get(canon.name.toLowerCase());
      if(!existing){
        toInsert.push(canon);
      } else if(existing.id !== canon.id){
        // Parehong pangalan, ibang id — ito ang lumang row mula sa unang bersyon.
        // Panatilihin ang balanse nito sa ILALIM ng BAGONG canonical id.
        toMerge.push({oldId:existing.id, newRow:{...canon, begin_day:existing.begin_day, added:existing.added, deducted:existing.deducted, unit_cost:existing.unit_cost||canon.unit_cost}});
      }
    }
    for(const row of toInsert){
      await sb.from('inv_ingredients').upsert(row);
      cache.invIngredients.push(row);
    }
    for(const {oldId,newRow} of toMerge){
      await sb.from('inv_ingredients').upsert(newRow);
      // I-remap ang lahat ng existing reference papunta sa bagong id
      await sb.from('inv_staff_counts').update({ingredient_id:newRow.id}).eq('ingredient_id',oldId);
      await sb.from('inv_stock_entries').update({ingredient_id:newRow.id}).eq('ingredient_id',oldId);
      await sb.from('inv_reorders').update({ingredient_id:newRow.id}).eq('ingredient_id',oldId);
      cache.invStaffCounts.forEach(c=>{ if(c.ingredient_id===oldId) c.ingredient_id=newRow.id; });
      cache.invStockEntries.forEach(e=>{ if(e.ingredient_id===oldId) e.ingredient_id=newRow.id; });
      cache.invReorders.forEach(r=>{ if(r.ingredient_id===oldId) r.ingredient_id=newRow.id; });
      await sb.from('inv_ingredients').delete().eq('id',oldId);
      cache.invIngredients = cache.invIngredients.filter(i=>i.id!==oldId);
      cache.invIngredients = cache.invIngredients.filter(i=>i.id!==newRow.id);
      cache.invIngredients.push(newRow);
      await invAuditLog('ingredient_migrated',{name:newRow.name,oldId,newId:newRow.id,reason:'Catch-up migration sa canonical ingredient list'});
    }
    if(toInsert.length || toMerge.length){
      await invAuditLog('ingredient_catchup',{inserted:toInsert.length,merged:toMerge.length});
    }
    // Sub-recipes — same logic, simpler dahil walang balance na dadalhin
    const srByNameLower = new Map(cache.invSubRecipes.map(s=>[s.name.toLowerCase(), s]));
    for(const canon of seedSub){
      if(!srByNameLower.has(canon.name.toLowerCase())){
        await sb.from('inv_sub_recipes').upsert(canon);
        cache.invSubRecipes.push(canon);
      }
    }
  }catch(e){ console.error('invCatchUpIngredients failed', e); }
}

function invAlerts(){
  const a=[];
  cache.invIngredients.forEach(i=>{ if(invBal(i)<0) a.push({t:'flag',m:`${i.name}: balance ${invBal(i)} ${i.unit}`}); });
  const ps=cache.invStockEntries.filter(e=>e.status==='pending').length;
  const up=cache.invStockEntries.filter(e=>e.status==='approved'&&e.needs_processing&&!e.processed_entry_id).length;
  const pp=cache.invProcessedEntries.filter(e=>e.status==='pending').length;
  const pe=cache.invEquipment.filter(e=>e.pending_approval).length;
  const pf=invPendingFixRequests().length;
  const omr=cache.invOwnerMadeRequests.filter(r=>r.status==='requested').length;
  const omd=cache.invOwnerMadeRequests.filter(r=>r.status==='done').length;
  const ump=invUnmappedPosKeys().length;
  if(ps) a.push({t:'warn',m:`${ps} delivery na hinihintay i-approve`});
  if(up) a.push({t:'warn',m:`${up} item kailangan i-proseso (yield)`});
  if(pp) a.push({t:'warn',m:`${pp} yield na hinihintay aprubahan ng owner`});
  if(pe) a.push({t:'warn',m:`${pe} equipment na hinihintay i-approve`});
  if(pf) a.push({t:'warn',m:`${pf} fix request na hinihintay aprubahan`});
  if(omr) a.push({t:'warn',m:`${omr} reorder request na hinihintay gawin ng owner`});
  if(omd) a.push({t:'warn',m:`${omd} reorder na tapos — kailangan i-log ang natapos`});
  if(ump) a.push({t:'warn',m:`${ump} naibentang item na walang recipe (hindi pa nababawas sa stock)`});
  return a;
}
function invAlertBadge(){
  const n=invAlerts().length;

}

function renderInventory(){
  if(!session) return '';
  const role=session.role;
  const isOwner=role==='owner';
  const isStaff=role==='staff';
  const back=`<button class="btn-ghost btn-small" data-go="select" style="margin-bottom:12px;">← Mga Module</button>`;

  // Recipe editor (menu item o sub-recipe) — kinukuha ang BUONG screen habang
  // bukas, para hindi malito sa tabs habang ginagawa ang recipe.
  if(invEditType && invRecipeDraft && isOwner){
    return `<div class="screen">${invRenderRecipeEditor()}</div>`;
  }

  // Multi-line delivery draft — kinukuha rin ang buong screen, lahat ng role
  // pwedeng gumawa nito (staff, manager, owner).
  if(invDeliveryDraft){
    return `<div class="screen">${invRenderDeliveryDraft()}</div>`;
  }

  // Processable setup — pagpili ng OUTPUT ingredient mula sa UTAK list
  // (hindi free-text) kapag may i-mark na processable.
  if(invProcSetupDraft){
    return `<div class="screen">${invRenderProcSetup()}</div>`;
  }

  // Equipment form — full-screen, hindi na prompt-chain
  if(invEqDraft){
    return `<div class="screen">${invRenderEqDraft()}</div>`;
  }

  const managerCanViewCosting = cache.settings.inv_manager_can_view_costing === '1';

  // Lahat ng tabs. 'count' ay para lang sa STAFF (daily required blind count).
  // Stock/Costing = OWNER lang (maliban kung binigyan ng access ang manager).
  // Delivery/Processing/Order/Equipment = lahat pwede gumawa (operational), pero
  // ang mismong NUMBERS sa loob (yield deviation, cost) ay nakatago sa di-owner.
  const tabsAll=[
    {k:'count',l:'Daily Count', staffOk:true, managerOk:false, ownerOk:false},
    {k:'stock',l:'Stock', staffOk:false, managerOk:false, ownerOk:true},
    {k:'counts',l:'Mga Count', staffOk:false, managerOk:false, ownerOk:true},
    {k:'incoming',l:'Delivery', staffOk:true, managerOk:true, ownerOk:true},
    {k:'processing',l:'Proseso', staffOk:true, managerOk:true, ownerOk:true},
    {k:'costing',l:'Costing', staffOk:false, managerOk:false, ownerOk:true},
    {k:'sales',l:'Sales Sync', staffOk:false, managerOk:false, ownerOk:true},
    {k:'order',l:'Order', staffOk:true, managerOk:true, ownerOk:true},
    {k:'equipment',l:'Equipment', staffOk:true, managerOk:true, ownerOk:true},
    {k:'audit',l:'Log', staffOk:false, managerOk:false, ownerOk:true}
  ];
  const tabs = tabsAll.filter(t=>{
    if(isOwner) return t.ownerOk;
    if(role==='manager') return t.managerOk || (managerCanViewCosting && (t.k==='stock'||t.k==='processing'||t.k==='costing'||t.k==='audit'));
    if(isStaff) return t.staffOk;
    return false;
  });

  if(!tabs.find(t=>t.k===invTab)) invTab=tabs[0]?.k || 'count';

  const tabRow=`<div class="btn-row" style="overflow-x:auto; flex-wrap:nowrap; padding-bottom:4px;">${tabs.map(t=>`<button class="btn-small ${invTab===t.k?'btn-primary':'btn-ghost'}" data-invtab="${t.k}" style="white-space:nowrap;">${t.l}</button>`).join('')}</div>`;
  const gateNote = !isOwner ? `<p class="hint">🔒 Costing at Stock balance: Owner lang ang makakakita. ${managerCanViewCosting?'(Binigyan ka ng owner ng pansamantalang access.)':''}</p>` : '';

  let body='';
  if(invTab==='count') body=invRenderDailyCount();
  else if(invTab==='stock') body=invRenderStock(role);
  else if(invTab==='counts') body=invRenderCountsManagement(role);
  else if(invTab==='incoming') body=invRenderIncoming(role);
  else if(invTab==='processing') body=invRenderProcessing(role);
  else if(invTab==='costing') body=invRenderCosting(role);
  else if(invTab==='sales') body=invRenderSalesSync(role);
  else if(invTab==='order') body=invRenderOrder(role);
  else if(invTab==='equipment') body=invRenderEquipment(role);
  else if(invTab==='audit') body=invRenderAudit(role);

  const alerts = isOwner ? invAlerts() : [];
  const alertsHtml=alerts.map(a=>`<div class="warn-box-l" style="margin-bottom:6px;">${a.m}</div>`).join('');

  // OWNER: control para payagan / bawiin ang manager access sa costing, at forced full audit button
  const pendingFixCount = invPendingFixRequests().length;
  const postponedToday = invCountPostponedToday();
  const ownerControls = isOwner ? `
    ${pendingFixCount?`<div class="section-title">🛠 Fix Requests (${pendingFixCount})</div>${invRenderFixQueue()}`:''}
    <div class="task-card" style="padding:10px; margin-bottom:10px;">
      <div class="line2"><b>Manager access sa Costing/Processing</b><span>${managerCanViewCosting?'BUKAS':'SARADO'}</span></div>
      <button class="btn-ghost btn-small" id="inv-toggle-mgr-access" style="margin-top:6px;">${managerCanViewCosting?'I-bawi ang access':'Payagan ang manager tingnan'}</button>
    </div>
    <div class="task-card" style="padding:10px; margin-bottom:10px; ${postponedToday?'border-color:var(--medium);':''}">
      <div class="line2"><b>Required Count Ngayong Araw</b><span>${postponedToday?'IPINAGPALIBAN':'ACTIVE'}</span></div>
      <button class="btn-ghost btn-small" id="inv-toggle-postpone" style="margin-top:6px;">${postponedToday?'I-activate ulit':'⏸️ Ipagpaliban ngayong araw (sarado/busy)'}</button>
    </div>
    <button class="btn-primary btn-block" id="inv-force-audit" style="margin-bottom:10px;">🔍 FORCED FULL AUDIT — bilangin LAHAT ngayon</button>
  ` : '';

  return `<div class="screen">${back}${ownerControls}${gateNote}${alertsHtml}${tabRow}${body}</div>`;
}

/* ----- STOCK TAB (with PROCESSABLE toggle button) ----- */
function invRenderStock(role){
  const isOwner=role==='owner';
  const active=cache.invIngredients.filter(i=>!i.archived);
  const totalVal=active.reduce((s,i)=>s+Math.max(0,invBal(i))*Number(i.unit_cost||0),0);
  const sorted=[...active, ...cache.invIngredients.filter(i=>i.archived)];
  const rows=sorted.map(i=>{
    const bal=invBal(i); const neg=bal<0;
    const yields=i.yields||[];
    const avgY=yields.length ? yields.reduce((s,y)=>s+y.pct,0)/yields.length : null;
    return `<div class="task-card" style="padding:10px; ${i.archived?'opacity:0.55;':''}">
      <div class="line2"><b>${escapeHtml(i.name)}</b>${i.archived?'<span class="cc-badge pending">Archived</span>':`<span style="${neg?'color:var(--very-high);':''}">${bal} ${escapeHtml(i.unit)}</span>`}</div>
      <div class="hint" style="margin:2px 0;">${invZoneLabel(i.zone||'dry')} · ₱${Number(i.unit_cost||0).toFixed(4)}/${escapeHtml(i.unit)}${avgY!=null?` · avg yield ${avgY.toFixed(1)}% (${yields.length}×)`:''}</div>
      <div class="btn-row" style="margin-top:6px;">
        <button class="btn-small ${i.is_processable?'btn-primary':'btn-ghost'}" data-invproc="${i.id}">${i.is_processable?'⚗️ Processable':'○ Raw'}</button>
        ${isOwner?`<button class="btn-ghost btn-small" data-invedit="${i.id}">Edit</button>`:''}
        <button class="btn-ghost btn-small" data-invlog="${i.name}">Log</button>
        ${isOwner&&i.archived?`<button class="btn-ghost btn-small" data-invunarchive="${i.id}">↩ I-restore</button>`:''}
      </div>
    </div>`;
  }).join('');
  return `
    <button class="btn-ghost btn-block" id="inv-export-stock">⬇️ I-download bilang CSV</button>
    <div class="line2" style="font-weight:700;"><span>${active.length} ingredients</span><span>₱${totalVal.toLocaleString('en-PH',{minimumFractionDigits:2,maximumFractionDigits:2})} value</span></div>
    <input type="text" id="inv-search" placeholder="Maghanap ng ingredient..." style="margin:10px 0;">
    <div id="inv-stock-rows">${rows}</div>
    <button class="btn-primary btn-block" data-action="inv-add-ing" style="margin-top:10px;">+ Idagdag ang Ingredient</button>
  `;
}

/* ----- INCOMING DELIVERY TAB ----- */
function invRenderIncoming(role){
  const canApprove = role==='owner'||role==='manager';
  const isOwner = role==='owner';
  const pend=cache.invStockEntries.filter(e=>e.status==='pending');
  const appv=cache.invStockEntries.filter(e=>e.status==='approved').slice(0,10);
  const pHtml=pend.length?pend.map(e=>`
    <div class="task-card" style="padding:10px; border-color:var(--medium);">
      <div class="line2"><b>${escapeHtml(e.ingredient_name)}</b><span class="cc-badge pending">Pending</span></div>
      <div class="hint">${e.supplier?escapeHtml(e.supplier)+' · ':''}${e.date} · ni ${escapeHtml(e.submitted_by||'')}</div>
      ${canApprove?`
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-top:6px;">
          <div>
            <div class="field-label">Qty (${escapeHtml(e.unit)})</div>
            <input type="number" step="0.01" value="${e.qty}" data-invqtyedit="${e.id}">
          </div>
          <div>
            <div class="field-label">Presyo (₱)</div>
            <input type="number" step="0.01" value="${e.price||''}" placeholder="0.00" data-invprice="${e.id}">
          </div>
        </div>
        <div class="hint" style="margin-top:4px;">Pwedeng i-edit kung may pagkakamali sa type bago aprubahan.</div>
        <div class="btn-row" style="margin-top:6px;">
          <button class="btn-small" style="background:var(--done);border-color:var(--done);color:#fff;" data-invapprove="${e.id}">✓ Aprubahan</button>
          <button class="btn-small" style="background:var(--very-high);border-color:var(--very-high);color:#fff;" data-invreject="${e.id}">✗ Tanggihan (mali ang ingredient/duplicate)</button>
        </div>`:`<div class="hint">${e.qty} ${escapeHtml(e.unit)}${e.price?' · ₱'+Number(e.price).toFixed(2):''} · Hinihintay i-approve ng manager o owner.</div>`}
    </div>`).join(''):'<p class="hint">Walang pending delivery.</p>';
  const aHtml=appv.map(e=>`<div class="task-card" style="padding:10px;"><div class="line2"><b>${escapeHtml(e.ingredient_name)}</b><span class="cc-badge done">✓ Approved</span></div><div class="hint">${e.qty} ${escapeHtml(e.unit)} · ${e.date} · ni ${escapeHtml(e.approved_by||'')}</div>${invRenderFixRequestButton('stock_entry', e.id, e.ingredient_name, `${e.qty} ${e.unit}`)}</div>`).join('');

  // Archive: kung hindi na need i-reorder ang isang ingredient. Staff/Manager
  // humihingi, Owner nag-aaprubahan (o pwedeng direkta na lang i-archive ang owner).
  const archivePendingItems = cache.invIngredients.filter(i=>i.archive_pending && !i.archived);
  const archiveQueueHtml = isOwner && archivePendingItems.length ? `
    <div class="section-title">📦 Hiling na i-archive (${archivePendingItems.length})</div>
    ${archivePendingItems.map(i=>`
      <div class="task-card" style="padding:10px; border-color:var(--medium);">
        <div class="line2"><b>${escapeHtml(i.name)}</b><span class="cc-badge pending">Hiling</span></div>
        <div class="hint">Hiniling ni: ${escapeHtml(i.archive_requested_by||'')}</div>
        <div class="btn-row" style="margin-top:6px;">
          <button class="btn-small" style="background:var(--done);border-color:var(--done);color:#fff;" data-archapprove="${i.id}">✓ I-archive</button>
          <button class="btn-small" style="background:var(--very-high);border-color:var(--very-high);color:#fff;" data-archreject="${i.id}">✗ Tanggihan</button>
        </div>
      </div>`).join('')}
  ` : '';

  const archivableOpts = cache.invIngredients.filter(i=>!i.archived && !i.archive_pending);
  const archiveRequestHtml = `
    <div class="task-card" style="padding:10px; margin-top:10px;">
      <div class="hint" style="margin-bottom:6px;">Hindi na ba kailangan i-reorder ang isang ingredient? (hal. tinanggal na sa menu)</div>
      <select id="inv-archive-pick" style="margin-bottom:6px;">
        <option value="">— Pumili ng ingredient —</option>
        ${archivableOpts.map(i=>`<option value="${i.id}">${escapeHtml(i.name)}</option>`).join('')}
      </select>
      <button class="btn-ghost btn-block" id="inv-archive-request">${isOwner?'📦 I-archive Agad':'📦 Humiling na I-archive'}</button>
    </div>`;

  return `
    <button class="btn-primary btn-block" data-action="inv-add-stock">+ Bagong Delivery</button>
    ${isOwner?'<button class="btn-ghost btn-block" id="inv-export-delivery" style="margin-top:6px;">⬇️ I-download bilang CSV</button>':''}
    <div class="section-title">Pending (${pend.length})</div>${pHtml}
    <div class="section-title">Kasunod na na-approve</div>${aHtml||'<p class="hint">Wala pa.</p>'}
    ${archiveQueueHtml}
    ${archiveRequestHtml}
  `;
}

/* ----- PROCESSING TAB (yield, owner-only discrepancy view) ----- */
function invRenderProcessing(role){
  const isOwner=role==='owner';
  const unprocessed=cache.invStockEntries.filter(e=>e.status==='approved'&&e.needs_processing&&!e.processed_entry_id);
  const pend=cache.invProcessedEntries.filter(e=>e.status==='pending');
  const uHtml=unprocessed.length?unprocessed.map(e=>`
    <div class="task-card" style="padding:10px; border-color:var(--medium);">
      <div class="line2"><b>${escapeHtml(e.ingredient_name)}</b><span class="cc-badge flag">Need yield</span></div>
      <div class="hint">${e.qty} ${escapeHtml(e.unit)} natanggap noong ${e.date}</div>
      <button class="btn-primary btn-small" data-invprocess="${e.id}" style="margin-top:6px;">Ilagay ang Yield</button>
    </div>`).join(''):'<p class="hint">Walang naghihintay na proseso mula sa delivery.</p>';
  const pHtml=pend.length?pend.map(e=>{
    const ing=invGIN(e.ingredient_name);
    const prevYields=(ing?.yields||[]).filter(y=>y.at!==e.submitted_at);
    const avgPrev=prevYields.length?prevYields.reduce((s,y)=>s+y.pct,0)/prevYields.length:null;
    const bigDev = e.deviation!=null && Math.abs(e.deviation)>15;
    // Discrepancy / deviation shown ONLY to owner
    const ownerBlock = isOwner ? `
      <div class="denom-grid" style="grid-template-columns:1fr; margin:6px 0;">
        <div class="line2" style="font-weight:700;"><span>Yield</span><span style="${bigDev?'color:var(--very-high);':''}">${Number(e.yield_pct||0).toFixed(1)}%</span></div>
        ${avgPrev!=null?`<div class="hint">vs average ${avgPrev.toFixed(1)}% · ${e.deviation>0?'▲+':'▼'}${Math.abs(e.deviation||0).toFixed(1)}%</div>`:'<div class="hint">Unang batch — magiging baseline ito.</div>'}
        ${bigDev?'<div class="hint" style="color:var(--very-high); font-weight:700;">⚠️ Malaking pagkakaiba — i-verify sa staff bago aprubahan.</div>':''}
      </div>
      <div class="field-label" style="margin-top:6px;">Output qty (${escapeHtml(e.out_unit)}) — pwedeng itama kung may typo</div>
      <input type="number" step="0.01" value="${e.out_qty}" data-procoutedit="${e.id}">
      <div class="btn-row" style="margin-top:6px;">
        <button class="btn-small" style="background:var(--done);border-color:var(--done);color:#fff;" data-invprocapprove="${e.id}">✓ Aprubahan</button>
        <button class="btn-small" style="background:var(--very-high);border-color:var(--very-high);color:#fff;" data-invprocreject="${e.id}">✗ Tanggihan</button>
      </div>` : `<div class="hint">Hinihintay aprubahan ng owner.</div>`;
    return `<div class="task-card" style="padding:10px; border-color:${bigDev&&isOwner?'var(--very-high)':'var(--medium)'};">
      <div class="line2"><b>${escapeHtml(e.ingredient_name)} → ${escapeHtml(e.output_ingredient_name)}</b><span class="cc-badge pending">Pending</span></div>
      <div class="hint">${e.in_qty} ${escapeHtml(e.in_unit||'')} → ${e.out_qty} ${escapeHtml(e.out_unit)} · ni ${escapeHtml(e.submitted_by||'')}</div>
      ${ownerBlock}
    </div>`;
  }).join(''):'<p class="hint">Walang pending na yield.</p>';

  // STANDALONE TRIGGER — talahanayan ng LAHAT ng processable raw ingredient
  // (hindi lang yung galing sa delivery), para may maclick anumang oras.
  const processable = cache.invIngredients.filter(i=>i.is_processable && !i.archived);
  const procRows = processable.length ? processable.map(i=>{
    const bal=invBal(i);
    return `<div class="line2" style="padding:6px 0; border-bottom:1px solid var(--line);">
      <span>${escapeHtml(i.name)} <span class="hint">(${bal} ${escapeHtml(i.unit)} available)</span></span>
      <button class="btn-primary btn-small" data-invstartproc="${i.id}">⚗️ Iproseso</button>
    </div>`;
  }).join('') : '<p class="hint">Walang processable ingredient pa.</p>';

  // Add-new-processable picker — OWNER/MANAGER lang (apektado ang costing),
  // search mula sa UTAK list (hindi free-text).
  const canManageProcessable = role==='owner'||role==='manager';
  const addProcResults = invAddProcSearch.trim() ? (()=>{
    const q=invAddProcSearch.toLowerCase();
    const matches=cache.invIngredients.filter(i=>!i.archived && !i.is_processable && i.name.toLowerCase().includes(q)).slice(0,8);
    return matches.length ? matches.map(i=>`<div class="line2" data-addprocpick="${i.id}" style="cursor:pointer; padding:6px 0;">${escapeHtml(i.name)} <span class="hint">(${escapeHtml(i.unit)})</span></div>`).join('') : '<p class="hint">Walang tugma.</p>';
  })() : '';
  const addProcPicker = canManageProcessable ? `
    <div class="task-card" style="padding:10px; border-style:dashed; margin-top:8px;">
      <div class="hint" style="margin-bottom:6px;">May ingredient na dapat i-mark na processable (hal. bagong "Mango Raw")? Hanapin dito:</div>
      <input type="text" id="inv-addproc-search" value="${escapeHtml(invAddProcSearch)}" placeholder="Maghanap ng ingredient...">
      <div id="inv-addproc-results" style="max-height:160px; overflow-y:auto; margin-top:6px;">${addProcResults}</div>
    </div>` : '';

  return `
    ${isOwner?'<button class="btn-ghost btn-block" id="inv-export-processing">⬇️ I-download bilang CSV</button>':''}
    <div class="section-title">⚗️ Simulan ang Proseso</div>
    <p class="hint">Pumili ng raw ingredient na iproproseso ngayon (hal. Raw Wings → Wings). Ibabawas agad sa raw balance, ilalagay mo ang output pagkatapos.</p>
    ${procRows}
    ${addProcPicker}
    <div class="section-title">Kailangan i-proseso mula sa delivery (${unprocessed.length})</div>${uHtml}
    <div class="section-title">Naghihintay ng Owner Approval (${pend.length})</div>${pHtml}
  `;
}

/* ----- COSTING TAB (sub-recipes + menu items) ----- */
function invRenderCosting(role){
  const isOwner=role==='owner';
  const cats=['All', ...new Set(cache.invMenuItems.map(m=>m.category).filter(Boolean))];
  const filtered = invCostingCat==='All' ? cache.invMenuItems.filter(m=>!m.archived) : cache.invMenuItems.filter(m=>!m.archived && m.category===invCostingCat);
  const tabBtns=cats.map(c=>`<button class="btn-small ${c===invCostingCat?'btn-primary':'btn-ghost'}" data-invcat="${escapeHtml(c)}">${escapeHtml(c)}</button>`).join('');
  const withRecipe=filtered.filter(m=>(m.ingredients||[]).length||(m.sub_recipes||[]).length);
  const target=invTargetCost();
  const menuCards=withRecipe.map(m=>{
    const cost=invMenuCost(m); const cp=invMenuCostPct(m);
    const flagClass = cp>40?'flag':cp>target?'pending':'done';
    const rawRows=(m.ingredients||[]).map(i=>`<div class="hint" style="display:flex;justify-content:space-between;">${escapeHtml(i.n)} (${i.q}${i.u})<span>₱${(invCost(i.n)*i.q).toFixed(2)}</span></div>`).join('');
    const subRows=(m.sub_recipes||[]).map(sb=>{
      const sr=invGSR(sb.sr_id); if(!sr) return '';
      const uc=invCost(sr.name); const lc=uc*sb.q;
      return `<div class="hint" style="display:flex;justify-content:space-between;">⚗️ ${escapeHtml(sr.name)} (${sb.q}${sb.u})<span>₱${lc.toFixed(2)}</span></div>`;
    }).join('');
    // Lahat ng recipe — bago man o luma, suggested man o hindi — DAPAT
    // editable ng Owner kahit kailan, dahil pwedeng magbago ang recipe
    // anumang oras (presyo ng ingredient, bagong bersyon, atbp).
    return `<div class="task-card" style="padding:10px; ${m.suggested?'border-color:var(--low);':''}">
      <div class="line2"><b>${escapeHtml(m.name)}</b>${m.suggested?'<span class="cc-badge pending">💡 Suggested</span>':`<span class="cc-badge ${flagClass}">${cp.toFixed(1)}%</span>`}</div>
      <div class="hint">${escapeHtml(m.category||'')} · Benta: ₱${Number(m.price).toFixed(2)}${(m.variants||[]).length?` · ${m.variants.length} variant${m.variants.length>1?'s':''}`:''}</div>
      ${rawRows}${subRows}
      <div class="line2" style="font-weight:700;border-top:1px solid var(--line);padding-top:4px;margin-top:4px;"><span>Cost/serving</span><span>₱${cost.toFixed(2)}</span></div>
      ${isOwner?`<button class="btn-ghost btn-small" data-invmenuedit="${m.id}" style="margin-top:4px;">✎ I-edit ang Recipe</button>`:`<div class="hint" style="margin-top:4px;">🔒 Owner lang ang maka-edit ng recipe.</div>`}
    </div>`;
  }).join('');
  const noRecipe=filtered.filter(m=>!(m.ingredients||[]).length && !(m.sub_recipes||[]).length);
  const subLib=cache.invSubRecipes.map(sr=>{
    const bc=(sr.ingredients||[]).reduce((s,i)=>s+invCost(i.n)*i.q,0); const uc=sr.batch_qty>0?bc/sr.batch_qty:0;
    const ingRows=(sr.ingredients||[]).map(i=>`<div class="hint" style="display:flex;justify-content:space-between;">${escapeHtml(i.n)} (${i.q}${i.u})<span>₱${(invCost(i.n)*i.q).toFixed(2)}</span></div>`).join('');
    return `<div class="task-card" style="padding:10px; border-color:var(--low);">
      <div class="line2"><b>⚗️ ${escapeHtml(sr.name)}</b><span>₱${uc.toFixed(4)}/${escapeHtml(sr.output_unit)}</span></div>
      <div class="hint">Batch: ${sr.batch_qty}${escapeHtml(sr.output_unit)} · Cost/batch: ₱${bc.toFixed(2)}</div>
      ${ingRows}
      ${isOwner?`<button class="btn-ghost btn-small" data-invsredit="${sr.id}" style="margin-top:4px;">✎ I-edit</button>`:''}
    </div>`;
  }).join('');
  const supRows=cache.invIngredients.map(i=>{
    const hist=cache.invSupplierPrices.filter(p=>p.ingredient_name===i.name).sort((a,b)=>new Date(a.created_at)-new Date(b.created_at));
    const cur=hist[hist.length-1]; const prev=hist[hist.length-2];
    const delta = cur&&prev ? cur.unit_cost-prev.unit_cost : null;
    const dc = delta==null?'':delta>0?'color:var(--very-high);':'color:var(--done);';
    return `<div class="line2"><span>${escapeHtml(i.name)}</span><span style="${dc}">₱${Number(i.unit_cost||0).toFixed(4)} ${delta!=null?(delta>0?'▲+':'▼')+Math.abs(delta).toFixed(4):''} ${isOwner?`<button class="btn-ghost btn-small" data-invsupedit="${escapeHtml(i.name)}" style="margin:0 0 0 6px;">✎ I-edit</button>`:''}</span></div>`;
  }).join('');
  return `
    <button class="btn-ghost btn-block" id="inv-export-costing">⬇️ I-download bilang CSV</button>
    <div class="hint">⚗️ Sub-recipes (sauces/mixes) ang gumagawa ng cost para sa Buffalo Sauce, Salted Egg Sauce, atbp. Awtomatikong nag-uupdate ang menu cost. Lahat ng recipe — bago man o luma — ay editable ng Owner anumang oras.</div>
    ${isOwner?`<div class="btn-row" style="margin:8px 0;">
      <button class="btn-primary btn-small" data-action="inv-add-menu">+ Menu Item</button>
      <button class="btn-ghost btn-small" data-action="inv-add-sr">⚗️ + Sub-recipe</button>
    </div>`:''}
    <div class="btn-row" style="overflow-x:auto;flex-wrap:nowrap;">${tabBtns}</div>
    ${menuCards}

/* ----- ORDER GUIDE TAB ----- */
/* ----- ORDER / REORDER WORKFLOW -----
   suggested (auto, mababa/negative ang stock) -> ordered (owner/manager pumili
   ng supplier+qty) -> arrived | not_arrived (kahit sino mag-mark) -> kung
   not_arrived, babalik sa "ordered" status na pwedeng i-order ulit, ibang
   supplier man o pareho. */
function invKnownSuppliers(){
  const fromReorders = cache.invReorders.map(r=>r.supplier).filter(Boolean);
  const fromStock = cache.invStockEntries.map(e=>e.supplier).filter(Boolean);
  const fromExtra = (cache.settings.inv_extra_suppliers||'').split('|').filter(Boolean);
  return [...new Set([...fromReorders, ...fromStock, ...fromExtra])].sort();
}
// Hanapin ang PREFERRED/dating supplier para sa isang ingredient, base sa
// pinakahuling delivery o order nito — para hindi kailangang pumili ulit
// ang Owner kung pareho lang naman lagi ang ginagamit nilang supplier.
// Sinusuri ang supplier price history muna (pinaka-tumpak, may date ng
// totoong delivery), tapos stock entries, tapos huling reorder bilang
// fallback. null kung wala talagang naitalang supplier dati.
function invPreferredSupplier(ingredientName){
  const fromPrices = cache.invSupplierPrices.find(p=>p.ingredient_name===ingredientName && p.supplier);
  if(fromPrices) return fromPrices.supplier;
  const fromStock = cache.invStockEntries.find(e=>e.ingredient_name===ingredientName && e.supplier);
  if(fromStock) return fromStock.supplier;
  const fromReorder = cache.invReorders.find(r=>r.ingredient_name===ingredientName && r.supplier);
  if(fromReorder) return fromReorder.supplier;
  return null;
}
// Tantyang presyo base sa pinakahuling delivery (unit_cost ng ingredient) at
// ang naitalang qty na hinihiling — para may starting point ang Owner kapag
// inaaprubahan ang isang order, hindi blangko.
function invEstimatedOrderPrice(ingredientName, qty){
  const ing=invGIN(ingredientName);
  if(!ing || !ing.unit_cost || !qty) return null;
  return Number(ing.unit_cost) * Number(qty);
}
function invAutoSuggestReorders(){
  // Para sa ingredient na negative o malapit maubos (<10% ng kasalukuyang added halaga
  // bilang proxy), gumawa ng 'suggested' reorder kung wala pang open (suggested/ordered/
  // not_arrived) na entry. MAHALAGA: kasama ang 'not_arrived' dito — kung hindi,
  // sa SUNOD-SUNOD na render pagkatapos i-mark na "Hindi dumating" ang isang
  // order, agad itong gagawan ng BAGONG 'suggested' duplicate (dahil negative
  // pa rin ang balance), kaya parang "hindi nawawala" ang item sa Order tab —
  // ito ang naging dahilan ng nareport na bug.
  const lowStock = cache.invIngredients.filter(i=>!i.archived && !i.pending_approval && invBal(i)<0);
  lowStock.forEach(i=>{
    const hasOpen = cache.invReorders.some(r=> r.ingredient_id===i.id && ['suggested','ordered','not_arrived'].includes(r.status));
    if(!hasOpen){
      const row={id:invUid(), ingredient_id:i.id, ingredient_name:i.name, unit:i.unit, suggested_qty:Math.abs(invBal(i)), order_qty:null, supplier:null, status:'suggested', ordered_by:null, ordered_at:null};
      cache.invReorders.unshift(row);
      sb.from('inv_reorders').insert(row).then(({error})=>{ if(error) console.error(error); });
    }
  });
}

/* ---------- DAILY REQUIRED COUNT (staff) ----------
   Ipinapakita ang BUONG listahan ng zone para sa araw na ito (hindi
   random-cut na subset) — kasi minsan may magkatabi na ingredient na
   madaling sabay bilangin. Ang STAFF mismo ang pumipili kung alin sa
   listahan ang bibilangin niya, hanggang sa makumpleto ang REQUIRED na 10.
   Bawat ingredient may sariling submit — pag-submit, nawawala na agad sa
   listahan (real-time, hindi batch). FREEZER zone lang ang available sa
   THURSDAYS (Belcris delivery day). WINGS dapat lumalabas ng hindi bababa
   sa 2x kada linggo, kaya pinipilit itong kasama kung kulang pa. Owner
   pwedeng i-FORCE FULL AUDIT (lahat ng zone, lahat ng ingredient) o
   I-POSTPONE ang required count para sa araw na ito (sarado/busy). */
const INV_DAILY_REQUIRED=10;   // minimum bilang ng ingredient na dapat masubmit ng staff kada araw
const INV_DAILY_POOL_SIZE=40;  // random na ipinapakita mula sa zone (hindi lahat), kung saan pipili ang staff
const INV_ZONES = ['chiller','dry','freezer','supplies','kitchen'];

function invForcedAuditActive(){
  const fa = cache.settings.inv_forced_audit;
  if(!fa) return false;
  try{ const o=JSON.parse(fa); return o.date===invToday() && o.status==='open'; }catch(e){ return false; }
}
function invCountPostponedToday(){
  const pp = cache.settings.inv_count_postponed;
  if(!pp) return false;
  try{ const o=JSON.parse(pp); return o.date===invToday(); }catch(e){ return false; }
}

// Deterministic-per-day-per-staff random subset, so refreshing the page
// doesn't reshuffle the list mid-count.
function invSeededRandom(seedStr){
  let h=0; for(let i=0;i<seedStr.length;i++){ h=(h*31+seedStr.charCodeAt(i))|0; }
  return function(){ h=(h*1103515245+12345)|0; return ((h>>>0)/4294967295); };
}
function invTodayWeekday(){
  // 0=Sunday ... 4=Thursday ... 6=Saturday, in Asia/Manila time
  return new Date(new Date().toLocaleString('en-US',{timeZone:'Asia/Manila'})).getDay();
}
function invIsoWeekKey(){
  // Linggo key (taon + week number) para sa "twice a week" tracking ng Wings
  const d=new Date(new Date().toLocaleString('en-US',{timeZone:'Asia/Manila'}));
  const onejan=new Date(d.getFullYear(),0,1);
  const week=Math.ceil((((d-onejan)/86400000)+onejan.getDay()+1)/7);
  return d.getFullYear()+'-W'+week;
}
function invWingsCountedThisWeek(staffName){
  const weekKey=invIsoWeekKey();
  return cache.invStaffCounts.filter(c=>{
    if(c.staff_name!==staffName) return false;
    if(!/wings/i.test(c.ingredient_name||'')) return false;
    return true;
  }).filter(c=>{
    try{
      const m=c.counted_at.match(/(\w+)\s+(\d+),\s*(\d{4})/);
      if(!m) return false;
      const dt=new Date(`${m[1]} ${m[2]}, ${m[3]}`);
      const onejan=new Date(dt.getFullYear(),0,1);
      const wk=dt.getFullYear()+'-W'+Math.ceil((((dt-onejan)/86400000)+onejan.getDay()+1)/7);
      return wk===weekKey;
    }catch(e){ return false; }
  }).length;
}
// Ibalik ang BUONG pool ng zone para sa araw na ito (hindi pinuputol sa
// random subset) — ang pagpili ng exact 10 ay gagawin na ng STAFF mismo sa
// UI. Kasama rito kung anong zone ang available ngayong araw, at kung
// kailangan i-force ang Wings.
function invTodayZonePool(){
  const allActive=cache.invIngredients.filter(i=>!i.is_processable && !i.archived && !i.pending_approval);
  if(invForcedAuditActive()) return {zone:null, pool:allActive, forced:true};

  const isThursday = invTodayWeekday()===4;
  const availableZones = INV_ZONES.filter(z=> z!=='freezer' || isThursday);
  const pool0 = allActive.filter(i=> availableZones.includes(i.zone||'dry'));

  const seed=invToday()+'|'+session.name;
  const rng=invSeededRandom(seed);

  const zonesWithStock = availableZones.filter(z=> pool0.some(i=>(i.zone||'dry')===z));
  if(!zonesWithStock.length) return {zone:null, pool:[], forced:false};
  const zoneIdx = Math.floor(rng()*zonesWithStock.length);
  const chosenZone = zonesWithStock[zoneIdx];
  let zonePool = pool0.filter(i=>(i.zone||'dry')===chosenZone);

  // Hindi BUONG zone ang ipinapakita kung malaki — random 40 (seeded, hindi
  // nagbabago habang araw na rin, pero ibang 40 bukas) para hindi sobrang
  // haba ang listahan pero staff pa rin ang pumipili ng REQUIRED na 10 (o
  // higit) mula sa 40 na ito.
  if(zonePool.length>INV_DAILY_POOL_SIZE){
    const shuffled=[...zonePool];
    for(let i=shuffled.length-1;i>0;i--){
      const j=Math.floor(rng()*(i+1));
      [shuffled[i],shuffled[j]]=[shuffled[j],shuffled[i]];
    }
    zonePool=shuffled.slice(0,INV_DAILY_POOL_SIZE);
  }

  // WINGS RULE: kung kulang pa sa 2x this week, isama sa pool kahit ibang
  // zone, para may option ang staff na piliin ito ngayon.
  const wingsIngs = allActive.filter(i=>/^wings$/i.test(i.name||''));
  if(wingsIngs.length && invWingsCountedThisWeek(session.name)<2){
    wingsIngs.forEach(w=>{ if(!zonePool.find(p=>p.id===w.id)) zonePool=[...zonePool, w]; });
  }
  return {zone:chosenZone, pool:zonePool, forced:false};
}
function invAlreadyCountedToday(ingId){
  return cache.invStaffCounts.some(c=> c.ingredient_id===ingId && c.staff_name===session.name && (c.counted_at||'').includes(invToday().slice(0,4)) && invSameDay(c.counted_at));
}
function invSameDay(countedAtText){
  // counted_at is a formatted PH date string; compare against today's date in the same format
  const todayFmt=new Date().toLocaleDateString('en-PH',{month:'short',day:'numeric',year:'numeric',timeZone:'Asia/Manila'});
  return (countedAtText||'').includes(todayFmt);
}

let invExtraPicks=[]; // ingredient ids manually added by staff to today's count, beyond the random assignment

function invZoneLabel(z){
  const labels={chiller:'❄️ Chiller', dry:'📦 Dry Storage', freezer:'🧊 Freezer', supplies:'🧹 Supplies', kitchen:'🍳 Kitchen'};
  return labels[z]||'📦 Dry Storage';
}
function invRenderDailyCount(){
  if(invCountPostponedToday()){
    const pp=JSON.parse(cache.settings.inv_count_postponed);
    return `<div class="warn-box-l">⏸️ Ipinagpaliban ng Owner ang required count ngayong araw${pp.reason?' — '+escapeHtml(pp.reason):''}. Walang kailangang bilangin ngayon.</div>`;
  }
  const forced=invForcedAuditActive();
  const {zone:todayZone, pool:zonePool} = invTodayZonePool();
  const extraIngs = invExtraPicks.map(id=>invGI(id)).filter(Boolean).filter(i=>!zonePool.find(p=>p.id===i.id));
  const pool = [...zonePool, ...extraIngs];
  const remaining = pool.filter(i=>!invAlreadyCountedToday(i.id));
  const todaysCounts=invTodaysOwnCounts();
  const doneToday=todaysCounts.length;

  const todaysCountsHtml = todaysCounts.length ? `
    <div class="section-title">Na-submit mo na ngayong araw</div>
    ${todaysCounts.map(c=>`
      <div class="task-card" style="padding:10px;">
        <div class="line2"><b>${escapeHtml(c.ingredient_name)}</b><span class="hint">${escapeHtml(c.counted_at||'')}</span></div>
        <div class="hint">Nailagay mo: ${c.counted_qty} ${escapeHtml(c.unit||'')}</div>
        ${invRenderFixRequestButton('staff_count', c.id, c.ingredient_name, `${c.counted_qty} ${c.unit||''}`)}
      </div>`).join('')}
  ` : '';

  // Search box para sa BUONG zone list (kasama lahat, hindi pinuputol),
  // para makita ng staff kung anong magkatabi at madaling sabay bilangin.
  const visibleList = invCountListSearch.trim()
    ? remaining.filter(i=>i.name.toLowerCase().includes(invCountListSearch.toLowerCase()))
    : remaining;

  // Picker para sa IBA PANG ingredient na hindi sa zone na ito, hal. kung
  // katabi na nila stock ng ibang zone.
  const alreadyShown = new Set([...pool.map(i=>i.id), ...todaysCounts.map(c=>c.ingredient_id)]);
  const pickableOpts = cache.invIngredients.filter(i=>!i.is_processable && !i.archived && !alreadyShown.has(i.id));
  const extraSearchResults = invExtraPickSearch.trim() ? (()=>{
    const q=invExtraPickSearch.toLowerCase();
    const matches=pickableOpts.filter(i=>i.name.toLowerCase().includes(q)).slice(0,10);
    return matches.length ? matches.map(i=>`<div class="line2" data-extrapick="${i.id}" style="cursor:pointer; padding:6px 0;">${escapeHtml(i.name)} <span class="hint">(${invZoneLabel(i.zone||'dry')})</span></div>`).join('') : '<p class="hint">Walang tugma.</p>';
  })() : '';
  const extraPicker = `
    <div class="task-card" style="padding:10px; margin-top:10px;">
      <div class="hint" style="margin-bottom:6px;">Hindi kasama sa listahan pero gusto mo nang ibilang ngayon (hal. ibang zone pero katabi mo na)?</div>
      <input type="text" id="inv-extra-search" value="${escapeHtml(invExtraPickSearch)}" placeholder="Maghanap ng ingredient...">
      <div id="inv-extra-results" style="max-height:160px; overflow-y:auto; margin-top:6px;">${extraSearchResults}</div>
    </div>`;

  if(!pool.length){
    return `<p class="hint">Walang ingredient na naitala pa. Sabihin sa Owner na mag-setup muna ng Inventory.</p>` + todaysCountsHtml + extraPicker;
  }

  const metRequired = doneToday>=INV_DAILY_REQUIRED && !forced;
  const completedMsg = metRequired ? `<div class="disc-ok-box">✓ Tapos na ang required na count mo ngayong araw (${doneToday}/${INV_DAILY_REQUIRED}). Salamat ${escapeHtml(session.name)}! Pwede ka pa ring magpatuloy kung gusto mo.</div>` : '';
  if(forced && !remaining.length){
    return `<div class="disc-ok-box">✓ Tapos na ang FORCED FULL AUDIT. Salamat ${escapeHtml(session.name)}!</div>${todaysCountsHtml}`;
  }
  if(metRequired && !remaining.length){
    // Naubos na ang 40-item pool pero tapos na ang required — wala nang ipapakitang listahan
    return completedMsg + extraPicker + todaysCountsHtml;
  }

  // RANDOM 40 mula sa zone (hindi BUONG ingredient list) — bawat row may
  // sariling submit. Pagka-submit, nawawala agad ang row (dahil mapupunta na
  // sa "remaining" filter sa susunod na render). Real-time ang pag-post kada
  // submit. Pumili ang staff ng REQUIRED na 10 (o higit) mula rito.
  const rows = visibleList.map(i=>`
    <div class="task-card" style="padding:10px;">
      <div class="line2"><b>${escapeHtml(i.name)}</b><span class="hint">${escapeHtml(i.unit)} · ${invZoneLabel(i.zone||'dry')}</span></div>
      <input type="number" inputmode="decimal" data-rowqty="${i.id}" placeholder="Aktwal na bilang" style="margin-top:6px;">
      <button class="btn-primary btn-small" data-rowsubmit="${i.id}" data-ingname="${escapeHtml(i.name)}" data-ingunit="${escapeHtml(i.unit)}" style="margin-top:6px;">✓ I-submit</button>
    </div>`).join('') || '<p class="hint">Walang tugma sa hanap.</p>';

  return `
    ${completedMsg}
    ${forced?`<div class="warn-box-l">🔍 FORCED FULL AUDIT — sinabi ng Owner na bilangin LAHAT ng ingredient, lahat ng zone, ngayon.</div>`
      :`<div class="warn-box-l">📋 ${todayZone?invZoneLabel(todayZone)+' — ':''}Required: pumili at bilangin ang ${INV_DAILY_REQUIRED} (o higit) ingredient (${doneToday}/${INV_DAILY_REQUIRED} tapos na). Random na ${pool.length} ingredient mula sa zone ang nakalista — pumili ka kung alin ang madali mong bilangin (hal. magkatabi).</div>`}
    <div class="warn-box-l" style="background:var(--paper-deep);">🔒 Blind count: hindi mo makikita ang dapat na balanse. Ilagay lang ang aktwal mong nabilang.</div>
    <input type="text" id="inv-count-list-search" value="${escapeHtml(invCountListSearch)}" placeholder="Maghanap sa listahan..." style="margin-bottom:8px;">
    ${rows}
    ${extraPicker}
    ${todaysCountsHtml}
  `;
}

    const newIngTrigger=document.querySelector('[data-dlnewing]');

    });

    const newIngUnitEl=document.getElementById('dl-newing-unit'); if(newIngUnitEl) newIngUnitEl.addEventListener('change',()=>{ invDeliveryNewIngDraft.unit=newIngUnitEl.value; });

    const newIngConfirmEl=document.getElementById('dl-newing-confirm');
    if(newIngConfirmEl) newIngConfirmEl.addEventListener('click', async ()=>{
      const nd=invDeliveryNewIngDraft;
      if(!nd.name.trim()){ alert('Ilagay ang pangalan ng ingredient.'); return; }
      const closeMatch = invFindCloseIngredientMatch(nd.name.trim());
      if(closeMatch && closeMatch.exact){
        alert(`May ingredient na ganito ang pangalan: "${closeMatch.ingredient.name}". Hanapin sa listahan sa itaas.`);
        return;
      }
      if(closeMatch && !nd.confirmedDifferent){
        const useExisting = confirm(`Halos kapareho ng existing na "${closeMatch.ingredient.name}" ang "${nd.name.trim()}".\n\nOK = gamitin ang existing na "${closeMatch.ingredient.name}"\nCancel = ibang ingredient talaga ito, ituloy ang paggawa ng bago`);

          d.lines.push({ingredient_id:closeMatch.ingredient.id, name:closeMatch.ingredient.name, unit:closeMatch.ingredient.unit, qty:'', price:''});
          invDeliveryNewIngDraft=null; invDeliverySearch='';
          render();
          return;
        }
        // Ibang ingredient talaga ayon sa user — ituloy, huwag na ulit i-check
        nd.confirmedDifferent=true;
      }
      const isOwner = session.role==='owner';
      const newIng={id:invUid(), name:nd.name.trim(), unit:nd.unit, begin_day:0, added:0, deducted:0, unit_cost:0, is_processable:false, yields:[], archived:false, archive_pending:false, is_in_utak:false, is_owner_made:false, zone:nd.zone, pending_approval:!isOwner, requested_by: isOwner?null:session.name, created_by:session.name};

    const saveBtn=document.getElementById('proc-setup-save'); if(saveBtn) saveBtn.addEventListener('click',invSaveProcSetup);
    return; // habang bukas ang proc setup, hindi na kailangan ng ibang bindings
  }

  // Equipment form bindings — aktibo lang kapag bukas
  if(invEqDraft){
    const eq=invEqDraft;
    const back=document.getElementById('eq-back'); if(back) back.addEventListener('click',invCloseEqDraft);
    const nameEl=document.getElementById('eq-name'); if(nameEl) nameEl.addEventListener('input',()=>{ eq.name=nameEl.value; });
    const catSelectEl=document.getElementById('eq-category-select');
    if(catSelectEl) catSelectEl.addEventListener('change',()=>{
      if(catSelectEl.value==='__new__'){ eq.addingNewCategory=true; eq.category=''; }
      else { eq.category=catSelectEl.value; }
      render();
    });
    const catNewEl=document.getElementById('eq-category-new'); if(catNewEl) catNewEl.addEventListener('input',()=>{ eq.category=catNewEl.value; });
    const catCancelNewEl=document.getElementById('eq-category-cancel-new'); if(catCancelNewEl) catCancelNewEl.addEventListener('click',()=>{ eq.addingNewCategory=false; eq.category=''; render(); });

              invRecipeDraft.ingredients=invRecipeDraft.ingredients||[]; invRecipeDraft.ingredients.push(line);
            }

            const vi=parseInt(target.split(':')[1],10);
            const isSr=cache.invSubRecipes.some(s=>s.name===name);
            if(isSr){ const sr=invGSRN(name); invRecipeDraft.variants[vi].sub_recipes=invRecipeDraft.variants[vi].sub_recipes||[]; invRecipeDraft.variants[vi].sub_recipes.push({sr_id:sr.id,name:sr.name,q:qty,u:unit}); }
            else { invRecipeDraft.variants[vi].ingredients=invRecipeDraft.variants[vi].ingredients||[]; invRecipeDraft.variants[vi].ingredients.push(line); }

      await invAuditLog('count_postponed',{by:session.name,reason});
    }
    render();
  });

  // Owner: grant/revoke manager view access to Costing/Processing/Stock
  const mgrAccess=document.getElementById('inv-toggle-mgr-access');

    const cur=cache.settings.inv_manager_can_view_costing==='1';

  document.querySelectorAll('[data-fixreq]').forEach(el=>el.addEventListener('click',()=>{

  document.querySelectorAll('[data-fixapprove]').forEach(el=>el.addEventListener('click',()=>invApproveFixRequest(el.dataset.fixapprove)));
  document.querySelectorAll('[data-fixreject]').forEach(el=>el.addEventListener('click',()=>invRejectFixRequest(el.dataset.fixreject)));
}

async function invSubmitDeliveryDraft(){
  const btn=document.getElementById('inv-delivery-submit');
  if(btn && btn.disabled) return;
  const d=invDeliveryDraft;
  if(!d.supplier.trim()){ alert('Pumili o maglagay ng supplier.'); return; }
  if(!d.lines.length){ alert('Magdagdag ng kahit isang item.'); return; }
  const invalid = d.lines.find(l=>!l.qty || Number(l.qty)<=0);
  if(invalid){ alert(`Ilagay ang qty para sa "${invalid.name}".`); return; }
  if(btn){ btn.disabled=true; btn.textContent='Isinusumite...'; }
  const supplierName=d.supplier.trim();
  const isNewSupplier = d.addingNewSupplier && !invKnownSuppliers().includes(supplierName);
  const isManagerOrOwner = session.role==='owner'||session.role==='manager';
  if(isNewSupplier){
    if(isManagerOrOwner){
      // Manager/Owner ang nagdagdag — direktang pwedeng gamitin agad
      const extra=(cache.settings.inv_extra_suppliers||'').split('|').filter(Boolean);
      if(!extra.includes(supplierName)){ extra.push(supplierName); await saveSetting('inv_extra_suppliers', extra.join('|')); }
    } else {
      // Staff ang nagdagdag — pending approval muna bago maidagdag sa listahan,
      // pero hahayaan munang magpatuloy ang delivery na ito (huwag i-block ang
      // trabaho) — markahan lang ang supplier name na "pending" sa entry mismo.
      const pending=(cache.settings.inv_pending_suppliers||'').split('|').filter(Boolean);
      if(!pending.includes(supplierName)){ pending.push(supplierName); await saveSetting('inv_pending_suppliers', pending.join('|')); }
      await invAuditLog('supplier_pending_approval',{supplier:supplierName,requestedBy:session.name,reason:'Bagong supplier mula sa delivery form, hinihintay aprubahan ng Manager/Owner'});
    }
  }
  for(const l of d.lines){
    const ing=invGI(l.ingredient_id);
    const e={
      id:invUid(), ingredient_id:l.ingredient_id, ingredient_name:l.name, qty:parseFloat(l.qty), unit:l.unit,
      supplier:supplierName, date:d.date, price: l.price?parseFloat(l.price):null, notes: isNewSupplier&&!isManagerOrOwner?'⚠️ Bagong supplier, hinihintay aprubahan':null,
      needs_processing: !!(ing&&ing.is_processable), submitted_by: session.name, submitted_at: invNow(),
      status:'pending', approved_by:null, processed_entry_id:null
    };
    cache.invStockEntries.unshift(e);
    await sb.from('inv_stock_entries').insert(e);
  }
  await invAuditLog('delivery_submitted',{supplier:supplierName,date:d.date,itemCount:d.lines.length,reason:'Multi-line delivery form'});
  invCloseDeliveryDraft();
}

async function invApproveStock(id){
  const e=cache.invStockEntries.find(x=>x.id===id); if(!e) return;
  // Una, kunin kung may inedit ang owner/manager sa qty bago aprubahan —
  // pwedeng nagkamali lang ng type ang staff (hal. 24 sa 244), kaya dapat
  // hindi kailangang i-reject nang buo, pwedeng i-tama lang at aprubahan.
  const qtyInput=document.querySelector(`[data-invqtyedit="${id}"]`);
  if(qtyInput && qtyInput.value && parseFloat(qtyInput.value)>0){ e.qty=parseFloat(qtyInput.value); }
  const priceInput=document.querySelector(`[data-invprice="${id}"]`);
  // Kunin ang presyo mula sa input field KUNG ipinapakita ito (walang price
  // pa noong i-submit), o mula sa e.price MISMO kung galing na ito sa bagong
  // multi-line delivery form (may presyo na agad noong i-submit). Dati,
  // nababalewala ang unit_cost recompute kung wala nang separate input dahil
  // may presyo na — kaya hindi na-update ang unit_cost kahit may totoong
  // delivery price na (ito ang naging dahilan ng maling costing, hal. Wings
  // na nagpapakita ng ₱85/pc gayong ₱2,625/244pcs = ₱10.76/pc lang dapat).
  const priceVal = (priceInput && priceInput.value) ? parseFloat(priceInput.value) : (e.price!=null ? Number(e.price) : null);
  if(priceVal!=null && priceVal>0){
    const price=priceVal;
    const ing=invGIN(e.ingredient_name);
    // I-normalise ang qty sa canonical unit ng ingredient para tama ang
    // unit_cost — hal. kung nag-deliver ng 0.9 kg pero ang base unit ng
    // ingredient ay 'g', dapat 900g ang gamitin sa computation, hindi 0.9.
    let normQty = e.qty;
    const delUnit = (e.unit||'').toLowerCase();
    const ingUnit = (ing?.unit||'').toLowerCase();
    if(delUnit==='kg' && ingUnit==='g')  normQty = e.qty * 1000;
    if(delUnit==='g'  && ingUnit==='kg') normQty = e.qty / 1000;
    if(delUnit==='l'  && ingUnit==='ml') normQty = e.qty * 1000;
    if(delUnit==='ml' && ingUnit==='l')  normQty = e.qty / 1000;
    const uc = price / normQty;
    const prevCost=ing?Number(ing.unit_cost||0):0;
    const spRow={id:invUid(),ingredient_name:e.ingredient_name,purchase_price:price,purchase_qty:e.qty,unit:e.unit,unit_cost:uc,prev_cost:prevCost,delta:prevCost>0?uc-prevCost:null,supplier:e.supplier,date:e.date,by_name:session.name};
    cache.invSupplierPrices.unshift(spRow);
    await sb.from('inv_supplier_prices').insert(spRow);
    if(ing){ ing.unit_cost=uc; await invSaveIngredient(ing); }
    e.price=price;
  }
  if(!e.needs_processing){
    const ing=invGIN(e.ingredient_name);
    if(ing){ let q=e.qty; if(e.unit==='kg') q*=1000; ing.added=Number(ing.added||0)+q; await invSaveIngredient(ing); }
  }
  e.status='approved'; e.approved_by=session.name;
  await sb.from('inv_stock_entries').update({status:'approved',approved_by:session.name,price:e.price,qty:e.qty}).eq('id',id);
  await invAuditLog('stock_approved',{ingredient:e.ingredient_name,qty:e.qty,unit:e.unit,priceUsed:priceVal,newUnitCost:priceVal?priceVal/e.qty:null});
  render();
}
async function invRejectStock(id){
  const e=cache.invStockEntries.find(x=>x.id===id); if(!e) return;
  e.status='rejected'; e.approved_by=session.name;
  await sb.from('inv_stock_entries').update({status:'rejected',approved_by:session.name}).eq('id',id);
  await invAuditLog('stock_rejected',{ingredient:e.ingredient_name});

/* ---------- Processing / yield ---------- */
// STANDALONE TRIGGER — pagprocesong hindi galing sa delivery record, direktang
// ibabawas sa kasalukuyang raw balance ang qty na iproproseso.
function invStartProcessing(ingId){
  const ing=invGI(ingId); if(!ing) return;
  const bal=invBal(ing);
  const rawQty=prompt(`${ing.name}: ${bal} ${ing.unit} available\n\nIlang ${ing.unit} ang iproproseso ngayon?`);
  if(rawQty===null||!parseFloat(rawQty)) return;
  const inQty=parseFloat(rawQty);
  if(inQty>bal && !confirm(`Mas malaki ang ${inQty}${ing.unit} kaysa sa available na ${bal}${ing.unit}. Ituloy?`)) return;
  const yields=ing.yields||[];
  const avgY=yields.length?yields.reduce((s,y)=>s+y.pct,0)/yields.length:null;
  const msg=avgY!=null?`Average yield ngayon: ${avgY.toFixed(1)}% (${yields.length} batch)`:'Unang batch — magiging baseline.';
  const outQty=prompt(`${msg}\n\nIlang output (${ing.output_unit||'pcs'}) ang nakuha?`);
  if(outQty===null||!parseFloat(outQty)) return;
  let inG=inQty; if(ing.unit==='kg') inG*=1000;
  const yp = inG>0 ? parseFloat(outQty)/inG*100 : 0;
  const deviation = avgY!=null ? yp-avgY : null;
  // Ibawas agad sa RAW balance ngayon (hindi naghihintay ng delivery record)
  ing.deducted = Number(ing.deducted||0) + inQty;
  invSaveIngredient(ing);
  const e={
    id:invUid(), stock_entry_id:null, ingredient_name:ing.name, in_qty:inQty, in_unit:ing.unit,
    out_qty:parseFloat(outQty), out_unit: ing.output_unit||'pcs', output_ingredient_name: ing.output_name||ing.name,
    yield_pct:yp, avg_at_time:avgY, deviation, notes:'Standalone processing (walang kaugnay na delivery)', submitted_by:session.name, submitted_at:invNow(), status:'pending'
  };
  cache.invProcessedEntries.unshift(e);
  sb.from('inv_processed_entries').insert(e).then(({error})=>{ if(error) console.error(error); });
  ing.yields=ing.yields||[]; ing.yields.push({date:invToday(),pct:yp,at:e.submitted_at,by:session.name});
  invSaveIngredient(ing);
  invAuditLog('processing_started',{ingredient:ing.name,inQty,outQty:parseFloat(outQty),yieldPct:yp,reason:'Standalone trigger'});
  alert(`Yield: ${yp.toFixed(1)}%. Isusumite para sa owner approval.`);
  render();
}
function invOpenProcessForm(stockId){
  const se=cache.invStockEntries.find(x=>x.id===stockId); if(!se) return;
  const ing=invGIN(se.ingredient_name);
  const yields=ing?.yields||[];
  const avgY=yields.length?yields.reduce((s,y)=>s+y.pct,0)/yields.length:null;
  const msg=avgY!=null?`Average yield ngayon: ${avgY.toFixed(1)}% (${yields.length} batch)`:'Unang batch — magiging baseline.';
  const outQty=prompt(`${se.ingredient_name}: ${se.qty}${se.unit}\n${msg}\n\nIlang output (${ing?.output_unit||'pcs'})?`);
  if(outQty===null||!parseFloat(outQty)) return;
  let inG=se.qty; if(se.unit==='kg') inG*=1000;
  const yp = inG>0 ? parseFloat(outQty)/inG*100 : 0;
  const deviation = avgY!=null ? yp-avgY : null;
  const e={
    id:invUid(), stock_entry_id:se.id, ingredient_name:se.ingredient_name, in_qty:se.qty, in_unit:se.unit,
    out_qty:parseFloat(outQty), out_unit: ing?.output_unit||'pcs', output_ingredient_name: ing?.output_name||se.ingredient_name,
    yield_pct:yp, avg_at_time:avgY, deviation, notes:null, submitted_by:session.name, submitted_at:invNow(), status:'pending'
  };
  cache.invProcessedEntries.unshift(e);
  sb.from('inv_processed_entries').insert(e).then(({error})=>{ if(error) console.error(error); });
  if(ing){ ing.yields=ing.yields||[]; ing.yields.push({date:invToday(),pct:yp,at:e.submitted_at,by:session.name}); invSaveIngredient(ing); }
  se.processed_entry_id=e.id;
  sb.from('inv_stock_entries').update({processed_entry_id:e.id}).eq('id',se.id);
  alert(`Yield: ${yp.toFixed(1)}%. Isusumite para sa owner approval.`);
  render();
}
async function invApproveProcess(id){
  const e=cache.invProcessedEntries.find(x=>x.id===id); if(!e) return;
  // Kunin kung may inedit ang owner sa output qty (hal. nagkamali ng type ang
  // staff) — itama bago ipasok sa stock at i-recompute ang yield%.
  const outQtyInput=document.querySelector(`[data-procoutedit="${id}"]`);
  if(outQtyInput && outQtyInput.value && parseFloat(outQtyInput.value)>0){
    e.out_qty=parseFloat(outQtyInput.value);
    let inG=Number(e.in_qty); if((e.in_unit||'g')==='kg') inG*=1000;
    e.yield_pct = inG>0 ? (e.out_qty/inG*100) : e.yield_pct;
    if(e.avg_at_time!=null) e.deviation = e.yield_pct - e.avg_at_time;
  }
  const out=invGIN(e.output_ingredient_name);
  const rawIng=invGIN(e.ingredient_name);
  if(out){
    out.added=Number(out.added||0)+Number(e.out_qty);
    // I-COMPUTE ang TOTOONG unit cost ng OUTPUT base sa RAW cost at yield —
    // hindi puwedeng manatili sa lumang/seed value habang dumadaan ang totoong
    // delivery price sa raw ingredient. Halimbawa: Raw Wings ₱10.76/g (mula sa
    // totoong delivery), 40% yield → Wings dapat ₱10.76 / 0.40 = ₱26.90/pc bawat
    // gramo na naproseso, hatiin sa bilang ng output para makuha ang per-unit cost.
    if(rawIng && rawIng.unit_cost!=null && e.in_qty>0 && e.out_qty>0){
      let inQtyBase=Number(e.in_qty);
      if((e.in_unit||rawIng.unit)==='kg') inQtyBase*=1000; // pare-pareho sa gramo kung kg ang ipinasok
      const totalRawCost = inQtyBase * Number(rawIng.unit_cost||0);
      const newOutUnitCost = totalRawCost / Number(e.out_qty);
      out.unit_cost = newOutUnitCost;
    }
    await invSaveIngredient(out);
  }
  e.status='approved'; e.approved_by=session.name;
  await sb.from('inv_processed_entries').update({status:'approved',approved_by:session.name,out_qty:e.out_qty,yield_pct:e.yield_pct,deviation:e.deviation}).eq('id',id);
  await invAuditLog('process_approved',{ingredient:e.ingredient_name,outputIngredient:e.output_ingredient_name,outQty:e.out_qty,yieldPct:e.yield_pct,newOutputUnitCost:out?out.unit_cost:null});
  render();
}
async function invRejectProcess(id){
  const e=cache.invProcessedEntries.find(x=>x.id===id); if(!e) return;
  e.status='rejected'; e.approved_by=session.name;
  await sb.from('inv_processed_entries').update({status:'rejected',approved_by:session.name}).eq('id',id);
  await invAuditLog('process_rejected',{ingredient:e.ingredient_name});
  render();
}

  const d=invRecipeDraft;
  if(!d.name || !d.name.trim()){ alert('Kailangan ng pangalan.'); return; }

  const price=priceEl&&priceEl.value?parseFloat(priceEl.value):null;
  let supplier=supEl?.value||'';
  if(supplier==='__new__'){
    const newSup=prompt('Pangalan ng bagong supplier:');

    supplier=newSup.trim();
    const extra=(cache.settings.inv_extra_suppliers||'').split('|').filter(Boolean);
