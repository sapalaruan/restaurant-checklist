function invAlerts(){
  const a=[];
  cache.invIngredients.forEach(i=>{ if(invBal(i)<0) a.push({t:'flag',m:`${i.name}: balance ${invBal(i)} ${i.unit}`}); });
  const ps=cache.invStockEntries.filter(e=>e.status==='pending').length;
  const up=cache.invStockEntries.filter(e=>e.status==='approved'&&e.needs_processing&&!e.processed_entry_id).length;
  const pp=cache.invProcessedEntries.filter(e=>e.status==='pending').length;
  const pe=cache.invEquipment.filter(e=>e.pending_approval).length;
  const pf=invPendingFixRequests().length;
  const omr=cache.invOwnerMadeRequests.filter(r=>r.status==='requested').length;
  const omd=cache.invOwnerMadeRequests.filter(r=>r.status==='done').length;
  const ump=invUnmappedPosKeys().length;
  if(ps) a.push({t:'warn',m:`${ps} delivery na hinihintay i-approve`});
  if(up) a.push({t:'warn',m:`${up} item kailangan i-proseso (yield)`});
  if(pp) a.push({t:'warn',m:`${pp} yield na hinihintay aprubahan ng owner`});
  if(pe) a.push({t:'warn',m:`${pe} equipment na hinihintay i-approve`});
  if(pf) a.push({t:'warn',m:`${pf} fix request na hinihintay aprubahan`});
  if(omr) a.push({t:'warn',m:`${omr} reorder request na hinihintay gawin ng owner`});
  if(omd) a.push({t:'warn',m:`${omd} reorder na tapos — kailangan i-log ang natapos`});
  if(ump) a.push({t:'warn',m:`${ump} naibentang item na walang recipe (hindi pa nababawas sa stock)`});
  return a;
}

function renderInventory(){
  if(!session) return '';
  if(!inventoryModuleLoaded) return '<div class="screen"><p class="hint" style="text-align:center; margin-top:40px;">⏳ Naglo-load ang Inventory...</p></div>';
  const role=session.role;
  const isOwner=role==='owner';
  const isStaff=role==='staff';
  const back=`<button class="btn-ghost btn-small" data-go="select" style="margin-bottom:12px;">← Mga Module</button>`;

  // Recipe editor (menu item o sub-recipe) — kinukuha ang BUONG screen habang
  // bukas, para hindi malito sa tabs habang ginagawa ang recipe.
  if(invEditType && invRecipeDraft && isOwner){
    return `<div class="screen">${invRenderRecipeEditor()}</div>`;
  }

  // Multi-line delivery draft — kinukuha rin ang buong screen, lahat ng role
  // pwedeng gumawa nito (staff, manager, owner).
  if(invDeliveryDraft){
    return `<div class="screen">${invRenderDeliveryDraft()}</div>`;
  }

  // Processable setup — pagpili ng OUTPUT ingredient mula sa UTAK list
  // (hindi free-text) kapag may i-mark na processable.
  if(invProcSetupDraft){
    return `<div class="screen">${invRenderProcSetup()}</div>`;
  }

  // Equipment form — full-screen, hindi na prompt-chain
  if(invEqDraft){
    return `<div class="screen">${invRenderEqDraft()}</div>`;
  }

  const managerCanViewCosting = cache.settings.inv_manager_can_view_costing === '1';

  // Lahat ng tabs. 'count' ay para lang sa STAFF (daily required blind count).
  // Stock/Costing = OWNER lang (maliban kung binigyan ng access ang manager).
  // Delivery/Processing/Order/Equipment = lahat pwede gumawa (operational), pero
  // ang mismong NUMBERS sa loob (yield deviation, cost) ay nakatago sa di-owner.
  const tabsAll=[
    {k:'count',l:'Daily Count', staffOk:true, managerOk:false, ownerOk:false},
    {k:'stock',l:'Stock', staffOk:false, managerOk:false, ownerOk:true},
    {k:'counts',l:'Mga Count', staffOk:false, managerOk:false, ownerOk:true},
    {k:'incoming',l:'Delivery', staffOk:true, managerOk:true, ownerOk:true},
    {k:'processing',l:'Proseso', staffOk:true, managerOk:true, ownerOk:true},
    {k:'costing',l:'Costing', staffOk:false, managerOk:false, ownerOk:true},
    {k:'sales',l:'Sales Sync', staffOk:false, managerOk:false, ownerOk:true},
    {k:'order',l:'Order', staffOk:true, managerOk:true, ownerOk:true},
    {k:'equipment',l:'Equipment', staffOk:true, managerOk:true, ownerOk:true},
    {k:'discrepancy',l:'⚠️ Discrepancy/Incident', staffOk:false, managerOk:false, ownerOk:true},
    {k:'audit',l:'Log', staffOk:false, managerOk:false, ownerOk:true},
    {k:'settings',l:'⚙️ Settings', staffOk:false, managerOk:false, ownerOk:true}
  ];
  const tabs = tabsAll.filter(t=>{
    if(isOwner) return t.ownerOk;
    if(role==='manager') return t.managerOk || (managerCanViewCosting && (t.k==='stock'||t.k==='processing'||t.k==='costing'||t.k==='audit'));
    if(isStaff) return t.staffOk;
    return false;
  });

  if(!tabs.find(t=>t.k===invTab)) invTab=tabs[0]?.k || 'count';

  const tabRow=`<div class="btn-row" style="overflow-x:auto; flex-wrap:nowrap; padding-bottom:4px;">${tabs.map(t=>`<button class="btn-small ${invTab===t.k?'btn-primary':'btn-ghost'}" data-invtab="${t.k}" style="white-space:nowrap;">${t.l}</button>`).join('')}</div>`;
  const gateNote = !isOwner ? `<p class="hint">🔒 Costing at Stock balance: Owner lang ang makakakita. ${managerCanViewCosting?'(Binigyan ka ng owner ng pansamantalang access.)':''}</p>` : '';

  let body='';
  if(invTab==='count') body=invRenderDailyCount();
  else if(invTab==='stock') body=invRenderStock(role);
  else if(invTab==='counts') body=invRenderCountsManagement(role);
  else if(invTab==='incoming') body=invRenderIncoming(role);
  else if(invTab==='processing') body=invRenderProcessing(role);
  else if(invTab==='costing') body=invRenderCosting(role);
  else if(invTab==='sales') body=invRenderSalesSync(role);
  else if(invTab==='order') body=invRenderOrder(role);
  else if(invTab==='equipment') body=invRenderEquipment(role);
  else if(invTab==='audit') body=invRenderAudit(role);
  else if(invTab==='settings') body=invRenderInvSettings(role);
  else if(invTab==='discrepancy') body=invRenderDiscrepancyLog(role);

  const alerts = isOwner ? invAlerts() : [];
  const alertsHtml=alerts.map(a=>`<div class="warn-box-l" style="margin-bottom:6px;">${a.m}</div>`).join('');

  // OWNER: fix request queue lang dito — inilipat na ang manager access toggle,
  // required count postpone, at forced audit sa SETTINGS tab (⚙️) para hindi
  // sila aksidenteng makaclick habang nasa Daily Count screen.
  const pendingFixCount = invPendingFixRequests().length;
  const ownerControls = isOwner ? `
    ${pendingFixCount?`<div class="section-title">🛠 Fix Requests (${pendingFixCount})</div>${invRenderFixQueue()}`:''}
  ` : '';

  return `<div class="screen">${back}${ownerControls}${gateNote}${alertsHtml}${tabRow}${body}</div>`;
}

/* ----- STOCK TAB (with PROCESSABLE toggle button) ----- */
function invRenderStock(role){
  const isOwner=role==='owner';
  if(invIngEditDraft) return invRenderIngEditForm();
  const active=cache.invIngredients.filter(i=>!i.archived);
  const totalVal=active.reduce((s,i)=>s+Math.max(0,invBal(i))*Number(i.unit_cost||0),0);
  const sorted=[...active, ...cache.invIngredients.filter(i=>i.archived)];
  const rows=sorted.map(i=>{
    const bal=invBal(i); const neg=bal<0;
    const yields=i.yields||[];
    const avgY=yields.length ? yields.reduce((s,y)=>s+y.pct,0)/yields.length : null;
    // I-CHECK kung may supplier price history na hindi tugma sa kasalukuyang
    // unit_cost — nangyayari ito kapag may delivery na na-approve BAGO pa
    // ma-deploy ang costing fix, kaya natigil sa lumang/seed value ang
    // unit_cost. Ipakita ang resync button kung may pagkakaiba.
    const latestPrice = cache.invSupplierPrices.find(p=>p.ingredient_name===i.name);
    const priceMismatch = latestPrice && Math.abs(Number(latestPrice.unit_cost) - Number(i.unit_cost||0)) > 0.001;
    return `<div class="task-card" style="padding:10px; ${i.archived?'opacity:0.55;':''}">
      <div class="line2"><b>${escapeHtml(i.name)}</b>${i.archived?'<span class="cc-badge pending">Archived</span>':`<span style="${neg?'color:var(--very-high);':''}">${bal} ${escapeHtml(i.unit)}</span>`}</div>
      <div class="hint" style="margin:2px 0;">${invZoneLabel(i.zone||'dry')} · ₱${Number(i.unit_cost||0).toFixed(4)}/${escapeHtml(i.unit)}${avgY!=null?` · avg yield ${avgY.toFixed(1)}% (${yields.length}×)`:''}</div>
      ${priceMismatch?`<div class="hint" style="color:var(--very-high);">⚠️ Hindi tugma sa huling delivery price (₱${Number(latestPrice.unit_cost).toFixed(4)}/${escapeHtml(i.unit)})</div>`:''}

        <button class="btn-small ${i.is_processable?'btn-primary':'btn-ghost'}" data-invproc="${i.id}">${i.is_processable?'⚗️ Processable':'○ Raw'}</button>
        ${isOwner?`<button class="btn-ghost btn-small" data-invedit="${i.id}">Edit</button>`:''}
        ${isOwner&&priceMismatch?`<button class="btn-small" style="background:var(--very-high);border-color:var(--very-high);color:#fff;" data-invresyncprice="${i.id}">🔄 I-resync ang Presyo</button>`:''}
        <button class="btn-ghost btn-small" data-invlog="${i.name}">Log</button>
        ${isOwner&&i.archived?`<button class="btn-ghost btn-small" data-invunarchive="${i.id}">↩ I-restore</button>`:''}
      </div>
    </div>`;
  }).join('');
  return `
    <button class="btn-ghost btn-block" id="inv-export-stock">⬇️ I-download bilang CSV</button>
    <div class="line2" style="font-weight:700;"><span>${active.length} ingredients</span><span>₱${totalVal.toLocaleString('en-PH',{minimumFractionDigits:2,maximumFractionDigits:2})} value</span></div>
    <input type="text" id="inv-search" placeholder="Maghanap ng ingredient..." style="margin:10px 0;">
    <div id="inv-stock-rows">${rows}</div>
    <button class="btn-primary btn-block" data-action="inv-add-ing" style="margin-top:10px;">+ Idagdag ang Ingredient</button>
  `;
}

      <div class="hint">${e.date} · ni ${escapeHtml(e.approved_by||'')}</div>

    ` : `<div class="hint">${e.qty} ${escapeHtml(e.unit)} · ${e.date} · ni ${escapeHtml(e.approved_by||'')}</div>`}
    ${invRenderFixRequestButton('stock_entry', e.id, e.ingredient_name, `${e.qty} ${e.unit}`)}
  </div>`).join('');

  // Archive: kung hindi na need i-reorder ang isang ingredient. Staff/Manager
  // humihingi, Owner nag-aaprubahan (o pwedeng direkta na lang i-archive ang owner).
  const archivePendingItems = cache.invIngredients.filter(i=>i.archive_pending && !i.archived);
  const archiveQueueHtml = isOwner && archivePendingItems.length ? `
    <div class="section-title">📦 Hiling na i-archive (${archivePendingItems.length})</div>
    ${archivePendingItems.map(i=>`
      <div class="task-card" style="padding:10px; border-color:var(--medium);">
        <div class="line2"><b>${escapeHtml(i.name)}</b><span class="cc-badge pending">Hiling</span></div>
        <div class="hint">Hiniling ni: ${escapeHtml(i.archive_requested_by||'')}</div>
        <div class="btn-row" style="margin-top:6px;">
          <button class="btn-small" style="background:var(--done);border-color:var(--done);color:#fff;" data-archapprove="${i.id}">✓ I-archive</button>
          <button class="btn-small" style="background:var(--very-high);border-color:var(--very-high);color:#fff;" data-archreject="${i.id}">✗ Tanggihan</button>
        </div>
      </div>`).join('')}
  ` : '';

  const archivableOpts = cache.invIngredients.filter(i=>!i.archived && !i.archive_pending);
  const archiveRequestHtml = `
    <div class="task-card" style="padding:10px; margin-top:10px;">
      <div class="hint" style="margin-bottom:6px;">Hindi na ba kailangan i-reorder ang isang ingredient? (hal. tinanggal na sa menu)</div>
      <select id="inv-archive-pick" style="margin-bottom:6px;">
        <option value="">— Pumili ng ingredient —</option>
        ${archivableOpts.map(i=>`<option value="${i.id}">${escapeHtml(i.name)}</option>`).join('')}
      </select>
      <button class="btn-ghost btn-block" id="inv-archive-request">${isOwner?'📦 I-archive Agad':'📦 Humiling na I-archive'}</button>
    </div>`;

  return `
    <button class="btn-primary btn-block" data-action="inv-add-stock">+ Bagong Delivery</button>
    ${isOwner?'<button class="btn-ghost btn-block" id="inv-export-delivery" style="margin-top:6px;">⬇️ I-download bilang CSV</button>':''}
    ${orphanHtml}
    <div class="section-title">Pending (${pend.length})</div>${pHtml}
    <div class="section-title">Kasunod na na-approve</div>${aHtml||'<p class="hint">Wala pa.</p>'}
    ${archiveQueueHtml}
    ${archiveRequestHtml}
  `;
}

/* ----- PROCESSING TAB (yield, owner-only discrepancy view) ----- */
function invRenderProcessing(role){
  const isOwner=role==='owner';
  const unprocessed=cache.invStockEntries.filter(e=>e.status==='approved'&&e.needs_processing&&!e.processed_entry_id);
  const pend=cache.invProcessedEntries.filter(e=>e.status==='pending');
  // OUTPUT PENDING — proseso na sinimulan na pero hindi pa naisubmit ang
  // output (hal. kinabukasan pa matatapos). Nasa SCREEN agad ito bilang
  // paalala, hindi popup, para hindi nakakairita at laging makikita.
  const outputPending=cache.invProcessedEntries.filter(e=>e.status==='output_pending');
  const outputPendingHtml = outputPending.length ? `
    <div class="warn-box-l" style="margin-bottom:10px;">⏳ <b>May ${outputPending.length} proseso na hinihintay pa ang output</b> — ilagay kapag tapos na.</div>
    ${outputPending.map(e=>`
      <div class="task-card" style="padding:10px; border-color:var(--medium);">
        <div class="line2"><b>${escapeHtml(e.ingredient_name)} → ${escapeHtml(e.output_ingredient_name)}</b><span class="cc-badge pending">Hinihintay Output</span></div>
        <div class="hint">${e.in_qty} ${escapeHtml(e.in_unit||'')} sinimulan noong ${escapeHtml(e.submitted_at||'')} ni ${escapeHtml(e.submitted_by||'')}</div>
        ${invLogOutputDraft && invLogOutputDraft.entryId===e.id ? `
          <div class="field-label" style="margin-top:6px;">Ilang output (${escapeHtml(e.out_unit)}) ang nakuha?</div>
          <input type="number" step="0.01" id="logoutput-qty" placeholder="hal. 38" autofocus>
          <div class="btn-row" style="margin-top:6px;">
            <button class="btn-primary btn-small" id="logoutput-confirm">✓ I-save ang Output</button>
            <button class="btn-ghost btn-small" id="logoutput-cancel">Kanselahin</button>
          </div>
        ` : `<button class="btn-primary btn-small" data-logoutputopen="${e.id}" style="margin-top:6px;">📝 Ilagay ang Output</button>`}
      </div>`).join('')}
  ` : '';
  const uHtml=unprocessed.length?unprocessed.map(e=>`
    <div class="task-card" style="padding:10px; border-color:var(--medium);">
      <div class="line2"><b>${escapeHtml(e.ingredient_name)}</b><span class="cc-badge flag">Need yield</span></div>
      <div class="hint">${e.qty} ${escapeHtml(e.unit)} natanggap noong ${e.date}</div>
      <button class="btn-primary btn-small" data-invprocess="${e.id}" style="margin-top:6px;">Ilagay ang Yield</button>
    </div>`).join(''):'<p class="hint">Walang naghihintay na proseso mula sa delivery.</p>';
  const pHtml=pend.length?pend.map(e=>{
    const ing=invGIN(e.ingredient_name);
    const prevYields=(ing?.yields||[]).filter(y=>y.at!==e.submitted_at);
    const avgPrev=prevYields.length?prevYields.reduce((s,y)=>s+y.pct,0)/prevYields.length:null;
    const bigDev = e.deviation!=null && Math.abs(e.deviation)>15;
    // Discrepancy / deviation shown ONLY to owner
    const ownerBlock = isOwner ? `
      <div class="denom-grid" style="grid-template-columns:1fr; margin:6px 0;">
        <div class="line2" style="font-weight:700;"><span>Yield</span><span style="${bigDev?'color:var(--very-high);':''}">${Number(e.yield_pct||0).toFixed(1)}%</span></div>
        ${avgPrev!=null?`<div class="hint">vs average ${avgPrev.toFixed(1)}% · ${e.deviation>0?'▲+':'▼'}${Math.abs(e.deviation||0).toFixed(1)}%</div>`:'<div class="hint">Unang batch — magiging baseline ito.</div>'}
        ${bigDev?'<div class="hint" style="color:var(--very-high); font-weight:700;">⚠️ Malaking pagkakaiba — i-verify sa staff bago aprubahan.</div>':''}
      </div>
      <div style="display:grid; grid-template-columns:1fr 1fr; gap:8px;">
        <div>
          <div class="field-label">Input qty (${escapeHtml(e.in_unit||'')}) — pwedeng itama</div>
          <input type="number" step="0.01" value="${e.in_qty}" data-procinedit="${e.id}">
        </div>
        <div>
          <div class="field-label">Output qty (${escapeHtml(e.out_unit)}) — pwedeng itama</div>
          <input type="number" step="0.01" value="${e.out_qty}" data-procoutedit="${e.id}">
        </div>
      </div>
      <div class="btn-row" style="margin-top:6px;">
        <button class="btn-small" style="background:var(--done);border-color:var(--done);color:#fff;" data-invprocapprove="${e.id}">✓ Aprubahan</button>
        <button class="btn-small" style="background:var(--very-high);border-color:var(--very-high);color:#fff;" data-invprocreject="${e.id}">✗ Tanggihan</button>
      </div>` : `<div class="hint">Hinihintay aprubahan ng owner.</div>`;
    return `<div class="task-card" style="padding:10px; border-color:${bigDev&&isOwner?'var(--very-high)':'var(--medium)'};">
      <div class="line2"><b>${escapeHtml(e.ingredient_name)} → ${escapeHtml(e.output_ingredient_name)}</b><span class="cc-badge pending">Pending</span></div>
      <div class="hint">${e.in_qty} ${escapeHtml(e.in_unit||'')} → ${e.out_qty} ${escapeHtml(e.out_unit)} · ni ${escapeHtml(e.submitted_by||'')}</div>
      ${ownerBlock}
    </div>`;
  }).join(''):'<p class="hint">Walang pending na yield.</p>';

  // STANDALONE TRIGGER — talahanayan ng LAHAT ng processable raw ingredient
  // (hindi lang yung galing sa delivery), para may maclick anumang oras.
  // May SEARCH na ngayon para madaling makapili ang staff kahit mahaba ang
  // listahan, hindi na kailangang mag-scroll nang manual.
  const processableAll = cache.invIngredients.filter(i=>i.is_processable && !i.archived);
  const ptq = invProcTriggerSearch.trim().toLowerCase();
  const processable = ptq ? processableAll.filter(i=>invIngredientMatchesQuery(i,ptq)) : processableAll;
  const procRows = processable.length ? processable.map(i=>{
    const bal=invBal(i);
    return `<div class="line2" style="padding:6px 0; border-bottom:1px solid var(--line);">
      <span>${escapeHtml(i.name)} <span class="hint">(${bal} ${escapeHtml(i.unit)} available)</span></span>
      <button class="btn-primary btn-small" data-invstartproc="${i.id}">⚗️ Iproseso</button>
    </div>`;
  }).join('') : (processableAll.length ? '<p class="hint">Walang tugma sa search.</p>' : '<p class="hint">Walang processable ingredient pa.</p>');
  const startProcFormHtml = invStartProcDraft ? (()=>{
    const ing=invGI(invStartProcDraft.ingId); if(!ing) return '';
    const bal=invBal(ing);
    const yields=ing.yields||[];
    const avgY=yields.length?yields.reduce((s,y)=>s+y.pct,0)/yields.length:null;
    return `
    <div class="task-card" style="padding:12px; border-color:var(--medium); margin-bottom:10px;">
      <div class="line2"><b>⚗️ Iproseso: ${escapeHtml(ing.name)}</b></div>
      <div class="hint">${bal} ${escapeHtml(ing.unit)} available${avgY!=null?` · Average yield: ${avgY.toFixed(1)}% (${yields.length} batch)`:''}</div>
      <div class="field-label" style="margin-top:8px;">Ilang ${escapeHtml(ing.unit)} ang iproproseso ngayon?</div>
      <input type="number" step="0.01" id="startproc-inqty" placeholder="hal. 5000" autofocus>
      <div class="field-label" style="margin-top:8px;">Ilang output (${escapeHtml(ing.output_unit||'pcs')}) ang nakuha? (opsyonal — pwedeng iwanang blangko kung hindi pa tapos, hal. kinabukasan pa)</div>
      <input type="number" step="0.01" id="startproc-outqty" placeholder="iwanang blangko kung hindi pa alam">
      <div class="btn-row" style="margin-top:8px;">
        <button class="btn-primary btn-small" id="startproc-confirm">✓ Isumite</button>
        <button class="btn-ghost btn-small" id="startproc-cancel">Kanselahin</button>
      </div>
    </div>`;
  })() : '';
  const procTriggerSearchBox = processableAll.length>5 ? `<input type="text" id="inv-proctrigger-search" value="${escapeHtml(invProcTriggerSearch)}" placeholder="🔍 Maghanap ng ingredient na iproproseso..." style="margin-bottom:6px;">` : '';

  // Add-new-processable picker — BUKAS NA SA LAHAT (staff/manager/owner),
  // search mula sa existing list (hindi free-text). Kung wala talaga sa
  // listahan, may "+ bagong ingredient" option na rin, parehong approval-
  // gated pattern gaya ng Delivery — staff request → pending → owner
  // approve/edit/reject.
  const addProcResults = invAddProcSearch.trim() ? (()=>{
    const q=invAddProcSearch.toLowerCase();
    const matches=cache.invIngredients.filter(i=>!i.archived && !i.is_processable && !i.pending_approval && invIngredientMatchesQuery(i,q)).slice(0,8);
    const matchRows = matches.map(i=>`<div class="line2" data-addprocpick="${i.id}" style="cursor:pointer; padding:6px 0;">${escapeHtml(i.name)} <span class="hint">(${escapeHtml(i.unit)})</span></div>`).join('');
    return matchRows + `<div class="line2" data-addprocnewing="1" style="cursor:pointer; padding:6px 0; color:var(--accent2,#1a5fb4); font-weight:600;">+ "${escapeHtml(invAddProcSearch)}" — bagong ingredient, wala sa listahan</div>`;
  })() : '';
  const procNewIngForm = invProcNewIngDraft ? `
    <div class="task-card" style="padding:10px; border-style:dashed; margin-top:8px;">
      <div class="field-label">Pangalan ng Bagong Ingredient</div>
      <input type="text" id="proc-newing-name" value="${escapeHtml(invProcNewIngDraft.name)}">
      <div class="field-label" style="margin-top:8px;">Unit (raw)</div>
      <select id="proc-newing-unit">${['g','kg','ml','l','pcs'].map(u=>`<option value="${u}" ${invProcNewIngDraft.unit===u?'selected':''}>${u}</option>`).join('')}</select>
      <div class="field-label" style="margin-top:8px;">Zone</div>
      <select id="proc-newing-zone">${['chiller','dry','freezer','supplies','kitchen'].map(z=>`<option value="${z}" ${invProcNewIngDraft.zone===z?'selected':''}>${escapeHtml(invZoneLabel(z))}</option>`).join('')}</select>
      ${session.role!=='owner'?'<div class="hint" style="margin-top:6px;">⚠️ Kakailanganin ng approval ng Owner ang bagong ingredient na ito.</div>':''}
      <div class="btn-row" style="margin-top:8px;">
        <button class="btn-primary btn-small" id="proc-newing-confirm">+ Ihiling bilang Processable</button>
        <button class="btn-ghost btn-small" id="proc-newing-cancel">✕ Kanselahin</button>
      </div>
    </div>` : '';
  const addProcPicker = `
    <div class="task-card" style="padding:10px; border-style:dashed; margin-top:8px;">
      <div class="hint" style="margin-bottom:6px;">May ingredient na dapat i-mark na processable (hal. bagong "Mango Raw")? Hanapin dito — kung wala sa listahan, pwede ring magdagdag (hihintayin ang approval ng Owner kung hindi ikaw mismo ang owner):</div>
      <input type="text" id="inv-addproc-search" value="${escapeHtml(invAddProcSearch)}" placeholder="Maghanap ng ingredient...">
      <div id="inv-addproc-results" style="max-height:160px; overflow-y:auto; margin-top:6px;">${addProcResults}</div>
      ${procNewIngForm}
    </div>`;

  return `
    ${isOwner?'<button class="btn-ghost btn-block" id="inv-export-processing">⬇️ I-download bilang CSV</button>':''}
    ${outputPendingHtml}
    ${startProcFormHtml}
    <div class="section-title">⚗️ Simulan ang Proseso</div>
    <p class="hint">Pumili ng raw ingredient na iproproseso ngayon (hal. Raw Wings → Wings). Ibabawas agad sa raw balance — pwede mong iwanan munang blangko ang output kung hindi pa tapos (hal. kinabukasan pa).</p>
    ${procTriggerSearchBox}
    ${procRows}
    ${addProcPicker}
    <div class="section-title">Kailangan i-proseso mula sa delivery (${unprocessed.length})</div>${uHtml}
    <div class="section-title">Naghihintay ng Owner Approval (${pend.length})</div>${pHtml}
  `;
}

/* ----- COSTING TAB (sub-recipes + menu items) ----- */
function invRenderCosting(role){
  const isOwner=role==='owner';
  const cats=['All', ...new Set(cache.invMenuItems.map(m=>m.category).filter(Boolean))];
  const sq = invCostingSearch.trim().toLowerCase();
  let filtered = invCostingCat==='All' ? cache.invMenuItems.filter(m=>!m.archived) : cache.invMenuItems.filter(m=>!m.archived && m.category===invCostingCat);
  if(sq) filtered = filtered.filter(m=>m.name.toLowerCase().includes(sq));
  const tabBtns=cats.map(c=>`<button class="btn-small ${c===invCostingCat?'btn-primary':'btn-ghost'}" data-invcat="${escapeHtml(c)}">${escapeHtml(c)}</button>`).join('');
  const withRecipe=filtered.filter(m=>(m.ingredients||[]).length||(m.sub_recipes||[]).length);
  const target=invTargetCost();
  const menuCards=withRecipe.map(m=>{
    const cost=invMenuCost(m); const cp=invMenuCostPct(m);
    const flagClass = cp>40?'flag':cp>target?'pending':'done';
    const rawRows=(m.ingredients||[]).map(i=>`<div class="hint" style="display:flex;justify-content:space-between;">${escapeHtml(i.n)} (${i.q}${i.u})<span>₱${(invCost(i.n)*i.q).toFixed(2)}</span></div>`).join('');
    const subRows=(m.sub_recipes||[]).map(sb=>{
      const sr=invGSR(sb.sr_id); if(!sr) return '';
      const uc=invCost(sr.name); const lc=uc*sb.q;
      return `<div class="hint" style="display:flex;justify-content:space-between;">⚗️ ${escapeHtml(sr.name)} (${sb.q}${sb.u})<span>₱${lc.toFixed(2)}</span></div>`;
    }).join('');
    // PER-VARIANT COSTING — ang bawat sub-option (hal. "6 pcs Wings",
    // "12 pcs Wings") ay may sariling presyo at sariling ingredients.
    // Kailangan ng hiwalay na food cost % para sa bawat isa — hindi sapat
    // ang isang % lang para sa buong menu item. Batay sa industry standard
    // (Toast, TouchBistro, Lightspeed): Food Cost % = (Cost / Selling Price)
    // × 100, kinukuha per portion/option para malaman kung aling variant ang
    // kumikita at alin ang lugi.
    const variantRows = (m.variants||[]).filter(v=>v.price>0).map(v=>{
      const baseCost = invComponentsCost(m.ingredients, m.sub_recipes);
      const varCost = invComponentsCost(v.ingredients, v.sub_recipes);
      const totalCost = baseCost + varCost;
      const varPct = v.price > 0 ? (totalCost / v.price * 100) : 0;
      const vFlagClass = varPct>40?'flag':varPct>target?'pending':'done';
      const hasVarIngredients = (v.ingredients||[]).length > 0 || (v.sub_recipes||[]).length > 0;
      const vIngRows = (v.ingredients||[]).map(i=>`<div class="hint" style="margin-left:12px; display:flex;justify-content:space-between; color:var(--ink-soft);">+ ${escapeHtml(i.n)} (${i.q}${i.u})<span>₱${(invCost(i.n)*i.q).toFixed(2)}</span></div>`).join('');
      const vSubRows = (v.sub_recipes||[]).map(sb=>{
        const sr=invGSR(sb.sr_id); if(!sr) return '';
        const uc=invCost(sr.name); const lc=uc*sb.q;
        return `<div class="hint" style="margin-left:12px; display:flex;justify-content:space-between; color:var(--ink-soft);">+ ⚗️ ${escapeHtml(sr.name)} (${sb.q}${sb.u})<span>₱${lc.toFixed(2)}</span></div>`;
      }).join('');
      return `<div style="padding:4px 0; border-top:1px dashed var(--line); margin-top:4px;">
        <div style="display:flex; justify-content:space-between; align-items:center;">
          <span style="font-size:12px; font-weight:600;">${escapeHtml(v.label||v.match||'Variant')}</span>
          <div style="display:flex; gap:6px; align-items:center;">
            <span style="font-size:11px; color:var(--ink-soft);">₱${Number(v.price).toFixed(2)}</span>
            <span style="font-size:11px; color:var(--ink-soft);">Cost: ₱${totalCost.toFixed(2)}</span>
            <span class="cc-badge ${vFlagClass}" style="font-size:11px;">${varPct.toFixed(1)}%</span>
          </div>
        </div>
        ${hasVarIngredients ? vIngRows + vSubRows : totalCost===0 ? `<div class="hint" style="margin-left:12px; color:var(--medium); font-style:italic;">⚠️ Walang ingredients na naka-set para sa variant na ito — i-edit ang recipe para mailagay ang costing.</div>` : ''}
      </div>`;
    }).join('');
    const hasVariants = (m.variants||[]).filter(v=>v.price>0).length > 0;
    // Lahat ng recipe — bago man o luma, suggested man o hindi — DAPAT
    // editable ng Owner kahit kailan, dahil pwedeng magbago ang recipe
    // anumang oras (presyo ng ingredient, bagong bersyon, atbp).
    return `<div class="task-card" style="padding:10px; ${m.suggested?'border-color:var(--low);':''}">
      <div class="line2"><b>${escapeHtml(m.name)}</b>${m.suggested?'<span class="cc-badge pending">💡 Suggested</span>':hasVariants?`<span class="cc-badge ${flagClass}" style="font-size:10px;">${cp.toFixed(1)}% (base)</span>`:`<span class="cc-badge ${flagClass}">${cp.toFixed(1)}%</span>`}</div>
      <div class="hint">${escapeHtml(m.category||'')} · Base: ₱${Number(m.price).toFixed(2)}${hasVariants?` · ${(m.variants||[]).filter(v=>v.price>0).length} option${(m.variants||[]).filter(v=>v.price>0).length>1?'s':''} na may costing`:''}</div>
      ${rawRows}${subRows}
      <div class="line2" style="font-weight:700;border-top:1px solid var(--line);padding-top:4px;margin-top:4px;"><span>Base cost/serving</span><span>₱${cost.toFixed(2)}</span></div>
      ${hasVariants ? `<div style="margin-top:6px;"><div class="field-label" style="font-size:11px; margin-bottom:2px;">📊 Food Cost % per Option:</div>${variantRows}</div>` : ''}
      ${isOwner?`<button class="btn-ghost btn-small" data-invmenuedit="${m.id}" style="margin-top:4px;">✎ I-edit ang Recipe</button>`:`<div class="hint" style="margin-top:4px;">🔒 Owner lang ang maka-edit ng recipe.</div>`}
    </div>`;
  }).join('');
  const noRecipe=filtered.filter(m=>!(m.ingredients||[]).length && !(m.sub_recipes||[]).length);
  const subLib=cache.invSubRecipes.filter(sr=>!sq || sr.name.toLowerCase().includes(sq)).map(sr=>{
    const bc=(sr.ingredients||[]).reduce((s,i)=>s+invCost(i.n)*i.q,0); const uc=sr.batch_qty>0?bc/sr.batch_qty:0;
    const ingRows=(sr.ingredients||[]).map(i=>`<div class="hint" style="display:flex;justify-content:space-between;">${escapeHtml(i.n)} (${i.q}${i.u})<span>₱${(invCost(i.n)*i.q).toFixed(2)}</span></div>`).join('');
    return `<div class="task-card" style="padding:10px; border-color:var(--low);">
      <div class="line2"><b>⚗️ ${escapeHtml(sr.name)}</b><span>₱${uc.toFixed(4)}/${escapeHtml(sr.output_unit)}</span></div>
      <div class="hint">Batch: ${sr.batch_qty}${escapeHtml(sr.output_unit)} · Cost/batch: ₱${bc.toFixed(2)}</div>
      ${ingRows}
      ${isOwner?`<button class="btn-ghost btn-small" data-invsredit="${sr.id}" style="margin-top:4px;">✎ I-edit</button>`:''}
    </div>`;
  }).join('');
  const supRows=cache.invIngredients.filter(i=>!sq || i.name.toLowerCase().includes(sq)).map(i=>{
    const hist=cache.invSupplierPrices.filter(p=>p.ingredient_name===i.name).sort((a,b)=>new Date(a.created_at)-new Date(b.created_at));
    const cur=hist[hist.length-1]; const prev=hist[hist.length-2];
    const delta = cur&&prev ? cur.unit_cost-prev.unit_cost : null;
    const dc = delta==null?'':delta>0?'color:var(--very-high);':'color:var(--done);';
    return `<div class="line2"><span>${escapeHtml(i.name)}</span><span style="${dc}">₱${Number(i.unit_cost||0).toFixed(4)} ${delta!=null?(delta>0?'▲+':'▼')+Math.abs(delta).toFixed(4):''} ${isOwner?`<button class="btn-ghost btn-small" data-invsupedit="${escapeHtml(i.name)}" style="margin:0 0 0 6px;">✎ I-edit</button>`:''}</span></div>`;
  }).join('');
  return `
    <button class="btn-ghost btn-block" id="inv-export-costing">⬇️ I-download bilang CSV</button>

/* ----- ORDER GUIDE TAB ----- */
/* ----- ORDER / REORDER WORKFLOW -----
   suggested (auto, mababa/negative ang stock) -> ordered (owner/manager pumili
   ng supplier+qty) -> arrived | not_arrived (kahit sino mag-mark) -> kung
   not_arrived, babalik sa "ordered" status na pwedeng i-order ulit, ibang
   supplier man o pareho. */
function invKnownSuppliers(){
  const fromReorders = cache.invReorders.map(r=>r.supplier).filter(Boolean);
  const fromStock = cache.invStockEntries.map(e=>e.supplier).filter(Boolean);
  const fromExtra = (cache.settings.inv_extra_suppliers||'').split('|').filter(Boolean);
  return [...new Set([...fromReorders, ...fromStock, ...fromExtra])].sort();
}
// Hanapin ang PREFERRED/dating supplier para sa isang ingredient, base sa
// pinakahuling delivery o order nito — para hindi kailangang pumili ulit
// ang Owner kung pareho lang naman lagi ang ginagamit nilang supplier.
// Sinusuri ang supplier price history muna (pinaka-tumpak, may date ng
// totoong delivery), tapos stock entries, tapos huling reorder bilang
// fallback. null kung wala talagang naitalang supplier dati.
function invPreferredSupplier(ingredientName){
  const fromPrices = cache.invSupplierPrices.find(p=>p.ingredient_name===ingredientName && p.supplier);
  if(fromPrices) return fromPrices.supplier;
  const fromStock = cache.invStockEntries.find(e=>e.ingredient_name===ingredientName && e.supplier);
  if(fromStock) return fromStock.supplier;
  const fromReorder = cache.invReorders.find(r=>r.ingredient_name===ingredientName && r.supplier);
  if(fromReorder) return fromReorder.supplier;
  return null;
}
// Tantyang presyo base sa pinakahuling delivery (unit_cost ng ingredient) at
// ang naitalang qty na hinihiling — para may starting point ang Owner kapag
// inaaprubahan ang isang order, hindi blangko.
function invEstimatedOrderPrice(ingredientName, qty){
  const ing=invGIN(ingredientName);
  if(!ing || !ing.unit_cost || !qty) return null;
  return Number(ing.unit_cost) * Number(qty);
}
function invAutoSuggestReorders(){
  // Para sa ingredient na negative o malapit maubos (<10% ng kasalukuyang added halaga
  // bilang proxy), gumawa ng 'suggested' reorder kung wala pang open (suggested/ordered/
  // not_arrived) na entry. MAHALAGA: kasama ang 'not_arrived' dito — kung hindi,
  // sa SUNOD-SUNOD na render pagkatapos i-mark na "Hindi dumating" ang isang
  // order, agad itong gagawan ng BAGONG 'suggested' duplicate (dahil negative
  // pa rin ang balance), kaya parang "hindi nawawala" ang item sa Order tab —
  // ito ang naging dahilan ng nareport na bug.
  const lowStock = cache.invIngredients.filter(i=>!i.archived && !i.pending_approval && invBal(i)<0);
  lowStock.forEach(i=>{
    // KASAMA NA ANG 'rejected' — kung tinanggi na ng Owner ang isang
    // reorder suggestion para sa item na ito, HUWAG itong i-re-suggest
    // sa susunod na render. Dati, ang rejected na entry ay hindi kasama
    // sa check kaya agad na gumagawa ng bagong 'suggested' entry pagkatapos
    // ng rejection, nagreresulta sa paulit-ulit na lumalabas ang item kahit
    // paulit-ulit na itinatapon — ito ang eksaktong nangyari sa Chicken Skin
    // at Sisig Pack na inulat na "hindi natatanggal."
    const hasOpen = cache.invReorders.some(r=> r.ingredient_id===i.id && ['suggested','ordered','not_arrived','rejected'].includes(r.status));
    if(!hasOpen){
      const row={id:invUid(), ingredient_id:i.id, ingredient_name:i.name, unit:i.unit, suggested_qty:Math.abs(invBal(i)), order_qty:null, supplier:null, status:'suggested', ordered_by:null, ordered_at:null};
      cache.invReorders.unshift(row);
      sb.from('inv_reorders').insert(row).then(({error})=>{ if(error) console.error(error); });
    }
  });
}

let invCountsFilter='today';
let invCountsSearch='';
let invCountsSelected=[];      // mga staff_count id na naka-check para sa bulk delete
function invRenderCountsManagement(role){
  if(role!=='owner') return '<p class="hint">Owner lang ang maka-edit ng staff counts dito.</p>';
  const todayFmt=new Date().toLocaleDateString('en-PH',{month:'short',day:'numeric',year:'numeric',timeZone:'Asia/Manila'});
  let list = [...cache.invStaffCounts];
  if(invCountsFilter==='today') list=list.filter(c=>(c.counted_at||'').includes(todayFmt));
  // 'all' = walang filter; pinakabago muna
  list = list.slice(0,500);
  if(invCountsSearch.trim()){
    const q=invCountsSearch.toLowerCase();
    list = list.filter(c=> (c.ingredient_name||'').toLowerCase().includes(q) || (c.staff_name||'').toLowerCase().includes(q));
  }
  const dupWarnings = (()=>{
    // Tukuyin ang posibleng double-submit: parehong staff, parehong ingredient,
    // parehong counted_qty, AT malapit sa isa't isa ang oras (loob ng 5 minuto)
    // — hindi lang basta parehong staff+ingredient+qty kahit ibang araw na.
    // Dati, kahit legitimate na re-count makalipas ang ilang araw na pareho
    // lang ang bilang ay naituturing nang "duplicate" — mali iyon.
    const groups={};
    cache.invStaffCounts.forEach(c=>{
      const key=c.staff_name+'|'+c.ingredient_id;
      groups[key]=groups[key]||[]; groups[key].push(c);
    });
    let n=0;
    Object.values(groups).forEach(g=>{
      const sorted=[...g].sort((a,b)=>new Date(a.counted_at)-new Date(b.counted_at));
      for(let i=1;i<sorted.length;i++){
        const a=sorted[i-1], b=sorted[i];
        if(a.counted_qty!==b.counted_qty) continue;
        const tA=new Date(a.counted_at).getTime(), tB=new Date(b.counted_at).getTime();
        if(!isFinite(tA) || !isFinite(tB)) continue;
        if(Math.abs(tB-tA) <= 5*60*1000) n++; // loob ng 5 minuto = posibleng double-submit
      }
    });
    return n;
  })();
  const allVisibleSelected = list.length>0 && list.every(c=>invCountsSelected.includes(c.id));
  const rows = list.map(c=>`
    <div class="task-card" style="padding:10px; ${invCountsSelected.includes(c.id)?'border-color:var(--medium); background:var(--paper-deep);':''}">
      <div class="line2">
        <label style="display:flex; align-items:center; gap:8px; cursor:pointer;">
          <input type="checkbox" data-countcheck="${c.id}" ${invCountsSelected.includes(c.id)?'checked':''}>
          <b>${escapeHtml(c.ingredient_name)}</b>
        </label>
        <span class="hint">${escapeHtml(c.counted_at||'')}</span>
      </div>
      <div class="hint">${escapeHtml(c.staff_name)} · nailagay: ${c.counted_qty} ${escapeHtml(c.unit||'')}${c.expected_qty!=null?` · dapat: ${c.expected_qty} (${c.variance>0?'+':''}${c.variance})`:''}</div>
      <div class="btn-row" style="margin-top:6px;">
        <button class="btn-ghost btn-small" data-countedit="${c.id}">✎ I-edit</button>
        <button class="btn-small" style="background:var(--very-high);border-color:var(--very-high);color:#fff;" data-countdelete="${c.id}">✕ Burahin</button>
      </div>
    </div>`).join('') || '<p class="hint">Walang count entry.</p>';

  // VARIANCE REPORT — ipakita ang mga count na may malaking pagkakaiba sa
  // pagitan ng aktwal na binilang ng staff at ang inaasahan ng system
  // (current stock balance). Ito ang nagsasabi sa Owner kung saan posibleng
  // may nawawalang stock, sobrang order, o maling record.
  const varianceEntries = cache.invStaffCounts
    .filter(c=>c.expected_qty!=null && c.variance!=null && Math.abs(c.variance)>0.01)
    .sort((a,b)=>Math.abs(b.variance)-Math.abs(a.variance))
    .slice(0,30);
  const varianceHtml = varianceEntries.length ? `
    <div class="section-title">📊 Variance Report</div>
    <p class="hint">Pagkakaiba ng aktwal na binilang vs inaasahan ng system. Posibleng dahilan: spoilage, theft, maling record ng delivery/proseso, o tamang re-count lang pagkatapos ng error.</p>
    ${varianceEntries.map(c=>{
      const isOver = c.variance>0;
      return `<div class="task-card" style="padding:8px 10px; border-color:${Math.abs(c.variance)>5?'var(--very-high)':'var(--medium)'};">
        <div class="line2"><b>${escapeHtml(c.ingredient_name)}</b><span style="color:${isOver?'var(--medium)':'var(--very-high)'};font-weight:700;">${isOver?'+':''}${c.variance} ${escapeHtml(c.unit||'')}</span></div>
        <div class="hint">Aktwal: ${c.counted_qty} · Inaasahan: ${c.expected_qty} · ${escapeHtml(c.staff_name)} · ${escapeHtml(c.counted_at||'')}</div>
      </div>`;
    }).join('')}
  ` : '';

  return `
    <button class="btn-ghost btn-block" id="inv-export-count">⬇️ I-download bilang CSV</button>
    ${varianceHtml}
    ${dupWarnings>0?`<div class="warn-box-l">⚠️ ${dupWarnings} posibleng duplicate na entry na-detect (parehong staff, ingredient, at bilang, loob ng 5 minuto). Suriin sa baba.</div>`:''}
    <div class="btn-row" style="margin-bottom:8px;">
      <button class="btn-small ${invCountsFilter==='today'?'btn-primary':'btn-ghost'}" data-countsfilter="today">Ngayong araw</button>
      <button class="btn-small ${invCountsFilter==='all'?'btn-primary':'btn-ghost'}" data-countsfilter="all">Lahat (500 huli)</button>
    </div>
    <input type="text" id="inv-counts-search" placeholder="Maghanap ng staff o ingredient..." value="${escapeHtml(invCountsSearch)}" style="margin-bottom:10px;">
    <div class="line2" style="font-weight:700;"><span>${list.length} entry${invCountsSelected.length?` · ${invCountsSelected.length} napili`:''}</span></div>
    <div class="btn-row" style="margin:8px 0;">
      <button class="btn-ghost btn-small" id="inv-counts-markall">${allVisibleSelected?'☑ Alisin lahat ng tsek':'☑ Markahan Lahat (visible)'}</button>
      ${invCountsSelected.length?`<button class="btn-small" style="background:var(--very-high);border-color:var(--very-high);color:#fff;" id="inv-counts-bulkdelete">✕ Burahin ang ${invCountsSelected.length} napili</button>`:''}
    </div>
    ${rows}
  `;
}

function invCheckSobLeak(pastedText){

    const myVersion = invApplyWatermark(getSobParagraphs(), s.name).join(' ');
    // Hanapin kung gaano karaming salita (kasama ang posibleng thin space
    // pagkatapos) mula sa pinaste na text ay eksaktong sumasang-ayon sa
    // sariling bersyon ng staff member na ito.
    const myWords = myVersion.split(' ');
    // MAHALAGA: hatiin sa LITERAL na regular space (' ') lang, HINDI sa
    // \s+ regex — dahil ang \s sa JavaScript ay itinuturing ding
    // "whitespace" ang thin space (U+2009) mismo, kaya kung gagamitin ang
    // \s+, MAAALIS NA AGAD ang watermark character bago pa man ito
    // ma-check — ito mismo ang dating bug na naging dahilan kung bakit
    // laging 0% ang nakukuhang tugma.
    const pastedWords = pastedText.split(' ');
    let matches=0, checked=0;
    for(let i=0;i<Math.min(myWords.length, pastedWords.length);i++){
      if(myWords[i].includes('\u2009')){
        checked++;
        if(pastedWords[i] && pastedWords[i].includes('\u2009')) matches++;
      }
    }
    return {name:s.name, matches, checked, pct: checked>0 ? (matches/checked*100) : 0};
  }).sort((a,b)=>b.pct-a.pct);
  return results;
}

/* ---------- DAILY REQUIRED COUNT (staff) ----------
   Ipinapakita ang BUONG listahan ng zone para sa araw na ito (hindi
   random-cut na subset) — kasi minsan may magkatabi na ingredient na
   madaling sabay bilangin. Ang STAFF mismo ang pumipili kung alin sa
   listahan ang bibilangin niya, hanggang sa makumpleto ang REQUIRED na 10.
   Bawat ingredient may sariling submit — pag-submit, nawawala na agad sa
   listahan (real-time, hindi batch). FREEZER zone lang ang available sa
   THURSDAYS (Belcris delivery day). WINGS dapat lumalabas ng hindi bababa
   sa 2x kada linggo, kaya pinipilit itong kasama kung kulang pa. Owner
   pwedeng i-FORCE FULL AUDIT (lahat ng zone, lahat ng ingredient) o
   I-POSTPONE ang required count para sa araw na ito (sarado/busy). */
const INV_DAILY_REQUIRED=10;   // minimum bilang ng ingredient na dapat masubmit ng staff kada araw
const INV_DAILY_POOL_SIZE=40;  // random na ipinapakita mula sa zone (hindi lahat), kung saan pipili ang staff
const INV_ZONES = ['chiller','dry','freezer','supplies','kitchen'];

function invForcedAuditActive(){
  const fa = cache.settings.inv_forced_audit;
  if(!fa) return false;
  try{ const o=JSON.parse(fa); return o.date===invToday() && o.status==='open'; }catch(e){ return false; }
}
function invCountPostponedToday(){
  const pp = cache.settings.inv_count_postponed;
  if(!pp) return false;
  try{ const o=JSON.parse(pp); return o.date===invToday(); }catch(e){ return false; }
}
// Mga ingredient na PINILI ng Owner na DAPAT bilangin ngayong araw — hiwalay
// sa random pool, REQUIRED sila, palaging nasa unahan ng listahan. Sagot ito
// sa hiling na "owner ang maglagay ng ipapamanual count nya at required yun".
function invOwnerRequiredToday(){
  const raw = cache.settings.inv_owner_required_counts;
  if(!raw) return [];
  try{
    const o=JSON.parse(raw);
    if(o.date!==invToday()) return [];
    return o.ingredientIds||[];
  }catch(e){ return []; }
}

// Deterministic-per-day-per-staff random subset, so refreshing the page
// doesn't reshuffle the list mid-count.
function invSeededRandom(seedStr){
  let h=0; for(let i=0;i<seedStr.length;i++){ h=(h*31+seedStr.charCodeAt(i))|0; }
  return function(){ h=(h*1103515245+12345)|0; return ((h>>>0)/4294967295); };
}
function invTodayWeekday(){
  // 0=Sunday ... 4=Thursday ... 6=Saturday, in Asia/Manila time
  return new Date(new Date().toLocaleString('en-US',{timeZone:'Asia/Manila'})).getDay();
}
function invIsoWeekKey(){
  // Linggo key (taon + week number) para sa "twice a week" tracking ng Wings
  const d=new Date(new Date().toLocaleString('en-US',{timeZone:'Asia/Manila'}));
  const onejan=new Date(d.getFullYear(),0,1);
  const week=Math.ceil((((d-onejan)/86400000)+onejan.getDay()+1)/7);
  return d.getFullYear()+'-W'+week;
}
function invWingsCountedThisWeek(staffName){
  const weekKey=invIsoWeekKey();
  return cache.invStaffCounts.filter(c=>{
    if(c.staff_name!==staffName) return false;
    if(!/wings/i.test(c.ingredient_name||'')) return false;
    return true;
  }).filter(c=>{
    try{
      const m=c.counted_at.match(/(\w+)\s+(\d+),\s*(\d{4})/);
      if(!m) return false;
      const dt=new Date(`${m[1]} ${m[2]}, ${m[3]}`);
      const onejan=new Date(dt.getFullYear(),0,1);
      const wk=dt.getFullYear()+'-W'+Math.ceil((((dt-onejan)/86400000)+onejan.getDay()+1)/7);
      return wk===weekKey;
    }catch(e){ return false; }
  }).length;
}
// Ibalik ang BUONG pool ng zone para sa araw na ito (hindi pinuputol sa
// random subset) — ang pagpili ng exact 10 ay gagawin na ng STAFF mismo sa
// UI. Kasama rito kung anong zone ang available ngayong araw, at kung
// kailangan i-force ang Wings.
function invTodayZonePool(){
  const allActive=cache.invIngredients.filter(i=>!i.is_processable && !i.archived && !i.pending_approval);
  if(invForcedAuditActive()) return {zone:null, pool:allActive, forced:true};

  const isThursday = invTodayWeekday()===4;
  const availableZones = INV_ZONES.filter(z=> z!=='freezer' || isThursday);
  const pool0 = allActive.filter(i=> availableZones.includes(i.zone||'dry'));

  const seed=invToday()+'|'+session.name;
  const rng=invSeededRandom(seed);

  const zonesWithStock = availableZones.filter(z=> pool0.some(i=>(i.zone||'dry')===z));
  if(!zonesWithStock.length) return {zone:null, pool:[], forced:false};
  const zoneIdx = Math.floor(rng()*zonesWithStock.length);
  const chosenZone = zonesWithStock[zoneIdx];
  let zonePool = pool0.filter(i=>(i.zone||'dry')===chosenZone);

  // Hindi BUONG zone ang ipinapakita kung malaki — random 40 (seeded, hindi
  // nagbabago habang araw na rin, pero ibang 40 bukas) para hindi sobrang
  // haba ang listahan pero staff pa rin ang pumipili ng REQUIRED na 10 (o
  // higit) mula sa 40 na ito.
  if(zonePool.length>INV_DAILY_POOL_SIZE){
    const shuffled=[...zonePool];
    for(let i=shuffled.length-1;i>0;i--){
      const j=Math.floor(rng()*(i+1));
      [shuffled[i],shuffled[j]]=[shuffled[j],shuffled[i]];
    }
    zonePool=shuffled.slice(0,INV_DAILY_POOL_SIZE);
  }

  // WINGS RULE: kung kulang pa sa 2x this week, isama sa pool kahit ibang
  // zone, para may option ang staff na piliin ito ngayon.
  const wingsIngs = allActive.filter(i=>/^wings$/i.test(i.name||''));
  if(wingsIngs.length && invWingsCountedThisWeek(session.name)<2){
    wingsIngs.forEach(w=>{ if(!zonePool.find(p=>p.id===w.id)) zonePool=[...zonePool, w]; });
  }

  // OWNER-REQUIRED na ingredients ngayong araw — palaging kasama, kahit
  // anong zone. Hindi opsyonal, REQUIRED na bilangin.
  const ownerRequiredIds = invOwnerRequiredToday();
  if(ownerRequiredIds.length){
    ownerRequiredIds.forEach(id=>{
      const ing = allActive.find(i=>i.id===id);
      if(ing && !zonePool.find(p=>p.id===ing.id)) zonePool=[...zonePool, ing];
    });
  }

  // PRIORITY: ingredient na NEGATIVE ang balance PERO may totoong benta
  // (sales sync) — malaki ang posibilidad na MALI ang dating count, hindi
  // lang basta theoretical shrinkage. I-sigurong kasama sila sa pool, at
  // ilagay sa UNAHAN ng listahan para unang ma-recheck ng staff.
  const priorityIds = invNegativeWithSalesIds();
  if(priorityIds.size){
    allActive.forEach(i=>{
      if(priorityIds.has(i.id) && (chosenZone==null || (i.zone||'dry')===chosenZone) && !zonePool.find(p=>p.id===i.id)){
        zonePool=[...zonePool, i];
      }
    });
    zonePool=[...zonePool].sort((a,b)=>{
      const aP=priorityIds.has(a.id)?1:0, bP=priorityIds.has(b.id)?1:0;
      return bP-aP; // priority items muna
    });
  }
  return {zone:chosenZone, pool:zonePool, forced:false};
}
// Ibalik ang Set ng ingredient IDs na NEGATIVE ang balance AT may kahit
// isang totoong benta (deducted=true sale) sa loob ng huling 14 araw —
// pinakamalamang na maling count ito, hindi lang totoong shrinkage, kaya
// dapat unahin sa Daily Count.
function invNegativeWithSalesIds(){
  const cutoff = new Date(); cutoff.setDate(cutoff.getDate()-14);
  const recentSoldNames = new Set(
    cache.invSalesLines
      .filter(s=>s.deducted)
      .map(s=>{
        const m = cache.invMenuItems.find(x=>x.id===s.matched_menu_item_id);
        return m ? (m.ingredients||[]).map(ri=>ri.n) : [];
      })
      .flat()
  );
  const ids=new Set();
  cache.invIngredients.forEach(i=>{
    if(invBal(i)<0 && recentSoldNames.has(i.name)) ids.add(i.id);
  });
  return ids;
}
function invAlreadyCountedToday(ingId){
  return cache.invStaffCounts.some(c=> c.ingredient_id===ingId && c.staff_name===session.name && (c.counted_at||'').includes(invToday().slice(0,4)) && invSameDay(c.counted_at));
}
function invSameDay(countedAtText){
  // counted_at is a formatted PH date string; compare against today's date in the same format
  const todayFmt=new Date().toLocaleDateString('en-PH',{month:'short',day:'numeric',year:'numeric',timeZone:'Asia/Manila'});
  return (countedAtText||'').includes(todayFmt);
}

let invExtraPicks=[]; // ingredient ids manually added by staff to today's count, beyond the random assignment

function invZoneLabel(z){
  const labels={chiller:'❄️ Chiller', dry:'📦 Dry Storage', freezer:'🧊 Freezer', supplies:'🧹 Supplies', kitchen:'🍳 Kitchen'};
  return labels[z]||'📦 Dry Storage';
}
function invRenderDailyCount(){
  if(invCountPostponedToday()){
    const pp=JSON.parse(cache.settings.inv_count_postponed);
    return `<div class="warn-box-l">⏸️ Ipinagpaliban ng Owner ang required count ngayong araw${pp.reason?' — '+escapeHtml(pp.reason):''}. Walang kailangang bilangin ngayon.</div>`;
  }
  const forced=invForcedAuditActive();
  const {zone:todayZone, pool:zonePool} = invTodayZonePool();
  const extraIngs = invExtraPicks.map(id=>invGI(id)).filter(Boolean).filter(i=>!zonePool.find(p=>p.id===i.id));
  const pool = [...zonePool, ...extraIngs];
  const remaining = pool.filter(i=>!invAlreadyCountedToday(i.id));
  const todaysCounts=invTodaysOwnCounts();
  const doneToday=todaysCounts.length;

  const todaysCountsHtml = todaysCounts.length ? `
    <div class="section-title">Na-submit mo na ngayong araw</div>
    ${todaysCounts.map(c=>`
      <div class="task-card" style="padding:10px;">
        <div class="line2"><b>${escapeHtml(c.ingredient_name)}</b><span class="hint">${escapeHtml(c.counted_at||'')}</span></div>
        <div class="hint">Nailagay mo: ${c.counted_qty} ${escapeHtml(c.unit||'')}</div>
        ${invRenderFixRequestButton('staff_count', c.id, c.ingredient_name, `${c.counted_qty} ${c.unit||''}`)}
      </div>`).join('')}
  ` : '';

  // Search box para sa BUONG zone list (kasama lahat, hindi pinuputol),
  // para makita ng staff kung anong magkatabi at madaling sabay bilangin.
  const visibleList = invCountListSearch.trim()
    ? remaining.filter(i=>i.name.toLowerCase().includes(invCountListSearch.toLowerCase()))
    : remaining;

  // Picker para sa IBA PANG ingredient na hindi sa zone na ito, hal. kung
  // katabi na nila stock ng ibang zone.
  const alreadyShown = new Set([...pool.map(i=>i.id), ...todaysCounts.map(c=>c.ingredient_id)]);
  const pickableOpts = cache.invIngredients.filter(i=>!i.is_processable && !i.archived && !alreadyShown.has(i.id));
  const extraSearchResults = invExtraPickSearch.trim() ? (()=>{
    const q=invExtraPickSearch.toLowerCase();
    const matches=pickableOpts.filter(i=>invIngredientMatchesQuery(i,q)).slice(0,10);
    return matches.length ? matches.map(i=>`<div class="line2" data-extrapick="${i.id}" style="cursor:pointer; padding:6px 0;">${escapeHtml(i.name)} <span class="hint">(${invZoneLabel(i.zone||'dry')})</span></div>`).join('') : '<p class="hint">Walang tugma.</p>';
  })() : '';
  const extraPicker = `
    <div class="task-card" style="padding:10px; margin-top:10px;">
      <div class="hint" style="margin-bottom:6px;">Hindi kasama sa listahan pero gusto mo nang ibilang ngayon (hal. ibang zone pero katabi mo na)?</div>
      <input type="text" id="inv-extra-search" value="${escapeHtml(invExtraPickSearch)}" placeholder="Maghanap ng ingredient...">
      <div id="inv-extra-results" style="max-height:160px; overflow-y:auto; margin-top:6px;">${extraSearchResults}</div>
    </div>`;

  if(!pool.length){
    return `<p class="hint">Walang ingredient na naitala pa. Sabihin sa Owner na mag-setup muna ng Inventory.</p>` + todaysCountsHtml + extraPicker;
  }

  const metRequired = doneToday>=INV_DAILY_REQUIRED && !forced;
  const completedMsg = metRequired ? `<div class="disc-ok-box">✓ Tapos na ang required na count mo ngayong araw (${doneToday}/${INV_DAILY_REQUIRED}). Salamat ${escapeHtml(session.name)}! Pwede ka pa ring magpatuloy kung gusto mo.</div>` : '';
  if(forced && !remaining.length){
    return `<div class="disc-ok-box">✓ Tapos na ang FORCED FULL AUDIT. Salamat ${escapeHtml(session.name)}!</div>${todaysCountsHtml}`;
  }
  if(metRequired && !remaining.length){
    // Naubos na ang 40-item pool pero tapos na ang required — wala nang ipapakitang listahan
    return completedMsg + extraPicker + todaysCountsHtml;
  }

  // Wala nang visual distinction para sa negative-balance items sa staff view —
  // ang priorityIds ay ginagamit pa rin para sa Owner-side reporting,
  // pero sa staff blind count, lahat ng item ay magkaparehong hitsura.
  const priorityIds = invNegativeWithSalesIds();
  const ownerRequiredIdsToday = new Set(invOwnerRequiredToday());
  const rows = visibleList.map(i=>{
    const isOwnerRequired = ownerRequiredIdsToday.has(i.id);
    return `
    <div class="task-card" style="padding:10px; ${isOwnerRequired?'border-color:var(--medium);':''}">
      <div class="line2"><b>${escapeHtml(i.name)}</b><span class="hint">${escapeHtml(i.unit)} · ${invZoneLabel(i.zone||'dry')}</span></div>
      ${isOwnerRequired?'<div class="hint" style="color:var(--medium); font-weight:700;">📌 HINILING NG OWNER — required bilangin ngayong araw</div>':''}
      <input type="number" inputmode="decimal" data-rowqty="${i.id}" placeholder="Aktwal na bilang" style="margin-top:6px;">
      <button class="btn-primary btn-small" data-rowsubmit="${i.id}" data-ingname="${escapeHtml(i.name)}" data-ingunit="${escapeHtml(i.unit)}" style="margin-top:6px;">✓ I-submit</button>
    </div>`;
  }).join('') || '<p class="hint">Walang tugma sa hanap.</p>';

  return `
    ${completedMsg}
    ${forced?`<div class="warn-box-l">🔍 FORCED FULL AUDIT — sinabi ng Owner na bilangin LAHAT ng ingredient, lahat ng zone, ngayon.</div>`
      :`<div class="warn-box-l">📋 ${todayZone?invZoneLabel(todayZone)+' — ':''}Required: pumili at bilangin ang ${INV_DAILY_REQUIRED} (o higit) ingredient (${doneToday}/${INV_DAILY_REQUIRED} tapos na). Random na ${pool.length} ingredient mula sa zone ang nakalista — pumili ka kung alin ang madali mong bilangin (hal. magkatabi).</div>`}
    <div class="warn-box-l" style="background:var(--paper-deep);">🔒 Blind count: hindi mo makikita ang dapat na balanse. Ilagay lang ang aktwal mong nabilang.</div>
    <input type="text" id="inv-count-list-search" value="${escapeHtml(invCountListSearch)}" placeholder="Maghanap sa listahan..." style="margin-bottom:8px;">
    ${rows}
    ${extraPicker}
    ${todaysCountsHtml}
  `;
}

    const eq=cache.invEquipment.find(x=>x.id===el.dataset.eqviewphoto); if(!eq||!eq.damage_photo_url) return;
    try{
      const signed=await sb.storage.from(MAINT_BUCKET).createSignedUrl(eq.damage_photo_url, 60*60);
      if(signed && signed.data && signed.data.signedUrl) window.open(signed.data.signedUrl, '_blank');
      else alert('Hindi makuha ang litrato.');
    }catch(e){ console.error('view damage photo',e); alert('Hindi makuha ang litrato.'); }
  }));
  const addEq=document.querySelector('[data-action="inv-add-eq"]'); if(addEq) addEq.addEventListener('click',()=>invOpenEqForm(null));
  document.querySelectorAll('[data-inveqedit]').forEach(el=>el.addEventListener('click',()=>invOpenEqForm(el.dataset.inveqedit)));
  document.querySelectorAll('[data-inveqapprove]').forEach(el=>el.addEventListener('click',()=>invApproveEq(el.dataset.inveqapprove)));
  document.querySelectorAll('[data-inveqreject]').forEach(el=>el.addEventListener('click',()=>invRejectEq(el.dataset.inveqreject)));

  // Daily required count — buong listahan, bawat row may sariling submit
  const countListSearchEl=document.getElementById('inv-count-list-search');
  if(countListSearchEl) countListSearchEl.addEventListener('input',()=>{ invCountListSearch=countListSearchEl.value; render(); });
  document.querySelectorAll('[data-rowsubmit]').forEach(el=>el.addEventListener('click',()=>invSubmitRowCount(el.dataset.rowsubmit, el.dataset.ingname, el.dataset.ingunit)));

  // SETTINGS TAB — tatlong crucial toggle, lahat may confirmation
  const forceAudit=document.getElementById('inv-set-force-audit');
  if(forceAudit) forceAudit.addEventListener('click', async ()=>{
    const active=invForcedAuditActive();
    if(active){
      if(!confirm('Tapusin na ang Forced Full Audit?')) return;
      cache.settings.inv_forced_audit=JSON.stringify({date:invToday(),status:'closed',by:session.name});
    } else {
      if(!confirm('⚠️ SIGURADO KA BA?\n\nKakailanganin ng LAHAT ng staff na bilangin ang BUONG inventory ngayong araw, hindi na lang random pool. Malaking abala ito sa operasyon.\n\nOK = ITULOY\nCancel = huwag muna')) return;
      cache.settings.inv_forced_audit=JSON.stringify({date:invToday(),status:'open',by:session.name,at:invNow()});
      const msg='*FORCED FULL INVENTORY AUDIT*\nSinimulan ni '+session.name+' · '+invNow()+'\nKailangan bilangin ng staff ang LAHAT ng ingredient ngayong araw.';
      sb.rpc('send_whatsapp_alert',{p_text:msg}).catch(e=>console.error(e));
    }
    await saveSetting('inv_forced_audit', cache.settings.inv_forced_audit);
    invAuditLog('forced_audit_toggled',{active:!active,reason:'Owner toggled forced full audit'});
    render();
  });
  const postponeBtn=document.getElementById('inv-set-postpone');
  if(postponeBtn) postponeBtn.addEventListener('click', async ()=>{
    const active=invCountPostponedToday();
    if(active){
      if(!confirm('I-activate ulit ang required daily count ngayong araw?')) return;
      cache.settings.inv_count_postponed='';
      await saveSetting('inv_count_postponed','');
      await invAuditLog('count_postpone_lifted',{by:session.name,reason:'Owner re-activated required count for today'});
    } else {
      if(!confirm('⚠️ Ipagpaliban ang required count ngayong araw? Hindi hihingan ang staff ng required count.')) return;
      const reason=prompt('Bakit ipinagpaliban? (opsyonal — hal. "Sarado, bagyo")')||'';
      cache.settings.inv_count_postponed=JSON.stringify({date:invToday(),by:session.name,reason});
      await saveSetting('inv_count_postponed', cache.settings.inv_count_postponed);
      await invAuditLog('count_postponed',{by:session.name,reason});
    }
    render();
  });
  const mgrAccess=document.getElementById('inv-set-mgr-access');
  if(mgrAccess) mgrAccess.addEventListener('click', async ()=>{
    const cur=cache.settings.inv_manager_can_view_costing==='1';
    const msg = cur ? 'Bawiin ang access ng Manager sa Costing/Processing/Stock?' : '⚠️ Payagan ang Manager na makakita ng Costing, Processing, Stock, at Audit Log? (View lang — hindi pa rin sila makaka-edit ng recipe.)';
    if(!confirm(msg)) return;
    cache.settings.inv_manager_can_view_costing = cur?'0':'1';
    await saveSetting('inv_manager_can_view_costing', cache.settings.inv_manager_can_view_costing);
    invAuditLog('manager_costing_access',{granted:!cur,reason:'Owner toggled manager visibility into costing/processing'});
    render();
  });
  const newInfSaveBtn=document.getElementById('newinf-save');
  if(newInfSaveBtn) newInfSaveBtn.addEventListener('click', async ()=>{
    const ruleEl=document.getElementById('newinf-rule');
    const titleEl=document.getElementById('newinf-title');
    const descEl=document.getElementById('newinf-desc');
    const degreeEl=document.getElementById('newinf-degree');
    const rule=ruleEl.value.trim(), title=titleEl.value.trim(), desc=descEl.value.trim(), degree=degreeEl.value;
    if(!rule||!title||!desc){ alert('Kumpletuhin ang lahat ng field.'); return; }
    if(!confirm(`Idagdag ang infraction na "${title}" sa Standards of Behavior?\n\nIto ay AGAD na lalabas sa CARE picker at sa dokumentong nakikita ng lahat ng empleyado. Kailangan nilang tanggapin ang pagbabagong ito bago sila makapagpatuloy gumamit ng app.`)) return;
    const row={id:invUid(), rule_category:rule, title, sanction_degree:degree, full_text:desc, added_by:session.name};
    cache.customInfractions = cache.customInfractions||[];
    cache.customInfractions.push(row);
    await sb.from('inv_custom_infractions').insert(row);
    await invAuditLog('sob_infraction_added',{rule,title,degree,by:session.name});
    // I-flag ang lahat ng staff na may BAGONG SOB update na dapat tanggapin
    // bago sila makapagpatuloy — gamit ang parehong settings key pattern na
    // ginagamit na ng app para sa ibang acknowledgment-gated na pagbabago.
    const sobUpdateFlag = JSON.stringify({version: Date.now(), summary: `Bagong infraction: "${title}"`, addedBy: session.name, date: invToday()});
    cache.settings.inv_sob_pending_update = sobUpdateFlag;
    await saveSetting('inv_sob_pending_update', sobUpdateFlag);
    titleEl.value=''; descEl.value=''; ruleEl.value='';
    alert('✓ Naidagdag. Kailangan munang tanggapin ng lahat ng empleyado ang update na ito.');
    render();
  });
  const sobSetCodeBtn=document.getElementById('sob-set-code');
  if(sobSetCodeBtn) sobSetCodeBtn.addEventListener('click', async ()=>{
    const newCodeEl=document.getElementById('sob-new-code');
    const newCode=newCodeEl.value.trim();
    if(!newCode){ alert('Ilagay ang bagong code.'); return; }
    if(!confirm(`I-set ang access code sa "${newCode}"? Awtomatikong magagamit ng sinumang may alam ng code na ito para buksan ang Standards of Behavior.`)) return;
    cache.settings.inv_sob_access_code = newCode;
    cache.settings.inv_sob_access_revoked = '0';
    await saveSetting('inv_sob_access_code', newCode);
    await saveSetting('inv_sob_access_revoked', '0');
    await invAuditLog('sob_access_code_changed',{by:session.name,reason:'Owner set new SOB access code'});
    alert('✓ Na-set ang bagong access code.');
    render();
  });
  const sobToggleRevokeBtn=document.getElementById('sob-toggle-revoke');
  if(sobToggleRevokeBtn) sobToggleRevokeBtn.addEventListener('click', async ()=>{
    const cur = cache.settings.inv_sob_access_revoked === '1';
    const msg = cur ? 'Ibalik ang access sa Standards of Behavior gamit ang kasalukuyang code?' : '⚠️ I-revoke AGAD ang access sa Standards of Behavior? Walang sinumang empleyado ang makakapasok hangga\'t hindi mo ito ibinabalik.';
    if(!confirm(msg)) return;
    cache.settings.inv_sob_access_revoked = cur ? '0' : '1';
    await saveSetting('inv_sob_access_revoked', cache.settings.inv_sob_access_revoked);
    await invAuditLog('sob_access_revoked_toggled',{revoked:!cur,by:session.name});
    render();
  });
  const sobLeakCheckBtn=document.getElementById('sob-leak-check');
  if(sobLeakCheckBtn) sobLeakCheckBtn.addEventListener('click',()=>{
    const pasted=document.getElementById('sob-leak-paste').value.trim();
    const resultEl=document.getElementById('sob-leak-result');
    if(!pasted){ resultEl.innerHTML='<p class="hint">I-paste muna ang text.</p>'; return; }
    const results = invCheckSobLeak(pasted);
    if(!results.length || results[0].checked===0){
      resultEl.innerHTML='<p class="hint">Walang sapat na datos para magtugma — baka maikli masyado ang pinaste, o naalis ang spacing sa pag-OCR.</p>';
      return;
    }
    resultEl.innerHTML = results.slice(0,5).map((r,i)=>`<div class="line2" style="${i===0&&r.pct>50?'font-weight:700;color:var(--very-high);':''}">${i===0?'🎯 ':''}${escapeHtml(r.name)}<span>${r.pct.toFixed(0)}% tugma (${r.matches}/${r.checked})</span></div>`).join('');
  });
  const sobHistoryEl=document.getElementById('sob-view-history');
  if(sobHistoryEl){
    sb.from('inv_sob_views').select('*').order('created_at',{ascending:false}).limit(50).then(({data})=>{
      if(!data || !data.length){ sobHistoryEl.innerHTML='<p class="hint">Wala pang nag-view.</p>'; return; }
      sobHistoryEl.innerHTML = data.map(v=>{
        const isAttempt = v.code_used;
        const denied = isAttempt && v.access_granted===false;
        return `<div class="line2" style="${denied?'color:var(--very-high);':''}"><span>${escapeHtml(v.staff_name)}${denied?' ⚠️ MALING CODE':isAttempt?' ✓ tama ang code':''}</span><span class="hint">${escapeHtml(v.viewed_at)}</span></div>`;
      }).join('');
    });
  }
  const ownerReqSearchEl=document.getElementById('inv-ownerreq-search');
  if(ownerReqSearchEl) ownerReqSearchEl.addEventListener('input',()=>{ invOwnerReqCountSearch=ownerReqSearchEl.value; render(); });
  document.querySelectorAll('[data-ownerreqadd]').forEach(el=>el.addEventListener('click', async ()=>{
    const ids = invOwnerRequiredToday();
    if(!ids.includes(el.dataset.ownerreqadd)) ids.push(el.dataset.ownerreqadd);
    cache.settings.inv_owner_required_counts = JSON.stringify({date:invToday(), ingredientIds:ids, by:session.name});
    await saveSetting('inv_owner_required_counts', cache.settings.inv_owner_required_counts);
    invOwnerReqCountSearch='';
    render();
  }));
  document.querySelectorAll('[data-ownerreqremove]').forEach(el=>el.addEventListener('click', async ()=>{
    const ids = invOwnerRequiredToday().filter(id=>id!==el.dataset.ownerreqremove);
    cache.settings.inv_owner_required_counts = JSON.stringify({date:invToday(), ingredientIds:ids, by:session.name});
    await saveSetting('inv_owner_required_counts', cache.settings.inv_owner_required_counts);
    render();
  }));

  // Fix requests — staff/manager humihingi, owner nag-aaprubahan
  document.querySelectorAll('[data-fixreq]').forEach(el=>el.addEventListener('click',()=>{
    const [targetType,targetId,ingName,curVal]=el.dataset.fixreq.split('|');
    invOpenFixRequestForm(targetType,targetId,ingName,curVal);
  }));
  document.querySelectorAll('[data-fixapprove]').forEach(el=>el.addEventListener('click',()=>invApproveFixRequest(el.dataset.fixapprove)));
  document.querySelectorAll('[data-fixreject]').forEach(el=>el.addEventListener('click',()=>invRejectFixRequest(el.dataset.fixreject)));
}

/* ---------- Ingredient edit (prompt-based, lightweight — matches app's existing prompt() pattern) ---------- */

  const i = id ? invGI(id) : null;
  invIngEditDraft = i ? JSON.parse(JSON.stringify(i)) : {id:invUid(),name:'',unit:'g',begin_day:0,added:0,deducted:0,unit_cost:0,is_processable:false,yields:[],zone:'dry',is_owner_made:false};
  render();
}
function invRenderIngEditForm(){
  const i=invIngEditDraft;
  return `<div class="task-card" style="padding:14px; border-color:var(--medium);">
    <div class="section-title" style="margin-top:0;">✎ I-edit ang Ingredient</div>
    <div class="field-label">Pangalan</div>
    <input type="text" id="ied-name" value="${escapeHtml(i.name)}">
    <div class="field-label" style="margin-top:8px;">Ibang Pangalan/Tagalog (alias) — kuwit ang separator</div>
    <input type="text" id="ied-aliases" value="${escapeHtml((i.aliases||[]).join(', '))}" placeholder="hal. bawang, garlic cloves">
    <div class="hint" style="margin-top:2px;">Para mahanap ito kahit anong pangalan ang gamitin ng staff sa search.</div>
    <div style="display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-top:8px;">
      <div>
        <div class="field-label">Unit</div>
        <select id="ied-unit">${['g','kg','ml','l','pcs'].map(u=>`<option value="${u}" ${i.unit===u?'selected':''}>${u}</option>`).join('')}</select>
      </div>
      <div>
        <div class="field-label">Zone</div>
        <select id="ied-zone">${INV_ZONES.map(z=>`<option value="${z}" ${i.zone===z?'selected':''}>${escapeHtml(invZoneLabel(z))}</option>`).join('')}</select>
      </div>
    </div>
    <div class="field-label" style="margin-top:8px;">Unit Cost (₱ kada ${escapeHtml(i.unit)})</div>
    <input type="number" step="0.0001" id="ied-cost" value="${i.unit_cost||0}">
    <div style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; margin-top:8px;">
      <div>
        <div class="field-label">Beginning</div>
        <input type="number" step="0.01" id="ied-begin" value="${i.begin_day||0}">
      </div>
      <div>
        <div class="field-label">Added</div>
        <input type="number" step="0.01" id="ied-added" value="${i.added||0}">
      </div>
      <div>
        <div class="field-label">Deducted</div>
        <input type="number" step="0.01" id="ied-deducted" value="${i.deducted||0}">
      </div>
    </div>
    <label class="toggle" style="justify-content:space-between; margin-top:10px;">
      <span>Owner-made item (hal. Breading Mix, Cheese Sauce)</span>
      <input type="checkbox" id="ied-ownermade" ${i.is_owner_made?'checked':''} style="width:auto;">
    </label>
    <div class="btn-row" style="margin-top:12px;">
      <button class="btn-primary" id="ied-save">💾 I-save</button>
      <button class="btn-ghost" id="ied-cancel">Kanselahin</button>
    </div>
  </div>`;
}
async function invSaveIngEditForm(){
  const i=invIngEditDraft; if(!i) return;
  const nameEl=document.getElementById('ied-name');
  if(!nameEl.value.trim()){ alert('Ilagay ang pangalan.'); return; }
  i.name=nameEl.value.trim();
  const aliasesEl=document.getElementById('ied-aliases');
  i.aliases = aliasesEl ? aliasesEl.value.split(',').map(a=>a.trim()).filter(Boolean) : (i.aliases||[]);
  i.unit=document.getElementById('ied-unit').value;
  i.zone=document.getElementById('ied-zone').value;
  i.unit_cost=parseFloat(document.getElementById('ied-cost').value)||0;
  i.begin_day=parseFloat(document.getElementById('ied-begin').value)||0;
  i.added=parseFloat(document.getElementById('ied-added').value)||0;
  i.deducted=parseFloat(document.getElementById('ied-deducted').value)||0;
  i.is_owner_made=document.getElementById('ied-ownermade').checked;
  if(!cache.invIngredients.find(x=>x.id===i.id)) cache.invIngredients.push(i);
  await invSaveIngredient(i);
  await invAuditLog('ingredient_edited',{ingredient:i.name,aliases:i.aliases,reason:'Manual edit — isang screen na, hindi na prompt chain'});
  invIngEditDraft=null;
  render();
}

  invDeliverySearch='';
  render();
}
function invCloseDeliveryDraft(){
  invDeliveryDraft=null; invDeliverySearch='';
  render();
}
function invRenderDeliveryDraft(){
  const d=invDeliveryDraft;
  const lineTotal = d.lines.reduce((s,l)=>s+(Number(l.price)||0),0);
  const lineRows = d.lines.map((l,idx)=>{
    const unitCost = (Number(l.qty)>0 && Number(l.price)>0) ? (Number(l.price)/Number(l.qty)) : null;
    return `<div class="task-card" style="padding:10px;">
      <div class="line2"><b>${escapeHtml(l.name)}</b><button class="btn-ghost btn-small" data-dlrm="${idx}" style="margin:0;">✕</button></div>
      <div style="display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-top:6px;">
        <div>
          <div class="field-label">Qty (${escapeHtml(l.unit)})</div>

        <div>
          <div class="field-label">Presyo (₱)</div>
          <input type="number" step="0.01" data-dlprice="${idx}" value="${l.price||''}" placeholder="0.00">
        </div>
      </div>
      ${isOwner&&unitCost!=null?`<div class="hint" style="margin-top:4px;">→ ₱${unitCost.toFixed(4)}/${escapeHtml(l.unit)} (auto)</div>`:''}
    </div>`;
  }).join('');

  const searchResults = invDeliverySearch.trim() ? (()=>{
    const q=invDeliverySearch.toLowerCase();
    const matches=cache.invIngredients.filter(i=>!i.archived && invIngredientMatchesQuery(i,q) && !d.lines.find(l=>l.ingredient_id===i.id)).slice(0,8);
    const matchRows = matches.map(i=>`<button class="dl-pick-btn" data-dlpick="${i.id}" style="display:flex;justify-content:space-between;align-items:center;width:100%;text-align:left;background:none;border:none;border-bottom:1px solid var(--line);padding:10px 4px;font-size:13px;font-family:inherit;cursor:pointer;-webkit-tap-highlight-color:rgba(0,0,0,0.1);">${escapeHtml(i.name)}<span class="hint" style="margin-left:8px;white-space:nowrap;">(${escapeHtml(i.unit)})</span></button>`).join('');
    return matchRows + `<button class="dl-pick-btn" data-dlnewing="1" style="display:flex;width:100%;text-align:left;background:none;border:none;border-top:1px dashed var(--line);padding:10px 4px;font-size:13px;font-family:inherit;cursor:pointer;color:var(--accent2,#1a5fb4);font-weight:600;-webkit-tap-highlight-color:rgba(0,0,0,0.1);">+ "${escapeHtml(invDeliverySearch)}" — bagong ingredient, wala sa listahan</button>`;
  })() : '';

  const newIngForm = invDeliveryNewIngDraft ? `
    <div class="task-card" style="padding:10px; border-style:dashed; margin-top:8px;">
      <div class="field-label">Ano ito?</div>
      <select id="dl-newing-supplytype">
        <option value="food" ${invDeliveryNewIngDraft.supply_type!=='non_food'?'selected':''}>🍽️ Pagkain/Inumin (kasangkapan sa recipe)</option>
        <option value="non_food" ${invDeliveryNewIngDraft.supply_type==='non_food'?'selected':''}>🧹 Hindi Pagkain (sabon, papel, atbp.)</option>
      </select>
      <div class="field-label" style="margin-top:8px;">Pangalan ng Bagong Ingredient ${invDeliveryNewIngDraft.supply_type==='non_food'?'(GENERIC na pangalan — hal. "Fabric Conditioner", HINDI brand)':''}</div>
      <input type="text" id="dl-newing-name" value="${escapeHtml(invDeliveryNewIngDraft.name)}" placeholder="${invDeliveryNewIngDraft.supply_type==='non_food'?'hal. Fabric Conditioner, Dishwashing Liquid, Detergent Bar':'hal. Mantika ng Niyog'}">
      ${invDeliveryNewIngDraft.supply_type==='non_food'?`
      <div class="field-label" style="margin-top:8px;">Brand (opsyonal — hal. "Downy", "Joy")</div>
      <input type="text" id="dl-newing-brand" value="${escapeHtml(invDeliveryNewIngDraft.brand_name||'')}" placeholder="Brand name kung meron">
      <div class="hint" style="margin-top:4px;">⚠️ Ang BRAND ay hindi dapat maging pangalan ng ingredient — hal. "Downy" ay Fabric Conditioner, hindi sariling item. Ito ang dahilan kung bakit kailangang hiwalay ang generic name (saan ginagamit) at brand (anong binili).</div>
      `:''}
      <div class="field-label" style="margin-top:8px;">Unit</div>
      <select id="dl-newing-unit">
        <option value="g" ${invDeliveryNewIngDraft.unit==='g'?'selected':''}>g</option>
        <option value="kg" ${invDeliveryNewIngDraft.unit==='kg'?'selected':''}>kg</option>
        <option value="ml" ${invDeliveryNewIngDraft.unit==='ml'?'selected':''}>ml</option>
        <option value="l" ${invDeliveryNewIngDraft.unit==='l'?'selected':''}>l</option>
        <option value="pcs" ${invDeliveryNewIngDraft.unit==='pcs'?'selected':''}>pcs</option>
      </select>
      <div class="field-label" style="margin-top:8px;">Zone</div>
      <select id="dl-newing-zone">
        ${['chiller','dry','freezer','supplies','kitchen'].map(z=>`<option value="${z}" ${invDeliveryNewIngDraft.zone===z?'selected':''}>${escapeHtml(invZoneLabel(z))}</option>`).join('')}
      </select>
      ${session.role!=='owner'?'<div class="hint" style="margin-top:6px;">⚠️ Kakailanganin ng approval ng Owner ang bagong ingredient na ito.</div>':''}
      <div class="btn-row" style="margin-top:8px;">
        <button class="btn-primary btn-small" id="dl-newing-confirm">+ Idagdag sa Delivery</button>
        <button class="btn-ghost btn-small" id="dl-newing-cancel">✕ Kanselahin</button>

    </div>` : '';

  const knownSuppliers = invKnownSuppliers();
  const supplierField = d.addingNewSupplier ? `
      <input type="text" id="dl-supplier-new" value="${escapeHtml(d.supplier)}" placeholder="Pangalan ng bagong supplier">
      <div class="hint" style="margin-top:4px;">⚠️ Kakailanganin ng approval ni Manager/Owner ang bagong supplier na ito bago magamit sa susunod.</div>
      <button class="btn-ghost btn-small" id="dl-supplier-cancel-new" style="margin-top:4px;">← Bumalik sa listahan</button>
    ` : `
      <select id="dl-supplier-select">
        <option value="">— Pumili ng supplier —</option>
        ${knownSuppliers.map(s=>`<option value="${escapeHtml(s)}" ${d.supplier===s?'selected':''}>${escapeHtml(s)}</option>`).join('')}
        <option value="__new__">+ Bagong supplier...</option>
      </select>`;

  return `
    <button class="btn-ghost btn-small" id="inv-delivery-back" style="margin-bottom:12px;">← Bumalik</button>

      <div class="field-label" style="margin-top:8px;">Petsa ng Delivery</div>
      <input type="date" id="dl-date" value="${d.date}">
      <div class="hint" style="margin-top:4px;">Timestamp: ${invNow()} (auto)</div>
    </div>

    <div class="section-title">Mga Item</div>
    <div id="dl-lines-wrap">${lineRows || '<p class="hint" id="dl-empty-hint">Walang item pa.</p>'}</div>

    <div class="task-card" style="padding:10px; border-style:dashed;">
      <div class="field-label">Maghanap ng ingredient (UTAK list)</div>
      <input type="text" id="dl-search" value="${escapeHtml(invDeliverySearch)}" placeholder="i-type ang pangalan...">
      <div id="dl-search-results" style="margin-top:6px;">${searchResults}</div>
      ${newIngForm}
    </div>

    <div class="task-card" style="padding:10px; margin-top:10px;">
