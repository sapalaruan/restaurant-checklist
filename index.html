    <button class="btn-primary btn-block" id="inv-delivery-submit" style="margin-top:10px;" ${invDeliveryCooldown?'disabled':''}>${invDeliveryCooldown?'⏳ Lagyan ng qty...':'✓ Isumite ang Delivery'}</button>
  `;
}
async function invSubmitDeliveryDraft(){
  // COOLDOWN GUARD — nandito sa module-level variable, hindi sa DOM button state.
  // Ang DOM button ay nire-rebuild sa bawat render() kaya hindi mapagkakatiwalaan
  // ang btn.disabled bilang guard laban sa iOS ghost taps.
  if(invDeliveryCooldown){ return; }
  const btn=document.getElementById('inv-delivery-submit');
  if(btn && btn.disabled) return;
  const d=invDeliveryDraft;
  if(!d.supplier.trim()){ alert('Pumili o maglagay ng supplier.'); return; }
  if(!d.lines.length){ alert('Magdagdag ng kahit isang item.'); return; }
  const invalid = d.lines.find(l=>!l.qty || Number(l.qty)<=0);
  if(invalid){
    // Hindi na alert() — in-page error na lang para hindi maka-block ng modal
    // at para mas malinaw kung saang item ang kulang ang qty.
    if(btn){ btn.disabled=false; btn.textContent='✓ Isumite ang Delivery'; }
    const qtyInput = document.querySelector(`[data-dlqty="${d.lines.indexOf(invalid)}"]`);
    if(qtyInput){ qtyInput.style.borderColor='var(--very-high)'; qtyInput.focus(); qtyInput.placeholder='ILAGAY ANG QTY!'; }
    return;
  }
  if(btn){ btn.disabled=true; btn.textContent='Isinusumite...'; }
  try{
    const supplierName=d.supplier.trim();
    const isNewSupplier = d.addingNewSupplier && !invKnownSuppliers().includes(supplierName);
    const isManagerOrOwner = session.role==='owner'||session.role==='manager';
    if(isNewSupplier){
      if(isManagerOrOwner){
        const extra=(cache.settings.inv_extra_suppliers||'').split('|').filter(Boolean);
        if(!extra.includes(supplierName)){ extra.push(supplierName); await saveSetting('inv_extra_suppliers', extra.join('|')); }
      } else {
        const pending=(cache.settings.inv_pending_suppliers||'').split('|').filter(Boolean);
        if(!pending.includes(supplierName)){ pending.push(supplierName); await saveSetting('inv_pending_suppliers', pending.join('|')); }
        await invAuditLog('supplier_pending_approval',{supplier:supplierName,requestedBy:session.name,reason:'Bagong supplier'});
      }
    }
    const errors=[];
    for(const l of d.lines){
      const ing=invGI(l.ingredient_id);
      const e={
        id:invUid(), ingredient_id:l.ingredient_id, ingredient_name:l.name, qty:parseFloat(l.qty), unit:l.unit,
        supplier:supplierName, date:d.date, price: l.price?parseFloat(l.price):null,
        notes: isNewSupplier&&!isManagerOrOwner?'⚠️ Bagong supplier, hinihintay aprubahan':null,
        needs_processing: !!(ing&&ing.is_processable), submitted_by: session.name, submitted_at: invNow(),
        status:'pending', approved_by:null, processed_entry_id:null
      };
      cache.invStockEntries.unshift(e);
      const {error} = await sb.from('inv_stock_entries').insert(e);
      if(error){ errors.push(l.name+': '+error.message); console.error('delivery insert failed',l.name,error); }
    }
    await invAuditLog('delivery_submitted',{supplier:supplierName,date:d.date,itemCount:d.lines.length});
    if(errors.length){
      alert('May ilang item na hindi na-save:\n'+errors.join('\n')+'\n\nAng iba ay na-save na.');
    }
    invCloseDeliveryDraft();
    // Refresh inventory in background so new ingredients/suppliers appear immediately
    loadInventory().then(()=>{ inventoryModuleLoaded=true; render(); }).catch(err=>console.error('post-delivery reload',err));
  }catch(e){
    console.error('invSubmitDeliveryDraft failed',e);
    alert('May error sa pag-save: '+(e.message||'Unknown error')+'\nSubukan ulit.');
    if(btn){ btn.disabled=false; btn.textContent='✓ I-submit ang Delivery'; }
  }
}

async function invSaveApprovedDeliveryEdit(id){
  const e=cache.invStockEntries.find(x=>x.id===id); if(!e || e.status!=='approved') return;
  const qtyEl=document.querySelector(`[data-approvedqtyedit="${id}"]`);
  const priceEl=document.querySelector(`[data-approvedpriceedit="${id}"]`);
  const newQty=parseFloat(qtyEl?.value);
  const newPrice=priceEl&&priceEl.value?parseFloat(priceEl.value):null;
  if(!newQty || newQty<=0){ alert('Ilagay ang tamang qty.'); return; }
  const oldQty=Number(e.qty);
  const ing=invGIN(e.ingredient_name);
  if(ing && !e.needs_processing){
    // I-reverse ang dating idinagdag na stock (base sa lumang qty), tapos
    // i-apply ang bago — para tama ang balance kahit na-edit na ang
    // already-approved delivery na ito.
    let oldQtyBase=oldQty, newQtyBase=newQty;
    if(e.unit==='kg'){ oldQtyBase*=1000; newQtyBase*=1000; }
    ing.added = Number(ing.added||0) - oldQtyBase + newQtyBase;
  }
  e.qty=newQty;
  if(newPrice!=null && newPrice>0){
    e.price=newPrice;
    if(ing){
      let normQty=newQty;
      const delUnit=(e.unit||'').toLowerCase(); const ingUnit=(ing.unit||'').toLowerCase();
      if(delUnit==='kg' && ingUnit==='g') normQty=newQty*1000;
      if(delUnit==='g' && ingUnit==='kg') normQty=newQty/1000;
      ing.unit_cost = newPrice/normQty;
    }
  }
  if(ing) await invSaveIngredient(ing);
  await sb.from('inv_stock_entries').update({qty:e.qty,price:e.price}).eq('id',id);
  await invAuditLog('approved_delivery_edited',{ingredient:e.ingredient_name,oldQty,newQty,newPrice,editedBy:session.name,reason:'In-edit ang already-approved na delivery'});
  alert('✓ Na-save. Na-recompute ang stock balance at unit cost.');
  render();
}
async function invApproveStock(id){
  const e=cache.invStockEntries.find(x=>x.id===id); if(!e) return;
  // Una, kunin kung may inedit ang owner/manager sa qty bago aprubahan —
  // pwedeng nagkamali lang ng type ang staff (hal. 24 sa 244), kaya dapat
  // hindi kailangang i-reject nang buo, pwedeng i-tama lang at aprubahan.
  const qtyInput=document.querySelector(`[data-invqtyedit="${id}"]`);
  if(qtyInput && qtyInput.value && parseFloat(qtyInput.value)>0){ e.qty=parseFloat(qtyInput.value); }
  const priceInput=document.querySelector(`[data-invprice="${id}"]`);
  // Kunin ang presyo mula sa input field KUNG ipinapakita ito (walang price
  // pa noong i-submit), o mula sa e.price MISMO kung galing na ito sa bagong
  // multi-line delivery form (may presyo na agad noong i-submit). Dati,
  // nababalewala ang unit_cost recompute kung wala nang separate input dahil
  // may presyo na — kaya hindi na-update ang unit_cost kahit may totoong
  // delivery price na (ito ang naging dahilan ng maling costing, hal. Wings
  // na nagpapakita ng ₱85/pc gayong ₱2,625/244pcs = ₱10.76/pc lang dapat).
  const priceVal = (priceInput && priceInput.value) ? parseFloat(priceInput.value) : (e.price!=null ? Number(e.price) : null);
  if(priceVal!=null && priceVal>0){
    const price=priceVal;
    const ing=invGIN(e.ingredient_name);
    // I-normalise ang qty sa canonical unit ng ingredient para tama ang
    // unit_cost — hal. kung nag-deliver ng 0.9 kg pero ang base unit ng
    // ingredient ay 'g', dapat 900g ang gamitin sa computation, hindi 0.9.
    let normQty = e.qty;
    const delUnit = (e.unit||'').toLowerCase();
    const ingUnit = (ing?.unit||'').toLowerCase();
    if(delUnit==='kg' && ingUnit==='g')  normQty = e.qty * 1000;
    if(delUnit==='g'  && ingUnit==='kg') normQty = e.qty / 1000;
    if(delUnit==='l'  && ingUnit==='ml') normQty = e.qty * 1000;
    if(delUnit==='ml' && ingUnit==='l')  normQty = e.qty / 1000;
    const uc = price / normQty;
    const prevCost=ing?Number(ing.unit_cost||0):0;
    const spRow={id:invUid(),ingredient_name:e.ingredient_name,purchase_price:price,purchase_qty:e.qty,unit:e.unit,unit_cost:uc,prev_cost:prevCost,delta:prevCost>0?uc-prevCost:null,supplier:e.supplier,date:e.date,by_name:session.name};
    cache.invSupplierPrices.unshift(spRow);
    await sb.from('inv_supplier_prices').insert(spRow);
    if(ing){ ing.unit_cost=uc; await invSaveIngredient(ing); }
    e.price=price;
  }
  if(!e.needs_processing){
    const ing=invGIN(e.ingredient_name);
    if(ing){ let q=e.qty; if(e.unit==='kg') q*=1000; ing.added=Number(ing.added||0)+q; await invSaveIngredient(ing); }
  }
  e.status='approved'; e.approved_by=session.name;
  await sb.from('inv_stock_entries').update({status:'approved',approved_by:session.name,price:e.price,qty:e.qty}).eq('id',id);
  await invAuditLog('stock_approved',{ingredient:e.ingredient_name,qty:e.qty,unit:e.unit,priceUsed:priceVal,newUnitCost:priceVal?priceVal/e.qty:null});
  render();
}
async function invRejectStock(id){

  const reason=prompt(`Bakit tatanggihan ang delivery na ito para sa "${e.ingredient_name}"?\n(hal. "Mali ang ingredient", "Duplicate na entry", "Mali ang presyo")`);

  await invAuditLog('stock_rejected',{ingredient:e.ingredient_name,reason:reason.trim(),rejectedBy:session.name});
  render();
}

// STANDALONE TRIGGER — pagprocesong hindi galing sa delivery record, direktang
// ibabawas sa kasalukuyang raw balance ang qty na iproproseso.
function invStartProcessing(ingId){
  const ing=invGI(ingId); if(!ing) return;
  invStartProcDraft={ingId, inQty:'', outQty:''};
  render();
}
async function invSubmitStartProcessing(){
  const d=invStartProcDraft; if(!d) return;
  const ing=invGI(d.ingId); if(!ing) return;
  const bal=invBal(ing);
  const inQtyEl=document.getElementById('startproc-inqty');
  const outQtyEl=document.getElementById('startproc-outqty');
  const inQty=parseFloat(inQtyEl?.value);
  if(!inQty||inQty<=0){ alert('Ilagay ang qty na ipoproseso.'); return; }
  if(inQty>bal && !confirm(`Mas malaki ang ${inQty}${ing.unit} kaysa sa available na ${bal}${ing.unit}. Ituloy?`)) return;
  const outRaw=outQtyEl?.value;
  const hasOutput = outRaw!=null && outRaw!=='' && parseFloat(outRaw)>0;
  const yields=ing.yields||[];
  const avgY=yields.length?yields.reduce((s,y)=>s+y.pct,0)/yields.length:null;
  let yp=null, deviation=null;
  if(hasOutput){
    let inG=inQty; if(ing.unit==='kg') inG*=1000;
    yp = inG>0 ? parseFloat(outRaw)/inG*100 : 0;
    deviation = avgY!=null ? yp-avgY : null;
  }
  // Ibawas agad sa RAW balance ngayon (hindi naghihintay ng output)
  ing.deducted = Number(ing.deducted||0) + inQty;
  await invSaveIngredient(ing);
  const e={
    id:invUid(), stock_entry_id:null, ingredient_name:ing.name, in_qty:inQty, in_unit:ing.unit,
    out_qty: hasOutput?parseFloat(outRaw):null, out_unit: ing.output_unit||'pcs', output_ingredient_name: ing.output_name||ing.name,
    yield_pct:yp, avg_at_time:avgY, deviation,
    notes: hasOutput?'Standalone processing (walang kaugnay na delivery)':'Sinimulan, hinihintay pa ang output (hal. kinabukasan pa matatapos)',
    submitted_by:session.name, submitted_at:invNow(), status: hasOutput?'pending':'output_pending'
  };
  cache.invProcessedEntries.unshift(e);
  await sb.from('inv_processed_entries').insert(e);
  if(hasOutput){
    ing.yields=ing.yields||[]; ing.yields.push({date:invToday(),pct:yp,at:e.submitted_at,by:session.name});
    await invSaveIngredient(ing);
  }
  await invAuditLog('processing_started',{ingredient:ing.name,inQty,outQty:hasOutput?parseFloat(outRaw):null,yieldPct:yp,reason: hasOutput?'Standalone trigger':'Partial — hinihintay pa ang output'});
  invStartProcDraft=null;
  render();
}

async function invApproveProcess(id){
  const e=cache.invProcessedEntries.find(x=>x.id===id); if(!e) return;
  // Kunin kung may inedit ang owner sa INPUT qty — dahil naibawas na agad ang
  // dating in_qty sa raw balance noong i-trigger ang processing (hindi
  // naghihintay ng approval), kailangang i-reverse ang dating bawas at
  // i-apply ulit ang BAGONG (naitamang) qty para tama ang raw stock.
  const inQtyInput=document.querySelector(`[data-procinedit="${id}"]`);
  const rawIng=invGIN(e.ingredient_name);
  if(inQtyInput && inQtyInput.value && parseFloat(inQtyInput.value)>0){
    const newInQty=parseFloat(inQtyInput.value);
    if(newInQty!==e.in_qty && rawIng){
      const oldInQty=Number(e.in_qty);
      // I-reverse ang lumang bawas, i-apply ang bago
      rawIng.deducted = Number(rawIng.deducted||0) - oldInQty + newInQty;
      await invSaveIngredient(rawIng);
    }
    e.in_qty=newInQty;
  }
  // Kunin kung may inedit ang owner sa output qty (hal. nagkamali ng type ang
  // staff) — itama bago ipasok sa stock at i-recompute ang yield%.
  const outQtyInput=document.querySelector(`[data-procoutedit="${id}"]`);
  if(outQtyInput && outQtyInput.value && parseFloat(outQtyInput.value)>0){
    e.out_qty=parseFloat(outQtyInput.value);
  }
  let inG=Number(e.in_qty); if((e.in_unit||'g')==='kg') inG*=1000;
  e.yield_pct = inG>0 ? (e.out_qty/inG*100) : e.yield_pct;
  if(e.avg_at_time!=null) e.deviation = e.yield_pct - e.avg_at_time;
  const out=invGIN(e.output_ingredient_name);
  if(out){
    out.added=Number(out.added||0)+Number(e.out_qty);
    // I-COMPUTE ang TOTOONG unit cost ng OUTPUT base sa RAW cost at yield —
    // hindi puwedeng manatili sa lumang/seed value habang dumadaan ang totoong
    // delivery price sa raw ingredient. Halimbawa: Raw Wings ₱10.76/g (mula sa
    // totoong delivery), 40% yield → Wings dapat ₱10.76 / 0.40 = ₱26.90/pc bawat
    // gramo na naproseso, hatiin sa bilang ng output para makuha ang per-unit cost.
    if(rawIng && rawIng.unit_cost!=null && e.in_qty>0 && e.out_qty>0){
      let inQtyBase=Number(e.in_qty);
      if((e.in_unit||rawIng.unit)==='kg') inQtyBase*=1000; // pare-pareho sa gramo kung kg ang ipinasok
      const totalRawCost = inQtyBase * Number(rawIng.unit_cost||0);
      const newOutUnitCost = totalRawCost / Number(e.out_qty);
      out.unit_cost = newOutUnitCost;
    }
    await invSaveIngredient(out);
  }
  e.status='approved'; e.approved_by=session.name;
  await sb.from('inv_processed_entries').update({status:'approved',approved_by:session.name,in_qty:e.in_qty,out_qty:e.out_qty,yield_pct:e.yield_pct,deviation:e.deviation}).eq('id',id);
  await invAuditLog('process_approved',{ingredient:e.ingredient_name,outputIngredient:e.output_ingredient_name,inQty:e.in_qty,outQty:e.out_qty,yieldPct:e.yield_pct,newOutputUnitCost:out?out.unit_cost:null});
  render();
}
async function invRejectProcess(id){
  const e=cache.invProcessedEntries.find(x=>x.id===id); if(!e) return;
  const reason=prompt(`Bakit tatanggihan ang proseso na ito para sa "${e.ingredient_name} → ${e.output_ingredient_name}"?\n(hal. "Mali ang yield", "Maling input qty")`);
  if(reason===null) return;
  if(!reason.trim()){ alert('Kailangan ng dahilan bago tanggihan.'); return; }
  e.status='rejected'; e.approved_by=session.name; e.rejected_by=session.name; e.rejected_reason=reason.trim();
  await sb.from('inv_processed_entries').update({status:'rejected',approved_by:session.name,rejected_by:session.name,rejected_reason:reason.trim()}).eq('id',id);
  await invAuditLog('process_rejected',{ingredient:e.ingredient_name,reason:reason.trim(),rejectedBy:session.name});
  render();
}

async function invSaveRecipeDraft(){
  const d=invRecipeDraft;
  if(!d.name || !d.name.trim()){ alert('Kailangan ng pangalan.'); return; }
  if(invEditType==='menu'){
    if(!d.price || d.price<=0){ alert('Ilagay ang selling price.'); return; }
    d.suggested=false; // pagka-save ng Owner, hindi na ito "suggested" lang
    if(!cache.invMenuItems.find(x=>x.id===d.id)) cache.invMenuItems.push(d);
    else { const idx=cache.invMenuItems.findIndex(x=>x.id===d.id); cache.invMenuItems[idx]=d; }
    await invSaveMenu(d);
    await invAuditLog('menu_item_saved',{name:d.name,reason:'Recipe editor'});
    if(invPendingPosKeyLink){
      const posKey=invPendingPosKeyLink;
      const sample=cache.invSalesLines.find(s=>s.pos_key===posKey);
      if(sample){
        const row={pos_key:posKey, category:sample.category, item:sample.item, option_name:sample.option_name, modifier:sample.modifier, menu_item_id:d.id, ignored:false, updated_at:new Date().toISOString()};
        cache.invPosItemMap = cache.invPosItemMap.filter(x=>x.pos_key!==posKey);

        await sb.from('inv_pos_item_map').upsert(row);
        await invAuditLog('pos_item_linked',{posKey,menuItem:d.name,reason:'Auto-linked after suggested recipe save'});
        await invRetroDeductForPosKey(posKey, d);
      }
      invPendingPosKeyLink=null;
    }
  } else {
    if(!d.batch_qty || d.batch_qty<=0){ alert('Ilagay ang batch quantity.'); return; }
    if(!cache.invSubRecipes.find(x=>x.id===d.id)) cache.invSubRecipes.push(d);
    else { const idx=cache.invSubRecipes.findIndex(x=>x.id===d.id); cache.invSubRecipes[idx]=d; }

    await invAuditLog('sub_recipe_saved',{name:d.name,reason:'Recipe editor'});

}

    <div class="task-card" style="padding:12px;">

      `:`

        <input type="text" id="re-unit" value="${escapeHtml(d.output_unit||'g')}">
        <div class="field-label" style="margin-top:8px;">Batch quantity (kabuuang output)</div>
        <input type="number" id="re-batchqty" value="${d.batch_qty||0}">

/* ---------- Order / Reorder actions ---------- */
async function invMarkOrdered(reorderId){
  const r=cache.invReorders.find(x=>x.id===reorderId); if(!r) return;
  const qtyEl=document.getElementById('ro-qty-'+reorderId);
  const priceEl=document.getElementById('ro-price-'+reorderId);
  const supEl=document.getElementById('ro-sup-'+reorderId);
  const qty=parseFloat(qtyEl?.value)||0;
  if(qty<=0){ alert('Ilagay ang qty na i-order.'); return; }
  const price=priceEl&&priceEl.value?parseFloat(priceEl.value):null;
  let supplier=supEl?.value||'';
  if(supplier==='__new__'){
    const newSup=prompt('Pangalan ng bagong supplier:');
    if(!newSup||!newSup.trim()){ alert('Kailangan ng pangalan ng supplier.'); return; }
    supplier=newSup.trim();
    const extra=(cache.settings.inv_extra_suppliers||'').split('|').filter(Boolean);
    if(!extra.includes(supplier)){ extra.push(supplier); saveSetting('inv_extra_suppliers', extra.join('|')); }
  }
  if(!supplier){ alert('Pumili o maglagay ng supplier.'); return; }
  r.order_qty=qty; r.order_price=price; r.supplier=supplier; r.status='ordered'; r.ordered_by=session.name; r.ordered_at=invNow();
  r.not_arrived_note=null;
  // AWAIT ang DB write — dati, ginagawa ito nang async (.then) at agad na
  // nire-render, kaya kapag nag-refresh bago matapos ang write, hindi pa
  // nakita ng DB ang bagong status. Ngayon, hinihintay muna ang DB bago
  // mag-render para laging tama ang nakikita kahit mag-refresh agad.
  const {error} = await sb.from('inv_reorders').update({order_qty:qty,order_price:price,supplier,status:'ordered',ordered_by:session.name,ordered_at:invNow(),not_arrived_note:null}).eq('id',reorderId);
  if(error){ console.error('order update failed',error); alert('Hindi na-save ang order. Subukan ulit.'); return; }
  invAuditLog('reorder_placed',{ingredient:r.ingredient_name,qty,price,supplier});
  const msg=`*INVENTORY ORDER*\n${session.name} · ${invNow()}\n${r.ingredient_name}: ${qty} ${r.unit||''}${price?' · ₱'+price.toFixed(2):''}\nSupplier: ${supplier}`;
  sb.rpc('send_whatsapp_alert',{p_text:msg}).catch(e=>console.error(e));
  // In-page confirmation — walang alert() na maaaring ma-suppress ng iOS
  invOrderMsg = `✅ Na-order ang ${r.ingredient_name} (${qty} ${r.unit||''}) mula sa ${supplier}.`;
  render();
  setTimeout(()=>{ invOrderMsg=''; render(); }, 4000);
}

async function invApprovePendingSupplier(originalName){

  const nameEl=document.querySelector(`[data-supapprovename="${originalName}"]`);

  if(reason===null) return;

  // I-check muna kung may kaugnay na stock entries (deliveries) bago burahin
  // — kung may approved na delivery para sa ingredient na ito, dapat ma-
  // reject din ito, hindi pwedeng manatiling "approved" magpakailanman kahit
  // wala nang ingredient record. Ito ang naging dahilan kung bakit "approved"

  const linkedEntries = cache.invStockEntries.filter(e=>e.ingredient_name===ing.name && e.status==='approved');
  for(const e of linkedEntries){

}

/* ============================================================
   SALES SYNC — pag-import ng UTAK Transaction Details CSV para
   real-time mabawas sa inventory ang nabenta, base sa recipe ng
   menu item. Itinutugma ang bawat sale line sa inv_menu_items
   gamit ang pos_key (Category|Item|Option|Modifier, normalized),
   tapos ibinabawas ang ingredients/sub-recipes ng recipe niyan
   sa stock — kaya kasabay ang pag-export ng UTAK at pag-export
   ng staff count, makikita kung tugma ang dalawa (audit-ready).
============================================================ */
function invPosKey(category, item, option, modifier){
  const norm = s => (s||'').trim().toLowerCase().replace(/\s+/g,' ');
  return [norm(category), norm(item), norm(option), norm(modifier)].join('|');
}
function invParseSalesCsv(text){
  // Tanggalin ang UTF-8 BOM (\ufeff) kung naroroon — karaniwan itong nasa
  // simula ng totoong na-export na CSV file (hal. mula UTAK/Excel), at kung
  // hindi ito tatanggalin, hindi matutugma ang unang column header (\"Date\")
  // sa header.indexOf('Date'), kaya magiging blangko ang Date column sa
  // BAWAT row nang tahimik.
  if(text.charCodeAt(0)===0xFEFF) text=text.slice(1);
  // Simpleng CSV parser na may quote-handling, dahil may comma sa loob ng
  // ilang field (hal. modifier list). Hindi gumagamit ng external library
  // para hindi na-network-dependent ang import.
  const rows=[];
  let i=0, field='', row=[], inQuotes=false;
  const pushField=()=>{ row.push(field); field=''; };
  const pushRow=()=>{ pushField(); rows.push(row); row=[]; };
  while(i<text.length){
    const c=text[i];
    if(inQuotes){
      if(c==='"'){ if(text[i+1]==='"'){ field+='"'; i+=2; continue; } inQuotes=false; i++; continue; }
      field+=c; i++; continue;
    }
    if(c==='"'){ inQuotes=true; i++; continue; }
    if(c===','){ pushField(); i++; continue; }
    if(c==='\r'){ i++; continue; }
    if(c==='\n'){ pushRow(); i++; continue; }
    field+=c; i++;
  }
  if(field.length || row.length) pushRow();
  if(!rows.length) return [];
  const header=rows[0].map(h=>h.trim());
  const idx=name=>header.indexOf(name);
  const cDate=idx('Date'), cTime=idx('Time'), cTxn=idx('Transaction ID'), cReceipt=idx('Receipt No.'),
        cCat=idx('Category'), cItem=idx('Item'), cOpt=idx('Option'), cMod=idx('Modifier'), cQty=idx('Quantity'),
        // MONEY COLUMNS — kinukuha rin ngayon para makuha ang TOTOONG NET SALES
        // (hindi na gagamitin ang hardcoded na presyo mula sa app, kundi ang
        // aktwal na sininingil sa customer mula sa UTAK CSV mismo):
        // - Price per Unit: base price per item (bago discount)
        // - Gross Price: Price per Unit × Quantity (bago discount)
        // - Discounted Price: Gross Price minus item-level discounts
        // - Total Discount Amount: transaction-level discount (hal. senior, PWD)
        // - Total: NET AMOUNT na talagang binayad ng customer (only on first
        //   line of each transaction, blank on subsequent lines) — ITO ang
        //   dapat gamitin para sa Cash Reconciliation, hindi ang Gross Price.
        cPriceUnit=idx('Price per Unit'), cGrossPrice=idx('Gross Price'),
        cDiscountedPrice=idx('Discounted Price'), cTotalDisc=idx('Total Discount Amount'),
        cTxnTotal=idx('Total');
  const out=[];
  for(let r=1;r<rows.length;r++){
    const row2=rows[r];
    if(!row2 || row2.length<2) continue;
    const item=(row2[cItem]||'').trim();
    if(!item) continue; // skip blank/footer rows
    out.push({
      date:(row2[cDate]||'').trim(), time:(row2[cTime]||'').trim(),
      transaction_id:(row2[cTxn]||'').trim(), receipt_no:(row2[cReceipt]||'').trim(),
      category:(row2[cCat]||'').trim(), item, option_name:(row2[cOpt]||'').trim(),
      modifier:(row2[cMod]||'').trim(), quantity:parseFloat(row2[cQty])||0,
      price_per_unit: parseFloat(row2[cPriceUnit])||0,
      gross_price: parseFloat(row2[cGrossPrice])||0,
      discounted_price: parseFloat(row2[cDiscountedPrice])||0,
      total_discount_amount: parseFloat(row2[cTotalDisc])||0,
      // txn_total is only non-blank on the FIRST line of each transaction
      txn_total: row2[cTxnTotal] ? (parseFloat(row2[cTxnTotal])||0) : null
    });
  }
  return out;
}
function invSalesLineId(line){
  // Stable id para hindi ma-duplicate kung paulit-ulit i-import ang parehong CSV
  const raw=[line.transaction_id,line.date,line.time,line.category,line.item,line.option_name,line.modifier,line.quantity].join('::');
  let h=0; for(let i=0;i<raw.length;i++){ h=(h*31+raw.charCodeAt(i))|0; }
  return 'sl_'+(h>>>0).toString(36);
}
function invMenuItemForPosKey(posKey){
  // Exact match muna — modifier-specific mapping kung may naka-set.
  const mapped = cache.invPosItemMap.find(m=>m.pos_key===posKey);
  if(mapped && mapped.menu_item_id) return cache.invMenuItems.find(m=>m.id===mapped.menu_item_id) || null;
  if(mapped && mapped.ignored) return null;
  // FALLBACK: kung walang exact match, subukan nang WALA ang modifier field
  // — ito ang normal na kaso: ang modifier text sa bawat transaction ay
  // nag-iiba (hal. "0% Iced", "Buffalo W BBQ F"), pero ang MENU ITEM ay
  // iisa lang (Americano, Wings). Ang recipe mapping ay nasa item+option
  // level, hindi sa bawat modifier combination.
  const parts = posKey.split('|'); // [category, item, option, modifier]
  if(parts.length===4 && parts[3]){
    const noModKey = parts.slice(0,3).join('|')+'|';
    const mapped2 = cache.invPosItemMap.find(m=>m.pos_key===noModKey);
    if(mapped2 && mapped2.menu_item_id) return cache.invMenuItems.find(m=>m.id===mapped2.menu_item_id) || null;
    if(mapped2 && mapped2.ignored) return null;
  }
  // FALLBACK 2: item-level match (without option too) — for items that don't
  // have per-option recipes configured yet, use the base item mapping.
  if(parts.length>=2 && parts[2]){
    const itemOnlyKey = parts[0]+'|'+parts[1]+'||';
    const mapped3 = cache.invPosItemMap.find(m=>m.pos_key===itemOnlyKey);
    if(mapped3 && mapped3.menu_item_id) return cache.invMenuItems.find(m=>m.id===mapped3.menu_item_id) || null;
  }
  return null;
}
function invIsIgnoredPosKey(posKey){
  const mapped = cache.invPosItemMap.find(m=>m.pos_key===posKey);
  if(mapped) return !!(mapped.ignored);
  const parts = posKey.split('|');
  if(parts.length===4 && parts[3]){
    const noModKey = parts.slice(0,3).join('|')+'|';
    const mapped2 = cache.invPosItemMap.find(m=>m.pos_key===noModKey);
    if(mapped2) return !!(mapped2.ignored);
  }
  return false;
}

// I-reapply ang deductions para sa lahat ng sale lines na na-import na pero
// hindi pa nabawas sa stock (row.deducted===false). Nangyayari ito kapag
// nag-import bago pa na-setup ang pos_item_map (walang recipe linking pa).
// Ang button na ito ang lutas para hindi na kailangan mag-re-paste ng CSV.
async function invReapplySalesDeductions(){
  const undeducted = cache.invSalesLines.filter(s=>!s.deducted);
  if(!undeducted.length){ alert('Lahat ng na-import na sale ay na-deduct na sa stock.'); return; }
  if(!confirm(`May ${undeducted.length} na sale lines na hindi pa nabawas sa stock.\n\nTandaan: ang mga benta BAGO nai-setup ang recipe ay hindi mababawas — forward-only ang deductions para hindi magulo ang lumang stock data.\n\nOK = ituloy\nCancel = huwag muna`)) return;
  let deductedCount=0, stillUnmapped=0, preRecipeSkipped=0;
  for(const s of undeducted){
    const menuItem = invMenuItemForPosKey(s.pos_key);
    if(menuItem){
      // Kung walang recipe_effective_from (null), ibig sabihin hindi pa
      // nata-track ang petsa — WALANG cutoff, deduct ang lahat ng benta.
      // Ang cutoff ay ginagamit lang kung may NAITALANG petsa (ibig sabihin
      // dati walang recipe, pagkatapos nilagyan ng recipe, at gusto nating
      // protektahan ang mga benta bago iyon).
      const effectiveFrom = menuItem.recipe_effective_from || null;
      const sd = effectiveFrom ? invParseSaleDate(s.sale_date) : null;
      if(effectiveFrom && sd && sd < effectiveFrom){
        // Pre-recipe sale — mark as matched pero hindi ide-deduct
        preRecipeSkipped++;
        s.matched_menu_item_id=menuItem.id;
        await sb.from('inv_sales_lines').update({matched_menu_item_id:menuItem.id}).eq('id',s.id);
        continue;
      }
      const modText = (s.option_name||'')+' '+(s.modifier||'');
      await invDeductMenuItemSale(menuItem, s.quantity, modText);
      s.deducted=true; s.matched_menu_item_id=menuItem.id; deductedCount++;
      await sb.from('inv_sales_lines').update({deducted:true,matched_menu_item_id:menuItem.id}).eq('id',s.id);
    } else { stillUnmapped++; }
  }
  await invAuditLog('sales_deductions_reapplied',{deducted:deductedCount,preRecipeSkipped,stillUnmapped});
  invLastImportSummary={newCount:0,dupCount:0,deductedCount,unmappedCount:stillUnmapped};
  alert(`✓ Tapos na:\n• Na-deduct: ${deductedCount} sale lines\n• Na-skip (bago pa ang recipe noon): ${preRecipeSkipped}\n${stillUnmapped ? '• Hindi pa may recipe: '+stillUnmapped+' — i-link muna bago i-reapply ulit.' : '• Lahat ng may recipe ay naka-deduct na!'}`);
  render();
}
// I-COMPUTE ang TOTOONG HALAGA (piso) ng isang benta — tinitignan muna ang
// presyo ng SPECIFIC OPTION (hal. "12pcs & MF" = ₱599), tapos babalik sa
// base item price kung walang option match. Kailangan ito para sa
// AUTOMATIC na pag-fill ng Total Sales sa Cash Reconciliation — dapat
// TOTOONG halaga ito, hindi tantiya, dahil pera ang pinag-uusapan.
function invSaleLinePrice(line){
  const opts = UTAK_ITEM_OPTIONS[line.item];
  if(opts && line.option_name){
    const match = opts.find(o=>o.o===line.option_name);
    if(match) return match.p * (Number(line.quantity)||0);
  }
  const baseItem = UTAK_MENU_ITEMS.find(m=>m.n===line.item);
  if(baseItem) return baseItem.p * (Number(line.quantity)||0);
  return 0; // hindi nahanap ang presyo — hindi dapat mangyari, pero ligtas na 0 kaysa mali
}
// I-COMPUTE ang KABUUANG benta para sa isang petsa, mula sa totoong na-
// import na sales lines (inv_sales_lines), hindi mula sa hand-typed na
// number. Ginagamit ito para sa auto-fill ng Total Sales sa Cashier.
function invComputeUtakTotalForDate(dateKey){
  const lines = cache.invSalesLines.filter(s=>{
    const sd = invParseSaleDate(s.sale_date) || s.sale_date;
    return sd===dateKey;
  });
  if(!lines.length) return null;
  // TAMANG PARAAN: gamitin ang txn_total mula sa UTAK CSV — ito ang AKTWAL
  // na halaga na binayad ng customer, kasama na ang lahat ng discount (senior,
  // PWD, promo, atbp.). Ang txn_total ay naroroon lang sa UNANG linya ng
  // bawat transaction (ang iba ay null). Kaya i-sum nang isang beses per
  // transaction ID lamang, hindi per line item.
  //
  // BAKIT HINDI GAMITIN ANG HARDCODED NA PRESYO:
  // - Hindi kasama ang discounts (₱198 ang discount sa Jun 22 = ₱5,247 - ₱198 = ₱5,049)
  // - Maaaring hindi updated ang presyo sa app kapag nagbago ang menu
  // - Ang UTAK mismo ang pinaka-totoong pinagkukunan ng datos
  const txnTotals = {}; // {transaction_id: total}
  let hasRealTotals = false;
  lines.forEach(l=>{
    if(l.txn_total != null && !(l.transaction_id in txnTotals)){
      txnTotals[l.transaction_id] = l.txn_total;
      hasRealTotals = true;
    }
  });
  if(hasRealTotals){
    // May txn_total data mula sa CSV — gamitin ito (NET SALES, tama)
    const total = Object.values(txnTotals).reduce((a,b)=>a+b, 0);
    const discountTotal = lines.reduce((a,l)=>a+(l.total_discount_amount||0),0);
    return {
      total: Math.round(total*100)/100,
      lineCount: lines.length,
      txnCount: Object.keys(txnTotals).length,
      discountTotal: Math.round(discountTotal*100)/100,
      unpriced: 0,
      source: 'utak_net' // net sales mula sa UTAK
    };
  }
  // FALLBACK: lumang import na walang txn_total — gamitin ang hardcoded na presyo
  // (mas mababa ang katumpakan, pero hindi maaaring baguhin ang lumang data)
  let total=0, unpriced=0;
  lines.forEach(l=>{
    const price = invSaleLinePrice(l);
    if(price===0 && l.quantity>0) unpriced++;
    total += price;
  });
  return {total: Math.round(total*100)/100, lineCount: lines.length, unpriced, source: 'hardcoded_fallback'};
}
async function invImportSalesCsv(text){
  const lines = invParseSalesCsv(text);
  if(!lines.length){ alert('Walang nabasang row sa CSV. Siguraduhing tama ang file.'); return; }
  let newCount=0, dupCount=0, deductedCount=0, unmappedSet=new Set();
  const discrepancies=[]; // { id, field, stored, incoming, line }
  for(const line of lines){
    const id = invSalesLineId(line);
    const existing = cache.invSalesLines.find(s=>s.id===id);
    if(existing){
      // DUPLICATE VERIFICATION — hindi lang isi-skip. Suriin kung may
      // pagkakaiba sa quantity, item, option, o modifier. Kung pareho,
      // normal duplicate na walang problema. Kung iba, i-flag para
      // sa Owner review bago baguhin ang anumang nasa database.
      const changed = [];
      if(existing.quantity!==line.quantity) changed.push({f:'quantity',was:existing.quantity,now:line.quantity});
      if(existing.item!==line.item) changed.push({f:'item',was:existing.item,now:line.item});
      if(existing.option_name!==line.option_name) changed.push({f:'option',was:existing.option_name,now:line.option_name});
      if(existing.modifier!==line.modifier) changed.push({f:'modifier',was:existing.modifier,now:line.modifier});
      if(changed.length){
        discrepancies.push({id,txn:line.transaction_id,date:line.date,item:line.item,changes:changed,line,existing});
      } else { dupCount++; }
      continue;
    }
    // NEW LINE
    const posKey = invPosKey(line.category, line.item, line.option_name, line.modifier);
    const menuItem = invMenuItemForPosKey(posKey);
    const ignored = invIsIgnoredPosKey(posKey);
    const row = {
      id, pos_key:posKey, sale_date:invParseSaleDate(line.date)||line.date,
      sale_time:line.time, transaction_id:line.transaction_id,
      receipt_no:line.receipt_no, category:line.category, item:line.item,
      option_name:line.option_name, modifier:line.modifier,
      quantity:line.quantity,
      // MONEY DATA — direkta mula sa UTAK CSV, hindi na nakasalalay sa
      // hardcoded na presyo sa app. Ito ang tamang paraan para hindi mag-iba
      // ang computed total kapag nagbago ang presyo o may discount.
      price_per_unit: line.price_per_unit||null,
      gross_price: line.gross_price||null,
      discounted_price: line.discounted_price||null,
      total_discount_amount: line.total_discount_amount||null,
      txn_total: line.txn_total, // null kapag hindi first line ng transaction
      matched_menu_item_id: menuItem?menuItem.id:null,
      deducted:false, imported_by:session.name, imported_at:invNow()
    };
    cache.invSalesLines.unshift(row);
    newCount++;
    if(menuItem){
      const effectiveFrom = menuItem.recipe_effective_from || null;
      const sd = effectiveFrom ? invParseSaleDate(line.date) : null;
      if(!effectiveFrom || !sd || sd >= effectiveFrom){
        await invDeductMenuItemSale(menuItem, line.quantity, (line.option_name||'')+' '+(line.modifier||''));
        row.deducted=true; deductedCount++;
      } else {
        // Pre-recipe sale — linked pero hindi ide-deduct
        row.matched_menu_item_id = menuItem.id;
      }
    } else if(!ignored){ unmappedSet.add(posKey); }
    await sb.from('inv_sales_lines').insert(row);
  }
  // Handle discrepancies — ask owner about each one
  if(discrepancies.length){
    for(const d of discrepancies){
      const diffText = d.changes.map(c=>`  ${c.f}: "${c.was}" → "${c.now}"`).join('\n');
      const msg = `Discrepancy sa Transaction ${d.txn} (${d.date}, ${d.item}):\n${diffText}\n\nAng data sa database at sa bagong CSV ay hindi magkatugma. Halos imposible na ito kung totoong UTAK data — baka mali ang CSV o may bug sa UTAK export.\n\nOK = gamitin ang BAGONG CSV data (at i-update ang database)\nCancel = panatilihin ang lumang data (ignore ang bagong CSV para sa row na ito)`;
      if(confirm(msg)){
        // Owner chose to use the new CSV data
        Object.assign(d.existing, {quantity:d.line.quantity,item:d.line.item,option_name:d.line.option_name,modifier:d.line.modifier});
        await sb.from('inv_sales_lines').update({quantity:d.line.quantity,item:d.line.item,option_name:d.line.option_name,modifier:d.line.modifier}).eq('id',d.id);
        await invAuditLog('sales_discrepancy_resolved',{txn:d.txn,changes:d.changes,resolution:'owner_used_new_csv'});
      } else {
        await invAuditLog('sales_discrepancy_noted',{txn:d.txn,changes:d.changes,resolution:'owner_kept_old_data'});
      }
    }
  }
  await invAuditLog('sales_csv_imported',{newLines:newCount,duplicates:dupCount,discrepancies:discrepancies.length,deducted:deductedCount,unmapped:unmappedSet.size});
  invLastImportSummary = {newCount,dupCount,deductedCount,unmappedCount:unmappedSet.size,discrepancies:discrepancies.length};

  // AUTO-UPDATE ng CASH RECONCILIATION — para sa bawat petsang naapektuhan
  // ng import na ito, kung WALA pang total_sales na naitala (hindi pa
  // na-verify ng Owner), awtomatikong ipasok ang computed na total mula sa
  // totoong na-import na sales data. HINDI ito mag-o-overwrite ng anumang
  // halagang naitala na — iyon ang dapat manatiling resulta ng aktwal na
  // pag-verify ng Owner, hindi basta papalitan ng bagong import.
  const affectedDates = new Set();
  lines.forEach(l=>{ const sd=invParseSaleDate(l.date)||l.date; if(sd) affectedDates.add(sd); });
  let autoCashUpdated=0;
  for(const dateKey of affectedDates){
    const computed = invComputeUtakTotalForDate(dateKey);
    if(!computed) continue;
    const cDay = getCashierDay(dateKey);
    if(cDay.total_sales==null){
      cDay.total_sales = computed.total;
      cDay.total_sales_source = 'UTAK (auto mula sa Sales Sync)';
      cDay.total_sales_by = session.name;
      await saveCashierDay(cDay);
      await cashierCheckDiscrepancy(cDay);
      autoCashUpdated++;
    }
  }
  if(autoCashUpdated>0){
    invLastImportSummary.cashUpdated = autoCashUpdated;
  }
  render();
}

// Ibawas sa stock ang ingredients/sub-recipes ng recipe ng menu item, i-multiply
// sa quantity na nabenta. Ito ang nag-uugnay sa SALES at sa STOCK real-time.
// Ibawas ang isang listahan ng raw ingredients (multiply sa factor).
async function invDeductRawIngredients(ingredientLines, factor){
  for(const ri of (ingredientLines||[])){
    // Kung ang pangalan ay tumutugma sa isang SUB-RECIPE (hal. "Breading Mix"
    // ginamit bilang ingredient ng ibang sub-recipe), i-deduct recursively ang
    // raw ingredients NITO sa proportional na batch fraction — hindi lang
    // ibawas bilang generic "ingredient" dahil wala namang stock balance ang
    // sub-recipe mismo, ang mga RAW na bumubuo dito ang dapat mabawasan.
    const nestedSr = invGSRN(ri.n);
    if(nestedSr){
      const usedQty = ri.q*factor;
      const batchQty = nestedSr.batch_qty||1;
      const nestedFrac = usedQty/batchQty;
      await invDeductRawIngredients(nestedSr.ingredients, nestedFrac);
      continue;
    }
    const ing = invGIN(ri.n);
    if(ing){ ing.deducted = Number(ing.deducted||0) + (ri.q*factor); await invSaveIngredient(ing); }
  }
}
async function invDeductSubRecipes(subRecipeLines, qty){
  for(const rs of (subRecipeLines||[])){
    const sr = invGSR(rs.sr_id);
    if(!sr) continue;
    const usedQty = rs.q*qty;
    const batchQty = sr.batch_qty||1;
    const frac = usedQty/batchQty;
    await invDeductRawIngredients(sr.ingredients, frac);
  }
}
// Ibawas sa stock ang BASE recipe ng menu item, PLUS anumang VARIANT na
// tumutugma sa modifier text ng nabentang linya (hal. "Buffalo W BBQ F"
// ay magdadagdag ng Buffalo Sauce AT BBQ Powder components). Sub-recipes
// na naka-nest sa loob ng ibang sub-recipe (Breading Mix sa loob ng isang
// batch) ay automatic na nasusunod via invDeductRawIngredients.
async function invDeductMenuItemSale(menuItem, qty, modifierText){
  if(!qty) return;
  await invDeductRawIngredients(menuItem.ingredients, qty);
  await invDeductSubRecipes(menuItem.sub_recipes, qty);
  if(modifierText!=null){
    for(const v of invMatchVariants(menuItem, modifierText)){
      await invDeductRawIngredients(v.ingredients, qty);
      await invDeductSubRecipes(v.sub_recipes, qty);
    }
  }
}

// Listahan ng pos_key na lumabas sa sales CSV pero walang naka-link na recipe
// pa — ito ang kailangang gawan ng menu item o i-ignore (hal. "Extra Eco Bag").
function invUnmappedPosKeys(){
  const seen=new Map();
  cache.invSalesLines.filter(s=>!s.matched_menu_item_id).forEach(s=>{
    if(invIsIgnoredPosKey(s.pos_key)) return;
    if(!seen.has(s.pos_key)) seen.set(s.pos_key,{category:s.category,item:s.item,option_name:s.option_name,modifier:s.modifier,count:0,qty:0});
    const o=seen.get(s.pos_key); o.count++; o.qty+=Number(s.quantity||0);
  });
  return [...seen.entries()].map(([posKey,o])=>({posKey,...o})).sort((a,b)=>b.count-a.count);
}

// Bumuo ng SIMULANG recipe structure base sa pangalan/category ng item —
// tamang component SLOTS na (Wings, Fries, variant per flavor word), hindi
// gawa-gawang quantity. Ang Owner ang maglalagay ng totoong dami bago i-save.
function invDetectFlavorWords(text){
  const known=['buffalo','bbq','cheese','salted egg','sour cream','spicy buffalo','spicy bbq','spicy cheese','spicy salted egg','plain','salt and garlic'];
  const t=(text||'').toLowerCase();
  return known.filter(k=>t.includes(k));
}
function invBuildSuggestedDraft(sample){
  const draft={id:invUid(), name:sample.item, category:sample.category, price:0, archived:false, ingredients:[], sub_recipes:[], variants:[], suggested:true};
  const fullText=[sample.item, sample.option_name, sample.modifier].join(' ');
  const lname=sample.item.toLowerCase();

  if(lname.includes('wings') || (sample.category==='Combo' && lname.includes('wings'))){
    draft.name = sample.item + (sample.option_name?' ('+sample.option_name+')':'');
    const pcsMatch=(sample.option_name||'').match(/(\d+)\s*pcs?/i);
    const pcs=pcsMatch?parseInt(pcsMatch[1],10):6;
    draft.ingredients.push({n:'Raw Wings', q:0, u:'g'}); // i-type ang totoong g per pcs
    draft.ingredients.push({n:'Breading Mix', q:0, u:'g'});
    draft.ingredients.push({n:'Oil', q:0, u:'g'});
    if(lname.includes('fries') || (sample.category==='Combo')) draft.ingredients.push({n:'Fries', q:0, u:'g'});
    invDetectFlavorWords(fullText).forEach(fw=>{
      const label=fw.replace(/\b\w/g,c=>c.toUpperCase());
      const srMatch=cache.invSubRecipes.find(s=>s.name.toLowerCase().includes(fw.replace('spicy ','')));
      draft.variants.push({match:fw, label:label+' flavor', ingredients:[], sub_recipes: srMatch?[{sr_id:srMatch.id,name:srMatch.name,q:0,u:srMatch.output_unit}]:[]});
    });
  } else if(lname.includes('fries')){
    draft.ingredients.push({n:'Fries', q:0, u:'g'});
    draft.ingredients.push({n:'Oil', q:0, u:'g'});
    invDetectFlavorWords(fullText).forEach(fw=>{
      const label=fw.replace(/\b\w/g,c=>c.toUpperCase());
      draft.variants.push({match:fw, label:label+' flavor', ingredients:[{n:'Cheese Powder',q:0,u:'g'}], sub_recipes:[]});
    });
  } else if(['frappes','shakes','smoothies','kapetea'].includes((sample.category||'').toLowerCase())){
    draft.ingredients.push({n:'Milk', q:0, u:'g'});
    draft.ingredients.push({n:'White Sugar', q:0, u:'g'});
  } else if(lname.includes('silog')){
    draft.ingredients.push({n:'Rice', q:0, u:'g'});
    draft.ingredients.push({n:'Egg', q:0, u:'pcs'});
  } else {
    draft.ingredients.push({n:'', q:0, u:'g'});
  }
  return draft;
}

  await invRetroDeductForPosKey(posKey, m);

async function invRetroDeductForPosKey(posKey, menuItem){
  // FORWARD-ONLY: deduct lang ang mga benta simula nang ma-configure ang
  // recipe (recipe_effective_from). Ang mga benta BAGO iyon ay permanenteng
  // hindi mababawas — hindi tayo tiyak kung anong recipe ang ginamit noon,
  // at baka magbago pa ang recipe pagdating ng oras.
  const effectiveFrom = menuItem.recipe_effective_from || null;
  // MAHALAGA: huwag lang ang EXACT posKey na ini-link ang ayusin — ang
  // bawat magkaibang modifier (Buffalo W, BBQ W, atbp.) ay GUMAGAWA NG
  // IBANG posKey, kaya kung "mains|wings|6|buffalo w" lang ang ini-link,
  // hindi maaayos ang "mains|wings|12|buffalo w" o "mains|wings|6|bbq w"
  // — magkaiba silang posKeys pero PAREHONG dapat mapunta sa Wings.
  // Gamitin ang invMenuItemForPosKey (may fallback-without-modifier logic)
  // sa BAWAT undeducted sale line, hindi lang sa isang exact key, para
  // makuha LAHAT ng totoong tumutugma rito.
  const toFix = cache.invSalesLines.filter(s=>{
    if(s.deducted) return false;
    const resolved = invMenuItemForPosKey(s.pos_key);
    if(!resolved || resolved.id!==menuItem.id) return false;
    if(!effectiveFrom) return true;
    const sd = invParseSaleDate(s.sale_date);
    return sd >= effectiveFrom;
  });
  for(const s of toFix){
    await invDeductMenuItemSale(menuItem, s.quantity, (s.option_name||'')+' '+(s.modifier||''));
    s.matched_menu_item_id=menuItem.id; s.deducted=true;
    await sb.from('inv_sales_lines').update({matched_menu_item_id:menuItem.id,deducted:true}).eq('id',s.id);
  }
  // Mark pre-recipe sales as permanently skipped (deducted stays false, but
  // now has matched_menu_item_id set so they're no longer "unmapped")
  const preRecipe = effectiveFrom ? cache.invSalesLines.filter(s=>{
    if(s.deducted || s.matched_menu_item_id) return false;
    const resolved = invMenuItemForPosKey(s.pos_key);
    if(!resolved || resolved.id!==menuItem.id) return false;
    const sd = invParseSaleDate(s.sale_date);
    return sd < effectiveFrom;
  }) : [];
  for(const s of preRecipe){
    s.matched_menu_item_id=menuItem.id;
    // deducted stays FALSE — these pre-recipe sales are intentionally not deducted
    await sb.from('inv_sales_lines').update({matched_menu_item_id:menuItem.id}).eq('id',s.id);
  }
}
async function invIgnorePosKey(posKey){
  const sample = cache.invSalesLines.find(s=>s.pos_key===posKey);
  if(!sample) return;
  const row={pos_key:posKey, category:sample.category, item:sample.item, option_name:sample.option_name, modifier:sample.modifier, menu_item_id:null, ignored:true, updated_at:new Date().toISOString()};
  cache.invPosItemMap = cache.invPosItemMap.filter(x=>x.pos_key!==posKey);
  cache.invPosItemMap.push(row);
  await sb.from('inv_pos_item_map').upsert(row);
  await invAuditLog('pos_item_ignored',{posKey,item:sample.item});
  render();
}

async function invSaveEqDraft(){
  const eq=invEqDraft;
  if(!eq.name.trim()){ alert('Ilagay ang pangalan ng equipment.'); return; }
  const isManagerOrOwner = session.role==='owner'||session.role==='manager';
  const knownEqSuppliers=[...new Set(cache.invEquipment.map(e=>e.supplier).filter(Boolean))];
  if(eq.addingNewSupplier && eq.supplier && !knownEqSuppliers.includes(eq.supplier) && !isManagerOrOwner){
    eq.notes = (eq.notes||'') + ` ⚠️ Bagong supplier "${eq.supplier}" — hinihintay aprubahan ni Manager/Owner.`;
    await invAuditLog('eq_supplier_pending',{supplier:eq.supplier,requestedBy:session.name,reason:'Bagong supplier mula sa equipment form'});
  }
  // BEYOND REPAIR — kailangan ng dahilan, sino ang responsable, at litrato
  // bago ma-save, base sa industry-standard na incident documentation
  // (Toast, Miratag, Calm Kitchen): factual na rekord, may evidence, may
  // accountability — hindi lang basta "sira na".
  if(eq.status==='beyond_repair'){
    const reasonEl=document.getElementById('eq-damage-reason');
    const byEl=document.getElementById('eq-damaged-by');
    const photoEl=document.getElementById('eq-damage-photo');
    const reason=reasonEl?reasonEl.value.trim():'';
    const damagedBy=byEl?byEl.value.trim():'';
    if(!reason){ alert('Ilagay ang dahilan ng pinsala.'); return; }
    if(!damagedBy){ alert('Ilagay kung sino ang responsable (o "Hindi alam/Aksidente").'); return; }
    eq.damage_reason=reason; eq.damaged_by=damagedBy; eq.damaged_at=invNow();
    const file=photoEl&&photoEl.files&&photoEl.files[0];
    if(file){
      try{
        const ext=(file.name.split('.').pop()||'jpg').toLowerCase();
        const path='equipment/'+eq.id+'_'+Date.now()+'.'+ext;
        const up=await sb.storage.from(MAINT_BUCKET).upload(path, file, {contentType:file.type||'image/jpeg', upsert:true});
        if(up.error) throw up.error;
        eq.damage_photo_url=path;
      }catch(e){ console.error('damage photo upload',e); if(!confirm('Hindi na-upload ang litrato. Ituloy pa rin ang pag-save nang walang litrato?')) return; }
    } else if(!eq.damage_photo_url){
      if(!confirm('Walang litratong naka-attach. Ituloy pa rin ang pag-save?')) return;
    }
  }
  if(!cache.invEquipment.find(x=>x.id===eq.id)) cache.invEquipment.push(eq);
  else { const idx=cache.invEquipment.findIndex(x=>x.id===eq.id); cache.invEquipment[idx]=eq; }
  await sb.from('inv_equipment').upsert({
    id:eq.id,name:eq.name,category:eq.category,supplier:eq.supplier||null,status:eq.status,acquired_date:eq.acquired_date,
    purchase_price:eq.purchase_price,serial:eq.serial,notes:eq.notes,repair_shop:eq.repair_shop,
    repair_cost:eq.repair_cost,repair_eta:eq.repair_eta,
    damage_reason:eq.damage_reason||null,damaged_by:eq.damaged_by||null,damage_photo_url:eq.damage_photo_url||null,damaged_at:eq.damaged_at||null,
    pending_approval:eq.pending_approval,added_by:eq.added_by,
    updated_at:new Date().toISOString()
  });
  await invAuditLog('equipment_saved',{name:eq.name,status:eq.status,reason:eq.status==='beyond_repair'?eq.damage_reason:'Equipment form',damagedBy:eq.damaged_by});
  if(eq.status==='beyond_repair'){
    // I-PADALA sa Owner via WhatsApp — kasama ang lahat ng detalye, base sa
    // industry practice na agad na-notify ang management kapag may
    // equipment incident (Xenia: "instant notifications to managers").
    let photoLine='';
    if(eq.damage_photo_url){
      try{
        const signed=await sb.storage.from(MAINT_BUCKET).createSignedUrl(eq.damage_photo_url, 60*60*24*7);
        if(signed && signed.data && signed.data.signedUrl) photoLine='\nLitrato: '+signed.data.signedUrl;
      }catch(e){ console.error('signed url for whatsapp',e); }
    }
    const msg=`*EQUIPMENT — SIRA NA, HINDI NA MAAAYOS*\n${eq.name} (${eq.category||'—'})\nDahilan: ${eq.damage_reason}\nResponsable: ${eq.damaged_by}\nNaitala ni: ${session.name} · ${eq.damaged_at}${photoLine}`;
    sb.rpc('send_whatsapp_alert',{p_text:msg}).catch(e=>console.error('whatsapp alert',e));
  }
  invCloseEqDraft();
}

/* ---------- Blind staff count submit ---------- */
async function invSubmitRowCount(ingId, ingName, ingUnit){
  const btn=document.querySelector(`[data-rowsubmit="${ingId}"]`);
  if(btn && btn.disabled) return; // huwag payagang mag-double click habang nagsasubmit
  const valEl=document.querySelector(`[data-rowqty="${ingId}"]`);
  if(!valEl || valEl.value===''){ alert('Ilagay ang aktwal na bilang.'); return; }
  if(btn){ btn.disabled=true; btn.textContent='Isinusumite...'; }
  const i=invGI(ingId);
  const counted=parseFloat(valEl.value)||0;
  const expected=i?invBal(i):null;
  const variance = expected!=null ? counted-expected : null;
  const row={id:invUid(),ingredient_id:ingId,ingredient_name:ingName,unit:ingUnit,counted_qty:counted,expected_qty:expected,variance,staff_name:session.name,notes:'',counted_at:invNow()};
  cache.invStaffCounts.unshift(row);
  // Real-time: i-post agad sa Supabase, hindi naghihintay ng buong batch,
  // para makita ng owner ang progress habang nagtatrabaho ang staff. Pagka-
  // submit, mawawala agad ang row na ito sa listahan (filtered out bilang
  // "already counted today" sa susunod na render).
  await sb.from('inv_staff_counts').insert(row);
  await invAuditLog('staff_count_single',{ingredient:ingName,counted,variance});
  // MAHALAGA: i-update ang AKTWAL na stock balance base sa binilang ng
  // staff — hindi lang basta i-record ang variance bilang report. Ang
  // current stock ng app ay dapat sumasalamin sa pinakahuling totoong
  // bilang, hindi lang sa theoretical na kinakalkula mula sa delivery/sales.
  // I-adjust ang 'added' ng variance amount para tama agad ang balance,
  // habang nananatiling buo ang audit trail ng dating added/deducted.
  if(i && variance!=null && Math.abs(variance)>0.0001){
    i.added = Number(i.added||0) + variance;
    await invSaveIngredient(i);
  }
  if(variance!=null && variance!==0){
    const msg=`*INVENTORY COUNT VARIANCE*\n${session.name} · ${invNow()}\n${ingName}: dapat ${expected} ${ingUnit}, nabilang ${counted} (${variance>0?'+':''}${variance})`;
    sb.rpc('send_whatsapp_alert',{p_text:msg}).catch(e=>console.error(e));
  }
  render();
}

async function invApproveFixRequest(id){
  const r=cache.invFixRequests.find(x=>x.id===id); if(!r) return;
  if(r.target_type==='staff_count'){
    const c=cache.invStaffCounts.find(x=>x.id===r.target_id);
    if(c){
      if(r.requested_value==='DELETE'){
        cache.invStaffCounts=cache.invStaffCounts.filter(x=>x.id!==c.id);
        await sb.from('inv_staff_counts').delete().eq('id',c.id);
      } else {
        const oldQty=c.counted_qty;
        c.counted_qty=parseFloat(r.requested_value)||0;
        c.variance = c.counted_qty - Number(c.expected_qty||0);
        await sb.from('inv_staff_counts').update({counted_qty:c.counted_qty,variance:c.variance}).eq('id',c.id);
        await invAuditLog('fix_applied_staff_count',{ingredient:r.ingredient_name,old:oldQty,new:c.counted_qty,requestedBy:r.requested_by,reason:r.reason});
      }
    }
  } else if(r.target_type==='stock_entry'){
    const e=cache.invStockEntries.find(x=>x.id===r.target_id);
    if(e){
      if(r.requested_value==='DELETE'){
        // I-reverse ang naidagdag na stock kung naka-approve na ito
        if(e.status==='approved' && !e.needs_processing){
          const ing=invGIN(e.ingredient_name);
          if(ing){ let q=e.qty; if(e.unit==='kg') q*=1000; ing.added=Number(ing.added||0)-q; await invSaveIngredient(ing); }
        }
        cache.invStockEntries=cache.invStockEntries.filter(x=>x.id!==e.id);
        await sb.from('inv_stock_entries').delete().eq('id',e.id);
      } else {
        const oldQty=e.qty;
        const newQty=parseFloat(r.requested_value)||0;
        // I-adjust ang naidagdag na stock kung naka-approve na (diff lang, hindi doble)
        if(e.status==='approved' && !e.needs_processing){
          const ing=invGIN(e.ingredient_name);
          if(ing){ let diff=newQty-oldQty; if(e.unit==='kg') diff*=1000; ing.added=Number(ing.added||0)+diff; await invSaveIngredient(ing); }
        }
        e.qty=newQty;
        await sb.from('inv_stock_entries').update({qty:newQty}).eq('id',e.id);
        await invAuditLog('fix_applied_stock_entry',{ingredient:r.ingredient_name,old:oldQty,new:newQty,requestedBy:r.requested_by,reason:r.reason});
      }
    }
  }
  r.status='approved'; r.resolved_by=session.name; r.resolved_at=invNow();
  await sb.from('inv_fix_requests').update({status:'approved',resolved_by:session.name,resolved_at:invNow()}).eq('id',id);
  render();
}
async function invRejectFixRequest(id){
  const r=cache.invFixRequests.find(x=>x.id===id); if(!r) return;

  r.status='rejected'; r.resolved_by=session.name; r.resolved_at=invNow(); r.resolve_note=note;

}

function escapeHtml(str){
  return String(str ?? '')
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;')
    .replace(/'/g,'&#39;');
}

/* ---------- CSV EXPORT — generic helper, ginagamit ng bawat module sa
   Inventory (Count, Delivery, Order, Stock, Proseso, Costing, Sales Sync,
   Equipment, Log). OWNER lang makakakita ng download button. ---------- */
function invCsvEscape(val){
  const s = String(val ?? '');
  if(/[",\n]/.test(s)) return '"' + s.replace(/"/g,'""') + '"';
  return s;
}
function invDownloadCsv(filename, headers, rows){
  const lines=[headers.map(invCsvEscape).join(',')];
  rows.forEach(r=>{ lines.push(r.map(invCsvEscape).join(',')); });
  const csv=lines.join('\r\n');
  const blob=new Blob(['\ufeff'+csv], {type:'text/csv;charset=utf-8;'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url; a.download=filename;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
}
function invCsvDateTag(){ return invToday().replace(/[^0-9A-Za-z]/g,'-'); }

function invExportStockCsv(){

  invDownloadCsv(`PALARUAN-Stock-${invCsvDateTag()}.csv`, ['Ingredient','Unit','Zone','Beginning Day','Added','Deducted','Current Balance','Unit Cost','Processable','Output Name','Output Unit','Owner-Made','Archived'], rows);
}
function invExportProcessingCsv(){
  const rows=cache.invProcessedEntries.map(e=>[e.ingredient_name,e.in_qty,e.in_unit,e.output_ingredient_name,e.out_qty,e.out_unit,e.yield_pct,e.avg_at_time,e.deviation,e.status,e.submitted_by,e.submitted_at,e.approved_by,e.notes]);
  invDownloadCsv(`PALARUAN-Proseso-${invCsvDateTag()}.csv`, ['Raw Ingredient','In Qty','In Unit','Output Ingredient','Out Qty','Out Unit','Yield %','Avg Yield at Time','Deviation','Status','Submitted By','Submitted At','Approved By','Notes'], rows);
}
function invExportCostingCsv(){
  const rows=[];
  cache.invSubRecipes.forEach(sr=>{
    const batchCost=(sr.ingredients||[]).reduce((s,i)=>s+invCost(i.n)*i.q,0);
    const uc=sr.batch_qty>0?batchCost/sr.batch_qty:0;
    rows.push(['Sub-Recipe',sr.name,'',sr.output_unit,sr.batch_qty,uc.toFixed(4),'','']);
  });
  cache.invMenuItems.filter(m=>!m.archived).forEach(m=>{
    const cost=invMenuCost(m);
    const margin = m.price ? (100-invMenuCostPct(m)).toFixed(1) : '';
    rows.push(['Menu Item',m.name,m.category,'',1,cost.toFixed(4),m.price,margin]);
  });
  invDownloadCsv(`PALARUAN-Costing-${invCsvDateTag()}.csv`, ['Type','Pangalan','Category','Output Unit','Batch/Qty','Cost','Selling Price','Margin %'], rows);
}

function invOpenCareForm(id, prefill){
  if(id){
    const existing = cache.careRecords.find(c=>c.id===id);
    if(existing){ invCareDraft=JSON.parse(JSON.stringify(existing)); invCareView='new'; return; }
  }
  invCareDraft = Object.assign({
    id: invUid(), reference_no: 'CARE-'+invToday().replace(/-/g,'')+'-'+Math.floor(Math.random()*900+100),
    employee_name:'', issued_by: session.name, issued_date: invToday(),
    subject:'', infraction_rule:'', degree_of_sanction:'', details:'',
    status:'awaiting_explanation', offense_count:1
  }, prefill||{});
  invCareView='new'; invCareInfractionSearch='';
  // HUWAG mag-call ng render() dito — ang function na ito ay tinatawag
  // mula sa loob ng render() (sa CARE block), kaya kung mag-call ng
  // render() dito, magiging infinite recursion → stack overflow →
  // nahuhuli ng outer try/catch bilang "Walang connection" error.
  // Ang caller (render() o go()) ang mag-ha-handle ng rendering.
}
function invCareOffenseCountFor(employeeName, sanctionDegree){
  // I-bilang kung ilang beses na nagkasala ang empleyadong ito ng PAREHONG
  // degree ng sanction dati (base sa Degree of Sanction matrix sa Standards
  // of Behavior — 1st/2nd/3rd/4th offense ang tumutukoy sa kung anong
  // corrective action ang dapat ilapat).
  if(!employeeName || !sanctionDegree) return 1;
  const prior = cache.careRecords.filter(c=>c.employee_name===employeeName && c.degree_of_sanction===sanctionDegree && c.id!==invCareDraft?.id);
  return prior.length + 1;
}

  // kapag naghahanap ng infraction" — dati walang change listener ang

    if(invCareDraft) invCareDraft.from_field=careFromField.value;
  });

  const careSavePart2=document.getElementById('care-save-part2'); if(careSavePart2) careSavePart2.addEventListener('click',invSaveCarePart2);
  const careSaveAccept=document.getElementById('care-save-acceptance'); if(careSaveAccept) careSaveAccept.addEventListener('click',invSaveCareAcceptance);

  // nagbago, HINDI nagti-trigger ng render. Kung walang binding na ito,
  // ang pagpili ng "Written Advice" ay nawawala kapag nag-re-render ang form
  // (hal. mula sa background loadCareRecords fetch) at bumabalik sa lumang
  // value ng draft. Ito ang totoong dahilan ng "nagbiblink then bumabalik
  // sa Verbal Advice" na inulat.
  const careActionSelect=document.getElementById('care-action');

    if(invCareDraft) invCareDraft.corrective_action=careActionSelect.value;
  });
  const carePrevWarning=document.getElementById('care-prev-warning');
  if(carePrevWarning) carePrevWarning.addEventListener('change',()=>{
    if(invCareDraft) invCareDraft.previous_warning_date=carePrevWarning.value;
  });
  const careEffective=document.getElementById('care-effective');
  if(careEffective) careEffective.addEventListener('change',()=>{
    if(invCareDraft) invCareDraft.corrective_action_effective=careEffective.value;
  });
  const careConcurred=document.getElementById('care-concurred');
  if(careConcurred) careConcurred.addEventListener('input',()=>{
    if(invCareDraft) invCareDraft.concurred_by=careConcurred.value;
  });
  const careHrNoted=document.getElementById('care-hr-noted');

  });
  const careCancelBtn=document.getElementById('care-cancel'); if(careCancelBtn) careCancelBtn.addEventListener('click',()=>{ invCareView='log'; invCareDraft=null; invCareSaveMsg=''; go('care-hub'); });
  const careEditPart2Btn=document.getElementById('care-edit-part2');
  if(careEditPart2Btn) careEditPart2Btn.addEventListener('click', async ()=>{
    if(!confirm('Babaguhin ang naisumiteng Corrective Action? Mananatiling 1 lang ang record, pero mapapansin ng empleyado kung tiningnan nila ito.')) return;
    invCareDraft.status='explained';
    await sb.from('inv_care_records').update({status:'explained'}).eq('id',invCareDraft.id);
    const rec=cache.careRecords.find(c=>c.id===invCareDraft.id); if(rec) rec.status='explained';
    render();
  });
  const supOkMain = document.getElementById('care-supervisor-ok-main');

    const chk = document.getElementById('care-supervisor-confirm-main');

    invCareDraft.employee_comments=document.getElementById('care-my-comments').value.trim();
    invCareDraft.employee_accepted_at=invNow();
    invCareDraft.status='closed';
    await sb.from('inv_care_records').update({employee_accepted:invCareDraft.employee_accepted,employee_comments:invCareDraft.employee_comments,employee_accepted_at:invCareDraft.employee_accepted_at,status:'closed'}).eq('id',invCareDraft.id);
    const rec=cache.careRecords.find(c=>c.id===invCareDraft.id); if(rec) Object.assign(rec, invCareDraft);
    alert('✓ Nai-sign at na-save ang dokumento. Maaari ka nang magpatuloy gumamit ng app.');
    invCareDraft=null; go('select');
  });
  const careBackHubBtn=document.getElementById('care-back-to-hub');
  if(careBackHubBtn) careBackHubBtn.addEventListener('click',()=>{ invCareDraft=null; go('employee'); });

function bindSupport(){
  document.querySelectorAll('[data-go="select"]').forEach(el=>el.addEventListener('click',()=>go('select')));
  document.querySelectorAll('[data-support-type]').forEach(el=>el.addEventListener('click',()=>{
    supportDraft.report_type=el.dataset.supportType; supportDraft.category=''; render();
  }));
  const catEl=document.getElementById('support-category'); if(catEl) catEl.addEventListener('change',()=>{ supportDraft.category=catEl.value; });
  const descEl=document.getElementById('support-description'); if(descEl) descEl.addEventListener('input',()=>{ supportDraft.description=descEl.value; });
  const submitBtn=document.getElementById('support-submit');
  if(submitBtn) submitBtn.addEventListener('click', async ()=>{
    const d=supportDraft;
    const catEl2=document.getElementById('support-category');
    const descEl2=document.getElementById('support-description');
    const photoEl=document.getElementById('support-photo');
    const category=catEl2.value, description=descEl2.value.trim();
    if(!category){ alert('Pumili ng kategorya.'); return; }
    if(!description){ alert('Ilagay ang paglalarawan.'); return; }
    submitBtn.disabled=true; submitBtn.textContent='Isinusumite...';
    const row={id:invUid(), report_type:d.report_type, category, description, reported_by:session.name, reported_at:invNow(), screen_context:supportPriorRoute, status:'open'};
    const file=photoEl&&photoEl.files&&photoEl.files[0];
    if(file){
      try{
        const ext=(file.name.split('.').pop()||'jpg').toLowerCase();
        const path='support/'+row.id+'_'+Date.now()+'.'+ext;
        const up=await sb.storage.from(MAINT_BUCKET).upload(path, file, {contentType:file.type||'image/jpeg', upsert:true});
        if(!up.error) row.photo_url=path;
      }catch(e){ console.error('support photo upload',e); }
    }
    cache.supportReports = cache.supportReports||[];
    cache.supportReports.unshift(row);
    await sb.from('inv_support_reports').insert(row);
    const msg=`*SUPPORT REPORT*\n${row.report_type==='app_issue'?'🐛 App Issue':'⚠️ Workplace Incident'}\n${category}\nNi: ${session.name}\n${description}`;
    sb.rpc('send_whatsapp_alert',{p_text:msg}).catch(e=>console.error(e));
    alert('✓ Naisumite ang report. Makikita ito ng Owner/Manager.');
    supportDraft={report_type:'app_issue', category:'', description:''};
    render();
  });
  document.querySelectorAll('[data-support-inprogress]').forEach(el=>el.addEventListener('click', async ()=>{
    const r=cache.supportReports.find(x=>x.id===el.dataset.supportInprogress); if(!r) return;
    r.status='in_progress';
    await sb.from('inv_support_reports').update({status:'in_progress'}).eq('id',r.id);
    render();
  }));
  document.querySelectorAll('[data-support-resolve]').forEach(el=>el.addEventListener('click', async ()=>{
    const r=cache.supportReports.find(x=>x.id===el.dataset.supportResolve); if(!r) return;
    const resolution=prompt('Paano ito naresolba?');
    if(resolution===null) return;
    r.status='resolved'; r.resolution=resolution||''; r.resolved_by=session.name; r.resolved_at=invNow();
    await sb.from('inv_support_reports').update({status:'resolved',resolution:r.resolution,resolved_by:session.name,resolved_at:r.resolved_at}).eq('id',r.id);
    render();
  }));
  document.querySelectorAll('[data-support-viewphoto]').forEach(el=>el.addEventListener('click', async ()=>{
    const r=cache.supportReports.find(x=>x.id===el.dataset.supportViewphoto); if(!r||!r.photo_url) return;
    try{
      const signed=await sb.storage.from(MAINT_BUCKET).createSignedUrl(r.photo_url, 60*60);

  invCareSaveMsg = 'Na-save ang CARE 1. Ipakita ito sa empleyado para sa kanilang paliwanag sa loob ng 24 oras.';
  render();
  setTimeout(()=>{ invCareSaveMsg=''; render(); }, 5000);
}
async function invSaveCareExplanation(){
  const d=invCareDraft;
  const expEl=document.getElementById('care-explanation');
  d.employee_explanation=expEl.value.trim();
  d.employee_explained_at=invNow();
  d.status='explained';
  await sb.from('inv_care_records').update({employee_explanation:d.employee_explanation,employee_explained_at:d.employee_explained_at,status:'explained'}).eq('id',d.id);
  await invAuditLog('care_explained',{employee:d.employee_name,reference:d.reference_no});
  render();
}
async function invSaveCarePart2(){
  const d=invCareDraft;
  const action=document.getElementById('care-action').value;
  const eff=document.getElementById('care-effective').value.trim();
  const concurred=document.getElementById('care-concurred').value.trim();
  const hrEl=document.getElementById('care-hr');
  const prevWarnEl=document.getElementById('care-prev-warning');
  if((action==='final_warning'||action==='termination') && (!hrEl || !hrEl.value.trim())){
    if(!confirm('⚠️ Kailangan ang Noted by HR Director para sa Final Warning/Termination ayon sa Standards of Behavior. Ituloy pa rin nang walang ito?')) return;
  }
  d.corrective_action=action; d.corrective_action_effective=eff; d.concurred_by=concurred;
  d.hr_noted_by=hrEl?hrEl.value.trim():d.hr_noted_by;
  d.previous_warning_date=prevWarnEl?prevWarnEl.value:d.previous_warning_date;
  d.offense_count=invCareOffenseCountFor(d.employee_name,d.degree_of_sanction);
  d.status='corrective_action_issued';
  await sb.from('inv_care_records').update({corrective_action:d.corrective_action,corrective_action_effective:d.corrective_action_effective,concurred_by:d.concurred_by,hr_noted_by:d.hr_noted_by,previous_warning_date:d.previous_warning_date,offense_count:d.offense_count,status:d.status}).eq('id',d.id);
  const rec=cache.careRecords.find(c=>c.id===d.id); if(rec) Object.assign(rec, d);
  await invAuditLog('care_corrective_action',{employee:d.employee_name,action,reference:d.reference_no});
  const msg=`*CARE — CORRECTIVE ACTION ISSUED*\n${d.employee_name}\n${d.reference_no}\nSubject: ${d.subject}\nAction: ${action.replace('_',' ')}\nIssued by: ${d.issued_by}`;
  sb.rpc('send_whatsapp_alert',{p_text:msg}).catch(e=>console.error(e));
  invCareSaveMsg = `Na-save ang Corrective Action (${action.replace('_',' ')}) para kay ${d.employee_name}.`;
  render();
  setTimeout(()=>{ invCareSaveMsg=''; render(); }, 4000);
}
async function invSaveCareAcceptance(){
  const d=invCareDraft;
  d.employee_accepted=document.getElementById('care-accepted').checked;
  d.employee_comments=document.getElementById('care-comments').value.trim();
  d.employee_accepted_at=invNow();
  d.status='closed';
  await sb.from('inv_care_records').update({employee_accepted:d.employee_accepted,employee_comments:d.employee_comments,employee_accepted_at:d.employee_accepted_at,status:'closed'}).eq('id',d.id);
  // I-UPDATE ANG CACHE — kung hindi, ang CARE block sa render() ay makikita
  // pa rin ang lumang record (employee_accepted=null, status='corrective_action_issued')
  // at mag-fi-fire ulit ang block kahit na-close na ang CARE.
  const rec=(cache.careRecords||[]).find(c=>c.id===d.id);
  if(rec) Object.assign(rec, d);
  await invAuditLog('care_closed',{employee:d.employee_name,accepted:d.employee_accepted,reference:d.reference_no});
  invCareView='log'; invCareDraft=null;
  invCareSaveMsg='✅ Na-save. CARE record ay sarado na.';
  render();
  setTimeout(()=>{ invCareSaveMsg=''; render(); }, 4000);
}
function invExportCareCsv(){
  const rows=(cache.careRecords||[]).map(c=>[c.reference_no,c.to_field||c.employee_name,c.from_field||c.issued_by,c.issued_date,c.subject,c.infraction_rule,c.degree_of_sanction,c.details,c.previous_warning_date,c.status,c.employee_explanation,c.corrective_action,c.corrective_action_effective,c.concurred_by,c.hr_noted_by,c.employee_accepted?'Oo':'Hindi',c.employee_comments]);
  invDownloadCsv(`PALARUAN-CARE-${invCsvDateTag()}.csv`, ['Reference No','TO (Employee)','From (Issuer)','Date','Subject','Rule','Sanction Degree','Details','Previous Warning Date','Status','Employee Explanation','Corrective Action','Effective Date','Concurred By','HR Noted By','Accepted','Comments'], rows);
}
// LOGOUT — DELEGATED listener sa document mismo, isang beses lang itong
// nirerehistro sa simula ng app, kaya gumagana ito kahit anong screen ang
// kasalukuyang bukas. Dati, ang Logout link ay nasa loob ng renderHeader(),
// pero binibind lang ito ng bindEvents() — at ang mga hiwalay na route tulad
// ng 'care-hub' ay tumatawag ng sarili nilang bind function (bindCareHub)
// imbes na bindEvents(), kaya LUMALABAS ang Logout link pero WALANG click
// handler — ito ang totoong dahilan kung bakit "kailangan i-refresh" para
// makapag-logout habang nasa CARE screen. Sa pagkakaroon ng ISANG delegated
// listener dito sa document, hindi na kailangang umasa sa bawat indibidwal
// na route na tama ang pagkaka-bind nito.
document.addEventListener('click', (e)=>{
  const el = e.target.closest('[data-go="logout"]');
  if(el){
    session=null; DB.save('session', null);
    careOnlySession=null; careOnlyFetchedRecord=null;
    invSobAccessUnlocked=false; invSobAccessLoggedThisView=false;
    go('login');
  }
});
(async function start(){
  // I-CHECK muna kung totoong naaabot ang Supabase bago magpatuloy — kung
  // hindi, ipakita kaagad ang banner imbes na hayaang manatiling tahimik na
  // stuck ang screen (ito ang naging dahilan ng "walang connection, kahit
  // i-refresh walang nangyayari" — walang kahit anong signal sa user na
  // nabigo ang pag-load).
  try{
    const pingPromise = sb.from('app_settings').select('key').limit(1);
    const timeoutPromise = new Promise((_,reject)=>setTimeout(()=>reject(new Error('timeout')), 8000));
    await Promise.race([pingPromise, timeoutPromise]);
  }catch(e){
    console.error('startup connectivity check failed', e);
    showConnectionBanner('Hindi makakonekta sa server. I-check ang internet connection.');
  }
  await initData();
  await utilLoadData();
  await loadPhaseA();
  // RESTORE ROUTE — kapag may naka-save na route at may active na session,
  // ibalik ang user sa parehong screen kung saan sila noong nag-refresh.
  if(session){
    try{
      const saved = localStorage.getItem('lastRoute');
      const safeRoutes = ['select','cashier','inventory','employee','care-hub','care-answer','support','utilities','summary'];
      if(saved && safeRoutes.includes(saved)){
        route = saved;
      } else if(saved==='checklist' || saved==='locked'){
        // Kung naka-save na 'checklist' o 'locked', i-check muna kung may
        // submission na ngayon para hindi makita ng staff ang interactive
        // checklist na dapat read-only na (ito ang dahilan kung bakit paulit
        // ulit na nila ina-undo ang kanilang sariling na-submit na checklist).
        const sub = cache.todaySubmissions[currentChecklist];
        if(sub && session.role !== 'owner') route = 'locked';
        else route = 'checklist';
      }
    }catch(e){}
  }
  render();
  loadCashier().then(()=>{ cashierModuleLoaded=true; if(route==='cashier') render(); }).catch(e=>console.error('loadCashier bg',e));
  loadInventory().then(()=>{ inventoryModuleLoaded=true; if(route==='inventory') render(); }).catch(e=>console.error('loadInventory bg',e));
  if(session && session.role==='staff') startAuditWatch();
  setupAutoLogout();
})();

/* ----- Auto-logout after 5 minutes of inactivity ----- */
let inactivityTimer = null;
const INACTIVITY_MS = 5 * 60 * 1000; // 5 minutes
function resetInactivityTimer(){
  if(!session) return; // only when logged in
  if(inactivityTimer) clearTimeout(inactivityTimer);
  inactivityTimer = setTimeout(()=>{
    if(session){
      session = null;
      DB.save('session', null);
      route = 'login';
      render();
      setTimeout(()=>alert('Naka-logout ka dahil 5 minuto nang walang aktibidad. Mag-login ulit.'), 150);
    }
  }, INACTIVITY_MS);
}
function setupAutoLogout(){
  ['click','touchstart','keydown','scroll','input'].forEach(evt=>{
    document.addEventListener(evt, resetInactivityTimer, {passive:true});
  });
  resetInactivityTimer();
}
</script>
